body:
  text: 殿閣詞林記卷九明黃佐廖道南撰殿閣洪武十五年十一月戊午倣宋制置殿閣學士以禮部尚書劉仲質為華蓋殿大學士翰林院學士宋訥為文淵閣大學士檢討吳伯宗為武英殿大學士典籍吳沉為東閣大學士是月辛酉覆命耆儒鮑恂余詮張長年為文華殿大學士皆辭不拜既而全思誠始拜命永樂二十二年九月丁酉仁宗昭皇帝增設謹身殿大學士命太子少傅楊榮兼之其序次華蓋殿謹身殿文華殿武英殿文淵閣東閣凡六大學士至今因之而文華殿則不常設左右春坊亦時設大學士云親擢洪武之末翰林不及十數人壬午六月成祖即位首詔吏部及本院舉文學行誼才識之士授職聞待詔解縉名擢居近侍召對喜其竒傑敢言益見信用七月侍書黃淮改中書舍人入見上與語大竒之凡侍朝特命與縉立于御榻左以備顧問一日以萬幾叢脞日御奉天門左室每夕召對至夜分或便殿就寢賜坐榻前論議政事同列不得與聞是時吳府審理副楊士竒在翰林充修史官亦有譽望親擢為編修已而改給事中金幼孜桐城縣知縣胡儼為檢討尋升縉為侍讀胡靖為侍講編修楊子榮為修撰而改子榮名榮繼又升淮為編修九月遂開內閣於東角門內召七人者諭以委任腹心至意俾入處其中專典密務雖學士王景輩不得與焉明日賜織金羅衣各一襲時幾務孔殷每旦奏事退內閣之臣造扆前進呈文字商機密承顧問率漏下十數刻始退十一月升縉為侍讀學士靖淮儼皆侍讀榮士竒幼孜皆侍講復靖名廣永樂元年九月上御右順門召縉及士竒諭之曰朕即位以來爾七人者朝夕相與共事鮮離左右朕嘉爾等恭順不懈皆賜五品公服二年正月七人皆賜二品金織衣且勞之曰天下事咸朕與若等同計非若六卿之分理也三月册立儲宫進縉為學士兼右春坊大學士奉議大夫淮為左春坊左庶子廣為右春坊右庶子皆奉議大夫仍兼侍讀儼為左春坊左諭德仍兼侍讀榮為右春坊右諭德仍兼侍講士竒以本官兼左春坊左中允幼孜以本官兼右春坊右中允各賜袍笏九月儼出為國子祭酒四年縉坐事去廣遂進學士兼左春坊大學士奉政大夫五年二月淮進右春坊大學士仍兼侍讀尋進學士仍兼右春坊大學士士竒進左春坊左諭德幼孜進右春坊右諭德俱奉訓大夫仍兼侍講十二年淮坐事去十四年四月廣進文淵閣大學士榮幼孜進學士三人仍兼春坊原職十五年二月士竒進學士仍兼春坊原職十六年五月廣卒十八年閏正月命榮幼孜皆為文淵閣大學士兼學士十九年正月改士竒為左春坊大學士終永樂之世內閣之臣不過五品而華蓋等殿大學士亦不復設蓋雖不崇以穹秩然皆出於親擢寄以天下大政諫行言聽得以盡其啓沃是故英宗復辟大學士李賢柄政復永樂之舊時修撰嶽正每開口論事以世務自許大內廉知其名吏部尚書王翺亦薦之天順元年六月召見文華殿上見遽曰好問年幾何對曰四十又曰正好問何處人對曰漷縣人又曰又是北方人問治何經曰尚書上曰是書經尤善問何科進士對曰正統十三年上益喜曰又是我所取者乃顧曰今用汝內閣參預機務凡事為朕主張許彬老矣不足恃也正頓首辭至再乃出赴閣九月朔御文華殿召太常少卿兼侍讀彭時入見令近榻前問曰汝是正統十三年狀元邪對曰不才誤蒙寵渥拔擢至今感戴不忘因叩頭者三又曰第二名是陳鑑第三名是嶽正對曰是又問今年幾何對曰臣犬馬之齒四十二上曰正好用出外喫酒飯時叩首謝命赴文淵閣辦事蓋前此未嘗無親擢者觀此倚毗宰輔禮重儒臣之意可知矣咨詢必及其年者豈不以老成謀國必有徽猷新進少年或至敗事歟用人慎始如此真可謂後世法視事殿閣大學士雖設自洪武中然同在內閣視事則自永樂初年始其坐次不敢正席者以車駕所嘗臨幸故也天順中大學士李賢疑與外衙門同將欲正席坐同列彭時不可乃止時常記其事曰文淵閣在午門之內迤東文華殿南面磚城凡十間皆覆以黃瓦揭文淵閣三大字于閣門中間置紅匱藏厯朝訓録副本前楹設凳東西餘四間後列書匱隔前楹所李賢自吏部進以傍坐不安令人移紅匱壁後欲設公座時曰不可聞宣德初年駕幸至此故不設公座李曰事久矣今設何妨時曰此內府也亦不宜南面正座李曰東邉會食處與各房却正座如何時曰此有牌扁故為正彼皆無扁故也李曰東閣有扁亦正坐何必拘此時曰東閣西面非正南也李詞氣稍不平曰烏有居是官而不正其位乎時曰正位在外諸衙門則可在內決不可如欲正位則華蓋謹身武英文華諸殿大學士將如何耶蓋殿閣皆至尊所御原設官之意止可侍坐以備顧問決無正坐理李語塞然意猶未已踰日上遣中官傳恭送孔子并四配像一龕置於中間又數日遣太監裴當送聖賢畫像一副來懸於龕後壁上乃罷不設坐焉幾務內閣參預幾務肇自成祖然惟大學士暨學士而已永樂二十二年八月仁宗立以文淵閣大學士楊榮等輔導久積有年勞乃命升榮為太常寺卿金幼孜為户部右侍郎俱兼前職楊士竒為禮部左侍郎兼華蓋殿大學士起前左春坊大學士兼學士黃淮為通政司通政使兼武英殿大學士四人俱掌內制內閣帶三品官䘖始此九月加士竒少保仍兼前職榮太子少傅兼謹身殿大學士幼孜太子太保兼武英殿大學士內閣位至三孤始此尊師重傅之禮至是極矣十一月士竒復進少傅兼職如故洪熙元年正月淮進少保户部尚書士竒進兵部尚書幼孜進禮部尚書俱兼大學士如故內閣帶尚書官䘖亦始此是年閏七月宣宗既嗣位罷𢎞文館命太常寺卿兼學士楊溥與士竒等同視事宣德元年三月升行在禮部右侍郎張瑛為左侍郎兼華蓋殿大學士九月淮致仕二年二月升行在户部左侍郎陳山為本部尚書兼謹身殿大學士瑛亦進本部尚書兼職如故二人者儲宫舊僚也自是每朝必晉陟侍從謂之從龍恩云然山與瑛皆不厭人望山直內閣無何被疏斥即致仕去久之瑛亦改南京禮部尚書六年十二月幼孜卒九年八月溥進禮部尚書兼職如故九月瑛起復入見憫其已老留為尚書兼大學士英宗在東宫天資明睿尚沖年委裘未及出閣講學故無推恩者正統元年七月瑛卒三年四月士竒暨榮俱進少師兼職如故溥進少保兼武英殿大學士內閣以實録成進官始此五年七月榮卒九年三月士竒卒十一年二月溥卒於是老成盡矣是時侍講學士陳循進户部左侍郎兼學士入閣參預幾務侍讀苗衷侍講髙榖修撰馬愈曹鼐以經筵日講官皆進侍講學士與循同視事未幾鼐進吏部左侍郎𠂻進兵部左侍郎俱兼侍講學士愈進禮部右侍郎榖進工部右侍郎俱兼侍讀學士愈尋卒十四年八月鼐扈從北征沒於土木之難景泰以郕王監國擢修撰商輅彭時入閣辦事及即位藩府舊僚推恩止侍郎不得厠內閣而循榖各進本部尚書兼學士輅時皆進侍讀時以憂去又擢户部右侍郎江淵兼學士入閣參預幾務尋又命禮部右侍郎俞綱綱在內閣三月改南京禮部蓋朝廷欲修永樂故事擢用諸人然進退亦頗輕矣景泰元年二月𠂻進本部尚書兼學士尋致仕九月輅進學士十一月以禮部左侍郎王一寧國子監祭酒蕭鎡各兼學士俱入閣參預幾務尋加循少保兼文淵閣大學士榖少保兼東閣大學士仍兼尚書如故四月命循榖俱兼太子太傅升淵一寧鎡俱太子太師輅兵部左侍郎學士兼左春坊大學士一寧尋卒十月命太子太保兼都察院左都御史王文入閣辦事外官不由翰林得參預幾務者始此初文與中官王誠結為兄弟謀入閣嘗私以語髙榖會有中旨增內閣貟陳循舉蕭鎡禎榖遂舉文奏上果用文人皆駭諤四年二月命文為太子太保吏部尚書兼學士尋加少保兼東閣大學士尚書如故七年五月改循兼華蓋殿大學士榖文俱兼謹身殿大學士鎡進本部尚書兼職如故英宗復辟天順元年正月命都察院右副都御史徐有貞兼學士入閣參預幾務有貞始名珵由侍講升任以迎復功故有是命是日升太常寺卿許彬為禮部左侍郎兼學士與有貞同視事明日升有貞為兵部尚書兼職如故詔罪謀立襄藩者王文伏法陳循江淵謫戌蕭鎡商輅發為民蓋事關社稷有所不得已故也又明日升大理寺卿薛瑄為禮部右侍郎兼學士入閣參預幾務又數日榖致仕三月命吏部右侍郎李賢兼學士入閣參預幾務有貞為奉天翊運推誠宣力守正文臣特進光祿大夫封武功伯兼東閣大學士尋改兼華蓋殿大學士掌文淵閣事曰掌文淵閣事有貞所自署也閣在御府大內非人臣所可掌矧非軍功冒進封爵固占知其不終矣尋進賢為本部尚書兼官如故五月彬瑄轉左侍郎仍兼原職六月命通政司左參議兼侍講吕原繼命修撰嶽正俱入閣參預幾務有貞賢坐事左遷賢為吏部左侍郎瑄遂致仕去瑄制行純慤邃於理學其去也蓋見幾而作云七月有貞革爵逺竄彬坐黜復賢官視事如故永樂中胡儼自內閣出不復再入再入自賢始也正尋坐事去九月命太常寺少卿兼侍讀彭時復入閣參預幾務十二月時進兼學士改原為侍讀學士二年五月原進學士六年七月加賢太子少保八月原以憂去十一月卒七年二月升詹事府詹事陳文為禮部右侍郎兼學士入閣參預幾務正統八年正月憲宗嗣位三月復正原職不預幾務加賢少保兼華蓋殿大學士尚書如故文吏部左侍郎時吏部右侍郎仍兼原職十月時進兵部尚書成化元年三月文進禮部尚書二年十二月命太常寺少卿兼侍讀學士劉定之入閣參預幾務是年賢以憂去奪情起視事尋卒三年三月復商輅原職視事如故八月文時俱加太子少保仍前尚書兼文淵閣大學士定之進工部左侍郎兼學士四年四月文卒十月輅進本部尚書定之轉禮部左侍郎俱兼職如故七年六月定之卒十一年正月時進少保三月卒四月輅進文淵閣大學士十二年六月加太子少保改吏部十三年二月進兼謹身殿大學士十四年輅致仕去加少保終成化之世又有劉珝萬安劉吉尹直彭華𢎞治中則徐溥丘濬劉健李東陽謝遷正德中則焦芳劉宇曹元王鏊劉忠楊廷和梁儲費宏靳貴楊一清蔣冕毛紀若芳與宇元由逆瑾進者也其末也惟廷和惟儲惟冕惟紀預聞嘉靖初政焉以近事尚在人耳目不復悉記夫內閣密勿之地寄以幾務即虞書所謂股肱説命所謂作礪作舟楫作霖雨也始雖以待儒彥而其後則元老巨寮為天下具瞻者乃得與焉百餘年來政治樞要實在於此舊制雖不設丞相而世以宰相稱之嗟乎用非其人固足以覆餗然或不見親且信焉雖有真儒安所宣其效哉擬旨唐宋以來臣僚章奏凡有所批答皆臣下代言中書省及集賢院翰林學士専之洪武初始猶設中書省丞相政事由以出納其後革去分任五府九卿衙門中外章奏皆上徹御覽每斷大事決大疑臣下惟面奏取旨有所可否則命翰林儒臣折𠂻今古而後行之故洪武中批答皆御前傳旨當筆即所書天語尚溫也永樂洪熙二朝每召內閣造膝密議人不得與聞雖倚毗之意甚專然批答出自御筆未嘗委之他人也至宣德時始令內閣楊士竒輩及尚書兼詹事蹇義夏原吉於凡中外章奏許用小票墨書貼各疏面上進謂之條旨中易紅書批出御筆親書及遇大事猶命大臣面議議既定傳旨處分不待批答自後始專命內閣條旨然中每依違或徑由中出嗣是若正統初年委政中官王振一至於此上下蒙蔽乃及土木之難及天順復辟每事與內閣面議然後批行𢎞治末年總覽權綱內閣條旨多孝廟御書事陟重大至厪宣問幾復國初之舊正德時批答大率與正統相類今之建議者徒知批答當依內閣所條而不知有面議傳旨故事或誤以條為調謂調和之義也審爾則是漫無可否以聽上裁惟恐見忤矣豈所望於以道事君者哉茍利社稷死生以之可也密疏內閣密務有難揚言敷奏者永樂許密封進呈謂之密疏己亥十七年十二月己丑學士楊榮密疏進言十事皆斥五府六部三法司積弊成祖嘉之密諭榮曰汝言實切時病但汝為腹心臣若遽進此言恐羣臣益相猜疑不若使言官言之於是得監察御史鄧真俾入奏衆皆服栗免冠請罪詔諸司即日悛改怙終者不赦蓋榮所為奏留中真則受其意也洪熙初改元兵部尚書李慶言於上曰民間馬畜蕃盛已散之軍伍尚餘數多請令朝覲官領之少蘇民力大學士楊士竒獨密奏謂朝廷求賢任官今乃使養馬而課責與民同非貴賢賤畜之意明日靣請內批罷其事不報明日又入對請罷上曰吾偶忘之當即批出不爽也午刻上御思善門諭曰內批豈真忘念卿孤立為衆所傷不欲因卿言而罷耳今有名矣出示一章乃按察使陳智所言者命士竒據几草勑止之已領者準洪武中官貟乘例不責生息虧損不責償未給者止勿給復謂曰繼今令有不便惟密與朕言李慶輩不識大體不足語也二十二年十一月學士楊溥密疏言事上嘉納手勑奬諭之曰覽卿所奏為國家之計誠合朕心但望卿始終如一知無不言相朕致治以承天休感卿忠懇特用酬報今賜卿綵幣一雙鈔一千貫卿其領之夫事幾不密則害成今日所以委曲為之處者如此而又寵以旌賞真可謂一德一心矣其後內閣言事循此例類用題奏揭帖不宣聞於外云天順癸未空中有聲大學士李賢密疏曰傳言無形有聲謂之鼓妖上不恤民則有此異因條十事上陳英宗嘉納詔皆從之頒行天下賢又請罷江南所造段匹磁器清錦衣衛囚止各邊守臣進貢下畨所遣使臣停中外買辦采辦詔不從賢執之數四止取前十條行之左右見賢力爭皆寒悚同列亦為賢懼賢曰古之大臣知無不言今雖不能盡然至於利害繫國家安危者豈可默默以茍祿位然聖明亦不以為忤也蓋嘉謀嘉猷入告于內與揚言敷奏者不同必利害係國家安危而後言之又與爭一事之得失陳一時之利害者不同內閣事功稱三楊一李然其所遭際可考也夫惟聲色不動而誠意潛孚閲歷既多而識見素定乃可以當此然亦難矣嶽正在內閣嘗密言吉祥石亨罪惡二人譖之被黜有士人告之曰先生犯孔子戒矣問之云何則曰未信而諫是也正曰臣被簡用置左右責任教誡甚至敢不盡心若子以諫官處我則恐未然夫正之言誠是也沃心之論造膝之謀初不事於表暴而天下自隂受其賜此內閣之所以異於諫官也若先朝委任楊李真可以為萬世法會議宣德以前每有政事與羣臣面議正統十年始命內閣官與各衙門會議遂為例徐有貞曰景泰四年十月詔以河決沙灣久弗克治集左右臣弼暨百執事之官于文淵閣議舉可以治水者僉以有貞應上特用之有貞立碑為記近例凡厥時政有大事當會議者該部奏請會如合會儒臣則本院詹事府左右春坊司經局及國子監皆預繕寫永樂時內閣進學者二十八人皆靣稽而身教之王英王直德器才學尤為儕輩所推首擢為修撰以皆慎密可任並揀入祕閣書進呈幾密章疏永樂末纍擢至講讀學士蓋嘗試以為大用之地云至宣德時復增左春坊大學士曽棨俾入直未幾棨卒二王亦出理部事繕寫章疏之任遂廢書辦大明會典云凡內閣所掌制敕詔旨誥命册表寶文玉牒講章碑額及題奏揭帖等項一應幾密文書及王府敕符底簿皆制敕房書辦文官誥敕及畨譯敕旨并四夷來文揭帖兵部紀功勘合底簿等項皆誥敕房書辦合用中書舍人等官於本院或各該衙門帶俸遇有升遷仍舊供職其有堪别用者亦從吏部推舉閣禁祖宗規制嚴密內閣之禁凡一應官貟間雜人等不許擅入違者治罪今內閣門額尚懸嚴旨葉盛日記有云文淵閣宥密之地外臣非公事不能至廷陛機宜無敢泄者楊文貞文定文敏三先生典刑尚存文貞間遇知巳或問近日外間有何事或某事便否亦甚鮮也後來者則有稍稍傳聞于人甚而方面官見辭後必造謁或拘舉子入考文字又甚而造膝之言伐言之筆不待莫出禁門而已遍告多人矣此蓋指景泰中之用事者故云然參見凡本院官入見內閣必先使孔目通姓名而後見初授官謝恩後入見例留飯可齋雜記云時官修撰謝恩後偕同年陳緝熙嶽季方詣閣下見曹陳苗髙四先生遂留早餐酒飯隨光祿寺所供不增設諸先生笑曰此是本院故事儒官清淡只如此蓋以僚友待之也其後內閣官尊或有座主門生之分遂今六品以下揖於階下五品及詹事府官送迎如僚友禮陛朝見朝辭及冬正旦行禮後不暇易服往見焉非公事不復至或議朝政質問可否使孔目請入乃入外官入見亦以公事會典所載凡各衙門領敕官貟俱赴內閣會有敕書方赴鴻臚寺報名辭朝領勑其他則國子監官送書課提督四夷館送番譯文字之類具有定規云𢎞文洪武三年四月庚辰置𢎞文館設學士一貟及校書郎等官九年閏九月定官制遂罷之居是職者劉基詹同羅復仁胡鎡也仁宗即位建𢎞文閣於思善門外蓋法國初遺意永樂二十二年八月命本院學士楊溥掌之與侍講王進時承顧問討論經籍又擢編修楊敬給事中何澄俾預焉又起用檢討陳繼凡在閣者五人駕嘗臨幸講論經史不倦洪熙元年閠七月溥等奏納𢎞文閣印各還原任儲闈可之仍命溥與楊士竒等同治內閣事正德初建議者謂宜倣𢎞文閣故事特命侍從文學之臣更番入直或召天下名賢文學恬退者一二人如起用陳繼之例聽政之暇遊息之間時至閣中略去威嚴從容詢問或講經書或論古今成敗有暇則至不必拘其時有疑則問不必嚴其禮如是則聖學緝熙義理純熟凡百玩好自不暇及而所召必皆一時之聞人則亦可以收拾天下之遺才矣此亦祖宗君臣同遊之漸未必無補惜論建未及付之空言而已東閣正統丁卯詔選本院官之有譽望者入東閣讀中祕書修撰劉儼商輅編修陳文吕原等凡十人且特命之侍經筵日在內府進學不倦蓋儲之以待大用也厥後多為名臣嘉靖丁亥五月朔日食臣道南進陳洪範九疇疏以徵時政仰荷御劄云翰林官中有才識忠行者日輪二貟入直東閣凡經書史鑑有關君德者日録所聞以贊朕不逮於是大學士楊一清奏講大學衍義上特命顧鼎臣講洪範臣道南講無逸臣於終篇引吕祖謙論曰天之生萬物也健而不息以成悠久之功君之生萬民也勤而無逸以成惇大之治故人君之德在乎法天而已矣我太祖髙皇帝命儒臣進講無逸諭曰自昔有國家者未有不以勤而興以逸而廢周公是書上自天命之精微下至民生稼穡之艱難以及閭里小民之怨詛莫不具載先事而慮其意深矣朕每觀是篇反覆詳味求古人之用心嘗命儒臣書于殿壁朝夕省閲以為監戒仰惟皇上敬天愛民懋學勤政揭無逸豳風于殿亭以紹帝王之心法軫耕夫織女之勤苦以昭聖祖之徽猷雖商之三宗周之三后有不能企及焉者矣尤願剛健純粹孚乾運之不息含宏光大廣天德之好生明作有功而百司庶府咸貞其度曲成不遺而兆民庶物各得其所中庸曰故至誠無息不息則久久則徴徴則悠逺悠逺則博厚博厚則髙明博厚所以載物也髙明所以覆物也悠久所以成物也博厚配地髙明配天悠久無疆臣愚端有望于今日殿閣詞林記卷九
