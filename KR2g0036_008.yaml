body:
  text: 殿閣詞林記卷八明廖道南撰史館附修撰陟禮部尚書朱夢炎朱夢炎字仲雅江西進賢人元進士金溪縣丞歲丙午以故官入朝授國子博士吳元年遷修撰夢炎博學能文凡稽古禮文志多預議未幾補浙江按察司經歷洪武二年轉山西行省貟外郎召入為禮部貟外郎尋陟侍郎本部尚書修撰兼大本堂待制王僎王僎字原闕河南祥符人元末為國子助教洪武初徴為修撰四年開科取士僎與典試又命于大本堂授吳王經遷待制後以子𢎞為龍江遞運官忤丞相胡惟庸置之于理惟庸敗僎來京授徒上忽問僎安在左右告以其故召見慰勞甚至賜以綺帛仍給舟還于家修撰孔克表孔克表字正夫浙江平陽人孔子五十五代孫也至正戊子進士洪武六年正月徴為修撰克表長身美髯學篤而不窳尤精於諸史所著有通鑑綱目附釋宋濂稱其書世不可無視穿鑿性命簸弄詞章者不侔故一時士林稱為巨擘云修撰劉泰劉泰字原闕山東淄川人洪武間為修撰上親𠡠曰朕聞孔子之諭孝也逰必有方斯可為孝矣朕昨與卿逰東苑詢及卿家事卿對以宗族甚蕃遭兵漸减獨老母在别無侍養卿云至此朕心惕然吁哀哀父母生我劬勞今朕雖君天下育萬民二親已逝恨不生今於朕有戚戚焉若欲迎親就養或棄職往侍朕勿拘焉修撰趙新趙新字彥銘浙江樂清人洪武初任本庠訓導出知開封府入為國子助教陟山西右布政使復改修撰上賜𠡠曰士之所以能立以保其終者有三品焉上才之士志髙量大其所為無所不可中才之士謹守成法不失其忠然不至于為惡此皆足以保其身者也惟卿質真無僞涉獵書史始為國子助教能舉其職及遷山西布政使雖無所設施而持身廉潔朕以卿本儒者而才不及中人不宜任以政務授翰林院修撰既而見卿年老多疾特令致仕卿其保厥終始以副朕懷所著有四書說約行素稿修撰李叔允李叔允字原闕河南鈞州人洪武三年任國子博士洪武六年纂修昭鍳録同事者則秦王傅文原吉助教朱復録事蔣子杰吕宗盛杜環張雲翀吳從善王鏞宋善也書成叔允擢修撰及修洪武正韻亦與有力焉廖道南曰國初設國史修撰諸職蓋以擬宋制云而朱善為大學士朱夢炎為大宗伯此其最顯者也觀孔克表所著潞州學記所養正矣而王僎之直劉泰之孝趙新李叔允之博雅皆有可取焉又有迮原霖者未知其為迮雨否也吾於弔唐肅文見之矣贊曰仲雅不羣博而能精王僎克直而忱而恂克表聖裔存性之貞劉泰孝養情感丹宸彥銘叔允華國之文懋績編摩不二其心修撰達嚕與權達魯與權其先朔人後居河南永寧仕元為河南北道僉事以故官入朝洪武六年為秦府紀善改監察御史上疏言堯舜禹湯文武相承為道統孔子顔曽思孟相傳為道學宜崇祀典七年八月復上疏言王者立始祖之廟又推始祖所自出之帝祀之於廟故曰禘祭今受命已七年矣而禘祭未舉甚為匪彛也上皆納之先是出為廣西僉事未之任復召回至八年三月擢為修撰降典籍轉應奉致仕自稱洛上翁上親為說辨之文多不載又有莽蘇爾伊克瑪哈穆特西域人也能通華夷譯語善測天文上命為編修特𠡠勞之廖道南曰天地無棄物王者重絶人信斯語也古之刖者守門瞽者司樂宫者守宫各全其生也而寄象鞮譯無弗設焉與權達嚕不猶是乎特著莽蘇于編修者附莽蘇也外之也贊曰聖人用人造化成物小大各偹罔不充足元之孽臣號曰達嚕亦有莽蘇為我供役秉政中華日際月域他山之石可以攻玉起居注熊鼎熊鼎字伯頴江西臨川人元至正七年鄉舉為龍溪書院山長遇兵亂陳友諒屢强之仕不就王師駐鄱陽大將軍鄧愈聞其名請與相見鼎母黎氏乃言曰聞江表有真主兒可速往矣上至南康召至軍門與語大悅欲授以事鼎以母老辭乃留置幕府參贊軍事丙午徴至京師授德清縣丞吳元年為中書博士改太常博士編集經史事類成遷起居注七月乙亥上御㦸門命選樂舞生召學士朱升范常閲試上親擊石磬學士不能辨以宫為徴上詰之鼎曰八音之中石最難和故書曰於豫擊石拊石百獸率舞上曰石音固難和然必以人聲為主人聲既和即八音和矣因命樂舞生舞歌一曲上曰古者作樂以和民聲格神人而與天地同其和近世儒者鮮知音律之學欲樂和顧不難哉鼎曰樂音不在外求實在人君一心君心和則天地之氣亦和天地之氣和則樂無不和矣時耿忠奏廣信郡縣茶稅不實上命御史往亷其事鼎諌曰朝廷新布大信于四方奈何肆赦之後復徴細務是䙝國威也又欲徴浙西糧輸京師鼎復曰國家都金陵以浙西為根本農作方興而據困之民害深矣上雅重其言凡創制更革之典鼎預聞洪武元年六月以鼎為浙江僉事尋調山東陟副使三年封建諸王以鼎為晉王傅㑹有事方丘鼎當導駕既齊宿習射苑中上命近臣俱射鼎一發中鵠上喜酌湩飲以賜四年故元四大王出沒為冦居民震恐上以鼎不能弭冦左遷大同知事五年復授晉府參軍七月召為刑部主事八年西戎多爾濟巴勒率部落內附上以鼎老成歷事岐寧衛經歷賜金帛以行鼎密疏論之上遣使慰勞賜以裘帽已而遣中使趙成召之還行次西凉打班驛巴勒叛酋約噶擁鼎還鼎切責以大義遂及趙成與知事杜實俱被害鼎時年五十五上聞悼惜遣使葬之黃羊川仍以祿給其家廖道南曰豫讀宋學士撰鼎父萬初及其母黎氏銘心竊賢之及觀國史述鼎死難悽惻牢落又不知涕之無從也然而論樂之和本于君心嗚呼鼎之學亦正矣宋濂銘略曰啓國之初俊才如雲其心之真允惟熊君帝謂相臣鼎也可恃不負吾民寧負吾子既入授經復出治戎狐裘毳衣惟帝念功封論邊事其䇿甚偉欲召用君君則道死編修蘇伯衡蘇伯衡字平仲其先蜀人文定公裔子遲守婺遂居金華伯衡幼警敏絶倫肆力古人洪武初徴為國子學録擢編修與劉基宋濂魏觀胡翰相友善基曰平仲著作語粹而氣逹不凡而意不詭蓋其明于理而昌于氣也濂曰平仲辭精博而不粗澀敷膄而不以綺縟其視魯弓郜鼎均也翰曰平仲托物以造端比事以寓意緣情以見義明於國家之體逹于人情之變其出蓋無窮也伯衡在史館多所著述及纂修元史成宋濂舉以自代伯衡以瞶辭歸上賜之綺帛給道里費周之復起為處州府學教授遂居平陽有文集十五卷編修王廉王廉字熙陽浙江青田人洪武初為編修二年正月安南國王陳日煃令陪臣同時敏上表稱臣上嘉其意遣侍講學士張以寧典簿牛諒往諭仍錫以璽書金印未及境而日煃卒以寧乃留詔即次于洱江先遣牛諒之其國嗣君曰日㷂復令陪臣杜舜卿來告哀上素服御西苑之幄殿親製奠章命廉充祭弔使同考功主事林唐臣往既至其境日㷂出迎于郊議授受禮往返數四不能决廉厲聲訶之乃奉御製于綵輿迎入壽光殿别設日煃靈位于殿前使者南向宣之日㷂率羣臣再拜俯伏以聽成禮而還既歸述所撰歌詩曰南征録宋濂序之稱其措辭和而不流激而弗怒雅而不凡可謂能專對者矣使旋擢工部貟外郎不拜改澠池丞所著有迂論數十册編修張美和張美和名九韶以字行江西臨江人十三能詩詞元至正間隱居教授洪武初辟為清江教諭轉國子助教擢編修美和善著書奏對稱㫖後以疾致仕上親賜𠡠曰古之至賢之士修己行仁以為時君之用否則獨善其身以終天年或著書立言傳之永久雖不顯于當時而光于後世爾美和篤信至善不易其守侍朕左右日與同逰詢問典禮以沃朕心奈何年高不能自強不忍任以周旋從卿歸老於戲千載一遇古今通言卿善始終不亦美乎廖道南曰豫觀南征録慨然興嘆嘉熙陽之不辱也及讀理學類編乃見其義精而語確美和所得者深矣贊曰炎荒綿邈桂海梧山厥土霾瘴厥途間關允矣熙陽事不避難大江渺茫匡廬彭蠡其道云逺其室伊邇誠哉美和著書逹理編修髙啓髙啓字季迪蘇州長洲人少孤力學工於詩詞時張士誠據蘇有參政饒介者喜延士啓方弱冠介見大竒之待以上賓啓不之答乃隱于松江之青丘洪武三年初修元史徴啓與儒士汪克寬胡翰宋喜陶凱陳基曽魯顔增趙汸張文海徐尊生黃箎傅恕王錡傅著謝徽充纂修之任書成擢啓編修命教勳臣子弟徽字𤣥懿與啓同鄉啓嘗夢與徽承召問豫告身後上御闕樓召啓與徽敷對詳明雅稱簡注命啓為户部侍郎徽為吏部郎中果如夢所感啓辭以少未更事遂與徽俱歸賜金帛有差啓復居青丘先是蒲圻魏觀署史局啓與交愜及觀守蘇聘啓至學宫延訪郡中利病多所裨益觀罹于禍遂連坐啓君子悼之啓身長八尺有文武才博羣典為文汪洋浩瀚神噓鬼吸靡有㾗跡其為詩也波起雲湧颷號電掣直超脫元宋而上宗盛唐近代詩人未之能及惜其傳之不多爾所傳有鳬藻缶鳴二集廖道南曰豫觀蘇平仲集善叙事理鬱而文質而不俚核而不夸及觀高季迪集天趣飄逸莫可羈勒嚴滄浪所謂詩有别才非關學也詩有别趣非關理也其然豈其然乎贊曰金華之派平仲是傳瓊芝燦爛玉樹聨綿姑蘇之英季迪為最震澤攸瀦洞庭攸㑹平仲之文季迪之詩劉宋而下彼如何其編修朱濓朱濂字伯清浙江義烏人洪武三年續修元史乃徴濂與儒士趙塤朱右貝瓊王彛張孟兼髙巽志李懋李汶張宣張簡杜寅殷弼俞同俱充纂修書成擢編修俾授楚王經濂自幼酷嗜考亭之學其見于辭章資為講解悉祖述之既而引年歸浦陽察隂陽鬼神之奧驗性命心情之藴乃即朱子精語編為理學纂言宋濂為之序稱其所見端確所得粹凝嘉惠後學功亦至矣仕終楚府長史編修傅藻傅藻字伯長浙江義烏人洪武五年以儒學教諭徴授編修尋改應奉為東宫文學十一年五月皇太子御文華殿命侍臣講讀春秋乃曰諸國之事雜見于二百四十二年間艱于考索乃命藻曹分類聚先周以尊天王次魯以崇望國次齊晉以表主􅉀次宋衛蔡陳以原列爵而楚而吳而越則列之于末繕為三十卷進呈上覽之喜賜名曰春秋本末是舉也校之者典籍劉仲質助教儲惟德稽之者中書舍人朱孟辨宋璲桂慎鑄印副使詹希元序之者宋濂也後藻出為武昌知府有惠政終河南按察使編修孫作孫作字大雅一字次和常州江隂人自曽祖澄川四傳至作家學克彰洪武六年丞相李善長等奏修日厯乃徴作與儒士徐一䕫黃昶陳孟𤾉俱充纂修書成擢作編修作自陳外補授太平府教授復召為助教明年分教中都又明年還成均又明年陟司業著書號東家子宋濂為作東家子傳今傳有滄螺集編修張宣張宣字藻仲其先清河人徙居常州之江隂父端為元江浙樞密院都事宣十歲善屬文讀書經目不忘洪武三年與髙啓等被徴同修元史上親書其名擢為編修宣為人爽闓潤密而文思浩雄宋濂為撰族譜所著有春秋傳義廖道南曰豫始逰南雍乃見朱伯清所撰理學纂言于司成魯公鐸及傅伯長所撰春秋本末于司成汪公偉而孫大雅之滄螺張藻仲之傳義猶未之見也諸儒夙際皇運𢎞闡賁文用心亦以勤矣贊曰義烏多賢乃有伯清辭章爾雅玉闕瑤京伯長超越萬人之傑沉潜三傳乃著本末次和藻仲處于江隂擢頴揚芒輝赫儒林編修王璉王璉字宗器其先太原人徙居山東之長山洪武五年以鄉舉發魁計階南宫六年正月甲寅上召見便殿命題賦詩詩成稱㫖是時舉人張唯王輝李端張鳳任敬馬亮陳敏張翀等至上嘉其才俊遂及璉等十七人俱充國史編修命入文華堂讀中祕書賜以冠服車駕時臨幸䇿勵取其文親評優劣日命光祿給膳羞酒漿每食太子暨諸王迭為之主而璉等侍食左右冬夏賜衣各一襲復有白金弓矢鞍馬之賜命宋濂為之師九年三月復命璉等攝監察御史事巡行天下紏察官吏賢否咨訪生民休戚璉如河南逮歸奏對雅稱上意乃諭廷臣曰文華堂諸生如璉者皆異日將相才也宋濂為之字說略曰宗廟之器貴重實殊夏有四璉殷稱六瑚昔端木氏才堪三卿文章外見以言語稱今生既長局度純亮發為辭章大河奔放出逄盛治講學禁中天日照臨以照以融豸冠峩峩巡行洛河貪夫夜逃良士笑歌厥用既周由體斯被生尚朂焉庶幾不器璉後為御史山東行省參知政事編修張唯張唯江西永豐人曲江張子壽之後也父光逺死於賊宋濂為之志銘唯流寓河南以尚書領首薦擢編修入文華堂肄業唯有俊才同列遜之編修張翀張翀字鳳舉河南人入文華肄業擢編修後教授南陽瀕行辭于宋濂曰翀以布衣感上恩遇喬嶽匪髙瀛海匪深典教一邦弗稱是懼濂作文送之且稱其沉重有識研窮遺經而造其閫奧可進於道是必有所試矣廖道南曰我聖祖尊賢造士之典於是乎益徴矣投戈之暇即建禮賢館履元之初即開文華堂鴻儒俊髦文物彬彬於戲盛哉今考之入文華者十七人而王璉張唯張翀者賴有景濂為之述也他若馬亮任敬陳敏李端王輝不少槩見可惜也哉贊曰虎觀天開石渠雲密東璧焜煌西昆赫奕濟濟多士藹藹吉人萬邦惟獻百度惟貞皇建有極古訓是式五星聚奎以兆今日編修朱右朱右字伯賢浙江臨海人光庭先生九世孫嘗逰李五峰陳兩峰之門洪武初預修元史大明日厯皇明寶訓授翰林編修終晉府右長史所著有白雲稿春秋類編三史鈎𤣥秦漢文衡深衣考誤歷代統紀要覽元史補遺凡若千卷編修蔣敬蔣敬字行簡其先汴人徙居金陵之錦繡里父成字翁輔孝友之士也洪武初敬為編修同蔡𤣥受業于宋濂濓既銘其父矣且稱敬為人謙慎重然諾一時名士多與之逰云編修羅公願羅公願字從善浙江青田人父世昌為處州路教授洪武四年公願應州辟舉以書經試銓曹擢編修轉工部都水主事編修王釐王釐江西鄱陽人洪武初以明經授本庠教諭徴為編修預修元史每承顧問稱㫖嘗患頭風上賜以所御藥酒飲之遂愈後知南陽府所著有羣英雜言諸集編修桑慎桑慎字仲修世居常州遷嘉興洪武初擢編修改監察御史賢能廉直孝親睦姻苦行力學逼于古人諍廷則有折檻之風諌友則有靣折之直以行部海南奏誅衛使張榮坐不避八議罪謫瓊安置未嘗怨懟凡動止合禮瓊志稱之編修董琰董琰字子莊江西樂安人洪武間為編修遷國子司業廖道南曰豫考國史乃得朱孟辨趙塤者以修元史徴吳升周孟東以賢良徴桑慎陳晟以儒士徴俱為編修晟自撰族譜與孟辨孟東俱見宋濂文集而其行義之詳弗可考也孔子曰豫猶史之闕文也嗚呼豈史之闕文爾矣乎贊曰蔣敬謙慎蔡𤣥敦約王釐遭際朱右𢎞博下逮羅周董朱為儔趙塤吳升孟東清修桑慎陳晟後先輝映唐虞之際於斯為盛殿閣詞林記卷八
