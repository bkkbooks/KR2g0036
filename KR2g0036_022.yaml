body:
  text: 殿閣詞林記卷二十二明黃佐廖道南撰議禮上祖宗時凡國家禮樂制度皆命本院儒臣議而行之洪武元年二月壬寅朔中書省臣及學士陶安等進郊社宗廟議曰圜丘曰方丘曰宗廟曰社稷各具沿革安等奏天子大社必受風雨霜露以達天地之氣若亡國之社則屋之不受天陽也今於壇創屋非宜若祭而遇風雨則於齊宫望祭上是之又定宗廟祭享之禮安與侍講學士朱升待制詹同等歷考秦漢以下廟皆同堂異室四時皆合祭今四廟時享宜倣之上命春特祭於三時合祭如古制至二年三月戊戌朱升等奉勑撰齊戒文大祀四日戒三日齊凡七日中祀三日戒二日齊凡五日上命凡祭天地社稷宗廟山川等神是為生靈祈福下令百官一體齊戒若自有所禱者不下令八月定大祀受誓戒九月乙巳詔以司中司命司民司祿及夀星五神為中祀命翰林院撰文七年六月乙卯上以大祀終獻畢方行分獻於禮未當命宋濓詹同議以若行初獻禮奠玉帛將畢分獻官行初獻禮亞獻終獻皆如之八月辛酉監察御史達魯與權請行禘祭事下禮部太常寺翰林院議以為虞夏商周四代世系明白其始所從出可得而推故禘禮可行自漢以來世系無考莫能考其始祖所自出當時所謂禘祭不過合巳祧之主序昭穆而祭之乃古之大祫非禘也宋神宗嘗曰禘者所以審諦祖之所自出是則莫知祖之所自出禘禮不可行也八年十一月乙丑詔翰林院考定大祀登壇脫舄之禮學士樂韶鳯奏祭日大駕臨壇入幕次脫舄升壇執事等官皆脫舄於外以次升壇供事協律郎樂舞生依前跣襪就位祭畢降壇納舄從之正月合祀天地於南郊詔儒臣紀其事九年五月乙丑將有事於方丘適有晉王妃之喪上命宋濂考古制以聞對曰郊社之禮國之大事聖人所重雖有三年之喪亦不敢廢示有尊也二十五年六月懿文皇太子喪時享在邇命翰林院禮部議之學士劉三吾等奏王制三年不祭惟天地社稷不敢以卑廢尊宋真宗居喪易月服除之明年遂享太廟祀天地服衮冕車輅儀物音樂緣神事者不廢其鹵簿鼓吹諸樂皆備而不作兹議天地社稷先師厯代帝王等神宜如宋制惟太廟先祖靈神所在國既有喪而時享用樂恐神不樂聽宜備而不作從之已而上自以己意定郊廟禮庶吉士解縉嘗上疏言六經殘缺莫甚禮樂宜正禮經祀天宜復掃地之規尊祖宜偹七廟之制上嘉其識先是洪武二年八月詔天下郡邑舉素志髙潔博通今古練達時宜之士年四十以上者禮送至京纂修禮書二十年十月諭禮部集諸儒臣稽考臣僚尊卑禮儀舊制重加刪訂凡二十六條行之改元之初即定釋奠先師仲春仲秋二上丁日降香遣官祭于國學又詔定親征遣將諸軍禮及太歲風雲雷雨嶽鎮山川城隍諸神祭禮其冠禮皇太子冠翰林院撰祝文祝辭因定天子冠禮尋定皇太子親王及士庶婚禮俱本院偕中書省臣議上其王國禮樂及合祀山川之儀則本院禮部與王府官議上遂命燕齊祭東海齊魯祭東嶽東鎮秦蜀祭西海晉祭北海禮孝慈皇后喪專詔本院定議以聞成穆貴妃薨詔本院稽古定制令父母俱斬衰三年子為庶母服朞月書成頒行曰孝慈録又考議陵寢朔望節序之祭及祭前代忠臣用便服行服等節今見於大明集禮洪武禮制等書雖損益古今之宜然皆出自聖意衆莫能違也雖敢言如解縉上亦未嘗以其異己而罪之夫以異己者為罪則必以合者為功以合者為功則是禮樂自臣下出也嘉靖九年正月十四日今上大詔廷臣問圜丘方澤禮臣道南奏曰邇者伏䝉皇上頒賜勑諭詢以天地宗廟社稷之重及日月太歲諸神從祀之宜臣愚曷足以知此中庸曰非天子不議禮不制度不考文又曰君子之道本諸身徴諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑是故知禮樂之情者能作識禮樂之文者能述大人舉禮樂天地將為昭焉臣愚以為三代而上大道為公禮載諸經而典則明備三代而下大道既隱禮載諸史而議論紛紜自非天子建中和之極聖人通幽明之故安能折羣言之淆亂以嘉典禮之㑹通也哉謹按周禮大宗伯掌建邦之天神人鬼地祗之禮小宗伯兆五帝於四郊四望四類亦如之兆山川丘陵墳衍各因其方蓋以辨方經野叙神奠位法天地髙卑之象順隂陽剛柔之義也其禮器則有曰蒼璧禮天黃琮禮地有曰四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望其樂舞則有曰奏黃鍾歌大吕舞雲門以祀天神奏太蔟歌應鍾舞咸池以祭地祗有曰圜鍾為宫黃鍾為角太蔟為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟冬日至於地上之圜丘奏之函鍾為宫太蔟為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟夏日至於澤中之方丘奏之此周人祀天地之遺典也祭法曰燔柴於泰壇祭天也瘞埋於泰折祭地也禮器曰為髙必因丘陵為下必因川澤因天事天因地事地王制曰天子祭天地諸侯祭社稷又曰惟祭天地社稷為越紼而行事又曰祭天地之牛角繭栗則其義亦明矣然亦有專言祀天者曰禋祀昊天上帝曰王祀昊天上帝則大裘而冕曰郊之祭也迎長日之至也兆於南郊就陽位也曰祭之日王被衮以象天蓋天者羣物之祖舉其尊而言也而天固無不覆也有兼言祀社者曰祭帝於郊所以定天位也祀社於國所以列地利也曰郊以眀天道也社以神地道也曰禮行於郊而百神受職焉禮行於社而百貨可極焉蓋古封國立社舉其重而言也而地固無不載也夫天地之道貞觀者也日月之道貞明者也法象莫大乎天地懸象著明莫大乎日月變通莫大乎四時是故君后所以承天地配日月而順四時者也若以為祀不可分郊不宜二祭統何以故天子躬耕於南郊王后親蠶於北郊也月令又何以故孟春迎氣於東郊孟夏則於南郊孟秋迎氣於西郊孟冬則於北郊也祭義又何以故祭日於東於壇於王宫祭月於西於坎於夜明也孔子繫易曰天尊地卑乾坤定矣卑髙以陳貴賤位矣豈日月兆於東西迎氣耕蠶分於南北天地之位獨混而無别乎若易言享帝而不言享祗則帝大而尊而各有取象詩歌昊天而不歌后土則地卑而謙而不敢專功知此則虞之類於上帝商之告於上天神后周之郊用牛二春秋魯人之僣祈榖之郊先儒固自有明辨矣臣故曰三代而上大道為公而典則明備也漢郊祀志載秦祠四畤八神漢髙因之增為五畤武帝祀太乙於甘泉后土於汾隂成帝從匡衡之議立南北郊厥後王莽創為天地合精夫婦同牢之說而始合祭矣光武中興雖兆南北郊然合祭亦未之有改焉者也唐六典正月祀天祈榖於圜丘夏至祭皇地祗於方丘俱以髙祖配孟夏大雩於圜丘孟冬祭神州地祗於方丘以太宗配至武后親享南郊而復合祭矣𤣥宗中興雖從張說之議以祀后土而亦未為得也宋史志南郊初有四祀太宗始創壇北郊以祀地神宗因陳襄之議復南北郊及南渡以後而禮文寖廢矣夫漢之議從匡衡者五十人從許嘉者八人宋之議從陳襄者四十人從蘇軾者五人不有大儒君子孰從而正之程頥曰元祐議行北郊只為五月天子不可服大裘殊不知郊天郊地禮制自不同報本之祭惟各從其類朱熹曰周禮有圜丘方澤之說後人却說社是后土看來自有方澤之祭此皆不滿於宋議者也夫天道也父道也君道也地道也母道也臣道也天道至尊而無對者也地道無成而代有終者也漢之廢禮也自王莽始也莽以臣賊君無臣道者也唐之廢禮也自武曌始也曌以隂干陽無母道者也宋人之爭禮也則又介乎漢唐之間者也臣故曰三代而下大道既隱而議論紛紜也恭惟我太祖髙皇帝開國之初大召名儒博綜古典首制禮樂二局沿考制度數年於吳元年建圜丘於鍾山之陽以祀昊天上帝建方丘於鍾山之隂以祀后土皇祗至洪武元年二月壬寅朔聖祖勑禮部翰林院太常寺諸儒臣曰自昔聖帝明王之有天下莫嚴於祭祀故當有事內必致其誠敬外必備其儀文所以交神明也朕誕膺天命統一海宇首崇祀事顧草創之初典禮未備其何以交神明致靈貺今有國大祀曰圜丘曰方丘曰宗廟曰社稷其各具沿革以進於是丞相李善長傅瓛等禮部尚書陶凱等學士陶安等上議以為宜復古制祀天圜丘以大明夜明星辰太歲諸神從祀祀地方丘以五嶽五鎮四海四瀆諸神從祀而宗廟社稷亦各有議今載諸聖祖洪武實録者足徴也其圜丘方丘樂章俱聖祖自撰今載諸御製文集者足徴也其圖制之詳禮儀之備今載諸聖祖存心録及大明集禮祭祀禮儀者足徴也當時諸臣如宋濓則有天降膏露頌及觀心亭記所以紀事天之明也劉基則有方丘頌所以紀事地之察也至洪武十年聖祖感齊居隂雨之應覽京房災異之說即舊址為壇合祀於一覆以大祀殿十二年始合祭焉上復更撰祀文樂章今載於御製文集夫前之分祭者酌萬世帝王之道禮本太始者也是先王之制也聖祖因之而未嘗自制焉者也後之合祭者感一時災異之應禮緣人情者也是後世之制也聖祖亦因之而未嘗自制焉者也厥後儒臣解縉奏云配天宜復掃地之規尊祖宜備七廟之制而聖祖弗加之罪者意亦可識矣太祖遷都於北當時儒臣未有建白以復聖祖初制之舊宜今日厪我皇上之詔諭也禮樂百年而後興詎不信哉宗廟之制國初立四親廟德祖𤣥皇帝廟居中懿祖居東第一廟熙祖居西第一廟仁祖居東第二廟昭穆有定位禘祫有定時視商家七廟周家九廟之制其揆一也至九年十月乙卯改建太廟同漢人同堂異室之制時享嵗祫則設纍朝帝后之衣冠於神座而祀之於是乎始以功臣配享矣洪熙間復增以姚廣孝等配享夫古者人臣配享惟伊尹見於盤庚之篇周禮凡有功者書於太常嘗於太蒸不過嵗一從享而已漢祭功臣不於廟而於庭曹魏始以荀攸配享而唐宋遂相沿襲矣夫德必若伊尹親必若周公而後可矧其他乎今九廟已用同堂異室之制纍朝帝后臨之在上一氣流通而功臣配享殊無降殺恐非古先聖王尊尊親親之道也至於社稷之制皇上改之是矣昔之議者漫不之考以勾龍共工氏子也鄭𤣥注疏以為共工乃太皥後神農前以水土名官者其子勾龍能平水土非四凶中共工也聖諭又云日月贊上帝以成化工止嵗致一祭不得專誠以享臣按禮郊特牲郊之祭大報天而主日配以月玉藻朝日於東門之外周禮大宗伯兆日於東郊兆月於西郊祭法王宫祭日夜明祭月祭義祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外內以端其位覲禮拜日於東門之外反祀方明禮日於南門之外禮月於北門之外天子大采朝日祖識地德故於春分祀之少采夕月糾䖍天刑故於秋分祀之國初諸儒已有定議我聖祖亦有朝日夕月之文臣復何辭禮又曰有其舉之莫敢廢也今之大祀殿穹窿閟侐髙廣洞達崇壇羅列密樹隂森祖宗所創立上帝所棲止者已百數十年於兹矣古人思其人尚愛其樹而不忍伐豈敢云毁以傷在天之靈按古者明堂之制正在南離之地大戴禮曰明堂近郊韓詩傳曰明堂在南方七里之郊淳于登曰明堂在國之陽三里之外七里之內其為說多同孟子亦曰夫明堂者王者之堂王欲行王政則勿毁之夫周人郊祀后稷以配天宗祀文王於明堂以配上帝郊而曰天所以尊之也明堂而曰帝所以親之也天也帝也其禮一也今之大祀殿正以倣古者明堂之制也曰昊天上帝正所以親之也而未備夫尊之之典也皇上法古帝王必欲行之臣豈敢妄言以干成典抑豈敢不言以孤明詔宜法聖祖南畿初制於今之南天門外别兆圜丘以祀天尊聖祖以配之以法周人尊后稷之禮兆方丘於北郊以祀皇地祗以法周人祀地之禮而又宗祀太祖成祖於大祀殿以法周人宗祀明堂之禮兆大明於東郊兆夜明於西郊以法周人朝日夕月之禮增太廟大禘之祭正太祖南向之位移功臣配享於兩廡庶尊尊有等而天地之大義不踰親親有統而纍朝帝后之大禮無間然矣夫舉大事者必動大衆動大衆者必費出不資今水旱蟲蝗海內告沴邊疆盜賊邊圉竊發民力竭矣民財罄矣皇上慎重典禮軫惜民隱或發內帑之財不至於斂民財或藉工匠營繕之力不至於勞民力可也夫安循守者憚改更信耳目者疑心志議禮之家名為聚訟此書生常態爾如昔者羣臣之議禮也其心固無他也特其見有不同故也臣恐今之羣臣之議禮也猶夫昔也其心亦無他也特其見有不同故也皇上昭宣祖制之重參酌衆議之公於議之同者不必以為功於議之不同者不必以為罪則人心和於下天心和於上祖宗列聖監於前子孫干億綿於後億萬載無疆之休端在是矣議禮下永樂十一年十二月鴻臚寺奏習正旦賀儀詔禮部及本院官問曰正旦日食百官賀禮可行乎尚書吕震時曰日食與朝賀先後不相妨侍郎儀智曰同日免賀為當成祖顧問曰日食行賀禮否楊士竒對曰日食天變之大者前代元正日食多不受朝宋仁宗時元正日食富弼請罷宴徹樂宰相吕夷簡不從弼曰萬一契丹行之為中國羞後有言敵是日罷宴仁宗深悔今免賀誠當上遂免賀及宴仍賜百官節鈔十四年十一月周王橚楚王楨相繼來朝例次日謁陵周王先至上命東宫皇太孫及諸皇孫陪謁已出東華門上遽召楊榮金幼孜楊士竒問謁陵展敬之位如何士竒對曰周楚二王屬尊當列稍前兩傍東宫殿下列稍後居中皇太孫殿下亦居中列於東宫之後諸皇孫與皇太孫同班分列兩傍上曰爾所言有據乎對曰宋儒朱熹家禮大約如此上曰吾未嘗熟家禮但據已見書其位次遂出宸翰所書正與所言合然下有六字未書授筆命士竒足之遂遣鴻臚丞周升馳齎赴陵俾率行之二十二年九月禮部尚書吕震言於仁宗曰今喪服已踰二十七日請如太祖倣漢制釋縗易吉服奏巳士竒謂震曰今喪服未可比此例蓋洪武有遺詔且仁孝皇后喪成祖皇帝在上縗服後仍服數月白衣冠時黃淮議同士竒然不敢明言忤震震出忽語尚書蹇義從旁解之曰渠言當理國家事公豈應偏執己見請兼取二說明旦皆素衣冠黑角帶遂偕六部都察院具奏報可明旦上素冠麻衣絰出視朝文臣惟學士武臣惟英國公如上服餘皆從震等所定朝退上召蹇義夏原吉及士竒諭曰吕震昨奏易服云皆與汝等議定然後奏時吾已疑其非但聽臣下易之梓宫在殯吾豈忍易後聞士竒有言始知震妄士竒所執是因嘆曰張輔知禮六卿乃有不及又顧義曰汝所折衷亦未當然不必再以語人羣臣聽其便十二月庚午百官習新正儀於海印寺用樂明日士竒等進言近禮部與臣等已議定新正朝儀不用樂昨日習儀仍用樂不改今四方朝覲官皆集於此觀禮乞勑禮部設樂不作不報蓋入吕震之言也楊榮金幼孜皆欲已榮即趨出士竒與淮不可三人遂復進言夜漏下十刻未得㫖不敢退遂有㫖命禮部設樂不作正月二日特召士竒等四人至奉天門諭之曰吕震每事誤朕卿等所執停樂最是夫為君以受直言為賢不受直言則過益深為臣以能直言為賢不能直言則忠不盡如昨日朝㑹若從震言今悔何及自今遇朕行有未當但盡意言之毋以不從為慮各賜鈔千緡文幣一表裏天順中聖烈慈夀皇太后崩英廟見學士李賢所服斬衰與衆異取視之乃知賢服制合古即以為法命宫中悉易之孟冬享太廟適大喪禮未終上以問賢言宜俟釋服後庶人情事理兩安從之癸未春上以足疾不視朝召賢曰大禮將至而疾末愈欲遣官代行可乎賢曰亦須至壇所雖不能行禮人心亦安上至齊宫復召賢曰朕惟俯伏弗興欲令一人扶之何如賢曰陛下能力疾行禮尤見敬天之誠遂畢事而還上以母后胡氏因疾請間尊號靜慈仙師非令典欲上皇后尊諡而左右以為不便召問賢賢曰陛下此一念天地鬼神實臨之然臣之愚必須陵寢享殿神主皆如奉天殿之式庶幾稱陛下之明孝不然為虛文上即命從之恭讓章皇后乃英廟嫡母也憲宗即位內臣夏時倡言錢后久病欲致尊隆於所生母賢與彭時援遺詔執不可夏入𫝊仁夀宫㫖曰豫為皇帝母當為太后豈有無子稱太后者時曰今日與宣德年間事不同胡后曽上表讓位退居别宫故正統初不加尊號今日名分故在豈可不尊夏謂宜照例寫讓表賢與時曰臣子誰敢擅寫天子新即位四海顒望凡事宜遵遺詔庶幾順天理服人心夏作色以為偏向時拱手向天曰祖宗神靈在上錢后已無後何所利而為之所以爭者為全皇上聖德也故若推大孝之心則兩宫同尊為宜賢等皆曰然夏乃再入請命曰適皇上再三勸諭已俞允矣時等遂執筆書尊皇后為慈懿皇太后母妃為皇太后夏以為疑時曰加二字好稱呼耳非有尊卑於其間也於是尊號之詔遂下後數日大監覃包至內閣言曰並尊二母本出上意但屈於生母有難言者非二先生力爭幾誤大事矣時同僚有慙色蓋此禮之行賢與時之力也及議山陵賢等具疏請建𤣥宫為三穴夏復執不從成化四年六月慈懿皇太后喪傳㫖議山陵時等曰梓宫當合葬裕陵神主當祔廟此一定禮無可議者禮部尚書姚䕫贊之曰此正禮也夏獨曰不可慈懿無子且有疾豈可入山陵只可比胡后例葬西山耳已而上御文華殿召內閣三人及諸內臣入面議上曰朕豈不知正禮是好但於有礙故令爾等議商輅曰外議洶洶若不祔葬則人心不服且於聖德有損劉定之曰孝子從事不從令雖聖母有言亦不可從也上默然良久曰合葬固是孝若因此失聖母心不可謂孝時曰皇上大孝當以先帝之心為心先帝時慈懿始終如一今若安厝於左虛其右以待後來則兩全其美庶不失先帝之意夏曰比先閣下議作三位已不允時曰彼時慮有今日故預為此議今須依前處置乃宜耳上雖未允而玉色甚和時因曰臣等言未當欲具本言之乞皇上再三申勸聖母以終大事上曰擬進來看當晚時等具本進有㫖令百官㑹議明白禮部集文武大臣議皆云時等言是內批未允欲别擇地於是伏闕諫乃行焉語在伏闕𢎞治初元詔議憲宗升祔及孝穆皇太后祔享之禮議者人人殊禮部左侍郎倪嶽言德祖以上無可復推則德祖視周后稷太祖太宗視周文武百世不祧懿祖而下以次迭遷今憲考升祔則懿祖神主當祧宜於太廟寢殿之後略倣夾室之制别建一殿殿九室以藏祧主每嵗墓時享則奉祧主仍居舊位以應古祫祭之制又周禮春官大司樂歌中吕舞大濩以享先妣謂姜嫄也帝嚳之妃后稷之母故特立廟以祀而宋元德懿德二太后俱有别廟章獻章懿俱建奉慈殿孝穆神主宜於奉先殿旁别為一廟歲時祭享悉如奉先殿之儀從之於是遂建祧廟及奉慈殿時惟學士楊守陳獨以德祖比宋僖祖百世不遷為非禮抗言禮天子七廟祖有功宗有德乃孔子之言凡號太祖者即始祖必事之以配天若商周之契稷是已議者徒謂大臣嘗有取於王安石之說而不從孔子遂使七廟有始祖又有太祖太祖既以配天而不正南面之位名與實乖豈先王之禮哉若為降而合食為非禮則王者既立始祖之廟又推始祖所自出之帝而配之固無嫌也憲宗升祔請并祔德懿熙三祖自仁祖以下為七廟異時祧盡則以太祖擬契稷而祧主藏於後寢祫禮行於前廟時享則尊太祖祫祭則尊德祖各不失尊庶無悖禮議者不從十七年三月聖慈仁夀太皇太后崩上御西角門朝退召大學士劉健李東陽謝遷至門內扉遂闔上御暖閣素幄起立牀前顧謂曰先生輩上來健等皆至幄內上曰為陵廟事與先生輩商量健等仰奏曰昨䝉遣太監扶安諭示孝莊睿皇后葬不合禮欲為釐正此盛德事臣等仰見皇上聖孝髙出前古不勝欣慕上袖出裕陵圖一紙指示陵門內有二隧道其一西行北轉而至者為英宗皇堂虛其右壙而中有道可通往來其一東行北轉而至者為孝莊𤣥堂相去可數丈中隔不通因曰此大非禮東陽對以初不知昨見成化間彭時姚夔奏先朝大臣都忠厚為國如此健與遷對曰英宗有遺命錢后與我合葬大學士李賢記在閣下上曰既有遺命當時奈何為之東陽對曰臣等聞當時尚有别議故委曲如此非先帝意也上曰先帝亦甚不得已耳健等奏曰誠如聖諭但今斷自聖𠂻勿憚改作則天下臣民無不痛快上曰欽天監言恐動風水朕不以為然隂陽宜忌之說不足信上曰朕以拆之矣今日開壙合葬不為動風水乎皇堂不通則天地否塞因以指畫紙曰若如此通則風氣流行惟一㸃誠心為之料亦無害東陽贊曰皇上一念孝誠可以格天吉無不利健等皆力贊曰皇上所見髙出尋常萬萬願勿復疑上曰此事不難若祔廟之禮尤所當講健等奏曰先年奏議已定慈懿太后居左今大行太皇太后居右祫祔裕陵配享英廟且引唐宋故事為證臣等不敢輕議其實漢以前惟一帝一后唐始有二后宋亦有三后並祔者上曰二后已非若三后尤為非禮遷對曰彼三后一乃繼立一則所生母也上曰事須師古末世鄙䙝之事不足學東陽對曰皇上當以堯舜為法上曰然宗廟事關係綱常極重豈可有毫髮僣差太皇太后鞠育朕躬恩德深厚朕何敢忘但一人之私情耳錢太后乃皇祖冊立正后我祖以來惟一帝一后今若並祔乃從朕壞起恐後來雜亂無紀極耳且奉先之祭先生輩尚不知英宗皇祖止設一座每祭飯一分匙一張而已健等倉卒不解但應曰唯唯退思之蓋孝莊尚未配食也上又曰孝穆太后朕生身母止尊稱為皇太后别祀以奉慈殿今仁夀宫前殿儘寬意欲奉太皇太后於此他日奉孝穆太后於後殿歲時祭享一如太廟不敢少缺健等皆未敢應聖意蓋謂今皇太后千秋萬歲後也東陽曰皇上言及孝穆太后尤見大公至正之心可以服天下矣上曰此事却難處行之則理有未安不行則違先帝之意又違羣臣㑹議㑹議猶可奈先帝何朕嘗思之夜不能寐先帝固重而祖宗之制為尤重耳東陽曰願聖見主張得定臣等無不奉行上曰朕亦難於降㫖先生輩是朕腹心大臣好為處置是日上稱心腹者三呼先生者以十數健等感激稱謝皆叩頭起次日朝退上起立呼內閣健等至暖閣幄前立問曰先生輩昨日所進令多官㑹議是幾箇衙門健等曰即前日進諡議者東陽厯對曰五府六部都察院通政司大理寺及詹事府翰林院言未畢上遽曰有翰林院最好考擬古今大典禮須用翰林院又曰有科道乎皆對曰有上又曰好少頃曰别無說話回去辦事蓋是日專為翰林問也自是每召必於朝退立呼內閣未嘗叱名二十一日復召上袖出㑹議本問曰此事如何東陽奏曰未知聖意如何上曰先生輩如何說健等對曰正是古禮上曰仍稱太皇太后可否皆對曰既是别廟須如此尊稱為當上曰如何批答遷對曰須說得委曲東陽曰要見重事上曰然宗廟事重要見今後世世子孫崇奉不缺之意此本隨文書來健等曰臣等領去上即以本授健復目送而出二十二日復召上袖出奉先殿圖指示曰此與太廟寢規制一般常時祭薦皆在此又指其廊間有門通西一區曰此奉慈殿也舊為神庫今廊廡及井俱未動指東又其一區别為門面南五間東西廊各五間此神厨也欲如此建廟可乎健等對曰此最便東陽曰但未知寬窄如何上曰寬窄有數因指其傍曰東西十幾丈南北二十丈後有墻墻之後為米倉蓋較之奉慈殿深不及八尺皆請曰墻可展否上曰須展之其西偏有井亭亦須去之耳又曰欲遷孝穆太后併祭於此如何健等皆對曰甚當再問再對上曰位序如何健等對曰太皇太后中一室孝穆太后或左或右一室上曰須在左後來有如此者却居右東陽曰太皇太后居中乃可外廷瞻仰此本已數日上曰正為廟地未定今既定即出矣皆拜出如前㑹禮部尚書吳寬亦言周祭姜嫄於别廟詩謂之悶宫魯桓公之母仲子不得祔廟春秋書考仲子之宫至宋始有兩后並祔之說然豈後世所法哉上意合二十五日御批云祀享重事禮當詳慎卿等稽考古典及祖宗廟制既已明白都准議特建廟等享仍稱太皇太后以伸朕尊親之意後世子孫遵守崇奉永為定制於是中外翕然稱為得禮審樂吳元年七月乙亥上御㦸門召學士朱升領樂舞生入見設雜樂令試之上親擊石磬命升辨五音升以宫音為徴音上曰何乃以宫作徴耶起居注熊鼎對曰八音之中石最難和故書曰於豫擊石拊石百獸率舞上曰石聲固難和然樂以人聲為主人聲和則八音和矣因命樂生登歌一曲上復嘆曰古者作樂以和民聲格神人而與天地同其和近世儒者鮮知音律之學欲樂和顧不難耶鼎等對曰樂音不在外求實在人君一心君心和則天地之氣亦和天地之氣和則樂亦無不和矣上深然之其後命升等撰圜丘方丘樂章而朝享太廟諸樂章則詔梁寅等分為之永樂元年九月成祖詔學士王景等擬撰樂章竟未施行凡舞用習於郊壇武舞服左袖上書除暴安民四字𢎞治中用儒臣建議復之惟中和樂𨽻教坊率多俗部如解縉所論者嘉靖九年六月十五日臣道南奏為稽古樂以禆盛典事臣伏考洪武十七年六月庚午我太祖髙皇帝諭曰治天下之道禮樂二者而已若通於禮而不通於樂非所以淑人心而出治道達於樂而弗達於禮非所以振紀綱而立大中臣嘗莊誦見聖祖獨禀全智超越千古允升大猷參贊萬化故至治馨香達於神明休徴駢疊登諸史䇿禮樂百年而後興亶其然矣恭惟皇上光紹聖祖之丕圖肇舉明王之盛典禮崇三典樂備四郊邇者宸翰飛灑親撰圜丘方丘樂章昭焕乾文發揮道妙被之管絃協乎律吕真有以動天地而感鬼神矣臣惟古帝王之樂莫善於虞莫備於周書曰豫欲聞六律五聲八音在治忽以出納五言汝聽周家大司樂以六律六同五聲八音六舞大合樂以致鬼神祗蓋聖人作則必以天地為本厯所以經天時也律所以候地氣也天地相為經緯律厯相為表裏天數五地數五五位相得而各有合天五與地十合而生土其聲為宫地四與天九合而生金其聲為商天三與地八合而生木其聲為角地二與天七合而生火其聲為徴天一與地六合而生水其聲為羽五聲相生旋相為宫於是播之以八音所以宣八風之和聲也諧之以十二律所以順四時之和氣也有元氣而後有和氣有元聲而後有和聲聲和則氣和氣和則形和形和而天地之和自應矣臣請以古樂之可行於今與夫今樂之有戾於古者言之古者樂律之制陽律從乾隂吕從坤故奏黃鍾歌大吕以祀天神奏太蔟歌應鍾以祭地祇奏姑洗歌南吕以祀四望奏㽔賔歌函鍾以祭山川奏夷則歌小吕以享先妣奏無射歌夾鍾以享先祖蓋人聲與樂聲相比而抑揚髙下各有其節今之樂律則職掌於太常寺協律郎傳之既久而寖失其初意用之既殊而不得乎元聲其於隂陽配合之理律吕子母之義未必盡然也古者樂舞之設文舞羽籥武舞干戚故祀天神則舞雲門祭地祇則舞咸池四望則舞大㲈祭山川則舞大夏享先妣則舞大濩享先祖則舞大武蓋樂舞與樂律相應而綴兆舒疾咸中其度今之樂舞則𨽻習於太常寺樂舞生朱干玉戚秪繪之於服皇帗旄臯弗辨之於佾其於樂師六舞之儀舞師四舞之節恐未必盡然也古者大享之禮所以親君臣也周禮王宫懸凡饗食奏燕樂歌工在上舞位在下琴瑟在堂鐘鼓在庭各從其類無相奪倫今大祀慶成設宴於奉天殿教坊司承應雅俗混淆優侏雜進恐非所以祗承上天之餘惠也古者籍田之禮所以重農事也周禮王出入則奏王夏司空除壇農正陳藉鬱人薦鬯犧人薦醴各司其事無相越職今躬耕籍田設樂於先農壇教坊司承應羣伶紛擾衆劇喧豗恐非所以表率下民之先務也凡此數者雖載在令甲相沿有年而關係匪輕釐正宜急宋儒周敦頥曰樂者古以平心今以助欲古以宣化今以長怨不復古禮不變今樂而欲至治者逺矣皇上法古帝王行古典禮天地日月之祀既已復其初郊廟朝廷之樂未盡合乎古記曰作者之謂聖述者之謂明聖人在上作必自今始矣或以為元聲難知也古樂難復也臣厯考載籍樂家之說尚在也論樂之本則有若樂記載樂之文則有若儀禮自周以降雖失其傳然司馬遷撰律厯書班固宗之是故有三統之論蔡元定著律吕書朱熹稱之以為成一家之言若陳𤾉之樂書則又備載古今之制而無遺者也然欲求元聲當求諸經易曰雷出地奮豫先王以作樂崇德夫雷也者運天地之元氣以鼓萬物之出機者也知雷之元氣之所以發則知樂之元聲之所以宣矣舜命夔曰詩言志歌詠言聲依永律和聲我聖祖謂熊鼎曰樂以人聲為主人聲和則八音諧矣斯訓也即舜命夔意也萬古不易之定論也記曰知聲而不知音者禽獸是也知音而不知樂者衆庶是也臣非知樂者也姑述所聞按古樂書條為之說一曰稽五聲以審八音二曰稽八音以審十二律三曰稽十二律以審旋宫若厯代諸家之議互有得失元儒許衡固自有定論矣臣不敢備述謹繹其義開具進呈一曰稽五聲以審八音禮曰五聲六律十二管旋相為宫也孟子亦曰不以六律不能正五音五音也者天地自然之聲也在天為五星之精在地為五行之氣在人為五臟之聲出於脾合口而通之謂之宫出於肺開口而吐之謂之商出於肝而張口湧吻謂之角出於心而齒合吻開謂之徴出於腎而齒開吻聚謂之羽宫土行也君象也其性信其味甘其色黃其事思其位戊巳其數八十有一其聲重以舒猶夫牛之鳴􅐎也而主合也商金行也臣象也其性義其味辛其色白其事言其位庚辛其數七十有二其聲明以敏猶夫羊之離羣也而主張也角木行也民象也其性仁其味酸其色青其事貌其位甲乙其數六十有四其聲防以約猶夫雉之登木也而主湧也徴火行也事象也其性禮其味苦其色赤其事視其位丙丁其數五十有四其聲泛以疾猶夫豕之負駭也而主分也羽水行也物象也其性智其味醎其色黑其事聽其位壬癸其數四十有八其聲散以虛猶夫馬之鳴野也而主吐也宫數八十有一下生為徴徴數五十有四上生為商商數七十有二下生為羽羽數四十有八上生為角角數六十有四五色成文而不亂八風從律而不姦百度得數而有常史記曰宫動脾而和正聖商動肺而和正義角動肝而和正仁徴動心而和正禮羽動腎而和正智聞宫音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徴音使人樂善而好施聞羽音使人整齊而好禮聲音之道與政通矣臣按洪武十七年六月甲午我聖祖諭禮部臣曰古之律吕協天地自然之氣後世之律吕出人為智巧之私天時與地氣不審人聲與樂聲不比故雖以古之詩章用古之器數亦乖戾而不合陵犯而不倫矣手擊之而不得於心口歌之而非出於志人與樂判然為二而欲動天地感鬼神豈不難哉臣惟十二律生於八音八音生於五聲漢制氏惟傳其鏗鏘歌舞而不得其義自李延年以新聲進而樂始雜矣宋之胡瑗李照范鎮阮逸議論雖多而無適於用均之亦未為得也伏願皇上昭宣祖訓勑下所司延訪通樂之儒遴選典樂之官務重其任而不泛視以為常務久其任而不更易以為數凡協律郎必擇其行誼端謹音律間熟者不許虛應故事而卑汚冗濫得以列其間凡樂舞生必擇其年貌精壯禮節間熟者不許濫收庸品而瑣屑齷齪得以容其跡庶乎教之豫而有本習之久而後化而古樂可復矣二曰稽八音以審十二律易曰易有太極是生兩儀兩儀生四象四象生八卦是故惟乾也為天下之至陽而石音繫焉惟坤也為天下之至隂而土音繫焉竹音震革音坎匏音艮音雖不同而同於陽皆本乎乾者也木音巽絲音離金音兊音雖不同而同於隂皆本乎坤者也是故石乾音也其風不周其聲溫栗其音辨立冬之氣也其為樂也為玉磬為毊磬為編磬為離磬為笙磬為頌磬為球為寋革坎音也其風廣莫其聲隆大其音歡冬至之氣也其為樂也為鼓為拊為鼙為鞉為應為鼖為􅉧為提為靁為靈為建鼓為足鼓為楹鼓為懸鼓匏艮音也其風融其聲崇聚其音愀立春之氣也其為樂也為鳳笙為􅩁笙為大竽為小竽為和竹震音也其風明庶其聲越其音溫春分之氣也其為樂也為簫為籥為管為篞為篎為簥為笛為箎為簜木巽音也其風清明其聲茂遂其音直立夏之氣也其為樂也為柷為敔為止為籈為椌楬為舂牘絲離音也其風景其聲纎微其音哀夏至之氣也其為樂也為琴為瑟為離琴為中琴為小琴為灑瑟為中瑟為小瑟土坤音也其風凉其聲含宏其音濁立秋之氣也其為樂也為土鼓為瓦鼓為塤為缶為雅塤金兌音也其風閶闔其聲舂容其音鏗秋分之氣也其為樂也為鐘為鏞為編鐘為鎛鐘為剽為棧為錞為鐲為鉦為鐸樂記曰鐘聲鏗鏗以立號號以立橫橫以立武君子聽鐘聲則思武臣石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聽竽笙簫管之聲則思畜聚之臣鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣是故觀其所感而天下之情見矣臣按國初吳元年七月乙亥上諭起居注熊鼎曰古者作樂以和民聲格神人而與天地同其和近世儒者鮮知音律之學顧不難耶鼎對曰樂音不在外求實在人君一心君心和則天地之氣亦和天地之氣和則樂亦無不和矣臣惟古樂惟虞韶為善知樂者惟后夔為善若孔子在齊聞韶季札在魯觀韶猶能興起於百世之下而况當時之羣后乎嗣是若周之伶州鳩晉之師曠魯之師襄皆能詠歌諷誦以有得於心演繹敷暢以不謬其學君子取焉下至漢之鄭𤣥蔡雍晉之荀朂唐之祖孝孫周之王朴宋之劉几楊傑諸人雖號為知樂要未能如古人之精也伏願皇上昭宣祖訓𠡠下所司精製八音之器務擇其所産之地如嶧陽之桐泗濵之石則氣完而不爽調和衆樂之成務辨其旋宫之節如璧之斯合如珠之斯聮則樂大而有章以十有二律為之節度而上則乎乾象之文十有二聲為之齊量而下宣乎月令之氣庶乎有合於古而不失其正無戾於今而可垂於久矣三曰稽十二律以審旋宫易曰神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮是故萬物孽萌於子紐牙於丑冒苑於卯振美於辰巳盛於已咢布於午昧薆於未申堅於申留熟於酉畢入於戍閡該於亥陽氣鍾於子也謂之黃鐘其嵗困敦其宿虗其次須女其辰星紀其候冬至其卦為乾之初九隂氣旋於丑也謂之大吕其嵗赤奮若其宿牽牛其次建星其辰元枵其候大寒其卦為坤之六四萬物凑地而出也謂之太蔟其嵗攝提格其宿箕其次尾其辰娵訾其候啓蟄其卦為乾之九二隂陽相夾而聚也謂之夾鐘其嵗單閼其宿心其次房其辰降婁其候春分其卦為坤之六五萬物潔而齊發也謂之姑洗其嵗執徐其宿氐其次亢其辰大梁其候清明其卦為乾之九三萬物旅而西行也謂之仲吕其嵗大荒落其宿軫其次翼其辰實沈其候小滿其卦為坤之上六隂氣繼陽而賔也謂之㽔賔其嵗敦牂其宿張其次七星其辰鶉首其候夏至其卦為乾之九四萬物成熟而衆也謂之林鐘其嵗協洽其宿弧其次狼其辰鶉火其候大暑其卦為坤之初六萬物夷易而儀則也謂之夷則其嵗涒灘其宿伐其次參其辰鶉尾其候處暑其卦為乾之九五陽氣旋入於南也謂之南吕其嵗作噩其宿畢其次昴其辰夀星其候秋分其卦為坤之六二陽氣無餘而畢也謂之無射其嵗閹茂其宿胃其次奎其辰大火其候霜降其卦為乾之上九隂陽交應而初閉也謂之應鐘其嵗大淵獻其宿壁其次室危其辰析木其候小雪其卦為坤之六三是故黃鐘之實九寸而下生林鐘焉林鐘之實六寸而上生太蔟焉太蔟之實八寸而下生南吕焉南吕之實五寸三分有竒而上生姑洗焉姑洗之實七寸一分有竒而下生應鐘焉應鐘之實四寸六分有竒而上生㽔賔焉㽔賔之實六寸二分有竒而又上生大吕焉大吕之實八寸三分有竒而下生夷則焉夷則之實五寸五分有竒而上生夾鐘焉夾鐘之實七寸四分有竒而下生無射焉無射之實四寸八分有竒而上生仲吕焉仲吕六寸五分有竒而復生黃鐘而變化無窮矣樂記曰清明象天廣大象地終始象四時周旋象風雨此聖人作樂之本也臣按洪武四年六月戊申我聖祖諭禮部尚書陶凱等曰禮以導敬樂以宣和不敬不和何以為治元時古樂俱廢惟淫詞艷曲更唱迭和又使北鄙之聲與正音相雜甚者以古帝王祀典神祇飾為武隊諧戲殿廷非所以導中和崇治體也今一切流俗喧譊淫褻之樂悉屏去之臣惟古樂不復于今久矣自元入中國古樂益廢我聖祖掃除洗濯㑹朝清明悉崇古雅觀諸大明集禮所載昭如日星人所共見奈何浸淫日久新聲代變俗樂雜乎雅羌樂雜乎俗而怗懘噍殺之音沈溺怪幻之伎作矣孔子曰樂則韶舞放鄭聲又曰惡鄭聲恐其亂樂也他日夾谷之㑹又斥萊夷之舞之熒惑漢臣陳禪亦曰帝王之廷不宜作邊疆之樂是古樂之日就散亡者如此固未可委於韎師而屬之寄象鞮譯也伏願皇上昭宣祖訓勑下所司厯考雅樂之章革去邊樂之部凡淫哇之聲有亂乎正音者斥之不使復用凡妖冶之技有出於竒邪者禁之不使復習庶乎風行自近而大道為公俗正於逺而頌聲可作矣疏上上批曰禮部看了來說禮部尚書李時左侍郎嚴嵩右侍郎湛若水等議云中允道南所議音樂無非欲復古正今以成一代盛典然音樂之妙自古難精儒者之議主於義理故考據該博而諧協則難工藝之術泥於傳習故聲音近似而義理實悖今太常所傳音律不惟不合於古制而於國初制作之意亦罕有存者但欲更改恐難遽行合候選有精通音律之人將前項所議條件令其逐一酌量議處至於朱干玉戚祗繪於服皇帗旄臯弗辨於佾委非古人樂舞之義臣等竊以此等儀文非若音律之難改者而祖宗以來遵用不變或有深意寓於其間非臣等所能測識其稱慶成藉田樂章樂舞雅俗混雜蓋慶成有平定天下撫定四夷車書㑹同表正萬邦天命有德而又有黃童白叟及蠻夷隊舞二項承應藉田有村田樂及感天地隊舞俱係承應夫既謂之承應則為俗樂明矣但祭祀專用雅樂朝㑹兼用俗樂自唐宋以來皆然惟慶成有仰天恩感地德之曲今慶圜丘禮成而仍用感地德似為無謂况各項樂章詞多俚俗率係樂工猥陋之語誠不宜用之朝廷傳之後世今欲因祖宗之制而少加潤色宣功德之美而擬諸形容默寓針規警戒不至於褻狎雜擾其於治體不為無補七月十五日奉聖㫖考定音律待真知者行羽籥干戚不宜繪於服當如禮制更定其朝燕等樂且姑照舊今年至日大祀後宴樂章曲名還著翰林院官撰用臣道南奉命撰上慶成樂章九奏凡四十九章欽遵宸諭改感地德為感昊德兩宫燕樂暨西苑無逸殿豳風亭燕講官樂章俱道南撰進上親裁定殿閣詞林記卷二十二
