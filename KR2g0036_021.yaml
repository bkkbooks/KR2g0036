body:
  text: 殿閣詞林記卷二十一明黃佐廖道南撰薦舉聖祖之靖元亂也干戈未定即大召四方名儒隨所在館榖之使各以其所知薦戊戌十二月辟儒士范祖幹葉儀為咨議己亥正月克婺州初置中書省召儒士許元胡翰十餘人會食省中日令二人進講經史敷陳治道及克處州又薦青田劉基龍泉章溢麗水葉琛金華宋濓者即遣使以書幣徴之庚子三月至建康入見甚喜賜坐從容與論經史及咨以時事深見尊寵既而命有司即所居之西創禮賢館以處之始置儒臺校理以官儒臣時李文忠守金華復薦王褘王天錫至皆用之尋建尚賔館以待薦舉至者丙午年置博士廳設博士一人典籖十餘人以備顧問博士則許瑗許存仁典籖則劉秩鮑穎吳毅劉辰黃哲塗穎之屬侍從文學之職實權輿於此及置翰林院則擢諸儒之良有文行者任焉洪武六年復大徴天下儒士浙江參政徐本首以桂彥良薦待詔闕下奏對稱旨擢春坊正字未幾浙江布政使安然等以懷逺縣教諭王景等薦既至命日直翰林隨班朝見賜燕西序七年學士宋濓侍上登武樓賜坐問及宿學之士濓以會稽郭傳對上覽其文稱善召見謹身殿稱旨擢應奉翰林文字十年復聘金華儒士吳沉以侍臣有薦之者十月召見稱旨以為待制十五年復徴耆儒隱逸侍臣張寧以宛平儒士董倫薦召至以為太子贊善大夫賜冠帶是年置諌院官十月以耆儒劉靖為諫院左司諌兼左春坊左庶子關賢為右司諫兼右春坊右庶子趙肅為諫院左正言兼左春坊左諭德何顯周為右正言兼右春坊右諭德十七年七月下詔徴賢耆儒汪仲魯至自婺源儀禮司引見有旨舉西伯戡黎篇命之講釋稱旨授左春坊左司直郎又數日劉三吾至自茶陵入見便殿見其莊重宏博甚禮重之即拜左春坊左贊善未幾擢本院學士十八年三月開進士科始定進士入翰林之制自此薦舉者乃不輕授云永樂中本院貟少遂簡命侍臣更薦引之於是首擢審理副楊士竒為編修繼擢儒士曽日章為侍講助教鄒緝為侍讀改給事中金幼孜王洪桐城縣知縣胡儼為檢討又以大平訓導蕭引髙袁州訓導廖敬先為檢討應天訓導王汝玉蕪湖訓導張伯頴為五經博士皆異數也自後惟於進士及庶吉士內擢用宣德七年大學士楊士竒薦交址南靈州知州黎恬文學操行可任近侍遂拜右春坊右諭德恬既至不副輿論江右人寓詞林者或咻之乃求歸其鄉自是薦舉進者益罕矣天順二年忠國公石亨大學士李賢交薦撫州處士吳與弼召以為左春坊左諭德固辭不拜成化十八年廣東布政使彭韶巡撫兩廣都御史朱英交薦新會舉人陳獻章既至吏部欲試之辭以疾自陳患病乞歸侍養詔授檢討侍親終病愈仍來供職獻章即與弼門人也後屢被薦皆援詔不行二人者皆以理學鳴於時隱居求志天下髙之竊謂科目未足以盡天下之賢才矧岩居川觀抱道不售與就試有司而屢黜者豈無其人乎薦舉之典誠不可廢也銓注洪武初年本院官皆由薦舉進雖設進士科未有入翰林者以第一甲賜進士及第丁顯練安黃子澄為修撰第二甲賜進士出身馬京齊麟等為編修吳文等為檢討皆出簡用不由選法命下禮部惟銓注而已後遂為例䇿進士以第一人任亨泰為修撰第二人唐震第三人盧原質為編修著為令至今因之則許觀張顯宗吳言信則張信景清戴德彛則陳䢿尹昌隆劉諤是年六月覆試則韓克忠王恕焦勝遵洪武乙丑之例第一甲胡廣王艮李貫皆修撰第二甲吳溥楊子榮楊溥劉現皆編修進士第一人曽棨擢修撰第二人周述第三人周孟簡仍銓編修則復遵戊辰之令也林環陳全劉素蕭時中苗衷黃㿩馬鐸林志王鈺陳循李貞陳景著李騏劉江鄧珍曽鶴齡劉矩裴綸邢寬梁禋孫曰恭馬愈杜寧謝璉林震龔錡林文曽鼐趙恢鍾復周旋陳文劉定之施槃楊鼎倪謙劉儼吕原黃諫商輅周洪謨劉俊彭時陳鑑嶽正柯潛劉升王㒜孫賢徐溥徐轄黎淳徐瓊陳秉中王一夔李永通鄭環彭教吳釴羅璟羅倫程敏政陸簡張升丁溥董鉞吳寬劉震李仁傑謝遷劉戩王鏊曽彥楊守址曽追王華黃珣張天瑞李旻白鉞王敕費宏劉春凃瑞錢福劉存業靳貴毛澄徐穆羅欽順朱希周王瓉陳瀾倫文敘豐熙劉龍康海孫清李廷相顧鼎臣董玘謝丕吕柟景㿩戴大賔時大學士焦芳用事第二甲第一人焦黃中芳子也有中旨以黃中及第三甲第一人胡續宗俱為檢討及黃中之敗也纘宗亦坐貶楊慎余本鄒守益唐臯黃初蔡昻舒芬倫以訓崔桐楊惟聰陸釴費懋中蓋自永樂以來進士得銓注者惟第一甲而二甲三甲必改庶吉士乃得銓注云吉士庶吉士之選始自洪武以諸進士未更事欲優待之俾觀政於諸司候諳練然後任之其在本院承敕監等近侍衙門者采書經庶常吉士之義俱改稱為庶吉士其在六部及諸司者則仍稱進士云是科本院庶吉士則陳淇等吏科則楊靖等戶科則郭資等禮科則徐旭等厥後楊靖為刑部尚書郭資為户部尚書封忠勤伯惟解縉黃金華為中書庶吉士因之本院庶吉士取數十人擇二十五人暨首甲三人俾進學內閣周忱自陳願與其列遂增忱為二十九人命學士解縉領其事御前親教之首擢王英王直為修撰又擢羅汝敬余鼎彭汝器為修撰余學夔為檢討楊相劉子欽章敞陳敬宗沈升李時勉段民倪維哲吾紳楊勉等俱刑部主事蓋舊制欲作養積久因其成材次第擢用然急於進者或觖望焉故相等皆除刑部庶吉士陳孟潔曽春齡輩卒於京師或以教習已近十年為言時論其希進以張叔豫等皆除府通判二甲庶吉士錢習禮陳璲黃夀生劉永清等教習未久皆擢檢討三甲中則方復等庶吉士王翶擢大理寺左寺正宋琰鄭雍言髙榖張益俱中書舍人黃仲芳等授知縣惟曹義彭麟應授編修許彬連智授檢討庶吉士周敘董璘習嘉言楊珙尹鳯岐陳珣俱授編修餘皆授諸司官有差宣德中三科進士選入翰林為庶吉士者二十八人薩琦賴世隆吳節江淵徐珵授編修王玉王振薑洪李紹授檢討珵後更名有貞振後更名詢是年猶有選入六科近侍諸衙門者庶吉士十二人其出舊科者一蕭鎡也惟鎡授編修是科以後始定庶吉士止入翰林然以為重事不輕豫以四年七年十年進士皆不選至是純選北方及蜀産者二甲萬安劉吉劉珝李泰授編修三甲邢讓李本授檢討尹旻等授給事中監察御史有差二甲吳匯周輿戚瀾劉宣楊守陳王獻童緣授編修三甲江潮宗張業授檢討二甲丘濬彭華尹直授編修二甲張元禎汪諧劉健授編修三甲周經鄭紀張頥授檢討二甲李東陽倪嶽焦芳陳音謝鐸授編修三甲傅瀚張泰吳希賢授檢討二甲林瀚章懋李傑黃仲昭商良臣授編修三甲莊昶授檢討二甲費誾尹龍喬維翰王臣授編修二甲梁儲張澯楊傑敖山劉忠于材徐鵬鄧掖江瀾馬廷用授編修三甲劉機張芮楊廷和楊時暢武衛授檢討庶吉士之留官翰林者至是盛矣二甲程楷蔣冕黃穆傅圭華巒吳儼羅玘蘇葵授編修三甲李遜學石珤毛紀授檢討二甲顧清沈燾吳一鵬汪俊周玉黃瀾授編修三甲薛格授檢討二甲濮韶陳霽葉德賈詠授編修三甲汪偉王九思劉瑞授檢討二甲魯鐸溫仁和李時滕霄畢濟川何瑭授編修三甲周禎盛端明授檢討二甲崔銑嚴嵩湛若水陸深翟鑾徐縉授編修三甲段炅穆孔暉孫紹先易舒誥張邦竒授檢討二甲第四人劉仁宇之子也逆瑾傳中旨併其上二名邵鋭黃芳及三甲李志學韓守愚凡五人為庶吉士數月即拜鋭芳仁為編修瑾敗仁黜鋭芳皆坐纍左遷云二甲許成名劉棟張璧應良尹襄劉朴費宷張潮王思孫承恩劉泉林文俊孫紹祖授編修三甲金臯吳惠郭維藩王元正陳寰張衍慶邊寭授檢討二甲汪佃余承勛黃易江暉劉世盛葉桂章葉式馬汝驥王三錫陳沂鄺灝授編修三甲張星蕭與成林時季方湯惟學授檢討二科庶吉士留用之多前此所未有也二甲廖道南江汝壁童承敘黃佐王相王同祖王用賔張治授編修蓋自宣德以前兼授部屬中書等官正統間始有授科道者成化後不授中書正德辛未丁丑止授科道而無部屬辛巳仍復兼授焉國初最重是選雖二甲第一人及會元或選而不預或預而不留其嚴如此丘濬嘗謂每科不必多選所選不過二十人每選不必多留所留不過三五輩其言誠是也然必有通融之術而後可以免遺材之嘆髙皇帝之久於教習也蓋欲盡使之積學以待問蓄德以克用而後已未嘗遽出入前輩謂翰林官惟首甲即除授選為庶吉士者逺則八九年近則四五年而後除授有不堪者乃改授他職世以職清務簡稱翰林為玉堂仙亦切喻也今公署教習不過三年即評品而去留之使有晚成者出乎其間曷由進哉成祖加意躬親校閲該授科道部屬等官有志進學者許自陳願就近侍他職如髙榖輩授中書舍人之例榖後以學行獨優升司直郎遂入翰林為侍講宣著為令庶使華國之儒不至有遺而祖宗之制可復也纂修洪武六年十二月以儒士朱右趙塤朱濓孫作為編修以纂日厯故也作辭不拜明年五月日厯始成云纂修擢用蓋自此始洪武末年充修史官者有教諭等官王景髙讓吳勤趙友士端孝思張秉彛唐耕葉惠仲胡仲昭等景即拜侍讀餘各除主事永樂初髙廟實録成詔定諸臣秩以太常寺博士錢仲益知縣楊覯梁潛王褒為修撰國子助教王達給事中朱紘為編修行人蔣驥為檢討國子博士金玉鉉為五經博士晉府伴讀蘇伯厚為侍書教諭解榮劉宗平為待詔謄録生貟金實為典籍亦有京職擢為外任上親裁定酌量才器銓授品職逮重修髙廟實録及修四書五經性理大全大典諸書主事李時勉陳敬宗等擢侍講等官有差其後纂修擢用者主事劉球陳叔剛改侍講御史邵宏譽改編修自後纂修專用本院官此例遂廢孝行洪武二十六年八月詔褒異浦江鄭氏纍世同居家範克篤里人王氏效之乃徴二家子弟年三十以上者詣闕既至令自推舉乃以鄭濟為左春坊左庶子王勤為右春坊右庶子徐州民權謹十歲喪父哀毁幾絶洪武中以薦知樂安縣進光祿寺署丞迎母就養母疾籲天求以身代母卒負土成墳廬墓三年哭泣不輟事聞聖祖命為文華殿大學士辭不允以風天下之為人子者尋改通政司右參議致仕仍旌其門曰孝行云詩有之有馮有翼有孝有德以引以翼聖人以孝治天下固如此若以文墨自矜罔修於家而欲其揚於王廷固已難矣直諌洪武十五年二月以福建儒士沈士榮為待詔士榮抗疏言天下事謂當修治省刑且請給筆劄條列事宜或入侍左右劇論庶事雅重其鯁直賜手詔褒重之十六年十月秀才周焕奎髙孟文入見論時事剴切上大喜皆擢為檢討二十六年十一月學官入覲者詢民間政事得失在列者多應對不稱旨獨秦州訓導門克新敷奏亮直擢右贊善紹興府學教授王俊華以善文辭擢右贊善召二人謂之曰吾所以左克新而右俊華者重直言故也皆悚然恱服他日侍臣李思迪馬懿顧問默默則黜之使忠讜之言日聞聖祖之詒謀逺矣耆俊太祖嘗曰古之老者雖不任以政至於咨詢謀謨則老者閲厯多聞見廣達於人情有可資者故洪武中多擢老成之士官以本院及為東宫輔導耆儒劉靖關賢為庶子趙肅何顯周為諭德學士劉三吾文淵閣大學士朱善左司直郎汪仲魯皆年踰六十時承顧問翊贊儲極趨朝則同列賜坐則聨席衣冠儼雅修潔人望而敬之時稱翰林三老洪武十九年七月詔舉經明行修練達時務之士年七十以下郡縣禮送京師上曰比來有司不體朕意豈知老成古人所長文王用吕尚而興穆公不聼蹇叔而敗伏生雖老猶傳經豈可槩以耄而棄之也若年六十以上七十以下者當置翰林以備顧問聖祖貽謀任用老臣臻於至治有非前代可及者隱逸處士吳與弼之見薦也天順元年十月上遣行人曹隆勑曰渴望來儀以資啓沃二年五月壬寅至京師時特召大學士李賢問曰與弼授以諭德何如賢對曰可然諭德有左右上曰與之左授左諭德與弼固辭上御文華殿召對賜紗羅羊酒柴米有旨朝廷久聞髙誼特用徴聘今惠然逺來喜悅然幣以將誠官以命德禮非過也不允所辭或勸就職與弼曰淺陋之學衰病之軀豈堪任使敢竊祿哉再疏辭上褒答之有曰亦不煩卿以冗務特處以宫僚之職不必再辭戊申大學士李賢請旨召入內閣講中庸己酉三疏辭且請閣中祕書有旨固辭雖得難進之義揆之中道無乃過乎欲觀祕書可勉就職丙辰令其子瑮赴吏部告疾七月庚寅四疏終辭奉旨既年老有疾不能供職準辭丙申進封事十䇿一曰崇聖志二曰廣聖學三曰隆聖德四曰子庶民五曰謹教令六曰敦教化七曰清百僚八曰齊庶政九曰廣言路十曰君相一德同心已未召入文華殿上眷賚無巳賜以銀幣給以月廪復遣行人王惟善送歸仍賜詔褒嘉示以拳拳至意與弼既辭上敕惟善曰天氣近寒吳與弼年老一路好生看顧莫教他費力古帝王褒賢之盛節大臣推賢之盛舉於是乎至矣聖裔洪武六年四月孔子五十五世孫孔克表以學行舉上與語經史獻納言皆稱旨拜修撰兼國史編修官永樂以後纍舉象賢世祿之典顔子孟子周子程子朱子後裔擇宗子以聞皆授世襲五經博士惟居鄉給俸以奉祭祀而已景泰時誠意伯劉基後裔亦援此例得世襲五經博士𢎞治中孔子嫡派在浙江衢州者有司以宗子孔彥繩奏聞詔授世襲五經博士尋改劉基之後為指揮於是崇道酬勳之意昭昭矣今上登極崇重世德復功臣劉基之孫瑜為誠意伯蓋千古盛典也任子洪武九年六月上謂學士承旨宋濓曰朕自布衣卿起草萊列侍從世與國同休不亦美乎趣官其子孫屢辭謝不敢奉詔不允遂徴冢子瓉之子慎為殿廷儀禮司序班未幾復召價子璲除中書舍人上時命題試璲與慎而戒之語濓曰朕為卿教子孫濓或奏事久稱倦遂特命璲慎共扶下殿父子祖孫三世皆官內廷當世以為榮厥後復録濓之孫懌為本院侍書云永樂中學士胡廣卒詔以其子穜為檢討纍遷至修撰洪熙時尚書兼詹事金忠之子達擢檢討賜歸依親讀書正統末改給事中尚書王直之子䆅為檢討大學士楊士竒楊榮則皆蔭尚寶丞及中書舍人自是遂為定制無任翰林者孝廟眷注大學士丘濬輩官其後多至三四人然或有援以陳乞者矣獨宣德中大學士金幼孜疾革士竒榮問之惟言受國家恩重生無益於當時死無益於後世復何言或啓請身後之澤者則正色曰為子弟求祿君子所耻此其最可稱者也改擢本院官特清貴舊不輕改擢學士官雖五品序秩於尚書之上洪武三年七月丙申以太常寺卿魏觀為侍讀學士六年四月丙辰以兵部尚書樂韶鳯為侍講學士吏部尚書詹同為學士承旨仍兼吏部尚書八年三月以廣西按察司僉事達魯與權為修撰十三年五月癸丑以山西右布政使趙新為修撰十五年十一月戊午以禮部尚書邵質為華蓋殿大學士十六年十月以僉都御史茹太素為檢討瓊州府知府趙瑁為左諭德三十四年九月以左僉都御史凌漢為左贊善蓋本院自革承旨後為五品衙門居庶寮以學行著聞而改擢者品秩大都由尊改卑蓋崇儒右文之體當如是也永樂初進髙廟實録猶先學士王景而後及禮部尚書李至剛其尊重可知曽棨以狀元及第官居侍從將二十年始得侍講學士上顧左右謂曰曽棨也與學士矣意猶謂其早也是時燕邸左長史金忠不得厠名翰林惟拜工部宣宗雖擢山東張瑛入翰林以嘗為詹事府舊僚宷故也景帝興自郕邸其左長史儀銘亦官止禮部左侍郎未有遽擢為學士者其後一日拜六學士時人以為名器之濫兵部尚書陳汝言謂人曰昔十八學士登瀛洲今六學士同登何謂多耶此景泰之治鮮克終也竊謂慎重名器當自本院始葉盛所著水東日記蓋備紀之兼職本院官始惟與詹事府左右春坊司經局互兼職事洪武中未設編修時多以修撰兼國史編修官其後以修撰任亨泰為詹事府少詹事兼修撰則東宫官兼本院官之始文華殿大學士全思誠兼左春坊左中允則學士兼宫僚之始也凡宫僚必俟儲位既正而後設然必互兼無有専任者仁宗在東宫始以尚書蹇義金忠兼詹事尚書李至剛兼左春坊大學士學士解縉兼右春坊大學士侍講學士楊士竒等兼中允皆本聖祖初制洪熙以後始有三孤及三師三少六卿侍郎通政事使太常寺卿少卿尚寶司卿兼本院官者正統以後始有都御史大理寺卿通政司參議兼本院與殿閣官者若詹事府詹事或不設而以尚書兼學士掌之左右諭德及司經洗馬或兼講讀或兼修撰編修或兼校書等官惟視時以為崇卑成化以後內閣止用吏户禮三部兼職若左諭德則兼侍讀右諭德則兼侍講等官一定而不易則自𢎞治時始正德中詹事府左右春坊司經局等官通無一員百餘年來所未有也坊局諸印皆寄之本院本院學士又缺有一人帶管二印者蓋逆瑾與姦芳主之大學士李東陽曰旁觀坐視不能救正咎有所歸正指此也殿閣詞林記卷二十一
