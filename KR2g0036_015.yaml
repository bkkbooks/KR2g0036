body:
  text: 殿閣詞林記巻十五明黄佐廖道南撰經筵英宗嗣位年九齡大學士楊士竒等始奏請開經筵疏略曰去年十月宣宗皇帝御左順門召臣士竒諭之曰明年春煖東宫出文華殿讀書凡内外侍從俱用慎擇賢良廉謹之臣臣士竒對曰此國家第一事正惟其時伏望陛下留心不幸先帝上賔臣未敢遽言此事至重不敢久黙兹遇山陵畢早開經筵以進聖學因具合行事宜今當預擇講官必得問學貫通言行端正老成重厚識達大體者數人以供其職乞預命吏部禮部翰林院公同推舉具名陳奏取自上裁又曰天子就學其事體與皇太子親王不同乞先命禮部翰林詳定講筵禮儀陳奏又曰凡起居出入一應隨侍及使用之人皆宜選揀行動端莊立心行己正當者使在左右如或其人動舉輕佻語言䙝慢立心行己不正者皆宜早去之若不早去隨侍既乆情意相洽不覺其非言聽計從後來欲去其勢難矣正統元年二月勑曰朕祗奉天命嗣承祖宗大寳統御天下用主神人弗遑夙夜永惟厥道必學乃明今以初九日十九日御經筵爾翰林春坊儒臣分直侍講夫道原出於天堯舜禹湯文武以隆政教而周公孔子闡明之我祖宗世所師法以安天下卿等宜安心竭誠相與討論務歸至當毋隠而勿彰毋曲以偏好庶明於行以興治化以福蒼生罔忝天與祖宗之命欽哉以太師英國公張輔知經筵事少傅兵部尚書兼華蓋殿大學士楊士竒少傅工部尚書兼謹身殿大學士楊榮禮部尚書兼學士楊溥同知經筵事詹事府少詹事兼侍讀學士王直少詹事兼侍講學士王英侍讀學士李時勉錢習禮侍講學士陳循侍讀苗𠂻侍講高榖修撰馬愉曹鼐兼經筵官遂為定制其後各部侍郎出自本院者得與焉然是時吏部郎中李茂𢎞已竊有謂君臣之情不通經筵徒為文具之嘆矣會典所載經筵初開儀注開用勲臣一人知經筵事内閣大學士或知同知經筵事六部尚書左右都御史通政司大理寺卿及學士等官侍班翰林院春坊等官及國子祭酒二員進講翰林春坊等官二員展書給事中御史各二員侍儀鴻臚寺錦衣衛堂上官各一員供事又鳴賛一員賛禮序班四員舉案侯伯一人領將軍先期直殿内官於文華殿設御座及御案於殿内御座之東稍南設講案於御案之南稍東是日早司禮監官先陳所講四書經史各一册置御案又各一册置講案先四書東經西史先期輪講官撰四書經或史講章各一篇預置於冊内是日早上御奉天門早朝畢退御文華殿陞御座將軍侍衞如儀鴻臚寺官引知經筵及侍班講讀執事侍儀等官於丹陛上行五拜三叩禮禮畢以次上殿依品級東西序立知經筵官序于侍班官上侍儀御史給事中各二員於殿内之南分東西北向立序班二員舉御案置御座前二員舉講案置御講之南正中鴻臚寺官賛進講講官一員從東班出一員從西班出詣講案前稍南北向並立鴻臚寺官賛鞠躬拜叩頭興平身畢展書官一員從東班出進詣御案前跪展四書畢起退立於御案之東稍南講官一員進講詣案前立奏講某書講畢稍退展書官復詣御案前跪掩四書畢退就東班又展書官一員從西班出進詣御案前跪展經畢起退立於御案之西稍南講官一員進至講案前立奏講某經或某史畢少退仍並展書官復詣御案前跪掩書畢退就西班鴻臚寺賛講官鞠躬拜叩頭興平身禮畢各退就東西班序班二員舉講案退置原所鴻臚寺官賛禮畢命賜宴鴻臚寺等官及講官皆跪承㫖光禄寺官設宴於左順門宴畢叩頭出月講㑹典載月講常儀云毎月初二十二二十二日㑹講先期司禮監官陳設書籍御案如前儀至期俟上御文華殿侍衞侍儀執事進講賜宴禮同但各官止行叩頭禮孝宗時經筵雖隆冬盛暑不廢𢎞治十年四月二日當㑹講以享太廟有㫖改是月之三日至期遇雨又改四日盖聖學之勤不以事而廢如此嘉靖十年八月癸夘西苑豳風亭落成上御無逸殿命輔臣李時翟鑾坐講暨日講官顧鼎臣謝丕張潮臣道南分撰書無逸詩豳風講章進呈畢設宴列坐於亭之兩旁天顔澄霽玉音宣暢盖君臣同游之盛如此次日臣道南進講文華殿首揭君子所其無逸章嗣後進講書經康誥惟民康乂章召誥顧畏民碞章及孟子踐形章理義悦心章被袗衣皷琴章君子反經章毎横經竭忱上臨黼座俯躬咨詢虚心聽納一日講官劉龍進孟子至誠章上批曰龍於至誠能動乃云邇者黄河清是至誠之騐也未免近䛕但其末云謙以履盈約以保㤗此二句却好又倫以訓進論語陽膚為士師章講章上批云以訓講哀矜勿喜云是慈悲憐憫夫慈悲二字是釋氏之教也朕所傳者二帝三王之道所習者孔孟之學也非釋氏之教也及魏校進書經講罪疑惟輕章上批云桂萼薦校善觧經義朕昨觀其講章並未有過人者且其前後率多腴詞難居近侍着吏部調南京用上之聖明知人如此直與堯舜同一道矣日講㑹典載日講官儀云凡日講止用講讀官内閣大學士侍班不用侍衞侍儀執事等官待班講讀等官入見行叩頭禮東西分立先讀四書次讀經或讀史每本讀十數遍直講官先講四書次講經或講史務在直説大義明白易曉講讀後侍書官侍上習書畢各官叩頭退每三日一温講將前所講書通講一遍若講官中有事故同列代講其直解則講畢補進嘉靖十二年五月内臣道南輪講論語髙宗諒隂以下三章時汪鋐拜冢宰懇祈張孚敬改題以其有君薨聽於冢宰句也臣道南執不之改孚敬即上掲帖上批云覽卿等奏朕悉已舊日講官徐縉講孟敬子撤去二節人之將死不講夫死生人道之常何諱之有如卿等言則忠讜之論何由得聞還着道南照舊進講次日臣道南講畢進説云臣按説命夢帝賚予良弼其代予言又云其惟不言言乃雍即是以觀古之人君心純乎孝故宅憂而不暇於有言古之人臣心純乎忠故攝政而不嫌於代言然必有髙宗之聖而後可以用傅説之言必有傅説之賢而後可以輔髙宗之德不然則莽操懿温之流又將以冢宰藉口於千萬世矣時孚敬聞之大怒出謂鋐曰講官欲中之傷又明日進講大學衍義許敬宗立武昭儀章及李林甫嫉李邕章楊國忠比李輔國章元載陷顔真卿章盧把嫉張鎰章李逢吉結王守澄章江充害戾太子章孚敬積憾至十三年七月初三日彗星見輪顧鼎臣席春進講鼎臣未到孚敬遂叅臣道南及蔡昂不行代講乃謫道南於徽正欲鋐反噬也聖明軫念旋即賜環而姦黨無所容其欺矣咨講國初己亥年正月聖祖克婺州置分中書省詔諸名儒㑹食省中日令二人進講經史敷陳治道此論道講學之始也吳元年初創設博士㕔令博士許存仁等日講尚書等書及有天下令文學侍從之臣毎於御前講説經史無定日亦無定所尋設華盖文華武英等殿説書以儒士沈德輩為之其後惟本院及殿閣大學士專其事罷諸殿説書官然聖學緝熈甚力毎進講必反覆討論以求義理之極致講畢必議及政事以為常洪武三年二月上御東閣學士宋濂待制王禕等進講太學傳之十章至有土有人濂等反覆言之上曰人者國之本徳者身之本德厚則人懐人安則國固故人主有仁厚之德則人歸之如父母人心既歸則有土有財自然之理也若德不足以懐衆雖有財亦何用哉十六年八月上御謹身殿東閣大學士吴沈等進講周書罔有立政用憸人上曰有小人必敗君子故唐虞任禹稷必去四㓙魯用仲尼必去少正夘沈曰書云去邪勿疑所以深致其戒上曰國家不幸有小人如蓄毒藥不急去之必為身患有小人巧於悦上忍於賊下人君若但喜其順適己意任其所為而不問譬如犬馬傷人人不怨畜犬馬者乎十八年九月上御華盖殿命文淵閣大學士朱善講周易至家人上曰齊家治國其理無二使一家之間長幼内外各盡其分事事循理則一家治矣一家既治達之一國以至天下亦舉而措之耳朕觀其要只在誠實而有威嚴誠則篤親愛之恩嚴則無閨門之失善對曰誠如聖諭大學士李賢天順日錄有曰髙廟看書議論英發毎儒臣進講必有辨説因講夷狄之有君不如諸夏之亡也辨曰夷狄僻逺不知仁義禮智之道孔子之意盖謂中國雖無君長人亦知禮義勝似夷狄之有君長者宋儒乃謂中國之人不如夷狄豈不謬哉又講攻乎異端斯害也已辨曰攻是攻城之攻已止也孔子之意盖謂攻去異端則邪説之害止而正道可行也宋儒乃以攻為專治而欲精之為害已甚豈不謬哉如此辨者甚多漢唐以來人君能事詩書如此留意者亦不多見由聖資髙邁所以不襲故常而發前賢所未發也宣德二年三月己酉上御文華殿翰林儒臣進講孟子離婁章上曰伯夷太公皆處海濵而歸文王及武王伐紂太公佐之伯夷叩馬而諌所見何以不同講臣對曰太公以救民為心伯夷以君臣為重上曰太公之心在當時伯夷之心在萬世無非為天下生民也三年二月癸酉進講舜典上曰觀二典三謨則知萬世君臣為治之道不出乎此厯象日月星辰以閠月定四時天道以明治水土奠髙山大川分别九州任土作貢地道以成克明峻德以至恊和萬邦人道以建九官十二牧所掌禮樂刑政及養民之道後世建官繁簡雖不同大要不出乎此當時君臣都俞吁咈更相告戒用圖治功氣象藹然何後世之不能及也講官對曰明良相逢故治化之盛如此上曰天生聖人為後世法孔子刪書斷自唐虞使人知有堯舜所謂萬世帝王之師也十月庚寅儒臣進講春秋上曰聖人匡世之功憂世之心備見此書當時先王禮樂法度日以隳廢亂臣賊子接跡而起有此書而後天下知尊周又曰孔子作此書以尊周為本孟子乃以王天下勸齊梁之君何也對曰孔子之時天下猶知宗周孟子之時不復知有周矣上曰聖賢之心實為天下生民計孟子時不有王者興何以解生民之塗炭遂賜講官命左右送菓茗四年四月甲申上御便殿與儒臣論史問漢唐諸君在位孰久對曰武帝𤣥宗上曰漢武好大喜功海内虛耗晚年能懲前過𤣥宗初政有貞觀之風久而恣慾疎忠任邪遂致禍亂竄身失國武帝猶為彼善於此又曰善心生則明慾心生則暗武帝以田千秋為賢𤣥宗以李林甫為賢此治亂所由異也今上初命顧鼎臣講洪範及臣道南講無逸章御製詩賜講官曰自昔聖哲務民義其所重者惟曰農文武興周繼二代功有攸自慶有鍾后稷實始肇王業公劉稼穡追遺蹤男親耕耨謹東作婦勤蠶織以禦冬對時舉事罔敢忽率以儉約守以恭百年積累膺眷命天人允恊雲風從周公拳拳輔王室成王踐阼何雍容沃心申告端化本細大必舉不厭重乃知為君貴法祖敬以逢吉怠必㐫書垂無逸詩七月王者當服之心胸聖賢之言豈欺我躬行庶見臻時雍呈講凡講官侍讀者日在左右或進讀必諦聴髙皇帝嘗御華盖殿文淵閣學士朱善進讀心箴畢上曰人心道心有倚伏之幾盖仁愛之心生則忮害之心息正直之心存則邪詖之心消羞惡之心形則貪鄙之心絶忠慤之心萌則巧偽之心伏故人常持此心不為情慾所蔽至公無私自無物我之累耳永樂二年八月學士解縉等進呈大學正心章講義上覽之至再諭縉等曰人君誠不可有此好樂一有好樂泥而不返則慾必勝理若心能靜虗事來則應事去如明鏡止水自然純是天理朕毎退朝黙坐未嘗不思管束此心為切要也楊士竒等先於六月亦進呈文華殿大學講義上覽畢稱善因曰先儒謂堯典克明峻德一章一部大學皆具士竒對曰誠如聖諭堯舜禹湯文武數聖人凡修諸躬施於家國天下者皆大學之理上曰孟子道性善必舉堯舜爾等於講説道理處必舉前古為證庶幾明白易入又曰帝王之學貴切已實用講説之際一切浮泛無益之語勿用盖留神融㑹必妙悟至理而後已成化初洗馬楊守陳進講武成篇曰魯論稱舜無為而治周書稱武王垂拱而天下治然後世人主有深居禁中委政内侍者召閻樂之禍有髙拱無為惟寵嬖豔者啓禄山之亂何也堯舜之所以無為者由其封山濬川以至舉相去㐫無一不盡其道武王之所以垂拱者由其列爵分土崇德報功無一不究其心皆嘗憂勞以有為乃能佚樂而無為也後世人主則孟子所謂安其危利其菑樂其所以亡者耳惟陛下留意時左右聽者悚然守陳真善於啓迪者矣孝宗時嘗召大學士劉健李東陽謝遷議事因謂曰昨日令李榮來説日講時劉機講陳善閉邪陳字解做陳説不是止云敷陳其説乃可耳皆應曰諾徤進曰昨李榮又説以善道啓沃他他字不是上㣲笑曰他字也不妨大抵講書湏要明白透徹直言無諱道理皆是書上原有的不是纂出若不説盡也無進益且先生輩與翰林院是輔導之職皆所當言徤對曰臣等若不敢言則其餘百官無敢言者矣上曰然遷曰聖明如此講官愈好盡心今上御講筵虛心聽納一日問顧鼎臣曰堯典舜典是何人撰述對曰史臣所撰曰當時唐虞兩朝只數百言説盡何其簡要後世若宋史何其浩繁也即命史臣刪述入直洪武中令儒臣更番入禁中毎日用一員進講侍直誤者論罪大學士吳沉嘗坐進講遲誤被劾永樂以後多渥典自設經筵後講官不復入直惟令本院及坊局官相輪侍班乆之選為展書官又自展書乃得充月講官若日講則用年資深而品秩尊者正統中修撰商輅侍班上廉知其名諭學士曹鼐等曰商輅着展書宜選一人與輅為對初選修撰王玉弗稱㫖再選編修陳文乃俞允未逾月復諭鼐曰商輅陳文着講書盖自後鮮出新擢云趨召聖祖時凡觀經史中有句讀字義未明者必召翰林儒臣質之雖有知書内侍能文宫人不得近盖不特紬繹義理而已洪武末侍講方希直有詩云風暖彤庭尚薄寒御爐香繞玉欄干黄門忽報文淵閣天子看書召講官即其事也成祖寳訓云上親朝之暇輙御便殿閲書史或召翰林儒臣講論永樂以後盖莫不然今上召臣道南於徽州至都城通惠河厰中已奏聞御劄曰聖母近違和今臻安吉詣皇伯母宫謝視疾擬明日吉慈躬出宫朕惟親安其子之懽慶當何如擬奉壽安宴以稱壽承歡鼎臣道南各撰致語二篇来用遂召至平臺賞以金綺陳説祖宗時講官於講書後得言時政闕失及陳論所見洪武中大學士吳沈進講畢進去邪勿疑之説因曰小人懐奸甚似忠信不可不察上曰然憲宗在東駕覽學士劉珝周官無逸篇文王懐保惠鮮章遂及時事數十天顔豫悦深有契於心未幾嗣大位即却貢獻减財賦罷諸道鎮守官皆昔所論也𢎞治侍講學士李東陽大旱應詔言事摘經筵所講孟子中要論切於治道者析為數條極論其理而時政得失以𩔖附焉上嘉納之雖非面陳然均之為啓沃之義恩賚正統初經筵始開賜宴於禮部知經筵官賞白金八十兩寳鈔四千貫文綺四表裏同知經筵及講官賞白金五十兩寳鈔二千貫文綺四表裏侍班官賞白金三十兩寳鈔三千貫文綺二表裏餘皆賞寳鈔有差具本稱謝有曰萬幾有暇恒親御於經筵多聞是求肆詳延於儒雅臣等荷絲綸之飭勵繼宴賜之便蕃於緝熙殫厥心允洽周成之德念始終典于學敬陳商説之篇已而講官各賜廂金玳瑁香帶大紅織金紗羅襲衣冠履皆具天順八年八月憲宗御經筵講官學士柯潜等賜白金三十兩寳鈔三千貫文綺二表裏而庶子兼侍讀徐溥侍讀倪岳編修彭華等與焉成化四年十二月賜經筵儒臣七人襲衣冠履時柯潜已聞父䘮上命即其家賜之十二年大學士商輅等題奏言太常寺卿兼侍讀劉珝日講經筵進講經史其勞與少詹事兼侍讀學士柯潜李㤗同十四年四月十二日皇太子御左春坊進講大學首章退宴文華門十二日上御經筵進講中庸二十章退宴左順門寵錫稠疊前此所未有也孝宗時尤重經筵學士程敏政記其事云𢎞治元年三月十二日初開經筵賜宴及白金寳鏹十三日文華後殿早進讀尚書孟子及午進讀大學衍義以為常講畢賜茶上皆呼先生而不名四月二十八日以後屢賜桃杏郁李蓮房鮮筍青梅枇杷楊梅雪梨鮮藕五月二十九日以後屢賜敏政等具表稱謝且記之以詩有曰黄封盡帯乾清字朱實平分上苑香七月二十日文華殿後講上顧中官賜講臣冠帯鞾袍敏政預賜織金雲鴈緋袍一副金帯一及烏紗帽皂韈面謝訖上顧謂曰先生辛苦咸對曰此皆職分當為頓首而退有詩記之云日映罘罳曉殿清湛恩稠疊駕親臨褒衣紅濯天機錦束帯黄分内帑金久幸清班容官履漸慙華髮㸃朝簮經生職分尋常事消得君王念苦辛時上最重儒臣學士張元禎短小毎進講上俯几聽之嘉靖五年正月上召大學士楊一清費鋐石珤及編修孫承恩臣道南暨張治王用賔等至文華殿諭曰大典未備特命卿等纂修以埀後世各賚白金文綺有差嗣是毎遇經筵日講召講官顧鼎臣謝丕及臣道南蔡昂賜賚無筭臣道南悉記以詩賜枇杷菓詩云炎日殊珍出尚方賜來猶染御園香珠丸雲篚承優渥玉液霞􅎆敢自甞賦擬上林風韻别貢縁南國露華芳翠籠函賜同袍士蕙圃蘭臯倍寵光賜鰣魚詩云暑雨經旬濕不開雪鱗氷艦自南來御庖珍饌傳中使講幄金盤出上裁薦鮪未湏歌寢廟釣鼇何必羡蓬萊素餐忝竊慙無補魚藻空懐絶代才賜鮮筍詩云端居玉署槐隂細拜賜金門竹筍新仙苑青霄分鳯族御題彤管浹龍鱗娟娟秀色猶含雨嫋嫋柔芳尚帯春却憶瀟湘千畆地野人持贈未為珍賜鮮藕詩云承明供奉羅珍饌中使仍傳賜藕鮮捧出禁垣三錫寵薦來家廟寸𠂻䖍潤含天上金莖露清挹峰頭玉井蓮自是龍池有仙種江南風物敢爭先賜講官大帯詩云南郊禋薦勞明主上界仙班重講臣寳帯頒從三接晝玉堂先領一陽春光逾照乗連城價寵倍通天絶域珍揣分敢云稽古力立朝端委報君身殿閣詞林記卷十五
