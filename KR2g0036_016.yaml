body:
  text: 殿閣詞林記卷十六明黃佐廖道南撰顧問侍從文學之臣論思獻納自漢已然至唐始設翰林以言語文字備顧問因有天子私人與內相之目而待制輪對有非諸司所敢望者國初儒臣雖布衣皆得備顧問及置本院凡上御奉天華蓋謹身文華武英諸殿文淵閣東閣東西黃閣文樓武樓奉天左順右順中右思善等門并出入禁籞無不從游又定為入直即唐之待制也奏事即宋之輪對也宣宗嘗謂侍臣曰君臣一體猶元首之有股肱故於儒臣每燕見必從容咨訪使盡其意此所以上下交而德業成也正統以後入直奏事之制既廢凡有宣召獲承顧問咸歆艷以為榮嘗觀洪武中太祖嘗祀方丘患心不寧以問學士宋濂濂對曰孟軻有言養心莫善於寡欲審能行之心清而身泰矣上深然之夫以逆耳之言能格心如濂真以道事君者也然濂每有陳對絶不以語人署溫樹二字於居室之壁有問及內事者指以示之禔身慎幾事之密若濂者誠可為備顧問之法永樂時內閣七人惟楊榮金幼孜黃淮楊士竒當顧問時從容詳慎亦濂之亞云責難聖祖立國使人人得以盡言倚毗近侍尤切洪武二十九年十一月以修撰張信為侍讀編修戴德彛為侍講諭之曰官翰林者雖以論思為職然既列近侍旦夕在朕左右凡國家政治得失生民利病當知無不言昔唐陸贄崔羣李絳之徒在翰林皆能正言讜論補益當時顯聞後世爾等當以自期毋負朕擢用之意永樂三年四月成祖御奉天門視朝罷召六科給事中諭曰朕日臨百官可否庶政或有失中者爾等宜直言無隱又顧翰林學士解縉等曰敢為之臣易求敢言之臣難得敢為者强於已敢言者强於君所以王魏之風世不多見若使進言者無所畏聽言者無所忤天下何患不治朕與爾等皆勉之又嘗謂諸近臣曰早來在宫中偶忘一事問左右皆不能記憶蓋沈思久而後得之朕以一人之智處萬幾之繁豈能一一記憶不忘一一處置不誤拾遺補過近侍之職自今事之叢脞者爾等但悉記之以備顧問所行有未合理亦當直諌朕自起兵以來未嘗違忤直諌爾等慎勿有所顧避將順聖祖欲省刑學士詹同承顧問頓首賀曰陛下之言及此天下之慶也因言古者刑不上大夫上深然之又嘗當春月欲行刑以為疑問於左司直郎汪仲魯頓首涕泣曰此天地之仁也請即免行刑上允所奏郕戾王之葬也左右請以汪妃殉英廟不忍以問大學士徐有貞李賢賢言景泰初汪后即不得志况二女皆幼可憫臣愚以為宜厚遇之上憮然以為是又思建庶人幽大內久欲赦之左右多以為不可召問賢賢曰陛下此一念太祖在天之靈實臨之堯舜存心不過如此上意遂决遣中官衛送之居鳯陽聽出入自便上厭左右招權納賄與賢言之賢謂人君之權不可下移惟自攬取則彼之勢自消上曰然無此相礙何事不順吾五更二㸃起拜祖宗畢即出視朝循此舊規不敢有誤退朝至文華殿或有政事訪問大臣商確復省章奏賢曰自古賢君修德勤政莫不皆然願陛下持此不衰堅如金石可以為堯舜之君矣上一日又曰中官蔣冕嘗效勞其實讒亂朕初復位即於太后前言曰皇后無子當换朕即斥之及東宫既立冕復曰其母如何朕曰當為皇貴妃乃止以此逺絶之賢曰讒說殄行自古帝王所深惡者絶之最是賢之善於將順此類也故當時奏對無不當上心者成化十一年十一月詔復郕戾王位號初下羣臣議又遣太監懷恩等至內閣問大學士商輅萬安等輅力陳所以當復之故言甚剴切左右皆泣輅亦泣上聞之感動疏入即允輅舉手加額曰皇上此舉堯舜之盛德也遂上景皇帝尊諡云調停成祖巡狩漢庶人髙煦窺伺儲二上不能無疑永樂九年三月翰林諸臣奏事右順門特召楊士竒問曰汝輔監國久東宫所行果如何對曰孝敬上曰試言其事對曰凡事宗廟籩豆之類皆親閲自車駕北征恆切懷憂不遑寧居日中昃始食及敕使至始釋然寬慰上曰聞輔臣中獨爾能持直道不見忤否對曰臣性愚戅但見容納且殿下天資甚高非衆人所能及或有過未嘗不知知之未嘗不悔而速改之且用心以愛人為本將來不負陛下付託上甚喜命尚膳賜酒饌十四年上在北京聞髙煦有異志及還以問士竒曰汝與蹇義在此漢府事皆當悉知昨問義不肯言汝盍言之如朕未知汝輩慮有離間之罪朕既知矣汝何慮對曰漢王始受册封國雲南不肯行改青州又堅不行今朝廷將徙都彼欲留守南京天下皆疑其心惟陛下善處之乃詔削其兩護衛處之樂安州曰此去北京甚邇即其作禍可朝發而夕擒也宣德元年髙煦果反車駕親征罪人既得師還六部惟尚書陳山迎駕山見上言宜乘勝移師向彰德襲執趙王上召楊榮蹇義夏原吉楊士竒謀之有以為可者上令士竒草敕士竒執不從遂還京一日問士竒曰言者論趙王日益多奈何士竒請遣駙馬廣平侯袁容齎璽書往開諭之上從其請王喜即獻護衛且上表謝而言者頓息自是上待趙王日益親厚而薄陳山踰數月召士竒至南齊宫諭之曰吾趙叔不失親親之禮爾有力焉自今毋以見忤為嫌遂賜白金寶楮文綺若士竒者可謂善調護朝廷骨肉之間者矣景泰中易儲一事當國者有靦顔焉論薦聖祖嘗問及廷臣臧否宋濓惟舉薦名士稱其善者不置問否者為誰對曰善者與臣為友故知之否者縱有臣不知也自是每用人多命本院官舉而用之宣德三年六月召楊榮楊士竒謂曰祖宗時朝臣無貪者宣宗因問其甚者榮以都御史劉觀對士竒曰風憲所以警肅百僚憲長如此則諸侯皆效之上撫掌歎曰除惡務本又問廷臣中誰可使掌憲士竒對曰通政使顧佐廉公有威榮曰佐亦嘗為京兆尹政清弊革上喜曰顧佐乃能如此命賜茶而退數日擢佐右都御史乃治觀罪及士竒寢疾英宗遣內官詢人才舉檢討李紹等五人以對皆至大用天順中李賢在內閣奬進廉士首舉耿九疇為都御史軒輗為刑部尚書年富為户部尚書九疇為權臣所排輗不得志去賢屢言于上還之禮部缺侍郎有求近習薦升者上問賢賢曰不知其人臣所知者學士李紹可任因言士風不振多夤緣求進如用紹請於黼座召吏部面命之庶幾士類知警上從之命下之日傾朝􅋏然初石亨以文臣總軍務于邊使武臣不得逞因請罷之居無何邊徼騷然上悟其非命賢舉可任巡撫者賢以都御史李秉芮釗白圭王宇陳翌薦後松潘冦發薦都督許貴往平靖之成化中編修陳音抗疏言異端日熾宜召還尚書李秉修撰羅倫編修張元禎評事章懋給事中王徽舉人陳獻章置之臺諌革去法王佛子真人位號禁創寺觀則正人用妖妄息矣不報景泰末學士商輅薦司直郎林聰詔復職後聰忤宰執欲加重辟輅力辨之憲宗朝聰遂拜南京禮部右侍郎姚夔考滿至京輅又薦留後夔荐歷吏禮二部尚書亦輅汲引之故也申救洪武初朝臣有上疏萬餘言者太祖厭其迂衍欲罪之宋濂對曰彼應詔上疏其心為朝廷耳奚可深罪乎上乃覽疏有足采者召阿意者罵曰若向非濂言幾不誤罪言者耶洪熙初大理少卿弋謙數言事有言其賣直沽名者楊士竒對曰主聖則臣直惟陛下容之不然進言者將懼矣仁宗免其朝參令專坐司視事自是一月餘言事者少仁宗諭士竒曰自免弋謙朝言者不至豈果無事可言遂令士竒書敕引過命謙如舊朝參令百官言事毋以謙為戒景泰五年十月給事中有忤執政者大學士髙穀請從輕典卒得左遷七年順天府鄉試太常卿劉儼為考官時大學士陳循之子英王文之子倫入試不中二人交章奏儼欲置于法穀時病强起預考考畢入言曰大臣子與寒士並進已不可况又不安於命欲搆考官可乎由是儼得釋㫖中下以英倫為特賜舉人穀由此與二人不合屢求退然天順中彭時在內閣上方倚任李賢日與面議賢退乃咨訪於時有不可者時每執不肯初或相忤久之相協後錦衣衛指揮使門達用事忌賢隂中傷之上怒曰賢且得罪但當專用彭時中貴以語時時矍然曰何遽至此因為力辨其誣得釋一日欽天監湯序言變異上以問修撰嶽正正曰奸臣未有聞於朝著者若求之人人自危耳序術疏淺不足信事遂寢𢎞治中武岡知州劉遜為岷府奏訐被逮科道奏乞寬貸上怒俱下之獄大學士劉健等言遜情輕譴重言官為國盡忠槩以為罪後有大利害誰可言者上乃釋之正德二年尚寶卿崔璿御史姚祥張彧主事張偉給事中安奎咸被繫時劉瑾用事欲俱令枷號大學士李東陽俱申救寬釋一日早朝有文書一卷投於丹墀録瑾過惡上命瑾等詰問無肯承者遂執朝官三百餘人詔送獄東陽奏此事必隂謀所為同朝諸臣倉卒拜起豈能知之乃盡得釋匡弼凡被顧問必關於國家大體而後言之永樂五年冬廣東布政徐竒入覲載嶺南藤簟將以餽廷臣上閲視無楊士竒名乃獨召之問故士竒曰竒自都給事中受命赴廣時衆皆作詩文贈之故有此餽臣不預者以當時命未有所作不然亦不免今衆名雖具然受否未可知且物微甚當無他上意解即付中官單目令燬之一無所問洪熙元年四月有㫖故東宫官鄒濟徐善述王汝玉皆贈官賜諡令建祠於墓四時賜祭士竒進曰禮貴得中朝廷惟宗廟以四時享雖社稷孔子亦皆春秋二祀濟等雖有勞祀之乃與宗廟等可乎上曰吾過矣遽召禮部改春秋祭景泰元年八月英廟車駕自北狩還方議奉迎禮衆疑未定千户龔遂榮寓書於大學士髙穀言奉迎當從厚穀即袖其書以進且曰武夫尚知此禮况儒臣乎已而朝廷以遂榮非分下錦衣獄㑹車駕至百官郊迎穀復上章以伸前議聞者韙之而遂榮亦釋後英廟居南宫指揮盧忠妄言南內事景帝欲窮治之學士商輅請止罪忠一人以全大體上從之天順初錦衣衛邏得一僧妖言惑衆獄具當坐反及太監牛玉援近例請官邏者內閣修撰嶽正言事縱得實不過合妖言律活其從十數人邏者准應捕律而已時忠國公石亨與太監曹吉祥怙寵擅權有投匿名書指斥朝政者獨不及亨緝捕甚急舉朝惶駭亨勸上出榜募能捕告賞以三品職上令內閣撰榜格嶽正與吕原見上曰為政自有體盜賊責兵部姦宄責法司豈有天子自出榜購募之理且堯建進善之旌舜立誹謗之木秦始皇杜諫乃下誹謗妖言之令由此過失不聞卒至亡國陛下新復寶祚正當以堯舜為法秦為戒縱欲窮治其事緩則人情怠忽事自覺露急則人情危懼愈求韜晦不如勿究吉祥從旁請究甚力上曰正言是也成化初太監劉永成死有軍功欲封為伯大學士彭時力爭之或曰自古有封侯王者時曰此盛世事耶祖宗成憲具在誰敢違之事遂寢十二年七月建玉皇閣於宫北别創禮儀樂章將有事焉學士商輅論毁之十三年四月太監汪直創西厰立威內外官卧不貼席輅與同寅疏其十罪以聞上即命革罷納言成祖嘗與學士解縉論羣臣御書蹇義等十人名命各疏於下縉具以實對於義曰其資厚重而中無定見於夏原吉曰有德有量不逺小人於劉俊曰雖有才幹不知顧義於鄭賜曰可為君子頗短於才於李至剛曰誕而附勢雖才不端於黃福曰秉心易直確有執守於陳瑛曰刻於用法好惡頗端於宋禮曰戅直而苛人怨不恤於陳洽曰疏通警敏亦不失正於方賔曰簿書之才駔儈之心既奏上以授東宫曰李至剛朕洞燭之矣餘徐驗之問尹昌隆王汝玉對曰昌隆君子而量不𢎞汝玉文翰不易得所惜者市心耳後十餘年仁宗出其所奏示楊士竒曰人率謂縉狂士縉非狂士向所論定見也宣宗為皇太孫時官僚左庶子陳山邪侫得寵同列戴綸林長懋以直諌為山所讒害上即位始知之宣德四年十月一日朝罷楊士竒侍上於左順門遙望見山上曰汝試言山為人對曰君父有問不敢不盡誠以對山雖侍從日久其人寡學多欲而昧於大體非君子也上曰然趙王事幾為所誤朕已甚薄之近聞渠於諸司日有干求不厭當不令溷內閣也蓋上初臨御以山及張瑛東宫舊臣俱升內閣視事至是事寖聞於內有㫖調瑛南京禮部山專教內豎俱罷內閣之任天順初內閣修撰間為上極言曹石勢太甚慮有變宜早為節制上曰汝可以朕意告之正徑造亨諷令稍自斂戢二人怨之正遂被斥竄及二人誅上召李賢謂曰向者嶽正固言之他日又思正曰嶽正到好只是大膽因召還焉武宗時逆瑾用事凶焰熾甚大學士劉健等率諸臣伏闕請誅之焦芳隂為瑾地言者遂沮而健與謝遷輩皆引去於此見君子勝小人之難也當其事者必先事預防而後可計慮成祖一日晚出右順門召內閣諸臣楊榮一人在出江西三司奏章示之言吉安鄉民嘯聚者遣行人許子謨齎敕撫諭又遣都督韓觀率兵隨之如撫諭不下即加兵及是奏至上曰非觀至不下其降敕褒觀榮讀訖奏曰計發表之日觀尚在中道未足褒也從之後詢之果然榮自是益見重畨長阿嚕台既納欵欲收女直土蕃諸部聽其約束請朝廷刻制詞于金錠集諸部長磨酒飲之以盟上以問翰林諸臣黃淮對曰畨人莫測其心使各自為心則力易制若併為一則力大難制矣此舉實其奸謀也上顧左右曰黃淮如立髙岡無逺不見爾等如立平地所見惟目前耳天順初石亨從子彪鎮大同遣使獻捷內閣詢其狀其人盛陳戰伐且稱斬首無算嶽正取地圗指示曰某地至某地四面皆沙漠梟于何所其人驚伏成化四年平凉圖克坦布斯反官軍連失利遣都御史項忠往撫捕之大學士彭時商輅料其必成功而朝議洶洶咸欲再遣將出師時等執不可或以危語動之時等不為動未幾獻俘至上喜甚各賜俘奴一人籌邊洪武十七年侍講李翀論武事重在任將上曰任將固重必用之專信之篤而後成功齊用穰苴魏用樂羊可謂專且篤矣故皆有功若唐用魚朝恩吐宇承璀為監軍使諸將掣肘故敗事也永樂五年諭德楊榮奉命往甘肅察視守備還奏稱㫖七年春甘肅總兵何福奏降將托克托布哈等率部來歸命榮往同福議處遂奉命持節往額齊訥之地事平封福為寧逺侯十年冬甘肅守帥西寧侯宋琥奏邉人婁達衮逃居齊勤䝉古衛將為邊患時豐城侯李彬鎮陜西遂敕彬率師勦之且命榮往與計度十二月還奏餉道險阻沍寒人疲馬瘠不可行且小國不足煩王師遂敕彬旋師二十一年秋榮復扈從西征駐驆萬全一切軍務悉付榮掌之寧陽侯陳懋奏邊主額森托噶來歸命榮往議二十二年復從北征中道軍餉不繼上聞之命榮與金幼孜總計其數遂如所言遣使諭衆釋其不臣之罪宣德二年十月交趾黎利遣人進前安南陳王三世嫡孫皓表乞立為陳氏後上密以示英國公張輔請發兵討之輔退乃召尚書蹇義夏原吉謂曰何以處之二人對曰舉以與之無名徒示弱耳二人退召楊榮楊士竒出表示之且諭以三人所對曰今日與爾兩人決之榮曰永樂中費數萬人命得此至今勞者未息困者未蘇發兵之說必不可從不若因其請與之可旋禍為福上顧問士竒云何對曰榮言當從求立陳氏後者永樂初訪求之不得乃郡縣其地數十年來兵民困於交趾之役極矣體祖宗之初心以保其赤子此正陛下之盛德何謂無名且漢棄朱崖前史為榮何謂示弱臣侍仁宗皇帝久聖心數追憾此事臣願今日明决上曰汝兩人言正合吾意皇考言吾亦聞之屢矣今吾三人可謂同心同德遂令尚膳賜酒饌明旦罷朝出皓表示文武羣臣皆曰從之便遂赦交趾命羣臣舉奉使者明旦蹇義欲易以伏安衆莫敢異之士竒私謂夏原吉曰此無籍小人用之必辱朝廷公當榻前力爭已而有㫖召衆皆入蹇遂奏用伏安上顧問夏原吉對曰不可用遣之必辱國遂不用英宗北狩景帝即大位有倡議南遷者中外洶洶大學士陳循髙穀侍商輅等上言聖駕一移大勢去矣乃出榜曉諭人心稍安無何敵大舉逼京城衆論戰守不一循等皆言兵敗之餘宜固守且敵乘勝逺來勢必難久可伏兵歸路擊之時京師戒嚴內閣諸臣運謀設䇿迄昏乃出至忘寢食外諭諸將奬其忠義之心日令操練軍馬整飭器械以備戰守遣官分頭安戢畿內降夷以防不虞嚴督邊關固守要害然敵攻益急總兵官石亨折弓厲聲曰宰臣不出計䇿莫能支矣循等上疏請敕宣府遼東令總兵官楊洪曹義各選徑騎以進與京軍夾擊又為張榜敵營有能擒斬額森者高爵厚賞復寫書作喜寧與司禮太監興安云約誘額森入冦宜乘其孤軍合兵勦殺蓋喜寧以畨人為內侍與敵通謀者敕下偶為敵人邏卒所獲未幾宣府遼東兵至我軍大振敵聞之一夕遁去京師遂奠天順中兩廣用兵編修邱濬條用兵事宜內閣具本繳進行之𢎞治十七年六月北邊小王子遣使求貢甚急大同守臣以聞或報敵有異謀內閣具揭帖乞㑹官詳審上朝退召劉健李東陽至暖閣上曰各邊糧草須與劉大夏說用心整理健奏曰京營官軍亦須整㸃聽征上曰然東陽對曰聖諭將官當用謀略與經戰陳者但京軍有名無實初設團營時有十二萬今消耗過半古人云足食足兵今食不足兵亦不足臣等每思及此寢食不安上曰軍士須管軍官撫恤不可剝削東陽對曰誠如聖諭七月初四日復召至暖閣上袖出大同鎮巡官奏言敵之勢重近又掘墩殺軍上曰邊軍皆我赤子彼被殺者若何可言朕當與作主涼軍巳選聽征二萬須再選一萬整理齊備定委領軍名目即啓行健等對曰皇上重念赤子一言誠宗社之福京軍未宜輕動遷曰邊事固急京師尤重居重馭輕亦須內顧家當上猶未釋東陽曰近日北邊與朵顔交通潮河川古北口甚為可慮健因備言大同險逺本鎮尚可支持潮河川去京師不過一日最為切近誠宜先慮上曰今亦未便出軍但須預備停當待報乃行免致臨期失措皆對曰聖慮甚當退擬通選京軍三萬令兵部推委領軍官臨期酌量地方事勢具奏定奪後三日召劉大夏面議出師之意大夏力言京軍不可輕出大意與內閣同師乃不出已而沿邊將帥殺陳次第擬報而敵謀亦沮條疏永樂二十年三殿災金幼孜楊榮等陳便宜十數事皆見施行他官建言如蕭儀輩多獲罪死侍讀李時勉自刑曹入院即慨然論天下事被繫兩嵗洪熙初復抗言極諌被撲不死改交趾道御史又三上章下詔獄不死蓋未始有申拯之者修撰羅汝敬亦言時政十五事降雲南道御史蕭時中言致災八事侍講謝璉上治安十五事皆留中正統八年四月雷震奉天殿鴟吻詔求直言王振專恣侍講劉球上疏謂權不可下移振怒適修撰董璘求為太常卿下獄而球所言有謂太常卿必得儒者馬順迎合振意誣球與璘朋奸亦下獄死焉學士劉定之因京師大水上十事皆不行景泰初英廟至自沙漠檢討邢讓言事坐是不通顯時方春久旱災異迭見學士周叙進言大臣之罪固不可辭臺諌之臣緘默無補各處鎮守中官病民尤重皆致災之由也㑹叙考績至京師仍命留院辦事周洪謨始授官遂條陳十二事凡有所見即封章具聞憲宗初即位編修張元禎勸行三年喪又上疏言治道大本大原曰講學定治曰用人曰厚風化與時宰議不合乞歸家居二十餘年修撰羅倫編修章懋黃孔昭檢討莊昶相繼言事皆逺貶慈懿皇太后之喪修撰羅璟上疏言宜合葬裕陵又與諸學士合章以請其後亦左遷南京員外郎出使宣宗初元大學士金幼孜奉命持節冊封安化真定二王妃歷河南北關東西之境所過兵民休戚既還具疏奏聞景泰五年南京災上念祖宗陵寢所在命大學士髙穀往祭事竣録被災者千餘家悉發廪賑之奏聞稱㫖𢎞治十七年閏四月闕里災重建孔廟落成遣大學士李東陽祭告五月事竣還朝以所經過天災民瘼上奏詔查議行之效諍洪武二十一年四月上謂庶吉士解縉曰朕之與爾義則君臣恩猶父子當知無不言縉於是上封事萬言皆人所難者上嘉奬之景泰初敵入境庶吉士劉清上封事多見採録清由是知名纍擢兵部侍郎成化二十三年十月庶吉士鄒智因災異上疏略曰星變見於朝廷蓋陽不能制隂之象也宜進君子退小人其原當先於內閣萬安恃權怙寵殊不厭足劉吉附上罔下漫無可否尹直挾詐懷奸恬無廉恥世之所謂小人也王恕素志忠貞可任大事王竑秉節剛徑可寢大奸彭韶學識醇正可決大疑世之所謂君子也然君子之所以不進小人之所以不退者豈無自哉大抵中貴有以隂主之也自古君子小人進退之機未嘗不决於此曹之盛衰也願陛下以太祖為法則君子可進小人可退而天下之治成矣疏上謫石城吏目卒成化四年六月慈懿皇太后錢氏崩憲廟嫡母也詔大臣議葬衆相視莫敢先發大學士彭時謂同朝曰梓宫當合葬裕陵主祔廟此一定體無可議者即與禮部尚書姚夔定議具疏引漢文帝合葬吕后宋文宗合葬劉后故事上猶重違母后之意未允時率羣臣伏文華殿以請號哭不起上聞之使中官宣請中官退翰林中有呵中官使還者衆官皆曰死不敢奉詔且不得命不敢退時學士商輅劉定之進曰人心如此實天理所在望朝廷俯從於是中官入奏上感動母后亦悟即傳諭羣臣卿等昨者㑹議大行慈懿皇太后合祔陵廟固朕素志但聖母疑事有相妨未即俞允朕心終不自安再三據禮所幸聖慈開諭特賜允諾卿等其如前議施行衆聞命咸呼萬嵗而退正德中伏闕請誅逆瑾及跪門號泣諌止南巡尚書王恕等俱各上疏載在國史旌直大學士楊士竒輩仕三朝言聽諌行每被旌賞初永樂中御史李祥舒仲成奉敕理木植稅課之弊王汝玉預焉汝玉上監國時所愛者嘗有㫖命祥等削其人勿奏二人力言不可萬一聖上有聞得罪反重既忤意遂已犯者後皆茍免上嗣位尚書蹇義因奏仲成他事上曰是嘗為御史臺得南京木植稅課乎對曰然曰李祥安在對曰丁母憂去矣時仲成已升湖廣憲副即命都察院捕治仲成士竒聞之進疏曰向來小人得罪者多陛下即位以來皆已宥之今又追理前事即詔書不信漢景帝為太子待詔衛綰稱有病不赴即位進用綰前史韙之上覽之喜即有㫖罷治仲成而降敕奬諭士竒賜米及鈔幣又面諭之曰有卿盡心如此朕復何憂宣德六年七月時上好微行一夕漏下二十刻以四騎出過士竒家前報者言范太監來士竒倉皇出迎上已入門立月中士竒俯伏悚懼言陛下奈何以宗廟社稷之身而自輕擾擾塵埃昏暗中誰識至尊萬一或有識者變起倉猝何以備之上笑曰思見卿一言故來耳遂屏左右語竟顧謂士竒曰此居且敝當為汝葺理士竒叩頭懇辭曰陛下宫殿未建臣必不敢當車駕今夕俯臨外間明日必有知者自此慎出事出不測當慮也駕還宫明日遣太監范𢎞密問士竒車駕幸臨曷不謝對曰至尊夜出愚臣逮今中心惴栗未已豈敢言謝又數日遣𢎞問士竒今天下平靖上時一微行何足過慮堯不微行乎士竒對曰陛下尊居九重恩澤未洽幽隱萬一有寃夫怨卒窺伺竊發誠不可無慮後旬餘錦衣衛獲至二盜蓋盜嘗殺人官捕之急遂私結約候車駕之玉泉寺挾弓矢伏道邊林莽中作亂時有捕盜挍尉亦變服如盜入盜羣以其謀告之遂為所獲上既誅二盜嘆曰士竒言不虛即日遣太監范𢎞賜白金文綺士竒明旦入對上曰自今如汝言不復微行他如楊溥密疏獲賞之類不可具舉自是以來蹇諤之風漸少而言之亦未必不干怒也惟𢎞治五年四月大學士邱濬奏疏萬餘言大槩謂上改元之初嵗在戊申與太祖洪武初元同符今天災迭見宜釐革庶政盡復太祖舊規以應天意因擬為二十二條歷指竒邪之逢迎者開諭而力辨之使不至售其奸上覽奏甚悅批答以為切中時弊行之自此聖心嚮用恆加賞賚然濬時年已髦矣其後上日英明頗逺近習而信聽內閣亦濬有以啓之也武宗時逆瑾柄國雖大臣言出禍從大學士劉健等極言時弊以為即位之初詔書一下天下延頸想望太平而朝令夕改訖無寧日百官庶府倣效成風非徒廢格不行抑且變易殆盡建言者以為多言能幹者以為生事纍章執奏則謂之奏擾查革舊弊則謂之紛更憂在於民生國計則若罔聞知事涉於近幸貴戚則牢不可破以一二人之私恩壞百年之定制而不顧以一二人之邪說違滿朝之公論而不恤臣等叨居重地徒擁虛銜或㫖從中出略不預聞或有所擬議徑行改易尋又奏言政令十失言甚剴切瑾怒遂皆謝去嘉靖六年五月朔日食臣道南上九事上褒答曰這所言朕已省覽七年十二月望長庚氣如匹布起坤指乾臣復上四事上褒答曰覽奏事關朕躬的知道了其餘該門看了來說八年八月望臣復上六事是嵗十月朔日食臣復上五事俱荷明㫖允行殿閣詞林記卷十六
