body:
  text: 殿閣詞林記卷二十明黃佐廖道南撰授經國初置大本堂取古今圖書充其中召四方名儒教皇太子親王用學士宋濓待制兼編修王禕修撰王僎耆儒陶凱輩分畨夜直選才俊之士充伴讀所授經書必親督之嘗命禕采故實韻為四言詩以授皇太子上時賜燕賦詩商確古今評論文字無虛日尋命勛舊之子執經入侍於是鄭國公常茂曹國公李景隆蘄春侯康鐸等與焉洪武元年十一月辛丑燕東宫官及儒士各賜冠服是日上命大本堂諸儒作鍾山蟠龍賦置酒歡甚乃自作時雪賦故有是賜其後皇太子讀書在文華殿而親王則出就所居府十二年三月戊辰朔上御華蓋殿皇太子侍上問比日所讀何書對曰昨看書至商周之際上曰看書亦知古人為君之道否因諭之曰君道以事天愛民為重其本在敬身人君一言一行皆上通於天下繫於民必敬以將之而後所行無不善善天必鑒之不善天亦鑒之一言而善四海䝉福一行不謹四海罹殃言行如此可不敬乎汝其敬之聖祖之詒訓如此真可謂得其大本矣諸儒授經惟奉行上意而已嚴君在上賢師友輔之睿德之懋斯可望矣賔客太祖始令宋濓為諸王世子師庚子年十月奉命入內授經遇綱常大義再三言之乙巳年三月濓以起居注告病詔還家仍賜金帛世子致贈有加焉六月濓上箋謝恩復奉書東宮勉以孝友恭敬勤敏讀書無怠慢無驕縱修德進業以副天下望上覽書喜甚召東宫語以書意且賜書答之其略曰昔先生教吾子以嚴相訓是為不佞也以聖人文法變俗言教之是為疏通也所守者忠貞所用者節儉是為得體也昔聞古人今則見之復以文綺侑書洪武元年設東宫師傅官令勳臣兼之十月以耆儒梁貞王儀為太子賔客秦鏞盧德明張昌為太子諭德上以東宫師傅皆勳舊大臣當待以殊禮朝賀東宫難同庶僚命禮部考古定儀禮部及翰林諸儒臣議今凡遇大朝賀前期設皇太子座於大本堂設答拜褥位於堂中設三師賔客諭德拜位於堂前贊禮二人位於三師之北內贊二人位于堂中俱東西相向至日皇太子常服升座三師賔客諭德常服入位北向立皇太子起立南向贊禮唱鞠躬四拜皇太子受前二拜答後二拜禮畢而出五年太子贊善大夫宋濓輔導東宫一言一動皆以禮法諷諭使歸于道每侍讀書至切於政教及前世興亡必拱手揚言曰君國子民之道當如是不當如彼且推人情物理以明其義皇太子每斂容嘉納敬禮未嘗少衰言則必曰師父師父云且書舊學二字以賜二十六年七月戊申選秀才張宗濬等隨詹事府左春坊官分班入直文華殿侍講畢近前說民間利害田里稼穡等事間陳古今孝弟忠信文學材藝諸故事日以為常永樂中楊榮輩在春坊每進講罷必從容以正身務德親賢去邪尚儉戒逸之言進或訪以政務必陳其切要及先後緩急施行之序皆懇切無少避忌皇太子每以忠直稱之時贊善徐善述王汝玉尤見親禮嘗令善述擇選詩二十餘首分類賦比興以為法又與之書言欲學作表卿可一如詩題立例具詩題與表題間日封進且問其疾勞慰備至且曰卿今年邁恐輔余為勞似卿朴直苦口者百無一二面諛順顔者比比有之卿康健無憚勞弼余成業惟望藥石之言日甚一日毋務犯鱗觸諱之慮其所與書必字之曰好古或曰致書贊善好古先生云其與汝玉書有曰願求致治之方又曰善政之音至有如暗逐明之喻其望啓沃之切如此每遇節序燕勞東朝之臣起居慰問煦嫗諄切一如家人父子焉然成祖常恐東駕親近匪人每北巡必訓戒之又廣求名儒與之講學於是命侍讀學士王達洗馬楊溥修撰梁潜典籍金實郎中葉砥等分直講讀亦有選自教官者惟在得人而已故仁宗之為皇太子也監國視朝之暇專意文事手不釋卷被服寬博大類儒者蓄經籍法書富甚云講儀東宫講讀儀春坊官與翰林院官日分二貟講書以尚書春秋通鑑大學衍義貞觀政要等書進講須要纂其事之始終直述大義輯成篇章進呈御覽畢然後赴文華殿講說三師三少及詹事府官鴻臚寺并每科給事中一貟侍立進講畢衆官齊出及有召問亦須前項一貟官同進出如有獨進并獨貟留後者許給事中鴻臚寺官并司直郎清紀郎紏劾凡講讀畢每遇上位發落過五府軍政六部緊要事務及撫諭四夷恩意其大經大法詹事府官同春坊官將緣由於衆官未退之時一一敷陳焉永樂二年七月侍讀學士王達講乾之九四舉儲二為說仁宗在東宫問楊士竒曰達含譏否士竒因舉程子云凡卦中六爻聖賢有聖賢用衆人有衆人用君有君用臣有臣用無所不通又舉王昭素對宋太祖之言以對仁宗因命解縉專閲書胡廣閲詩金幼孜閲春秋士竒閲易仁宗問儲二說有據否士竒對以胡瑗之說甚喜自是講義有疑必召四人相與辨析暢而後已遂命春坊司經局臣分録講章以備常閲出閣永樂以前儲宫皆年長始出閣英宗未及出閣遂登大寶故出閣之儀至天順二年始定其講學師友惟用東宫官及本院官分班講讀內閣提督之不别選他職其講讀侍班及正字官從內閣具名奏請每日講書直解先送內閣定講畢補進與經筵同以史官修撰編修兼之校書正字以制𠡠房官兼之㑹典載初出閣議云是日早侍衛侍儀如常儀執事等官於文華殿行四拜禮畢鴻臚寺請皇太子升文華殿執事官導引至殿升座師保等官于丹陛上行四拜禮畢各官退出內侍官導皇太子至後殿升座以書案進每日侍班侍讀講官以次進讀叩頭而退每日讀講儀云每日早朝退後皇太子出閣升座內侍以書案進不用侍衛侍儀執事等官惟侍班侍讀講官入行叩頭禮畢分班東西向立內侍展書先讀四書則東班侍讀官向前伴讀十數遍退復原班次讀經書或讀史書則西班侍讀官向前伴讀亦如之務要字音正當句讀分明讀畢各官退每日巳時侍班侍讀侍講及侍書官候皇太子升座畢入東西向立侍班內侍展書先講早所讀四書則東班侍講官進講一遍退復原班次講早所讀經書史則西班侍讀官進講亦然務要直言解說明白易曉講畢內侍收書訖侍書官向前侍習寫字務要開說筆法㸃畫端楷寫畢各官叩頭而退午後從容逰息或習騎射晚讀本日所授書各數遍至熟而止凡讀書三日後一溫須背誦成熟遇溫書日免授新書講官通講須曉大義凡寫字春夏秋月每日寫一百字冬月每寫五十字凡遇朔望節假及大風雨雪隆冬盛暑暫停讀講寫字今按此儀稍變永樂之舊矣成化中孝宗出閣最勤學十九年御製文華大訓成少詹事彭華進講左中允周經預講是書東宫每起立拱聽內閣輔臣請坐講從之𢎞治中武宗在東宫學士吳寬率同僚上疏曰竊惟東宫講學自寒暑風雨朔望令節外一歲之中不過數月一日之內不過數刻况八歲出就外傅居宿於外誠欲離近習親正人也庶民且然况有天下者乎儲典洪武中定儲宫奏事皇太子御文華殿官貟人等承㫖召入者方許入凡啓事者稱臣㑹典載東宫朝儀云永樂二年定文武官貟常朝行叩頭禮畢三師三少詹事府官左右春坊官翰林院鴻臚寺等官六科給事中錦衣衛官左右序立於文華殿門之外鴻臚寺序班通政舍人引文武百官於丹陛上丹墀內東西序立照依衙門資次啓事御史二貟司直清紀日輪二貟北向侍立紏儀啓事畢百官齊退及有召問亦須前項官員一同進出如獨進并獨貟留後者許監察御史鴻臚寺官司直清紀紏核凡合啓事務在京衙門止用奏本其詹事府主簿録事同春坊司直清紀司諫分為六科將本內啓過事件同六科給事中逐一奏聞主簿録事司直清紀司諫仍於司禮監共開揭帖開寫逐日啓過本內事件略節緣由六科給事中亦具題帖各另奏進凡遇正旦冬至節行慶賀禮并進厯進春等事詹事府例該啓皇太子知必先奏聞候得㫖方具啓本進凡遇皇太子千秋節行慶賀禮奏啓本同進侍班用坊局官正旦冬至千秋節禮部官進箋并進厯進春通事二貟舉案又有監國等儀嗣輔皇太孫輔導講讀在洪武時具載集禮成祖時以東宫官僚兼之永樂六年七月命內閣胡廣等輔導皇長孫𠡠曰朕惟令德所成本乎天性養性之學實𢎞聖功故有聰明純一之資必有詩書禮樂之教所以充德性而廣器識也朕嫡長孫天章日表玉質龍資孝友英明寬仁大度年未一紀體志具寧動必中規言必合道好道之篤日夜孜孜日誦萬言心領要義朕嘗試之以事輒能裁决得中斯實宗廟之靈上天錫慶篤生異質以福祜天下而基命於無窮然宏材之建必由匠石之功圭瓉之成必假琢磨之力卿等皆茂簡德藝職輔東宫東宫之子必資兼弼宜協同心志輔導于成推廣仁義道德之源開陳二帝三王之治與太祖髙皇帝之大經大法凡創業守成之難生民稼穡之事朝夕講論以涵養本源恢𢎞智量充其盛大之器以為宗社生民之福國家有無窮之休卿等亦有無窮之聞欽哉九年九月皇太子命楊榮等侍諸皇孫讀書文華後殿且諭諸皇孫曰此皇祖近臣汝輩當加禮敬又謂榮等曰他日學成即汝訓迪力也後皇太子復𫝊上命召翰林院吏部官令舉老成正大儒者侍皇太孫講讀明日東宫特召尚書蹇義及楊士竒問得人否義對曰臣兩人共舉禮部侍郎儀智然衆鮮知之議尚未決東宫曰往者曽舉李繼鼎大誤後悔不及智甚端正但覺老矣士竒對曰智雖老然起家學官道理明執守正精神不衰廷臣老成未見其比是日午朝上喜曰此得人矣雖年耄識朝廷大體能直言不阿向之元正日食吕震等皆欲行賀禮惟此老與楊士竒言宜免賀朕從之智誠可用遂召禮部翰林諸臣諭曰儀智甚好朕知之矣今侍太孫講讀令右贊善陳濟等充講官教諭林長懋張英陳山戴倫等授給事中使侍太孫已而俱授春坊左右中允制度聖祖有天下之初凡制度命儒臣稽考古今因革之宜以聞中書省具奏上為裁定於是宣國公李善長學士陶安集諸儒論建以適厥中自朝廷以達邦國品式明備洪武元年二月安等奏定天子冕服之制上曰古禮太繁今祭天地宗廟則服衮冕社稷等祀則服通天冠絳紗袍餘不用十一月甲子禮部翰林院等官議乘輿以下冠服之制三年六月中書省臣與翰林院定文武官朝服之制四年正月戊子禮部太常司翰林院議奏上親祀圜丘方丘宗廟及朝日夕月服衮冕祭星辰社稷太歲風雲雷雨嶽鎮海瀆山川先農皆用皮辨服羣臣陪祭各服本品梁冠祭服五年五月癸卯親王儀仗車輅成亦禮官諸儒所定也八月乙亥禮部及翰林院議省牲宜用常服十六年七月戊午詔更定冕服之制先是禮部言虞周以來冕服制度不同宜加考定命翰林諸臣議從之二十年冬十月詔六部都察院通政使司左右春坊大理寺及本院官著禮儀定式合行事宜凡一十四欵詔頒行之二十四年六月己未詔六部都察院同翰林儒臣參考歷代禮制更定衣冠居室器用制度於是羣臣斟酌損益以聞二十九年十一月詔翰林議定制度凡官民房屋墳塋等第及食祿之家禁例為書名曰稽古定制頒行天下總載集禮及憲綱事類肇自洪武中載都察院十三道御史所宜行者宣德中𠡠禮部同翰林院考舊文而申明之凡祖宗所定風憲事體悉載其中至正統四年十月始頒行云律令吳元年十月詔修律令命學士陶安為議律官十二月甲辰律令成命刋布洪武元年正月大明令成修列吏戶禮兵刑工六官之條大明律亦如之上曰律令者治天下之法也令以教之於先律以齊之於後今所定律令刪繁就簡使之歸一直言其事庶幾易知而難犯八月己卯上念律令尚有輕重失宜有乖中典命儒臣四人同刑部官講唐律日寫二十條取進止擇其可者從之其或輕重失宜則親為損益務求至當六年十月命刑部與翰林院更定大明律學士宋濓撰表以進二十二年八月命翰林院同刑部官將比年律條參考折衷以類編附曰名例律附於斷獄下至是特載諸篇首頒行之封爵洪武三年十一月丙申大封功臣其五等封爵皆學士宋濓所定始制五等公曰國侯伯曰郡子男曰縣至是罷子男不封惟繫公於國各錫之鐡劵云二十三年九月乙未加封中山王徐達岐陽王李文忠二代皆王爵侍講學士葛鈞等奏王及三代惟本朝開平王常遇春出自特恩上謂二三皆元勳宜如開平王例自今開國功臣沒後俱追封三代其襲爵子孫非建竒功者生死止依本爵其劵文誥命皆詞臣撰進先是五年三月命學士宋濓參考唐宋誥命皆三省官列銜書名復用吏部告身等印章本朝誥𠡠既用御寶則省臣不敢署名考宋紹興間二部言官誥院所有綾紙易以僞冒下文思院别織花樣今議於誥尾添織字號以為關防及取工部神帛𠡠誥局造完書寫頒于文武官從之九年四月癸卯命中書省兵部定給武官誥𠡠大都督府咨中書省送兵部覆奏貼黃考功監參考同奏翰林院撰文付司文監投勘奏付中書舍人書寫十六年三月命中書省與翰林院定嫡妾封贈例及文官贈䕃叙之例二十四年五月辛卯詔定文武官封贈舊制兵部試尚書茹瑺請上命翰林院考古制學士劉三吾奏宋制母以子貴詔從舊制瑺又奏庶子襲父職例止封贈嫡母復命禮部翰林院同考古制三吾奏宋制母以子貴庶母亦依所生子之秩詔從宋制六月丙寅命禮部翰林院議軍官姪男替襲伯父職事及弟襲兄職義子女壻承襲養父妻父封贈禮制八月己巳瑺又奏言武臣封贈父母妻姓名有以嫡母生母同請有以正妻次妻並書乃命翰林院稽考古制學士劉三吾言宋制嫡母繼母亡許封贈所生母正妻有子無子皆得封贈上命只封嫡母正妻其所生母從宋制永樂元年十一月乙亥廣平侯袁容嫡母孫生母劉俱亡獨繼母羅氏在而封贈事例不同學士解縉等議上若所生母與繼母同在禮難並封今繼母在當封所生母并嫡母俱亡亦可一體追封從之仍命後不為例訂音聖祖嘗召學士樂韶鳳宋濓待制王僎修撰李叔允編修朱右趙塤朱濓典簿瞿莊鄒孟達典籍孫蕡達魯與權諭之曰韻學起於江右殊失正音有獨用當併為通用者如東冬清青之屬亦有一韻當析為二韻者如虞模麻遮之屬若斯之類不可枚舉卿等當廣詢通音韻者刋定韶鳳等奉詔撰成七十六韻共十六卷書奏賜名曰洪武正韻濓序曰古者之音惟取諧協故無不通江右制韻之初但知從有四聲而不知衡有七音故經常不交而失立韻之原七音者牙舌唇齒喉及舌齒各半是也分其清濁定角徴宫商羽以至於半商半徴而天下之音在是矣然則音者其韻書之權輿乎旋宫以七音為均均言韻也能推十二律以合八十四調旋轉相交而大樂之和亦在是矣自從奏啓進呈文字㸃畫音韻並從是書洪武二年四月命翰林院定官民書禮儀式禁革民間名字有先聖先賢大國君臣并漢晉唐宋等字者中書省臣具奏行之若正統十年進士登科録凡天字皆作䒶云出內閣意景泰中幸太學表內閣自為之中有管窺霄蠡測海句蓋亦避天字也與宋宣和時禁君天等八字同殆非洪武舊制矣毖祀聖祖肇正祀典首詔嶽瀆城隍等神皆削去後世所加封號止從實稱之惟孔子則仍其舊洪武元年遣官釋奠於先師孔子定以二丁降香遣官祭於國子監每二丁𫝊制遣官致祭孔子若登極皆遣官祭告闕里二十四年十月乙丑南豐縣典史馮堅言九事內一事歷代忠臣烈士有功德於民者宜𠡠有司訪其事蹟俾禮部翰林院考䆒明白量加封諡上寵擢之二十六年頒大成樂於天下府學令州縣如式製造以祀孔子二十八年用儒臣言黜莽大夫揚雄進董仲舒從祀孔子正統二年從本院議進胡安國蔡沈真德秀從祀八年追封元吳澄為臨川郡公從祀後建言者謂當祀劉因及薛瑄內閣劉定之駁二人皆無著述遂沮然澄實宋進士仕元失節識者非之學士丘濬嘗著論許衡無益於名教則澄可知也成化二年用大學士商輅議封仲舒為廣川伯安國為建寧伯沉為崇安伯德秀為浦城伯從之輅又請加孔子以道配天地之號事寢不行𢎞治九年追封宋楊時為將樂伯從祀言者因謂羅從願李侗亦同從祀禮部侍郎傅瀚言二子著述視尹焞游酢謝良佐未知所先後二子從祀則三人似不可遺乃止先是元年八月侍讀學士程敏政建議欲將馬融劉向賈逵王弼何休戴聖王肅杜預禠爵罷祀鄭衆盧植鄭𤣥服䖍范寧五人各祀于其鄉而增后蒼若荀况言性惡宜依揚雄例黜之時祀王通七十弟子中申棖申黨疑誤當為一人宜存棖去黨公伯寮秦冉顔何􅕋瑗林放五人既不載於家語亦宜罷去顔子曽子子思配享於殿而父在兩廡非所以明倫宜别立一祠中祠啓聖王以把國公顔無繇萊蕪侯曽㸃泗水侯孔鯉并邾國公孟孫氏配享其程珦朱松量加封爵祀焉祭酒謝鐸建議則謂吳澄出處不正當黜其祀俱詔廷臣議之學士吳寬言從祀茍有益於經𫝊則楊雄馬融昔皆不廢尚書倪嶽亦言馬融王弼之徒其立身不無可貶然秦漢以來六經出於煨燼賴諸子抱遺經専門講授經以復存自唐之注疏多祖其言今之經𫝊引用尚多其說何可盡廢七十子名字馬遷以來相沿已久今生千百年後何可臆定於是咸仍其舊云嘉靖九年臣道南寓史館欽奉上親製正孔子祀典說大㫖謂孔子生于周作春秋周文武止稱為王春秋繫王于天孔子之道王者之道也功王者之功也而位則非王者之位焉後世稱之以王不若尊之以師於是毁其像厝之主曰至聖先師孔子顔子曰復聖曽子曰宗聖子思曰述聖孟子曰亞聖則列名先賢七十二子曰先賢從祀諸儒則列名先儒特建啓聖祠于學宫之後别祀叔梁紇以顔無繇曽晳孔鯉配尊尊賢賢各盡其道矣定名聖祖有天下之初追尊四代考妣為帝后其廟號尊諡皆學士朱升等所定凡皇子命名受封及公主封號功臣爵名皆學士宋濓等擬奏取自上裁尋又命正天下合祀神祗名號洪武九年四月天下驛𫝊多因俗名兵部且數命翰林院考古正之凡二百三十二自後凡建置郡縣命名皆以屬焉㑹典云凡皇子名及各王府奏請子名親王公主及郡王郡主縣主郡君縣君鄉君封號俱內閣擬奏請㫖㸃用紀元國初紀元洪武出自聖祖親裁繼世之後始命翰林儒臣擬奏擇而用之成祖即位始擬用永清後用永樂自是每朝紀年不復再改蓋聖祖詒謀之善實前代所未有也英廟復辟召內閣髙榖商輅至文華殿問曰今年號宜改否榖對曰周雖舊邦其命維新宜改維新元年輅曰年號多與前代同者臣等具數年號請㫖上稱善已而用徐有貞等言用天順改元或請去景泰故號仍紀正統上不從改天順今上初登大寶輔臣擬明良善治上特用嘉靖蓋有商髙宗嘉靖殷邦之志云藩規洪武中命選儒士授本院博士等職事令於各王府說書永樂中妙簡宫僚以輔諸王以詹事府丞周孟簡為襄王府左長史司直郎金實為衛王府左長史俾侍講讀其後親王出閣止選進士中老成有學者除檢討及就封即拜長史𢎞治三年進士被是選者恣言怨詈吏部黜之㑹典云諸王讀書內閣提督檢討等官講讀為擬定經書起止所習倣學每日進看其儀天順二年定擬初入書堂其日早王至右順門之北書堂面東中坐提督講書并講讀官行四拜禮畢內官捧書展於案上就案左立講讀官進立於案右伴讀十遍叩頭退每日講讀清晨王至書堂講讀官行叩頭禮伴讀十遍出飯後復詣書堂伴讀看寫字畢講書直說大意畢仍叩頭退內侍以所寫字送內閣書翰書雖六藝之一然事屬天家頒為帝制亦不可以為末務成祖喜楷書時典籍沈度書法豐潤上深愛之每有大制作必命度謄寫纍遷至學士惟支俸仍事書辦賜象笏鏤金刻度姓名其上以寵耀之其弟粲亦起自書辦纍官侍讀自此沈字盛行於世宣宗自沖齡習古法帖宸翰妙絶蓋始學趙孟俯而加遒徑出神入天者矣孝宗亦愛沈字宫中始習焉嘗訪其後得其孫世隆授中書舍人故制誥猶用沈體云今上宸翰天日昭回星斗經緯嘗親書四針字暨皇史宬以示大學士李時衆皆欣服供奉諸僚各取其長云爾扈蹕聖祖御閲江樓及謁陵寢悉命詞臣扈從宣德五年二月宣宗謁天壽山時楊士竒金幼孜扈從嘉靖十五年三月今上禋祀諸陵命日講官顧鼎臣謝丕張璧及臣與蔡昻扈從臣道南恭和御製詩二章云聖皇孝祀惻中腸陵殿春開爼豆張鳯麓逺蟠知地勝鸞輿端擁自天康雲連北極千關壯水接東溟萬里洋仰識駿圖光宇宙永占佳氣護封疆帝藻初裁錦繡腸昭回雲漢列星張禮崇天地追隆古道貫皇王邁小康百辟霽瞻容穆穆萬方春靄頌洋洋即看鬷假登殷廟不獨巡游遍禹疆殿閣詞林記卷二十
