body:
  text: 殿閣詞林記卷十四明黄佐廖道南撰殿䇿聖祖策進士多親制策問洪武四年十八年皆然其後或命本院儒臣擬撰以進取自聖裁而用之永樂初成祖思求博聞多識之士命學士解縉採天文律厯禮樂制度擬撰為題上意士子必為所窘及得曾棨卷記誦詳盡歎異以為第一人御筆批曰貫通經史識達天人有講習之學有忠愛之誠擢魁天下昭我文明尚資啓沃惟良顯哉其第二人周述第三人周孟簡亦皆批評前此所未有也今上臨軒策士其第一甲三人皆親賜裁定批數語于巻首彬彬然有永樂之風焉殿試㑹典云凡殿試讀卷官内閣於大學士學士等官内具名從該部奏請至日與各衙門該讀巻官詳定試卷次日同赴文華殿内閣官將第一甲三巻以次進讀俟御筆批定出將二甲三甲姓名填寫黄榜又次日早同赴華葢殿内閣官進至御座前以次拆卷將姓名籍貫面奏司禮監官授制勅房官填榜畢開寫𫝊臚帖子内閣官一員捧榜出至奉天殿授禮部尚書制勅房官將帖子授鴻臚寺官𫝊臚其受卷彌封掌卷官從内閣於本院及春坊等官并制勅房官内推選與各衙門官相兼職事本院坊局始不過五人後增至七人遂為例按讀巻官國初用祭酒修撰等官正綂中猶預其後非執政大臣不得與而其去取之柄則在内閣殿試之明日大學士擇其中優者三卷圏㸃以硃明早持詣文華殿讀之御筆親標其名第又明日即𫝊臚矣葢讀卷止在一日咸病其太亟不能徧觀故本院坊局之執事者始得試巻時預鑒别其髙下為差等以付讀卷官内閣乃易於裁定葉盛曰景泰二年盛為殿試彌封官最知讀卷事第一甲葢閣老預屬意於受卷官已得之餘皆分送讀卷諸大臣且率以三分上一等次二等各置一所少頃閣老收上一等則判二甲次二等則判三甲也將午三人者持一甲卷詣文華進讀午後填黄榜明早榜出矣葢辰巳二時榜中人次已定若曰須一一品量髙下次第固有所不能也嘉靖壬辰今上御文華殿輔臣以次讀巻其第二卷孔天𦙍對農桑策云帝王敦本以厚天下之生達權以通天下之變則臣道南所拔也至乙未殿試策問其第二卷孫陞對云人君有仁以聨天下之心有禮以一天下之軌又出臣道南所拔上皆親賜批巻君相造命豈亦有數乎會試凡㑹試考試官禮部奏行内閣於大學士學士等官及詹事府春坊司經局官内具名奏請欽命其同考試官於本院侍讀等官及春坊司經局官與各衙門官相兼推選收掌試卷官用制勅房官一員按國初科舉第一塲問四書疑一道五經義各一道第二塲論一道詔誥章表内科一道第三塲策一道猶循元制也洪武四年會試陜西河南山東山西江西湖廣廣之東西福建為行中書者十一俊髦皆集而髙句麗之士與焉以禮部尚書陶凱與前侍講學士潘庭堅為主司侍讀學士詹同國子司業宋濂吏部員外郎原本前貢士鮑恂為同考取中試者俞友仁等一百二十人其後罷之十八年復以科舉取士始定今制以待詔朱善前典籍聶鉉為考試官取中試者黄子澄等四百七十二人二十一年取施顯等九十五人二十四年取黄觀等三十二人二十七年取彭徳等一百人三十年取宋琮等三十八人北士皆黜學士劉三吾為考試官竟以是獲罪上乃命本院官考擇下第北士六十一人廷試之語見覆試𩔖革除庚辰科禮部左侍郎兼學士董倫侍講學士兼太常寺髙巽志為考試官取呉博等一百一十人永樂二年侍讀學士解縉侍讀黄淮為考試官取楊相等四百七十二人遵洪武乙丑例也葢自是取士多寡臨期請自上裁云四年取朱縉等二百二十人七年取陳璲等一百人十年左諭徳兼侍讀楊士竒右諭徳兼侍講金㓜孜為考試官取林誌等一百人十三年修撰兼右贊善梁潛為考試官取王英等三百五十人十六年侍講曾棨為考試官取董璘等二百五十人十九年左春坊大學士楊士竒為考試官取陳中等二百人二十二年侍讀學士曾棨為考試官取葉恩等一百五十人宣徳二年右春坊大學士曾棨為考試官取趙鼎等一百人開科以來兼取南北士而南士往往數倍於北宣宗即位始詔禮部嵗取百人南士十六北士十四著為令既而更定中科文各退五為中數焉五年侍讀學士李時勉侍讀錢習禮為考試官取陳詔等一百人八年少保兼大學士致仕黄淮為考試官取劉哲等一百人正綂元年詹事兼侍讀學士王直侍講學士陳循為考試官取劉定之等一百人四年禮部左侍郎兼侍講學士王直學士藺從善為考試官取楊鼎等一百人七年禮部侍郎兼學士王英侍讀學士苗衷為考試官取姚夔等一百五十人十年學士錢習禮侍講學士馬愉為考試官取商輅等一百五十人十三年工部右侍郎兼侍講學士髙穀侍講杜寧為考試官取岳正等一百五十人景泰二年戸部右侍郎兼學士江淵修撰林文為考試官取呉匯等二百一人同考試官有侍講劉儼秩視修撰為髙葢科第後於文故也五年兵部左侍郎翰林院學士兼左春坊大學士商輅司經局洗馬兼修撰李紹為考試官取彭華等三百五十人天順元年學士薛瑄通政司右㕘議兼侍講吕原為考試官取夏積等三百人四年學士吕原尚寳司少卿兼修撰柯潛為考試官取陳選等一百五十人是科會試舉子不中者奏考官校文顛倒宜正其罪上疑之召問李賢賢對曰此乃私忿考官實無此弊如臣弟讓亦不中可見其公上意方囘乃命禮部會翰林院考此舉子驗其學多不能答題意且奏其狂妄遂枷于部前以示衆衆議方息七年學士陳文尚寳司少卿兼修撰柯潛為考試官塲屋災詔八月補試以太常少卿兼學士彭時侍讀學士錢溥為考試官而同考試官先後兩入簾不改命者修撰王獻也取呉釴等二百五十人成化二年太常少卿兼侍讀學士劉定之學士萬安為考試官取章𢡟等三百五十人五年太常寺卿兼侍讀學士劉珝侍讀學士劉吉為考試官取費誾等二百五人八年禮部左侍郎兼學士萬安司經局洗馬江朝宗為考試官取呉寛等二百五十人十一年少詹事兼侍講學士徐溥侍講學士丘濬為考試官取王鏊等三百人十四年禮部尚書兼學士劉吉學士彭華為考試官取梁儲等三百五十人十七年太常寺卿兼學士徐溥少詹事兼學士王獻為考試官取趙寛等三百人二十年詹事兼學士彭華左庶子劉健為考試官取儲巏等三百人時有勢家子在選朱墨巻不合華黜之失志者欲甘心焉卒亦無所害二十三年守臣有言中士日衆而額如故者事下禮部集議南北仍各退二以益之太子少保兵部尚書兼學士尹直諭徳吳寛為考試官取程楷等三百五十人𢎞治三年禮部尚書兼文淵閣大學士徐溥少詹事兼侍讀學士汪諧為考試官取錢福等三百人六年太常少卿兼侍講學士李東陽少詹事兼侍講學士陸簡為考試官取汪俊等三百人九年詹事兼侍講學士謝遷侍讀學士王鏊為考試官取陳瀾等三百人十二年太子少保禮部尚書兼文淵閣大學士李東陽掌詹事府事禮部右侍郎兼學士程敏政為考試官取倫文叙等三百人時敏政有異議同考試官給事中林廷玉發其事禮科給事中華㫤劾之敏政遂得罪十五年吏部左侍郎兼學士呉寛侍讀學士劉機為考試官取魯鐸等三百人十八年詹事府掌詹事太常寺卿兼學士張元禎左春坊大學士兼侍讀學士楊廷和為考試官取董玘等三百人正徳三年少傅兼太子太傅戸部尚書武英殿大學士王鏊掌詹事府事吏部尚書兼學士梁儲為考試官取邵鋭等三百五十人六年少傅兼太子太傅吏部尚書武英殿大學士劉忠掌詹事府事吏部侍郎兼學士靳貴為考試官取鄒守益等三百五十人九年少傅兼太子太傅吏部尚書謹身殿大學士梁儲學士毛澄為考試官取霍韜等四百人十二年太子太保戸部尚書兼武英殿大學士靳貴少詹事兼學士顧清為考試官取倫以訓等三百五十人十五年禮部左侍郎兼學士石珤侍講學士李廷相為考試官取張浩等三百五十人葢會試去取在各房同考試官而㕘定髙下則考試官柄之歴科典制雖同而凡取士多寡則臨期裁定故備記如此若同考試官正綂以前猶㕘用外官教職景泰後始純用京職本院外則六科部屬行人司𢎞治以來定本院官九人其餘六科部屬得與共十四人正徳辛未以易書詩房巻浩繁各增其一本院官十一人與六科部屬共十七人云按國朝以文取士大槩以詞達為本天順間晚宋文字盛行於時如論範論學繩尺之類士子翕然宗之文遂一變侍講學士丘濬每考試凡恠詞險語皆痛斥之衆不䘏也及為祭酒尤諄諄為學者言之文體乃復渾厚成化己未會試學以至乎聖人之道論舉子桑悦巻有我去而夫子來也等句濬黜之他日會試悦策有曰腹中有長劒一日幾回磨檢討呉汝賢復黜之前輩取士不苟如此復試洪武三十年丁丑六月辛巳朔上御奉天殿策試下第舉人先是禮部會試天下士中試者少被黜落者咸以為言上命翰林儒臣考下第甲中擇文理優長者得六十一人至是復廷試之擢韓克忠為第一仍賜克忠等進士及第出身有差乙酉以克忠為修撰第二人王恕第三人焦勝為編修七月命太常寺丞張顯宗署國子祭酒事因命克忠署司業事其見寵擢如此永樂二年成祖臨軒策士𫝊臚明日進會試所選副榜士於廷親試之上御右順門命侍講楊士竒金㓜孜諭旨令就試者從容盡所藴毋茍且取具命光禄給食中官夕給燭遂親拔三人命進學翰林餘第為二等付吏部除學官其第一人則周翰也預修永樂大典七年除典籍云按宣徳間副榜舉人得冠帶讀書太學葢循此制也自是至正統後副榜始不復廷試矣楊士竒云宣徳丁未以前有十五科前此南北士合試未有北士占首選者有之實自丁未始王直云自洪武辛亥至正綂丙辰為二十科葢皆并韓克忠一榜數之也鄉試凡順天府應天府鄉試本府以考試官請與會試同葢重畿甸以為天下先也按洪武庚戌京闈主考為前御史中丞劉基治書御史秦裕伯同考為侍講學士詹同𢎞文館學士眭稼起居注樂韶鳳尚寳丞魏潛國史宋濂辛亥京闈主考則兵部尚書呉琳國子司業宋濂也永樂癸未命侍講胡廣編修王達為應天府考試官賜宴于本府自是遂為例正綂戊午侍講學士曽鶴齡主考順天府鄉試初試之夕塲屋火試卷有殘缺者有司懼罪不敢以更試為言惟欲請葺塲屋以終後兩試鶴齡曰必更試然後百弊滌至公著不然雖無所私亦招外謗朝廷何惜一日之費以成此盛舉哉有司具二説以進命下悉如鶴齡所言後皆懾服得士云景泰丙子洗馬柯潛奉命主考應天府鄉試舟維淮上有舉子鬻私者暮夜投潛潛叱之彼固以請以所賂遺署前潛怒命執付有司懲以法成化甲午左庶子黎淳主考順天府鄉試有試巻竒甚後塲不𩔖疑有弊勾稽墨巻果得謄録生截卷狀移外簾按其事而取是巻為解首則名士馬中錫也此三事皆可為應變之法景泰庚午侍講學士劉鉉主考順天府及揭曉第一人劉宣乃盧龍軍士也同事者欲更之鉉爭曰朝廷立賢無方不可乃止時論韙鉉丙子順天主考為春坊大學士劉儼侍講學士吕原少保兼大學士陳循王文用事循子英文子倫入試俱不中二人論奏儼原不公有旨令翰林并科道覆考英倫文字遂以為合格得特賜舉人儼等問罪還職禮科給事中張寧劾奏循等罪狀乞黜罷不報英宗復辟文被誅循謫戍英倫皆除名嘉靖十五年八月順天請考官内閣以學士張壁主考臣道南初自徽郡召還是月初六日陪祀西苑上命著學士道南去考時吏部尚書汪鋐屬其二子雲程雲卿三鼓造門餽金三千兩臣即令呼隔隣錦衣陸堂遣校尉偵之遲明乃去復囑提調府丞張漢致意臣與侍讀張袞及同考等官焚香出題稍遲進呈嚴密闗節不通權臣具奏進題太慢張孚敬遂擬旨云考試以進題為重廖道南等受命主考縁何不行慎重以致遲慢禮部從重㕘来及臣道南辭宴上曰道南召用未久准預鹿鳴宴於是汪鋐上疏舉劉三吾不取韓克忠被誅事臣以劉儼事對之乃已試錄凡鄉試錄舊制例進呈祖宗時令翰林院儒臣評駁之後其制漸弛成化十四年天下鄉試録多舛謬或犯國諱少詹事兼侍讀黎淳摘奏數十條下禮部翰林院議治考試提調官罪且申定格例行之至今按是年山東刻文論語義不曰堅乎磨而不磷不曰白乎涅而不緇最為紕繆遂逮舉人張天瑞治之以墨卷不同乃止程試國朝鄉試諸錄㑹試進士登科録具有成式葢科舉自兩京外鄉試付之藩臬以為未信也會試則以名籍付禮部考試付翰林暨于親試則有殿最而無黜陟葢以為可信矣其所刻程文自鄉試以至于殿試皆宜刻士子所作庶為傳信流弊之極至于制策亦多代筆豈所以教之忠歟按洪武甲子鄉試乙丑會試初為小録以傳然惟列董事之官試士之題及中選者之等第籍貫經籍而已其録前後雖有序然猶未録士子之文以為程式也次科戊辰加刻程文自後永為定式但此後五科其間命官列銜或多隨時不一永樂以後其制始一定而不更易矣然永樂中各省鄉試猶有儒士主考品官同考者其序文亦不拘篇數景泰中序文禁稱公考官正用實授教官序為前後二篇以兩京為法也然兩京序文稱臣獨與會試同云按初塲例出四書義三道正統元年會試出大學論語中庸而不及孟子成化元年順天府鄉試出論語二道孟子一道而不及大學中庸其後定大學中庸内量出一道論語孟子各出一道遂為例二塲洪武四年以射禮論為題其後止用經書聖製書中成語三塲策問先是惟以經史疑難及國家之大者言之其後始有出於經史之外併及瑣屑隱僻若序文則𢎞治五年順天鄉試猶具嵗月後皆不然也葉盛曰文衡之任亦難矣言語文學不足以變士習服士心亦漫浪為之耳正徳己未會試王抑庵主考試第二名張穆兵馬策其原卷起語云兵本以衞民非兵無以安夫民之生馬所以資兵非馬無以足夫兵之用會試録云兵以衞民非兵無以安生馬以資兵非馬無以足兵用兩句減去八字抑庵筆也自是舉子以造語簡嚴典重為尚然抑庵又稱永樂辛丑楊文貞公同會試文衡務先典實之作以洗浮腐之弊喜曽鶴齡諸作多梓行之至今評程文者以是科為最葢洪武永樂間程文體皆渾厚不特是科而已誠宜録出以正文體而變士習至若登科録永樂甲申二甲刻所對策十餘篇其後革正徳三年二甲第一人三甲第一人俱刻策事出焦芳輩非制也燕對録曰正徳六年四月十三日講畢復召至煖閣叩頭畢上手取會試録一本付司禮監太監張永授臣東陽等内有白紙票粘於紙上者三皆指摘所刻文字錯誤處上曰今欲别有施行但念衙門體面恐不好看與先生輩知之臣東陽出至煖閣留寘案上永令内臣送至内閣是年大學士劉忠累疏辭疾聞此事而去葢已有先入之説矣武舉凡武舉第三塲考試官兵部請命如兩京鄉試之制正徳三年始刻錄前後有序賜會武宴一如文試九年十二年亦如之惟十五年兵部尚書王瓊變其制止用第一道刻文三篇本院官二員併兵部公侯伯皆為考驗官今照舊規出策二道論一道嘉靖十一年臣道南暨王用賔䝉上命主考得周乾等六十員其末則今都督陸錦衣炳也是科衆號得人評文洪武中聖祖召詞臣評論詩法太子正字桂彦良每應制先衆而就嘗進曰治道具在六經典謨訓誥願留聖意詩非所急也上深然之自是恩遇隆洽稱曰老桂不名永樂七年仁宗東宫贊善王汝玉每日於文華後殿道説賦詩之法一日顧楊士竒又曰古人善為詩者其髙下優劣何如士竒對曰詩以言志明良喜起之歌南薰之詩唐虞之君之志最為尚矣如漢髙祖大風歌唐太宗雪耻除兇之作所尚者霸力皆非王道若武帝秋風辭志氣已衰如隋煬帝陳後主所為萬世之鑑戒也仁宗曰太祖髙皇帝有詩集甚多何謂詩不足為士竒對曰帝王之學所重者不在詩太祖皇帝聖學之大者在尚書及諸書註作詩特其餘事今當致力於重且大者其餘事可姑緩仁宗曰世之儒者亦作詩否士竒對曰儒者鮮不作詩然有道徳之儒若記誦詞章謂之俗儒人主尤當致辨於此時仁宗監國視朝之暇専意文事因覽文章正宗一日諭士竒曰真徳秀學識甚正選輯此書有益學者對曰徳秀是道學之儒所以志識端正所著大學衍義一書有益學者為君不可不知為臣不可不知君臣不觀衍義為治皆茍而已嘉靖五年五月日食臣道南進洪範疏今上命顧鼎臣講洪範大學士楊一清請講大學衍義每月三八日輪日講官二員進講臣道南預焉初講許敬宗姦邪章次講李林甫勸帝西幸章張孚敬聞之怒又復講林甫賀野無遺賢章孚敬怒不可解語桂萼曰行當黜之毋使預講僚也賴聖明簡注每啓沃文華時必顧左右曰道南來否後復進講楊國忠姦邪二章及元載結宦者李輔國以自固盧把忌張鎰出之鳳翔忌楊炎貶之崖州至李逢吉則又結宦者王守澄孚敬大怒十二年七月初三日彗星見顧鼎臣輪講不到遂誣道南暨蔡昂不行代講謫知徽湖聖明洞鑒召復原秩其譖始不行云正體國初文體承元末之陋皆務竒博聖祖思有以變之凡擢用詞臣務令渾厚醇正洪武二年三月戊申上謂侍讀學士詹同曰古人為文章或以明道徳或以通當世之務如典謨之言明白易知無深恠險僻之語至如諸葛孔明出師表亦何嘗雕刻為文而誠意溢出至今使人誦之自然忠義感激近世文士不究道徳之本不達當世之務立辭雖艱深而意實淺近即使過於相如揚雄何禆實用自今翰林為文但取通道理明世務者毋事浮藻於戲大哉皇言乎萬世之通訓也然近日文體或務追秦漢而失之險或駕言韓歐而失之弱本院儒臣宜知所守然風靡者多矣舉聖謨以戒敇之最急務也奏啟洪武十四年十二月丁巳命翰林院編修檢討典籍左春坊左司直郎正字贊讀考駁諸司奏啓以聞如平允則署其御曰翰林院兼平駁諸司文章某官某例名書之永樂以後四方章疏經御覽者内有難詞難字始令本院考究不復先期評駁記録學士宋濂嘗輯洪武政紀此日錄之始也自後學士解縉有大明帝典洪武中事大學士楊士竒有三朝聖諭録紀永樂宣徳時際遇召對諸事天順日録大學士李賢所著雖紀時政然旁及論建與所傳聞彭時有可齋雜記専紀當時見用之事而本院故事多書厥後尹直有謇齋瑣綴李東陽有燕對録按宋有時政房每遇上召對即貼黄具寫付之雖勝國亦然若録以傳信亦聖政聿新之一助也屏衺先王之制一道徳以同俗其有造言非聖者必刑無赦聖祖崇重儒術以濂洛闗閩為宗罔敢有悖焉者也永樂中饒州士人朱季支獻所著書斥濂洛闗閩之説上覽之怒曰此儒之賊也時禮部尚書李至剛學士解縉侍讀胡廣侍講楊士竒侍側上示以其書縉曰惑世誣民莫甚於此至剛曰不罪之無以示儆宜杖之屏諸四裔士竒曰當盡燬所著書庶幾不誤後人廣曰聞其人年已七十燬書示儆足矣上曰謗先賢毁正道治之可拘常例耶遣行人押季支還饒州會布政司及府州縣官與其鄉士人明諭其罪而笞以示罰悉索其所著書殿閣詞林記卷十四
