body:
  text: 殿閣詞林記巻十三明黄佐廖道南撰宸翰聖祖嘗出御製詩文以示詞臣太子正字桂彦良即大聲誦之琅然左右驚愕學士承旨詹同私戒之上聞之謂曰儒者事君正當誠意毋事矯揉也又嘗出御製勑使彦良指摘彦良受命盡言洪武二十年二月甲辰御註尚書洪範成先是命儒臣書洪範揭于兩廡座右朝夕觀覽乃自為註至是成召贊善劉三吾曰朕觀洪範一篇帝王為治之要道也所以叙彛倫立皇極保萬民叙四時成百穀本於天道驗於人事箕子為武王陳之武王猶自謙曰五帝之道我未能焉朕毎為惕然遂疏其旨朝夕省覽三吾對曰陛下留心是書上明聖道下福生民為萬世開太平者也宣徳七年七月宣宗燕閒閲内庫書畫得元趙孟頫所繪豳風圖因賦長詩一章召翰林詞臣示之曰豳詩周公陳后稷公劉王業之由與民情早晚之宜以告成王使知稼穡艱難萬世人君皆當鑑此朕愛斯圖為賦詩欲揭於便殿之壁朝夕在目有所儆勵爾其書于圖之右九年十二月宣宗退朝御文華殿召少傅楊士竒等出御書洪範篇及御製序文示之且諭之曰所論或未當卿等當直言勿隱士竒等對曰聖諭皆當真得古人精藴上曰朕在宫中雖寒暑不廢書冊士竒等對曰帝王勤學問則宗社生民有賴矣惟願陛下始終此心上笑曰卿等亦常須直言朕不為忤嘉靖十年九月十五日今上命書周公無逸篇于西苑無逸殿壁叙曰無逸殿之所作者寓戒逸之意者也夫勞者人之所共惡逸者人之所同好故周公以是告戒成王者也朕於今年春因命西苑隙地耕耨之以舉農事卜吉擇皇祖文皇帝舊宫之迎和門内之南建帝社稷壇以祀帝社帝稷每嵗春告秋報行禮宫門外之東建殿亭一區殿曰無逸亭名豳風圍以小厦垣牆迎和門外之南作一亭曰省耕以備朕時省之小憇於此又於北之空地起倉厫一座曰恒裕前為一亭曰省斂之所工起於春三月之十六日訖於九月之十五日殿中壁奉刻我皇考睿製農家忙律附以朕所記于末左書周公之書無逸篇北書朕之所作題豳風圖詩告成朕親為此記以示將來夫斯作也非朕所偽飾而為之也于以思皇考之聖訓俾不至失忘後世以體朕此意庶知以勞而多興逸而速亡知農事之艱難民命之所繫國本之所闗上至郊廟粢盛之所供下及於官禄百需之所賴皆在此務勤勵己勸示於民億載之休永安磐石之固未必非為政之要務者故記之垂後云爾又曰殿之作與夫工之始末已載于左朕於是復以無逸之義而申説之夫逸者人君之大戒也何謂安逸自適人之常性孰不欲髙枕晏卧於終日遊情於聲樂之塲放恣於酒色之地以為嬉娯恬快而無所勞困殊不知昏蕩其性者以此懈墮其志者以此戕身伐命者以此危家亡國者率以此至於失禮喪義悖親違君傷倫敗俗皆自逸肆中來故曰晏安如鴆毒朕雖沖弱每以此為大防故取周公之無逸一書七月一詩揭于殿亭夫公之意以稼穡之艱難與小人之依告于王意葢謂譬農家後生不知祖父之勤而以逸失之況人君之宫生内長者安可不思祖宗創造之艱而耽於逸豫乎亦以使首先以農桑為重王業之基實在乎此朕罔知特以務先自勵而風天下以及置蠶室于迎和門内之北立先蠶壇于此毎嵗命皇后率宫職行祭告採桑禮于中庶使此心不敢怠忽以寓勉力之意耳若夫思聖祖創建之艱難保洪圖於永固則在于敬天恤民親賢講學脩身以端化本正心以貞治原持其敬協乎一以求不負我皇天與我皇祖之所付託及我皇考之所垂望者在是矣朕不徳尤望臣鄰之所匡贊凡覩斯者勿以文害意以答朕之望焉故為説制誥翰林職代王言唐以應奉文字待詔北門與中書舍人分掌制勅諭誥兩制宋始有知制誥之名然初入院者旋即得遷其後試博學宏辭科者始獲任用然屬之中書國朝兩制悉歸本院非鴻儒歴顯秩者不得掌而以中書主謄寫呉元年十二月乙丑上命開讀詔赦前期翰林院官承制草詔及文武官除授合用誥命勅命皆即日撰寫故學士陶安宋濂輩皆曰制誥于時封拜無虚日安等嘗擬撰誥命千餘首以待而猶不足乃使諸儒士在館者分局代為之其後定一考封贈之制初除授所領誥勅皆革去於是其務稍省矣永樂初内閣七人掌内外兩制楊榮金㓜孜諸人自署職銜亦曰知制誥用洪武時故事也仁宗始命内閣専典内制而擇學士一人専管文官誥勅正統以後罷之文官誥勅皆屬内閣如永樂時𢎞治七年復設以學士年深或尚書侍郎兼者為之亦得以知制誥自署兩制遂稍分矣按宋兩制曰冊文表本青詞密詞祝文齋文詔書批答口宣内制也曰皇后皇妃追封先代皇女皇族冊封進封文武百官遷擢致仕加恩等誥勅外制也若國朝内制則制勅詔旨誥命冊表寳文郊祀祭文享廟祭文皇太后受冊寳謁謝文皇后受冊寳謁告文皇妃受冊祭文祭陵文皇太子親王等冠辭祝辭親征禡祭旗纛露布巡狩所至祭山川旗纛軷祭文驃騎祭馬神等及五祀祭文大喪及皇妃贈諡等冊文親王妃公主郡王妃世子世孫及妃鎮國等將軍喪塟祭文諡冊塘誌諭祭文及文武大臣諭祭文經筵講章及題奏揭帖之屬外制則文官誥勅而已凡五府六部等衙門請勅行事備詞奏請既得旨移文本院依奏草勅内閣即時擬撰文官誥勅之𩔖亦然進稿畢編𩔖勘合中書舍人領出書寫其王府諡冊等文禮部抄出施行原稿具繳納云表箋洪武六年九月庚戌詔禁四六文辭先是上命翰林儒臣擇唐宋名儒表箋可為法者遂以韓愈賀雨表柳宗元代柳公綽謝表進上命中書省臣録二表頒為天下式諭羣臣曰唐虞三代典謨訓誥之辭質實不華誠可為千萬世法漢魏之間猶為近古晉宋時文體日衰駢麗綺靡而古法蕩然矣唐宋名儒輩出雖欲變之而卒未能近時若詔誥章表之類仍蹈舊習朕嘗厭其雕琢殊異古體且使事實為浮文所蔽其自今凡誥諭臣下之辭務從簡古以革弊習爾中書省宜播告中外臣民凡表箋奏疏毋用四六對偶悉從典雅十二年六月壬申命翰林院定皇太子與諸王往復書箋之式二十九年八月上以天下諸司所進表箋多務竒巧豔浮心甚厭之乃命學士劉三吾右贊善王俊華撰慶賀謝恩表箋成式頒于天下諸司令如式録進自是詞垣秉筆者多用散文如宋濂進大明律表是也成祖時有白鵲之瑞行在禮部行南京慶賀自皇太子監國下及五府六部例各進表時楊士竒以病在告監國表命庶子贊善呈稿東宫命尚書蹇義持以示士竒曰甚寂寥且不著題以賀白龜白鹿皆可因命改之士竒改一聨云望金門而送喜馴彤陛以有儀後増一聨云與鳳同類蹌蹌於帝舜之庭如玉其輝翯翯在文王之囿義以進仁宗喜曰此方是帝王家白鵲適内使陳昻進御饌撤以賜之且傳旨使勉進藥食早相見也按國初陞除猶具表陳謝其後惟狀元率諸進士謝恩衍聖公及公侯伯襲封謝恩始用之車駕幸館閣及太學初開經筵及有非常之賜亦具謝表朝廷有大喜慶及諸祥瑞具賀表進呈實録及書籍等皆具進呈表例本院詞臣司之若有東宫則増一箋云會典凡南京各衙門遇朝廷冊立大禮及上徽號等項合用慶賀表箋南京禮部行南京翰林院撰進應制本院以供奉文字為職凡被命有所述作則謂之應制然祖宗時皆出於面命或相與賡和其後惟中官傳諭旨而已丙午年六月旱上禱雨鍾山獲應賦七言喜雨詩命待制黄哲等賡和已而諸將告㨗多令翰林諸儒臣應制賦詩上親加評品洪武元年十一月召大本堂諸儒試以鍾山蟠龍賦時與文學之臣燕飲賡和語在賡歌巻大誥三編成命學士劉三吾為序既成上評以為無疵祖訓成學士宋濂被命序其後精誠録成則命大學士呉沈序之太子正字桂彦良入見上命製香几贊司直郎汪仲魯被命製續薫風南來諸曲皆稱旨洪武八年五月丁丑上御端門召翰林詞臣出示巨桃半核葢元内庫所藏物其長五寸廣四寸七分有刻西王母賜漢武桃及宣和殿十字命宋濂撰蟠桃核賦又嘗命宋濂詠鷹濂七舉足而成有自古戒禽荒之言上稱賞曰卿可謂善諫矣十年十月造觀心亭上臨觀親幸其中召濂為記十二月上制十題命典籍呉伯宗賦之援筆立就詞語峻潔上嘉其才敏賜織金錦衣嘗幸清流闗賦詩命扈從儒臣和之起居注劉季道有治定不教生縱逸功成猶遣歴間闗之句上歎賞曰可謂安不忘危賜以白金文綺又起居注蔣子杰應命即物賦詠立成上大悦時寵賜和章一日命羣儒撰縱豢鶴文呉府伴讀王驥操觚立就學士宋濂為之進呈上稱善及日將南至大祀於圜丘上復命羣臣賦七言律十二韻冠以三百言序驥與黄昶先成跽讀御榻前上聽畢加奬勵命進學禁林云十五年學士宋訥撰宣聖廟碑稱旨改文淵閣大學士先是二年二月乙亥立皇陵碑學士承旨危素承命撰文尋以多潤飾乃出御製一篇閲江樓成宋濂被命撰文稱旨初徐達還上御龍江亭命魏觀賦詩觀云乾坤喜氣溢天顔大將中原奏凱還日麗九斿來象輅雲連千騎擁龍闗神功烈烈銘周鼎宗社巍巍峙泰山會見凌煙髙百尺宸光常炳畫圖間又云白旄黄鉞兩京平甘雨和風四海清師出萬全非用武將資三傑在推誠蒼龍挾雨迎車騎彩鳳穿雲送斾旌獻頌偶䝉天一咲行看作樂著功成可謂同游矣永樂八年成祖北征至野狐嶺召學士胡廣賦平蠻詩楊榮曰聖主尊居四海安天教仇敵自相殘上甚嘉之未幾諜知敵帥布尼雅實哩與其下阿嚕台讐殺東西奔遁乃召榮諭曰此賊果自殘滅汝前日之詩安知不為䜟乎榮下馬叩首謝上喜命賜羊酒三月乙未次清水源水皆苦鹻不可飲人馬俱渴明日營西北二三里許忽有泉湧出清澈可愛命廣與榮往觀遣中宫以銀瓶汲取上親甞之味甚甘美賜廣等飲訖士馬爭趨之皆給足命曰神應泉又明日應制撰神應泉詩銘上嘉之各賜上尊又嘗命諸文學侍從賦天馬海青歌修撰曾棨最先成為上所褒美宣徳中毎遇令節各令詞臣應制賦詩是時太平無事上留意詞藝翰林儒臣常常命賦京師八景以獻曰瓊島春雲曰大液晴波曰西山霽雪曰玉泉埀虹曰盧溝曉月曰薊門煙樹曰金臺夕照曰居庸疊翠英宗増其二曰南苑秋風東郊時雨為十景焉景泰中學士倪謙輩應制賦詩中官嘗立候以進成化初學士劉定之應制賦元夕詩絶句百首頃刻而成又嘗以東風解凍春山雪霽等為題命翰林學士等分詠之𢎞治初上注意講學遣太監戴義傳示聖意命學士李東陽等各撰詩十首用寓啓沃東陽擬十題各撰七言律詩一章曰敬天曰法祖曰勤政曰務學曰任賢曰納諌曰節用曰愛民曰恤刑曰講武葢美不忘規焉嘉靖八年正月元夕臣道南應制撰燈詞十五首以進上親製一章云黄道開蓬殿青陽溢泰穹賞心纔令節養志自慈宫珠佩軒車從霞觴祝頌同千秋還萬嵗物阜與民豐九年七月敬一亭成上復命儒臣落成錫宴進詩十年演馬環碧殿御製歌詞賜同游諸臣和之十三年臣自徽州賜環上親灑鍾粹宫詞命和之賜金綺有差十五年三月上謁諸陵撰汎舟賦命同游諸臣和之視草凡代言先具藁進呈御覽允而後行諸播告兩制皆然洪武中有大政令詞臣録聖語不敢増損故凡詔令多你每好生等字者皆聖祖所面授也其後始令本院官為之漸至駢麗永樂二年楊士竒等進呈勑邊將藁上曰武臣邊將不諳文理只用直言俗説使之通曉庶不誤事他日編入實錄却用文六年冬巡狩北京詔書命士竒視草上覽之再三喜曰簡當更勿改易其擇日書之頒下又曰試與諸尚書觀之皆稱善獨兵部劉儁私於士竒曰請以有字易自字如何士竒曰善即以告於衆皆曰義無相逺不足易且上既善之矣士竒獨以聞請易之黄淮於上前執不足易士竒曰於國家大體當用儁言上顧士竒曰從汝明日諭胡廣曰楊士竒能服善難得二十二年十月仁宗御西角門視朝罷時風寒顧謂翰林臣曰朕與卿等居重城中猶覺凜凜如此守邊將士晝夜嚴警殆不可勝遂命書勑遣使以鈔幣賜緣邊將士宣徳五年二月上御南濟宫召楊士竒諭曰吾欲下寛恤之令今獨與爾商之然吾未能悉知爾當效助益遂命内侍具楮筆上曰免灾傷税糧當是首事聞民間虧欠畜馬驢驘所司追償甚迫民計無出亦甚艱難部官坐視不言對曰陛下聖念及此生民之幸然所當寛恤者殆非此兩事因言百姓積年負欠薪芻及採辦買辦之物所司責償甚急各處官田起科不一而租額皆重蘇州尤甚細民至於逃徙部符下郡縣一槩派徵非出産處百姓數十倍價買納刑獄冤濫者多工匠之弊四方逺近每戸不聞幾丁悉徵在京多為所管之人私役南方運糧甚艱而倉廩無闗防姦人盜竊動輒數萬若此者請有以處之上以為然即令草敇明旦頒行遂令尚饍賜饌勅諭既下上聞衆心悦戴召士竒賜鈔三千緡文綺二端及羊酒士竒叩首受賜上笑曰薄用潤筆耳七年二月上召士竒至文華殿諭曰五年二月與爾南濟宫論寛恤事今兩閲嵗矣民事不又有可恤者乎士竒復言戸部沮格官田減租及課程選舉等數事且曰臣一人見聞不廣願更得一人同論此事上曰若多令人知即勅諭未下事已徧播於外矣曰大臣中固有謹厚者上曰胡濙謹厚汝與之密議就錄稿進來於是退同濙議増十數事通録進呈上悦璽書遂下凡此類皆君臣同心之故也景泰末易儲大學士陳循等陰主其事詔既下視草實出循吏部尚書何文淵謂人曰詔語天佑下民作之君父有天下傳之子吾所為也獨石闗報㨗詔奬之循視草乃反譙責厥後與文淵皆被禍天順初承天門災上下詔躬責岳正視草歴陳弊政詞極切直天下傳之有飛語指為謗訕七月内批降正為廣東欽州同知繇是言之視草固非易事也褒荅洪武十五年二月太子正字桂彦良入朝獻萬世太平治要策凡十二事上嘉納之永樂七年侍講楊士竒撰周易直指仁宗在東宫凡決疑必用蓍而以易斷士竒因進曰易固為卜筮作然文王周公所繫辭凡脩齊治平之道悉具請編輯以備觀覽遂輯成書仁宗覽之賜名曰周易大義賜士竒繡衣銀帶先是徐好古作尚書直指金㓜孜作春秋直指各有發明成化末學士邱濬纂大學衍義補書成適孝宗登極表上之上批荅有曰卿所纂書考據精詳論述該博有裨政治朕甚嘉之賜白銀二十兩紵絲二表裏陞濬禮部尚書乃若進呈歌頌詩賦在國初學士宋濂進平江漢頌待制王禕進平江西頌聖祖曰吾固知浙東有二儒者卿與宋濂耳學問之博卿不如濂才思之雄濂不如卿洪武二年十月甲戌膏露降於乾清宫後苑松樹宋濂獻膏露頌三年四月陜西寳雞縣進瑞麥𢎞文館學士劉基進瑞麥頌五月戊申祀地祇于方丘基復進方丘頌四年八月明昇平基又進平西蜀頌上為文答焉五年六月句容縣民張觀園生嘉𤓰雙實同蒂圓如合璧禮部尚書陶凱奉之以獻宋濂進嘉𤓰頌二十九年天下多嘉禾之瑞學士劉三吾進嘉禾賦永樂二年八月周王畋于鈞州獲騶虞九月丁未王獻于闕下侍讀梁潛進騶虞詩侍講楊榮進頌已而奏甘露屢降嘉禾呈瑞外國獻麒麟白雉𤣥兎白鹿白象靈犀白兎之屬榮與學士胡廣金㓜孜梁潛等咸為詩歌以進三年九月朔頒聖祖御書嘉禾詩于諸王及近臣先是洪武二十八年九月庚戌北平永清衞之龍門有禾異莖同穂上在潛邸遣使馳獻聖祖親御宸翰賦長詩一章以賜上念手澤之存摹勒于石裝治成軸分賜諸王及學士解縉等又適有嘉禾之瑞縉獻嘉禾頌四年二月視學上服皮弁行四拜禮御彛倫堂賜祭酒胡儼司業張智坐講文武三品以上及翰林儒臣皆坐坐以聽賜畢賜答明日儼等率師生上表謝賜賚有差大燕羣臣於奉天門學士胡廣進視學詩一時詞林諸臣咸和之八年五月己卯上北征布尼雅實哩於𤣥溟河七月壬午駕還士竒獻平邊頌及鐃歌鼓吹詞十二年六月親征衞喇特薩里奇爾又北之于圖喇河八月駕還庶子鄒緝獻清邊頌十七年十一月甘露降于孝陵松栢學士王直獻瑞應甘露詩十八年正月禮部郎中周訥請封禪大臣有陰主之者於是學士胡廣獻却封禪頌上遂止宣德二年三月騶虞復見大學士楊榮獻頌上褒賞之三年九月榮扈從北征凱還進平邊詩凡十篇各立題命意上覽之喜屢沐白金鈔幣之賜自是毎同遊榮與楊士竒等多以詩進遇令節被召宴遊亦多以詩謝恩自正統後此事䆮不聞矣嘉靖十三年十一月肇祀皇天于圜丘今上親製大報曰朕肅懐大報作此數字以見意耳不顧是否乃與卿等及言鼎臣道南又并三分獻二禮官或一看卿等各盡所以贊佐戒進文辭以和來御製大報歌云嵗次甲午兮陽月之八日新冬肅羣臣而朝趨泰壇兮欽大報之叩蒼穹朕以微薄菲質兮荷洪眷下及而主兆庶愧緜才愚資兮懼無以上副恩隆思欲康此民以圖報稱兮慚無學以出其治源爰肇復泰禋兮兹當四舉愚衷匪直慎始兮思惟厥終諮右左丞弼兮其盡啓沃以匡佐期世道躋于煕皥兮庶或仰承乎眷崇臣道南恭和四章上褒答曰爾所衍和歌奏進留覽嗣是甘露降于顯陵松林山賜臣道南一罌進瑞應膏露頌泰神殿祈雪有應臣進瑞應靈雪賦及黄河清于陜州之靈寳臣進瑞應河清賦河南鄭府進白鵲臣進白鵲頌四川撫臣宋滄進白兎臣進白兎賦暨福建撫臣汪鋐進白鹿臣進白鹿賦聖駕幸大學賜學士列坐聽講臣進聖主臨廱頌圜丘成臣進大祀圜丘賦上諭内閣輔臣李時曰此是道南所上圜丘賦卿可詳著來聞方澤成臣進大祭方澤頌及帝王廟成臣進景徳崇聖頌九廟初建臣進列聖禋頌上咸褒答云覽奏具見忠意賦頌著史館纂入己亥三月大狩龍飛臣進聖主南巡江漢賦及景雲頌四篇上命行在禮部送史館聖駕旋京汎舟金海御詩云紫殿四頭勝槩舒晨輝朝彩映芙渠波光㶑灔千尺翠鏡色飛浮十里餘蓮紅的的明素鷺荷緑陰陰覆錦魚觸目傷心佳景處莫伸昔日奉慈娯殿閣詞林記卷十三
