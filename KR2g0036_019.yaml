body:
  text: 殿閣詞林記卷十九明黃佐廖道南撰齎詔國初置承敕監洪武九年以編修吳升為承敕監令周孟東為監丞使以齎奉制敕為職尋罷之其後凡朝廷大禮頒詔天下本院官先撰詔文請旨裁定付中書舍人書寫送尚寶司用寶璽畢行禮之日百官出承天門外肅候鴻臚寺官唱頒詔內閣官一員捧詔自奉天殿左門入至華蓋殿候駕興捧出至奉天殿授於禮部尚書其他制敕用寶時或不同皆內閣臨事制宜取自上裁葉盛云嘗見勑內閣楊士竒用勤民之璽皇太后遺詔用𢎞德昭順之寶皇后制書用厚載之記詔書制諭臣誥命皆制誥之寶近年詔書蓋皇帝之寶云始於學士李賢制命敕諭皆敕命之寶又嘗見正統中手摺印本敕諭廣運之寶朝覲敕諭亦手摺印本蓋敬天勤民之寶敕則用廣運之寶敕令皆為敕書蓋手敕耳惟景泰初敕諭亦用廣運之寶今上御劄新製政事文學驗記聖文神武非近世帝王所及也寶册凡上尊號尊諡皆本院撰擬寶册文以進洪武初尊德懿熙仁為四廟學士陶安朱升等捧册文至御前上親受之永樂初上太祖高皇帝孝慈高皇后諡議上御覽畢親舉諡議付本院撰文及上諡册一如洪武時天順二年二月上聖烈慈夀皇太后尊號內閣捧寶册文進上復親覽畢乃行禮時詔誥天下詔草已進訖大學士彭時謂李賢曰此事有恩典及人賢曰先年已兩赦矣恐數赦非宜時曰非赦也但行優老之政耳意欲令朝官父母年七十者與誥敕百姓年近百歲者與冠帶是所謂老吾老以及人之老也恩典如此斯與所上徽號相稱矣賢曰善遂共擬仁政數條進呈上大悅即命之頒徽號詔畢上御文華殿召賢等三人者令近前賜銀兩表裏有差仍親自授與和顔慰勉其鼓舞臣下有如此今上恭上皇天泰號暨聖祖徽號誕敷大詔錫類貤封尊尊親親道兼舉矣扈從凡車駕所在近侍諸臣皆扈從洪武中官無定員永樂初定巡狩親征先詔誥天下扈從用本院內閣官三員侍講修撰典籍等官六員書制敕秀才八人譯寫四夷文字監生十三人車駕將發燕羣臣賜扈從官軍人等寶鈔會典云凡駕詣郊壇或巡狩行幸親征內閣官扈從制敕房官隨行書辦遇有敕旨即時撰寫永樂七年正月車駕巡北京學士胡廣諭德楊榮金幼孜及修撰王英等扈從賜錦衣狐裘鞍馬榮時有母喪特留之三月抵北京賜廣等宴榮辭以憂弗與特命中官以珍饌送之八年二月上親征北番布尼雅實哩廣等三人仍扈從賜衣被鞍馬途次命光祿給酒饌七月車駕至臚朐河遣榮先歸報皇太子至京皇太子賜鈔幣金織麒麟衣服銀相鏤花香帶及石刻蘭亭記兩賜宴於翰林命隆平侯張信尚書蹇義欵待且命諸儒臣陪之八月抵北京賜綵幣鈔米羊酒等物十月榮與廣等扈駕南還賜鞍馬綿衣褲襪及路費途中屢賜珍饌嘉果抵京賜廣等鈔幣有差十一年正月復巡北京統師親征廣等三人偕修撰王直梁潛扈從賜衣幣鈔米等物十二年三月親征衛喇特時皇長孫侍行上命廣等三人凡行營有暇即與講解義理經書史鑑十四年復扈從南歸賜廣等錦衣鞍馬鈔幣十五年三月壬子車駕復巡北京三人者復扈從上屢問民情榮等悉以實對賜白金鈔幣金織紗羅紵絲衣服等物二十年二月上北征惟幼孜與侍講王英扈從賜鞍馬鈔幣前至庫稜海五月遂還英嘗奏事上喜謂曰秀才是二十八人讀書者朕需爾為用正好宣力勿憚勞苦令凡軍中一切動靜或謡言之類爾有所聞即來奏又諭太監孟驥曰秀才有事即令入見毋阻二十年二月戊寅大學士楊榮金幼孜從征沙漠賜米鈔鞍馬令榮等參預軍中幾務時召榮幼孜於御幄中同公侯大臣坐飲凡有賜賚或公侯不與俱或與公侯俱而扈從文臣不與焉九月宴隨征將士命榮幼孜坐前列食上殽賜鈔幣拜二品金織襲衣靴襪二十一年七月榮扈從西征賜羊酒帳房等物八月庚申駐師萬全一應軍務悉命榮掌之晝夜或三接五接每以楊學士稱之不名十月次天成畨王額森托噶納欵命榮往受之回賜御饌慰勞備至十一月旋師賜鈔一萬貫米十石紵絲金織衣二襲靴襪二雙二十二年復北征榮與幼孜扈從語見受顧命類宣德元年漢庶人髙煦反榮勸上親征遂與楊士竒從行討平之七月駕還賜榮鞍馬白金鈔幣及樂安州男婦五十餘人三年八月戊申車駕巡邊獨榮扈從九月癸丑給以內廄良馬命榮先從出塞日賜御厨酒饌乙卯師次寬河報捷丁巳駐蹕會州甲子班師五年二月乙未上侍皇太后謁長陵獻陵大學士楊士竒楊榮等扈從庚子上以皇太后命召見士竒等五人於行殿諭之曰皇帝數言卿等忠勤今天下清寧民生無事是固祖宗福祐家國亦惟卿等贊翼之功賜以酒殽及白金紵絲表裏辛丑進詩謝恩三月己酉扈駕回京賜青紅氁子駝褐九年九月榮復扈車駕巡邊給以天間名馬光祿寺日供酒饌至洗馬林而還比還恩賚甚厚正統十四年七月邊人額森入侵司禮監太監王振勸親征上親征時學士曹鼐及張益等扈從八月遇敵於土木鎮鼐及益皆沒宣德四年正月丁巳大學士楊榮扈駕南郊賜金銀鮮果等物𢎞治十六年上郊祀大學士李東陽等候駕畢宿神樂觀特賜者三東陽等為詩記之嘉靖十五年三月清明節今上躬詣天夀諸陵命日講官顧鼎臣謝丕張璧暨臣道南蔡昻扈從十八年三月大狩龍飛扈從則儒臣陸深等臣道南祗謁於鍾祥上命賜光祿酒飯蓋渥恩也留守永樂六年上將巡狩命尚書蹇義金忠大學士黃淮左諭德楊士竒留守諭曰朕留汝四人居守猶唐太宗簡輔弼監國必付房玄齡卿等其識朕意又以幾務事繁復命修撰王直副之凡南京政務惟文武除拜四夷朝獻邊警調發上請行在若祭祀賞罰一切之務有司具成式啓聞明年春車駕隨行十一年再巡命淮等與洗馬楊溥留守十五年春復巡北京留義與士竒居守以侍讀梁潛副之會謀譛監國者事連潛十六年九月置潛及司諫周冕於法皆漢庶人為之也惟士竒免咎宣宗在東宫受命祀陵因留南京監國舊臣曽棨輩皆從焉是年五月楊士竒黃淮楊榮佐鄭襄二王監國宣德元年上親征漢藩淮以病不行留佐監國正統十四年七月上自將北征命郕王居守每旦於闕左門西面受羣臣謁見朝政皆太監令英佐理學士陳循髙榖留守迎駕永樂八年七月車駕還自北征皇太子遣大學士黃淮往迎至滁州朝見洪熙元年五月宣廟召自南京大學士楊榮往迎於德州景泰元年八月十三日英宗自北狩回鑾遣學士許彬迎於宣府商輅迎於居庸關十四日駕至上關輅進見英宗命輅草書二封逹於皇太后入居於南內重華宫正德十五年十月武宗南征凱旋駐通州者久之楊廷和等出迓上戎服而入十六年三月大學士梁儲等迎今上於行宫充使皇太子及親王冠禮內閣官充賔贊婚禮充納徴等使册封諸王及妃內閣官充正使若册封副使以本院官充者自成化末侍讀江瀾始也永樂洪熙宣德三朝册封諸王及妃內閣楊榮金幼孜各充正使者二自後內閣不復出使於外惟冠婚大禮則用舊規宣德三年三月癸未楊榮奉命持節册中宫禮成賜白金鈔幣若本院官以事出使者洪武三年五月遣編修蔡玄等訪厯代帝王陵寢以聞永樂中修撰陳循被命往南京文淵閣取儲書之類是也逺使凡朝鮮安南國頒詔及册封學士等官充正使禮部預奏請特旨點用按洪武初侍讀學士張以寧使安南册封未至而國王死國人請授其世子以寧不聽遣人請命於朝且教其世子服三年喪拜令其國人效中國頓首稽首禮朝廷嘉之賜以敕書比之陸賈馬援御製詩以奬諭之於是復命編修王亷吏部主事林唐臣充弔祭使以往且封其世子陳日熞為王既至其君臣出迎於郊乃奉御製文於綵輿迎入成禮而還四年二月戊午以寧等三人還自安南以寧卒於道日熞遣陪臣阮汝亮偕亷來上表謝恩貢方物上即拜亷為工部員外郎旌其勞也亷固辭不拜出丞澠池十二年十二月壬戌遣編修羅復仁兵部主事張福齎詔諭安南占城及復仁還擢𢎞文館學士永樂初遣待詔王延齡使朝鮮行人朱彬副之賜衣一襲及鈔錠錦衣皮裘狐帽自後使二國者俱賜一品服其禮益隆云安南正統中請封侍讀學士錢溥充正使其王桀驁不恭授受迎拜不如禮溥以書纍爭之而後定𢎞治初侍講劉戩使安南考地志由陸南寧坦甚無虞乃乘肩輿從兩僮忽扺其界夷人傾駭至之日頒詔明日燕畢遂行餽贐一不受追送諸途不與語獨書其入關詩與之曰歸裝有一南物者關神其殛後陪臣入謝表有廷臣清白之語當時莫不多戩正德初侍讀徐穆充正使頒正朔於朝鮮及譯告國王不郊候迎詔不道跪穆援古義稽今制反復辨析皆如議王屢遣陪臣代質疑義穆剖析不遺凡所餽遺悉拒弗納人咸稱之六年編修湛若水充安南册封正使獨和其王贈詩一章論者謂得體云巡行洪武元年八月命儒臣十人分行十道訪求賢哲隱逸之士於是學士詹同等往焉攝憲洪武初編修王璉等攝行御史璉按河南入對稱旨上恱謂近臣曰文華堂諸生如璉等皆異日將相才也九年三月丙子以璉及編修馬亮任敬王懌陳敏張惟典籍王稱應奉殷哲侍儀使孫化祕書直長蕭韶贊讀閻裕起居注嚴鋭給事中方徴彭通宋善王惟吉十六人為監察御史十年正月乙丑復命編修葉慎陳晟署監察御史二十九年復以編修景清為監察御史尋署僉都御史其重憲職如此永樂末侍講李時勉修撰羅汝敬皆降監察御史是又與洪武時異矣分鎮正統十四年八月命侍講徐珵等十五人分鎮要地珵得彰德珵即有貞也成化中修撰張頥擢僉都御史巡撫居庸豈援此以為例歟代祀凡祈告代祀多用本院儒臣正統乙丑浙江台寧等府民遭疫死甚衆上遣禮部侍郎兼侍講學士王英齎香幣往祀南鎮以禳民癘時浙間久旱英至紹興大雨水深二尺灌獻之夕雨止見星明日又大雨田野霑足人皆喜曰此侍郎雨也布政使孫原貞等陪祀請為御祭感應記刻石於廟而還景泰辛未夏不雨特遣侍講學士劉鉉祀濟瀆成化甲辰陜西旱遣禮部左侍郎兼學士徐溥代祀中鎮河海瀆諸神雨輒應丁酉朝廷用儒臣議追崇先聖禮樂遣學士王獻祭告闕里𢎞治己未六月孔廟災學士李傑奉詔祭告甲子閏四月孔廟重建落成復遣大學士李東陽祭告陪祀凡郊祀五品以上官例得看牲次早復命陪祀皆預若分獻用文武大臣及近侍官太常寺請旨點充故本院官自檢討以上皆預永樂中修撰馬鐸建言國子監分獻十哲宜用翰林院官今上肇建圜丘分獻大明夜明周天星辰雷雨風雲四壇方澤分獻五嶽五鎮四海四瀆四壇俱用輔臣分獻及帝社稷壇用日講官陪祀讞獄洪武十四年十月癸丑命法司論囚擬律奏問從翰林院給事中及春坊正字司直郎會議平允然後覆奏論決永樂二十二年十月丁巳大理寺奏決重囚仁宗召大學士楊士竒楊榮金幼孜諭曰比歲法司濫刑往往出於煆鍊先帝嘗切戒之故死刑至四五覆奏而後決自今審録三法司必會三學士同審正統中侍講學士馬愈嘗奏讞獄終年不決者朝廷從之由是寃抑多伸理惜其未能復洪武之舊也主宴凡筵宴之錫賚臣下者令大臣待之謂之主宴天順四年天下諸司官吏朝覲至京上召大學士李賢諭曰黜陟之典亦當舉行其才行超卓政績顯著者布政以下賈銓等十人賜以衣服禇幣禮部筵宴命大學士李賢及尚書王翶待宴以勵其衆正德以來武舉會試宴例用內閣大臣一員主席兵部先期奏請嘉靖壬辰四月望今上命臣道南臣王用賔典武舉命成國公朱鳳尚書王憲待宴齋宿凡郊祀洪武二年定齋戒日期文武百官先沐浴更衣本衙門宿歇次日聽誓戒畢致齋三日宗廟社稷亦致齋三日惟不誓戒或朝廷祈禱亦如之成化丙申十二月十日禱雪致齋於翰林院之東署侍讀倪嶽侍講程敏政修撰陸釴編修陸簡同宿是夜雪大作遂用歐公禁體故事相與􅍐韻聮句以志喜鈎竒競勝達旦弗能休前輩風致可想見也習儀翰林舊不習儀以禮所自出故也成化十四年冬至上命學士而下俱依常參官赴朝天宫習儀至今循之陵祀洪武八年十月乙卯詔翰林院考定陵寢朔望節序祭祀禮部學士樂韶鳯等奏今擬每嵗元旦清明七月望十月朔冬夏二至日用太牢其伏臘社每嵗朔望日則用特羊祠祭署官行禮如節與朔望伏臘社同日則用節禮從之其後清明中元冬至至祭祀列聖陵寢分遣勳戚大臣行禮本院官例用二員陪祭永樂元年太祖皇帝忌辰上率諸王詣奉先殿行禮畢仍率百官躬詣孝陵致祭令近侍官於殿前行禮殿閣詞林記卷十九
