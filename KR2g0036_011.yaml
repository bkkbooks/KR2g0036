body:
  text: 殿閣詞林記卷十一明黄佐廖道南撰官制國初乙巳年五月己亥設翰林學士正三品侍講學士正四品直學士正五品修撰典簿正七品編修正八品洪武二年正月戊申定學士承㫖正三品學士從三品侍講學士正四品侍讀學士從四品直學士正五品典簿正七品待制從五品修撰正六品應奉正七品編修正八品典籍從八品九年閏九月癸巳詔定百官品級承㫖與六部尚書俱正三品學士從三品侍講學士從四品十三年八月己夘増設檢閲從九品十四年五月癸未改正五品衙門設學士一人侍講學士二人侍讀學士二人孔目一人屬官侍講二人侍讀二人五經博士五人典籍二人侍書二人待詔二人史官修撰三人編修四人檢討四人革承㫖直學士待制應奉檢閲典簿十八年三月丁丑命吏部定正官學士一人正五品侍讀學士侍講學士各二人從五品首領官孔目一人未入流屬官侍讀侍講各二人正六品五經博士五人正八品典籍二人從八品侍書二人正九品待詔六人從九品史官修撰三人從六品編修四人正七品檢討四人從七品又定華盖殿武英殿文華殿文淵閣東閣設大學士各一人俱正五品班在本院學士上其後簡用聖㫖自上裁官無定貟而侍讀先侍講則始於此革除年間更易官制仍設正官學士承㫖一貟在學士之上改侍讀學士侍講學士俱為文學博士設文翰文史二舘文翰舘以居侍讀侍講侍書五經博士典籍待詔其侍書陞七品文史舘以居修撰編修檢閲改孔目為典籍創置典簿㕔而革中書舍人改為侍書以𨽻翰林又増設文淵閣待詔及拾遺補闕等官永樂初皆復舊制即洪武十八年所定者也尋命編修等官於文淵閣參預㡬務謂之内閣漸陞至學士及詹事府諸職洪熈元年以輔導任重加陞至師保及尚書侍郎卿仍兼學士大學士自後因之或止以侍讀等官入預閣事其入閣者雖登穹秩凡厥事公移止穪翰林院焉永樂七年以順天府為北京本院扈從者穪行在翰林院後定北京為京師遂革行在之穪既建今衙門遂以舊署之在留都者為南京翰林院其南京翰林院止設學士一貟掌之遇有貟缺從内閣推舉其後侍講以上官皆得往掌院事仍設孔目一人若修撰等官或因事始添設焉官銜凡列銜學士正五品初授奉議大夫陞授奉政大夫勲曰修正庶尹侍讀學士侍講學士從五品初授奉訓大夫陞授奉直大夫勲曰協正庶尹侍讀侍講正六品初授承直郎陞授承徳郎修撰從六品初授承務郎陞授儒林郎編修正七品初授承事郎陞授文林郎檢討從七品初授從仕郎陞授徴事郎五經博士正八品初授迪功郎陞授修職郎典簿從八品初授迪功佐郎陞授修職佐郎侍書正九品初授將仕郎陞授登仕郎待詔從九品初授將仕佐郎陞授登仕佐郎凡給授之時本院行吏部該司開報奏聞毎僉押奏啓止書職名以品級為次序惟纂修及進呈書籍試錄等始書散官勲階凡書必繫于職名之下者以所職乃宸翰國史示有尊也若以他職兼本院官則否職掌學士之職凡賛闡皇猷敷敡人文論思獻納修纂制誥書翰等事無所不掌侍讀學士之職凡遇上習讀經史則侍左右以備顧問帥其屬以從侍講學士之職凡遇鶴禁講究經史亦如之侍讀侍講視侍讀學士侍講學士凡遇左右侍其職亦如之五經博士之職掌易者一人掌書者一人掌詩者一人掌春秋者一人掌禮記者一人人各專門明經同異得失究其指歸以備講讀典簿之職掌四庫書籍守扄鑰以伺明命侍書之職明習六書之法凡遇上書則侍左右以備考訂㸃畫音聲待詔之職凡遇上宣問文議以備呼召編摩謄冩等事亦如之史官之職修撰掌撰述編修掌纂輯檢討掌檢閲凡史事俾專掌焉孔目以首領為職掌言語趍走㑹計籍書之事粤自吴元年置本院以來官不必備惟侍從儒學之臣最重必如所謂明仁義禮樂通今古亂治文章議論可以决疑定䇿論道經邦者始可以處之故洪武永樂宣徳間雖待詔孔目不輕授人凡居是職者咸知自重若遽謂官雖有異名其實無異職諰諰焉而有出位之圖殊失所以肇建官之意也若乃國史不别置院者嘗考周官掌王之八柄之法以詔王治凡命諸侯及孤卿大夫則䇿命之丘濬曰八柄詔於冢宰内史復掌以詔王盖史官公論之所出爵祿廢置殺生予奪之柄有所不公直以筆之吴徴謂内史為翰林之職盖以其命諸侯公卿大夫則䇿命之猶命學士之草制詔也然謂之史乃掌文書賛治之名今制併史舘於翰林其亦此意歟然則聖祖命官之意正與成周嫓隆非徒逺過唐宋而已詹事洪武初建大本堂延名儒以教儲極與藩王此東宫輔導之始也後乃設輔導官屬有同知詹事院事副詹事左右詹事詹事丞左右率府使副使同知左右率府事諭徳賛善文學中舍正字侍正洗馬庶子等官皆以勲舊大臣兼之不别設府僚又改賛善為賛善大夫設賛讀洪武三年十二月禮部尚書陶凱請選人專任儲宫官屬罷兼領之職庶於輔導有所責成於是諭以父子一體君臣一心之意遂止十年置通事司設司令司丞十四年三月丁未設左右司直郎十五年設左右二春坊又設司經局二十三年置詹事院以統屬之二十四年七月丁未改院為府定設詹事一人正三品少詹事二人正四品丞二人正六品首領官主簿一人從七品錄事二人正九品二十九年十一月壬戌増設屬官通事舍人二人從九品改錄事亦為從九品其堂上官與本院官互兼職事而凡講讀纂修考試等官皆與本院同坊局雖各有印然事則詹事府統之南京詹事府今不設官止設主簿一貟盖詹之為義省也給也省給太子之家詹事之職於内外衆務無所不掌少詹事則貳之丞則掌文書以賛之通事舍人掌通謁賔賛禁令之事主簿掌勾稽錄事傳遞云春坊洪武初置春坊以為儲宫輔導侍從之臣官無定貟至十五年四月丙申更定春坊為左右春坊置左春坊大學士一人正五品左庶子一人正五品左諭徳一人從五品左中允二人正六品左賛善二人左司直郎二人俱從六品右春坊同二十九年十一月壬戌増設左春坊清紀郎一人從八品左司諌二人從九品右春坊同亦與本院互兼職事盖二坊之設猶舘閣也大學士綜勸學輔徳文翰記註之事庶子掌宫中并諸藩之適子及支庶版籍行則負璽護駕拜則左右扶掖之諭徳掌侍從賛諭中允掌侍從禮儀較正啓奏并監藥理刑賛善掌侍從翊養司直掌彈劾繩紏皆漢唐以來舊制清紀掌伺察司諫掌諫諍過失其設也自我洪武朝始司經洪武十五年四月丙申置司經局設洗馬二人校書二人正字二人二十三年六月命定司經局官制禮部考唐制言太子司經局洗馬從五品校書正九品正字從九品其餘職官祿各有差洪武祿増多於唐宜從裁减詔正字洗馬而下官秩依唐制其俸祿則從時制二十四年七月丁未定司經局官品秩俱仍其舊按典置經局自南梁其後隋改司經局唐為桂坊洗馬之洗言先也遇東駕出則前驅導威儀也掌圖籍經史之事校書掌讐校經籍正字掌刋正文字與本院互兼職事正字或中書科兼之制誥國初百官除授各有誥勑循宋制也吴元年授翰林侍講學士宋濂制有曰備顧問於内廷叅宻命於翰苑又曰議禮作樂郊廟所資修已及人國家所尚擢登玉署侍講彤闈鳳池兼掌于絲綸麟史仍叅于筆削地天交泰有資翊賛之功雲漢昭回共致文明之治洪武元年正月庚子授翰林學士陶安誥有曰國家之立必有一心之臣尊戴匡輔用能張其紀綱植其表儀正其名位善其辭命基圖以大國家以安又曰開翰苑以崇文治立學士以冠儒英重道尊賢莫先於爾是用擢居宥宻俾職論思兹特賜以寵章用昭國典尚其勤於獻納賛我皇猷綜理人文以臻至治其眷注隆重如此嘗攷翰林之名昉於揚雄所為賦學士出禮凡學世子及學士必時唐人始以命官所謂待詔供奉北門學士與學士院亦惟以言語文字為職未見其為國家輕重也宋元因之至我朝倚任益重凡議禮制度考文大柄一以付之論道經邦碩輔由此其選而政之樞要史之權衡皆所綜焉觀諸誥命詞有足徴矣又按永樂末仁宗即位大學士楊士竒等進陞少保本院以士竒等所受誥進呈乃親取筆重増二語曰勿謂崇髙而難入勿以有所從違而或怠顧士竒等曰此實朕心卿其勉之士竒對曰聖徳能容臣等敢不勉昔富弼有言願不以同異為喜怒不以喜怒為用舍成湯改過不吝所以為聖人願今常以古人為法吾皇上下之交真若元首股肱相須而成是又萬世聖子神孫所當鑒也御箴宣宗章皇帝宣徳七年六月親製翰林院箴其文曰廷有司言自周則然後世襲用愈宻而重䇿命所出講學所資機務之嚴于度于咨代有賢哲博聞明識克勵翼之用光厥職咨爾儒臣朝夕左右必端乃志必慎乃守啓沃之言惟義與仁堯舜之道鄒孟以陳詞尚典實浮薄是戒謀議所屬出毖于外心存大公罔役于私昔人四禁汝惟勵之獻納論思以匡以益以匹前休欽哉無斁大哉綸言表彰萬世守官者所敬遵也今揭于院之後堂朱髹漆榜字用金塗之公署公署為聴事而設吴元年建官以本院為近侍衙門故公署雖在外而寮屬相聚恒在舘閣洪武初建翰林院於皇城内學士而下晚朝退即宿其中扁曰詞林其後兼考唐宋制度詔改建于皇城東南宗人府之後詹事府居其次洪武二十六年十月興工至二十七年十月辛巳告成䛇皆賜宴落之今為南京翰林院永樂中行在本院官仍在禁内供奉不别立公署正統七年八月有詔復建於京師長安左門外玉河西岸鑾駕庫之右而東岸則為詹事府焉命中官陳姓者督工踰年落成正堂三間中設大學士學士侍讀學士侍講學士公座左為史官堂右為講讀堂首領官房在儀門之外之右學士楊溥輩為詩記其事然同寮相與毎朝畢本院官立東閣前竢大學士至入閣中講讀史官皆序立圜揖而退五經博士而下揖于閣外出復序立于史舘前亦圜揖揖畢各書公㑹乃入舘修書待詔諸寮日昃而出公署惟履任齋宿始一至若掌印官查理公移收放俸糧則蒞院視事按唐制翰林院在銀臺之北後復建東翰林院於金鑾殿之西因曰鑾坡盖随乗輿所在而遷取其便耳正㕔曰玉堂中設視草臺毎草制則具衣冠據臺而坐後以車駕經幸不復如此但存空臺而已玉堂云者漢有玉堂殿待詔金馬門近之李肇翰林院志言居翰苑者皆謂凌玉清遡紫霄豈止於登瀛洲哉亦曰登玉堂焉然未有榜至宋太宗乃御翰書飛白玉堂之署四字賜之今制雖不盡然私記往往猶曰玉堂視草用故事也嘉靖戊子始建御製五箴碑于敬一亭亭樹于堂之南左則劉文定井井之外為蓮池右則柯竹岩亭亭之前為土山朝房本院朝房在午門右第六區每候朝則殿閣大學士本院學士講讀官史官皆在焉詹事府朝房在午門左第十八區每候朝則詹事少詹事府丞左右春坊官司經局官皆在焉皷初鳴嚴各詣棕蓬下序坐候皷終嚴而入其後本院學士候朝亦在詹事府朝房成化中學士王獻掌院始奏聞復取内侍之署又有外朝房在長安左右門外以待漏云史館聖祖初建國爰重史事設起居注甲辰年十月以宋濂魏觀為之日侍左右記言動及正位後劉季道由明經任郭傳由翰林應奉任范常由直學士任蔣學閻鈍蔣子杰由舉人任熊鼎由考功博士任陳敬由編修任未幾革之洪武十四年九月己丑詔復置起居注秩從七品以儒士單仲祐任焉二十四年詹同猶為起居注其後竟廢令本院史官兼之每朝則立班記事入舘則載筆以從書動以為日厯書言以為寳訓永樂中王直在翰林猶從事於記注宣徳後寖以廢矣今史舘凡十所在東閣之右中藏列聖實錄古今書史每被命修書則本院官日聚集焉成化𢎞治中臣僚累建言欲復起居注之舊或欲即命史官記時政於其中如宋朝政房之制皆未舉行夫世之門生故吏於其所尊事者猶編有語錄談記矧聖神盛徳大業焜燿如日星胡可無述乎在洪武時日厯寳訓常勤刪述其舊跡猶有可尋者祖宗舊制所當復也視本院印信係銅鑄方二寸四分厚四分五釐九疊文其在南京者則加南京二字詹事府亦銅印方二寸七分厚六分左右春坊司經局銅印制度俱與本院同文淵閣别有印其印銀鑄方一寸七分厚六分其文玉筋篆文也各衙門印皆用於行移中獨内閣印惟機宻文字鈐封進至黻座開拆始用之近世訛傳此印為司禮監所奪甚或形諸章奏歸咎三楊盖不考之過云文移本院公文凡行六部用呈三品衙門用平關應有行移俱由該部轉行其呈關俱有定式見大明㑹典其他常務則用手本如官吏職役銓注給授散官勲階則行吏部俸糧則行户部領朝叅牙牌行禮部關皂𨽻柴薪則行兵部俱用本院印若左右二春坊司經局每事或呈行詹事府或徑行不相關白云序秩本院官與詹事府坊局官多互兼職事以品秩尊卑為序若非兼職而品秩同者先書本院官然後及詹事府坊局官如學士則序于春坊大學士及庶子之上侍讀學士侍講學士則序于諭徳之上侍讀侍講則序於府丞中允之上修撰則序于賛善司直之上典籍先清紀待詔先司諫錄事通事舍人盖亦然也此為修書考試等事書職名而言若平居相與則惟序齒㑹坐公朝凡侍坐公讌序坐本院官及詹事府坊局官皆以品級論若候朝入舘則學士自為一𩔖講讀史官自為一類宫坊官僚亦以其類相叅天順以前為然厥後座主門生頗妨起居乃以一科為一類序坐惟以齒不以官李東陽田今之諸曹百執事各有長屬以法相視事有禀白唯唯而退候事竣輙俛首去不敢漫及他其勢分懸絶固殊也惟舘閣以道徳文字為事雖師保耆宿位尊望重亦與後進相賔主誾誾侃侃各中其度喜有慶行有餞倡和聮屬亹亹不厭此詞林盛事也殿閣詞林記巻十一
