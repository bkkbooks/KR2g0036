body:
  text: 殿閣詞林記卷二明廖道南撰殿學華蓋殿大學士李賢李賢字原德河南鄧州人宣德癸丑進士初授吏部驗封主事歷考功文選郎中景泰初上正本十䇿曰勤聖學顧針警戒嗜欲絶玩好慎舉措崇節儉畏天變勉貴近振士風結民心景帝嘉納辛未之嵗額森遣使通好賢上言請修戰守之備識者韙之是歲冬擢兵部侍郎癸酉轉户部侍郎上言額森近殺其主併吞諸夷宜敕沿邊諸將勵兵觀釁于謙壯其言甲戍轉吏部侍郎上鑑古録英宗復辟召入內閣陟吏部尚書兼翰林院學士時太監曹吉祥忠國公石亨恃迎復功驕恣不法言官紏之曹石懼訴于上乃下徐有貞暨賢於獄未幾謫福建布政使吏部尚書王翺召見便殿白之復以為吏部侍郎值承天門災詔復尚書學士仍入內閣賜玉帶以奬之上問郕邸汪后左右欲以殉葬可否賢對宜生存之以全其子母又問建庶人久幽大內欲赦出之左右以為不可賢對宜從恤典以示濊恩又問吉祥干預國政四方奏報先造其門賢對權不可下移又問石亨當時迎復卿何不預賢對奪門無以訓後上竦然大悟乃遷汪后於别宫建庶人於中都曹石之黨益加禁束凡冒功四千人悉禠職朝廷始有紀綱先是命修一統志充總裁官至是賜第於詹事府之東庚辰博囉擁衆寇大同及涼州莊浪賢上安邊五事辛巳曹吉祥從子欽謀不軌焚東安門殺都御史寇深錦衣指揮逯杲傷賢臂迫令草疏請罪上聞賢在甚喜欽伏誅加太子少保癸未上以足疾不視朝時郊祀將至欲遣官代行禮賢對以為不可上力疾至齋宫成禮而還母后胡氏號靜慈仙師非典賢對宜加崇以全仁孝上從之二月晦空中有聲賢奏無形有聲謂之鼓妖上不恤民乃有此異遂上十事一曰欽恤淹禁二曰禁止銀場三曰停嵗造紙劄四曰蠲被災糧稅五曰弛芻粟之徴六曰罷虧損馬匹七曰戒邊臣撫兵民八曰命有司恤流移九曰飭御史紏貪吏十曰禁外官科斂詔頒行之是時錦衣指揮門逹擅權道路以目誣搆袁彬并及於賢上亷知其故不問甲申春正月上不豫賢受顧命惟謹憲皇登極加少保吏部尚書兼華蓋殿大學士知經筵事進光祿大夫柱國丙戌以父憂奪情復任修撰羅倫抗疏論之上怒左遷倫於嶺表賢復上八事命所司議行之踰月卒贈太師諡文逹官其子璋為尚寶丞廖道南曰子觀天順日録乃知賢之相業僅有此耳及觀國史謂徐有貞既去賢獨留被眷英廟每視朝畢左右顧則呼賢與門逹語良久乃巳時召入文華有所咨詢言無不從自三楊以來得君未有如賢者然而海內之士奔走匍伏以干恩澤者紛如獨立不懼惟一羅倫而巳於乎難哉贊曰賢哉賢也志可則也遇主於巷重納約也始扼曹石繼門逹也豶豕之牙勿躑躅也得專行久茂功烈也賢哉賢也胡可埓也謹身殿大學士商輅商輅字𢎞載浙江淳安人宣德乙卯鄉試正統甲子會試明年廷試皆第一授修撰丁卯英廟命選詞臣十八人進學東閣輅預焉巳巳景帝簡入內閣轉侍讀是時北邊告警閩浙盜起奏牘填委輅悉心剸裁績效居多景泰庚午進學士太上皇北還輅迎至居庸關伏謁命致書兩宫及皇太弟壬申遷兵部侍郎兼左春坊大學士仍兼學士賜以居第丁丑英宗復辟石亨輩嫉之坐除名成化丙戌復入內閣首言八事咸切時政戊子慈懿皇太后崩百官爭禮輅上疏定祔葬儀從之是嵗陟兵部尚書時皇莊甚為民厲輅言天子以天下為家何以莊為丁亥六月戊申輅上言八事一曰勤聖政二曰納諫諍三曰儲將才四曰飭邉備五曰汰冗濫六曰廣蓄積七曰崇聖道八曰謹士習上嘉納之改户部尚書仍兼前職癸巳宋元通鑑綱目成進文淵閣大學士丙申加太子少保改吏部尚書值幸臣有欲建玉皇祠於掖庭者輅爭以為不可宫門災工部請命中官鳩材於楚蜀輅又爭以為不可俱從之丁酉兼謹身殿大學士時中官汪直開西厰大肆羅織屢起巨獄百官驚恐輅上疏略曰近日伺察太繁政令太急刑網太密人心􅍅􅍅各懷疑畏蓋緣委聼斷於汪直一人而直又寄耳目於羣小如韋瑛王英輩傷害良善虧損國體非所以示大觀於天下也疏入上震怒命司禮監官懷恩至閣輅曰汪直違祖宗法壞朝廷事法所必誅而不以聼恩曰此疏誰其草之衆皆曰直罪滔天使輔臣不言天下必有言者與其使天下言孰若二三人言之恩具入奏上即命罷西厰由是見忤於直會前輔臣楊榮曽孫曄罪逮至京語連及輅直從中主之輅遂乞休加少保賜璽書給驛以歸卒贈特進榮祿大夫太傅諡文毅子良臣舉進士為翰林侍講良輔為刑部主事孫汝謙為尚寶寺丞廖道南曰豫以閼逢敦牂發練浦泛清溪艤棹桐江眺望文毅之廬萬峰回合千巖蜿蜒意其為間氣所鍾也及讀國史乃見其諸疏侃侃有大節於乎宋之王旦王曽宋庠俱以三魁致位宰輔若文毅者視古先哲何如耶贊曰三魁華名士林所稱三孤崇秩官針所評德不孚名奚名之榮勳不孚秩奚秩之尊允也文毅大節峥嶸龍山岋嶫桐江渟瀠誰其薦之明德惟馨華蓋殿大學士萬安萬安字循吉四川眉州人正統戊辰進士選庶吉士授編修景泰初以易儲遷左春坊司直郎轉右中允改尚寶司丞兼編修天順戊寅改侍講侍皇太子講讀進學士成化改元預修英廟實録升少詹事兼學士巳丑遷禮部侍郎兼學士入內閣尋陟禮部尚書加太子少保改户部尚書兼文淵閣大學士孝宗出閣改吏部尚書加太子太保光祿大夫柱國少傅兼太子太傅尋加少師兼太子太師華蓋殿大學士初昭德貴妃萬氏侍憲廟於儲邸其父貴為諸城邑吏至是以妃貴授都督兄通亦為錦衣都指揮權寵震耀通妻王氏出入掖庭安喜同姓隂使人結通之妻往來於家為進妖僧繼曉以固其寵時江右李孜省亦以小吏能幻術與其徒鄧常恩俱驟蠟要津安托孜省鄉宦彭華深相結納凡附巳者百計援之異巳者百計去之一時詞臣若禮部侍郎邢讓祭酒陳鑑而方正之士如王恕馬文升耿裕秦紘皆相繼斥逐雲南土酋曩罕弄與木邦爭搆據寶林以叛入賄於安安啖其利即授以安撫而邊釁日積凡若此類恬不為怪舉朝側目莫敢顯訟其過庶吉士鄒智與安同鄉憤其所為率同館士吉人李文祥上疏發其姦御史湯鼐文貴薑洪各相紏劾孝宗在東宫稔聞其惡至是於宫中檢獲所進房中書遣太監懷恩携至內閣示之每展一卷安即跪泣乞哀猶無去意復令懷恩摘其所懸牙牌安始慚懼告退至中途尚占中台冀復用卒贈太師諡文康其子翼為南京禮部侍郎孫𢎞璧為編修俱淫恣不檢類其父云廖道南曰豫讀國史見成化間傳升乞升冒濫名器者無慮數千固巳訝之及閲萬氏本傳安據內閣二十餘年嫉侮忠正深於仇讐保飬姦回切於骨肉觀其結萬通李孜省輩以隂為之援而又斥逐鄒智吉人輩以陽張其勢自古權姦之禍人家國類如此易曰開國承家小人勿用可不鑒哉贊曰唐之林甫天寶召亂宋之似道紹興啓變斫尸函首國有顯戮安何人斯獨保完福不於其身於其子孫覆宗墟戾是曰天刑華蓋殿大學士文穆公劉吉劉吉字祐之直𨽻博野人正統戊辰進士選庶吉士授編修景泰初侍經筵預修寰宇通志轉修撰天順中侍東宫講讀預修一統志進侍讀成化初英廟實録成升侍讀學士尋擢禮部侍郎巳丑簡入內閣兼學士丁酉陟禮部尚書戊戌加太子少保文淵閣大學士壬寅守制詔起復之修文華大訓成加太子太保武英殿大學士給一品誥命甲辰改户部尚書謹身殿大學士𢎞治改元進少傅兼太子太師吏部尚書知經筵事巳酉二月吉率同官上言邇者姦徒欲效李孜省鄧常恩之故術見月宿在畢天將隂雨乃奏請祈禱幸而有中以希進用謹按詩云月麗于畢俾滂沱矣書云月之從星則以風雨今月宿在畢雨降之徴也臣恐幸門一開爭言祈禱啓釁召亂咸基於此所有祝文臣等不敢奉命庚戌吉率同官上言邇者妖星出天津歷杵臼近營室考之圖志為兵為飢為水旱矧今南海修垣汝河修橋俱非急務宜停止以答天戒上嘉納之辛亥憲廟實録成加少師兼太子太師華蓋殿大學士壬子修撰張升上疏訟之吉遂致仕卒贈太師諡文穆令其子臯為太常少卿廖道南曰豫讀國史謂吉沉毅能斷伹所與遊者多讒夫以故不聞其過廷臣不協於巳者隂嗾言官劾之乏休休之量及讀月畢天津之疏又有不可撓者其然乎其不然乎贊曰博野之墟大川平原篤生哲士為國鼎鐺首斥異端愈堅直節星彗于津月麗于畢國史有言匪直也人城府深密有靦名臣華蓋殿大學士徐溥徐溥字時用常州宜興人景泰甲戌進士及第授編修天順丁丑兼司經局校書侍東宫講讀成化紀元遷左庶子兼侍講充經筵講官兼纂英廟實録甲午擢少詹事兼侍講學士乙未主考禮部會試庚子轉太常卿兼學士辛丑再典會試擢禮部侍郎丙午改吏部孝宗登極簡入內閣陟禮部尚書兼文淵閣大學士總裁憲廟實録同知經筵庚戌復典會試辛亥加太子太傅户部尚書武英殿大學士時岷藩訐奏知州劉遜詔逮繫言官救之俱下獄羣議􅍅􅍅溥力救之甲寅加少傅兼太子太傅吏部尚書謹身殿大學士進光祿大夫柱國乙卯命撰三清樂章溥率同官上言天子祭天地夫天至尊無對故禮以少為貴祭不過南郊時不過孟春牲不過特牛漢祀五帝儒者非之况三清乃邪妄之説謂一天之上有三大帝乃以李聃居其一是以人鬼列於天神非禮也至於郊祀樂章皇祖舊製今所傳樂章雖載永樂大典是書博采弗精不可以黷禮臣等誦習儒書若邪説俚曲尤所不習且初設文淵閣命學士居之者實欲其謨謀政事講論經史培飬本原弼正闕失非欲其阿諛順旨以取容悅也疏上上即從之丁巳總裁會典以疾辭戊午武宗出閣加少師兼太子太師華蓋殿大學士尋以目眚乞休卒年七十二贈特進左柱國太師諡文靖李文正公銘其墓曰瑞雲山髙荆水清元氣下結扶輿精公居太史官列星文章作緯禮作經入掌帝制持邦衡補衮五色山龍形廟堂髙古坐不傾一朝令出民弗驚調齊甘苦成和羮四方士類歸陶型悉遣襟佩為冠纓尺量寸度桷與杗大者梁棟當朝廷公心不倦亦不矜盡弭怨謗消讒爭功成身退古有恆公歸自保哲且明君寵極重臣身輕飄然乘風遡髙冥山迎水徯如平生廖道南曰子觀李文正公年譜見𢎞治間所上章疏皆出其手而溥能用之及讀國史稱溥立朝四十餘年因事納約隨才器使屢遇大獄保全善類從容委曲溫易充裕乃知曹參丙吉雖不踰於陳平魏相而培飬國家元氣又不在彼而在此也十八年之治固有由哉贊曰周至成康厥治迓衡三后同心篤亮真誠漢至文景厥政底平萬石同德渾朴堅凝如文穆者其忱其恂既無勇功亦無智名十八年中協氣氤氲於乎寧靜鮮見其倫武英殿大學士邱濬邱濬字仲深廣東瓊山人正統甲子鄉試第一景泰甲戌進士選庶吉士授編修時兩廣用兵經年不決濬條列事宜李文達公一見即代上之英宗嘉嘆付所司舉行憲宗登極充經筵講官轉侍講預修英廟實録成進侍講學士續修宋元綱目升學士濬自出巳見撰史略名曰世史正綱有禆世教會祭酒缺僉謂非濬不可乃加禮部侍郎掌國子監事復撰大學衍義補一書以獻上褒答之尋陟禮部尚書掌詹事府事修憲廟實録充副總裁官加太子太保兼文淵閣大學士上時政疏略曰成化間彗星三見遍掃三垣地震無慮五六百次邇者彗見天津地震天鳴無虛日且異鳥三鳴於禁中考諸經史天變莫大於彗孛在三垣三台尤為重地變莫大於震動在京師邊防為急矧禽鳥動物得氣之先春秋二百四十二年書彗孛者三地震者五飛禽者三今乃屢見於二十五六年之間變不虛生必有其應天人相與甚可畏也臣願體上天仁愛念祖宗基業端身以立本清心以應務謹好尚勿流於異端節財費勿至於耗國公任用勿失於偏聽禁私謁以肅內政明義理以絶神姦慎儉德以懷永圖勤政務以𢎞至治庶可以回天災消物異帝王之治可幾也疏凡十餘萬言上命諸司議行未幾加少保兼太子太保改户部尚書武英殿大學士以目疾辭不允卒贈太傅特進光祿大夫左柱國諡文莊官其孫畇為尚寶寺丞程敏政敘其集曰先生懼學者之無本也有學的之編懼學者之不知變也有史綱之作懼學者之明體而不適於用也有大學衍義之補其言鑿鑿可行行之可以興治致吾君於堯舜使吾道不為空言蓋其志如此蔡清祭之曰先生博極羣書如巨海之吞吐百川含𢎞無際其才華國名世者四十年晚際聖明登之台輔取其所著書於大內以廣聰明權衡百度其道尊為國師門生學子遍天下矣自瓊崖以來所鍾人物未有如先生者於乎其不為虛生也巳廖道南曰國朝洪武建文間時則有若劉伯溫之閎大宋景濓之浩博王子充之醇正方孝孺之爾雅永樂宣德間時則有若解大紳之雄放胡光大之豪宕楊文貞之精密金文靖之沉渾正統景泰間時則有若李忠文之朴茂劉文安之該核然皆麗藻豐腴未有若邱文莊之明體適用酌古凖今褎然為一代文宗也自是以後若程篁墩李文正諸公蓋聞文莊之風而興起焉者或乃以劉文泰之誣而病之於乎豈知文莊者哉贊曰瓊海浩瀚珠崖渺茫含靈鳩和誕生文莊矯矯若人萬夫之傑牛毛繭絲劍光玉潔衍義有補世史有綱潤色皇猷禆益典常我髮未燥誦習仰止布帛菽粟有禆國紀華蓋殿大學士劉健劉健字希賢河南洛陽人天順庚辰進士選庶吉士授編修成化中轉修撰遷左春坊左庶子𢎞治初升禮部侍郎兼學士簡入內閣總裁憲廟實録成陟禮部尚書兼文淵閣大學士甲寅進榮祿大夫武英殿大學士巳未加光祿大夫柱國少傅兼太子太傅户部尚書謹身殿大學士庚申健率同官上言自古願治之君必早朝晏罷日省萬幾祖宗視朝在黎明以前每日奏事二次邇者視朝太遲散本或至昏黑四夷朝貢奚示觀瞻庶府文移多致寢閣矧今各邊啓釁四方荐災尤為可慮怠荒是戒勵精是圖庶可以回天意慰人心也孝宗嘉納尋加特進光祿大夫少師兼太子太師吏部尚書華蓋殿大學士辛酉健率同官上言近有旨中官往武當山設像挂幡修舉齋醮命臣等撰敕并祝文竊聞兹山宫觀像設巳極壯麗若復差官實為無益矧今災異迭出生民困苦苖賊肆亂軍旅方興糧餉供餽猶恐不給君門萬里豈能悉知宜斥邪妄以遏無良甲子健率同官上言近有旨欲於朝陽門外修建夀塔臣等竊惟人主信佛莫梁武帝為甚卒飢死臺城信老莫宋徽宗為甚卒囚斃金地本以求福反以致禍觀諸往事可為明鑒我祖宗相傳以治天下者堯舜周孔之道而巳似此異端蠧射惑衆何關於治欲造佛塔非所以訓天下垂後世也又令撰真人杜永祺等誥命及封號臣等竊惟異端不可信誥命封號不當與夫誥命朝廷所以奬貞勵能雖卿士大臣必待秩滿考最乃得頒給况祖宗廟號不過十六字親王及文武大臣有功德者諡號止一二字此輩何賢何能封號多至十八字流布朝野傳聞後世皆曰此朝廷所給與儒臣所擬撰也天下後世其謂之何俱報罷毅皇履極詔健總裁孝廟實録加左柱國食正一品俸倚毗甚隆健亦盡言無諱未幾焦芳媚劉瑾以健同鄉不附巳遂力攻之健居家遭目眚年九十餘卒廖道南曰𢎞治間豫從先大夫遊京邸飫聞文靖劉公當國正色率下凡諸僚宷謁私宅者不與交一言及入朝事關大義纍幾千言不缺及子登甲科列史館公尚無恙卒無一言干求恩澤豈古之所謂大臣與贊曰嵩嶽峨峨汴河湯湯伊洛瀍澗回繞北邙惟彼東都元氣攸萃爰有大老鍾兹間氣耿耿大節侃侃正言力詆邪説中扼權姦公考正命公神不死以道事君不可則止華蓋殿大學士李東陽李東陽字賔之湖廣茶陵人曽祖文祥以戎籍𨽻金吾遂居京師文祥生允興允興生淳淳生東陽蚤負竒氣四嵗能作大書景帝召見抱置膝上賜上林珍果及內府寶鏹六嵗八嵗復兩召之試講尚書大義命肄京庠天順壬午年甫十六舉順天鄉試甲申登二甲進士第一選庶吉士授編修甲午轉侍講癸卯進侍講學士甲辰充東宫講讀官丙午主考順天鄉試𢎞治巳酉遷左庶子兼侍講學士辛亥預修憲廟實録成升太常少卿仍兼前職掌翰林院事充日講官癸丑主考會試得汪俊為第一甲寅擢禮部侍郎兼侍讀學士典誥敕乙卯命兼文淵閣大學士預機務時安南侵占城國奏請命官往問上欲從之東陽會同官上疏曰春秋王者不治夷狄安南雖奉正朔修職貢然恃險負固積嵗巳久今若遣官往至其國海島茫茫徒掉寸舌小必掩過飾非大或執迷抗命若置而不問損威巳多若問罪興師貽患尤大宜勿聽丁巳秩滿賜金犀帶時中官李廣以燒煉齋醮被寵東陽覆會同官上疏曰我祖宗自洪武至天順年間面召儒臣咨議政事今朝參外不得一覲天顔且經筵日講成就君德禆益治道今每嵗進講不過數日夫人君之心必有所繫不繫於此必繫於彼正士既疏則邪説乘間而入近有以齋醮燒煉進者此乃異端惑世之術聖王之所必禁宋徽宗崇信道流及金兵圍城方士郭京誑稱作法卒使乘輿播遷社稷顛覆求福不得反以致禍至若燒煉其禍尤慘金石之藥性多酷烈一入腸腑為禍百端唐憲宗藥發致疾雖杖殺方士柳泌竟亦何益今上清龍虎宮神樂祖師殿及畨經厰皆焚燬無遺神如有靈何不自保天厭其穢亦已明甚昔李絳有言憂先於事可以無憂事至而憂無益於事矧熒惑失度太陽無光天鳴地震草妖木異四方奏報殆無虛日伏望嚴早朝之節復奏事之期勤講學之功優接下之禮逺邪佞之人斥誣罔之説太平之業可保矣時武岡知州劉遜逮繫科道會奏上震怒俱下獄東陽覆同上疏救之上為霽威召至平臺奏事始復舊制戊午皇太子出閣加太子太保禮部尚書五月復召問親定團營總兵官九月清寧宫災東陽上疏曰近年以來災異頻仍內府火災尤甚或以為天道茫昧變不足畏此乃慢天之説或以為天下太平患不足慮此乃誤國之言或以齋醮祈禱為弭災此乃邪妄之術或縱囚釋罪為修德此乃姑息之術熒惑聖聽莫此為甚且賄賂公行賞罰失當紀綱廢弛賢否混淆工役繁興軍民困憊下情不達上澤不宣愁嘆之聲上干和氣災異之積正此之由越二日有為李廣乞祠額者東陽以為不可又召能仁寺僧入大內慶讃東陽又以為不可上俱從之巳未程敏政典試給事中華昶劾之命東陽覆試壬申會典成賜玉帶甲子命祀孔子於闕里還朝上時政疏上命有司議行乙丑上不豫召入玉几前受顧命武宗登極加光祿大夫柱國兼太子太傅户部尚書謹身殿大學士丙寅上􅌒於政東陽上疏曰近日視朝太遲免朝太多奏事漸晚嬉遊漸廣夫奢靡玩戲非所以崇儉彈射釣獵非所以飬仁鷹犬狐兔田野之物不可育於朝廷弓矢甲胄戰鬭之象不可施於宮禁使正人不親直言不聞而此數者交雜於前臣竊憂之矧六月中旬風雨飄蕩雷霆震怒正殿鴟吻太廟脊獸天壇樹木禁門房柱摧折燒毁災異尤甚惕然省悟側身勵精庶可以回天慰人國家之福也不聽復上疏曰先帝顧命惓惓以陛下為託臣痛心刻骨誓以死報邇者地動天鳴五星凌犯星斗晝見白虹貫日羣災疊異併在一時歷觀載籍偏閲古今未有如此而不亂者且詔令廢格變易殆盡憂在於民生國計若罔聞知事涉於近幸貴戚牢不可破或旨從中出略不預聞或有所議擬徑行改易臣若諉顧命之名不盡輔導之責天下後世其謂臣何不報又上陳政令十失上付諸司議革之十二月加少師兼太子太師吏部尚書華蓋殿大學士丁卯劉瑾擅權適尚寶卿崔璿御史姚祥主事張偉為邏卒誣執枷號於長安門外東陽上疏力救之命戍邊時聞內苑御船獵獸上疏曰今嵗自端陽後金鼓炮火聲徹都邑廄牧厮役紛充禁廷大臣畏忌不敢言小臣震懾不敢諫不知祖宗分職設官朝廷糜祿飬士將焉用之昔漢司馬相如諌繫熊豕以為逸羣之獸輿不及還轅人不暇施巧非天子所宜近薛廣德諌御樓船以為乘船危從橋安聖主不乘危伏望鑒古道以端好尚視朝加早則炎暑不侵進膳有時則元氣日盛上褒答之戊辰六月給事中安奎御史張彧忤瑾枷號東陽又上疏救之都御史楊一清逮繫至東陽又力救之是月早朝有投空名文書數瑾罪者疑羣臣所為悉逮問詔獄東陽又力救之庚午六月旱霾東陽上疏曰近時威令大行中外悚懼但霜雪之後必有陽春雷電之餘必有甘雨此天道所當法也臣謹條上一曰寬逃軍拐馬之罪二曰寬僉書職員之罪三曰寬查盤糧草之罪四曰禁官校羅織之非疏上會慶府置鐇叛命太監張永同都御史楊一清討平之師旋獻俘永發瑾姦狀上即命擒之以東陽有反正功加特進左柱國廕其從子兆蕃為尚寶司丞覆上疏曰天下者祖宗之天下上天所付託生民所仰賴高皇帝櫛風沐雨十餘年而後定何其勞也文皇帝南征北伐定鼎貽謀亦二十餘年而後成何其難也列聖相承兢兢業業罔有怠荒先帝顧命惟欲陛下早嗣大位早成大婚光前裕後衍無疆之澤聖慮所及何其深且逺也臣願念上天付託者重思祖宗授受者隆體生民仰賴者切每於朝奏講讀之暇安處宫闈溥施恩澤起居以節遊豫以時保養天和培植國本則六氣莫能侵百邪不敢近矣不報時巨冦劉陸等衆至數十萬東陽晝畫宵籌卒致底定加廕一子為錦衣指揮上疏力辭上以京軍不習戰陳欲調邊軍入衛京師東陽上疏陳其十不便狀不聽遂乞休賜之敕曰君臣相遇自古為難卿資稟神異慧悟夙成爰自童年召見中禁應制稱旨名動四方遂以宏博之學蜚英藝苑資歷既深聞望彌重逮我皇考擢居政府朝夕獻替便殿延訪平臺賜問有懷必吐無言不從不激不隨無私無比顧命付託感激知遇益竭忠勤委曲匡救西鄙戡亂兩河討賊廟謨勝算多所贊畫釐革敝政率循舊規樂育人才明揚善類代言宣意敷奏達情文學詞翰獨妙一時立朝五十年輔政十八年清慎之操終始不渝自古大臣兼兹衆美者代不數人屬時多艱方切倚仗乃以止足為念章數十上重違雅志特賜允俞於乎功成身退卿自處善矣國有大政將就而問焉仍廕其從子兆延為中書舍人卒年七十贈太師諡文正所著有懷麓堂藁廖道南曰子觀楊邃菴敘懷麓堂藁云高才絶學獨步一世如大河之源出崑崙至積石至龍門至底柱吞吐百川涵浴日月頃刻萬變而不知其所窮邵二泉敘續藁云盛德嘉謨澤被海內如大將御戎不聞號令一節一麾無不如意嗟乎可謂知言矣豫以為𢎞治間簿海外內泰和流行兵以不試為威財以不蓄為富刑以不措為治伊誰之力耶君子是以知文正之不可及也贊曰雲陽秀鬱皇雩蜿蜒洞庭浩渺湘水淪漣惟彼黎老端亮沉潛歷事四朝一德格天翼翼匪懈休休不專稽厥勳謨鼎石有編謹身殿大學士焦芳焦芳字孟陽河南泌陽人天順甲辰進士選庶吉士授編修轉侍講進侍講學士左遷湖廣桂陽州同知歷霍州知州四川副使調湖廣副使俱督學政上疏奏辨請雪其愆升南京右通政守制起復為通政再以憂去召入為太常少卿兼侍講學士擢禮部侍郎改吏部陟吏部尚書尋加少傅兼太子太傅謹身殿大學士性險愎始比尹旻父子尹敗坐謫其為吏部尚書時值逆瑾亂政號八黨大學士劉健會同户部尚書韓文率百僚伏闕固爭將除之芳潛通於瑾預為之所繇是劉健謝遷韓文楊守隨等相繼斥罷黨勢益熾瑾遂引芳入閣表裏為姦凡變紊成憲桎梏臣工杜塞言路酷虐軍民皆芳導之芳用事時有曹元劉宇者媚竈續貂咸溷政本芳為之奧援暨充孝廟實録總裁官筆削任意凡先正名卿悉肆醜詆授意檢討假炅以快其忿初在吏部時郎中張綵與瑾同鄉芳力薦之驟至冢宰賣官鬻爵名器壞濫其子黃中尤狂誕恣睢方廷試畢芳欲處以魁選既而衆論取吕柟為第一芳謂諸執事抑之遂入言於瑾改編修顧清等二十餘人為部屬官授子黃中為檢討及劉宇之子仁等六七人俱為庶吉士黃中尋升編修踰年升侍讀時土官岑濬沒入家口有姝色殊甚芳聞求瑾得之後卧病黃中聚麀人咸鄙之瑾伏誅言官交劾其罪父子皆褫職為民中原盜起有趙鐩者入泌陽芳僅以身免盡發其先祖冢墓無遺骸取芳衣冠被庭樹歷數其罪命劔士臠之曰使吾手誅此賊以謝天下議者謂盜賊猶知疾惡云廖道南曰夫政本之地上應台衡下司鼎鼐陳猷敷典論道𢎞化宗社安危生民休戚華夷向背世代汚隆胥繫焉軒皇六相帝堯四嶽舜之五人武王十人亦不為多湯之伊尹髙宗之傅説一二大僚亦不為少誠以大聖大賢不世出大姦大惡亦不常見也逆瑾擅權乃有如芳如宇如元者首附之遂至海內騷動宗社幾搖易曰開國承家小人勿用可畏哉贊曰豶豕之牙不可長也牯牛之童不可飬也盜而且乘致冦至也鬼載之車疑未釋也吁嗟芳乎與衆棄也遺臭萬世不可雪也武英殿大學士王鏊王鏊字濟之蘇州吳縣人成化乙未會試第一進士及第授編修𢎞治初轉侍讀遷右諭德壬子主考應天鄉試明年進侍讀學士歷少詹事兼前職丙辰主考會試又明年擢吏部侍郎壬戌陟禮部尚書知貢舉有景陵魯鐸者屢蹶科屋鏊偶閲其卷亟稱之時吳文定公為考官取鐸為省元人咸稱其知人尋簡入內閣改户部尚書文淵閣大學士先是和碩擁衆入邊詔廷議可否時馬端肅公劉忠宣公咸預廟算鏊上邊議八事一曰定算二曰重主將三曰嚴法令四曰恤邊民五曰廣召募六曰用間七曰分兵八曰出竒疏上孝宗嘉納正德紀元加光祿大夫柱國少傅兼太子太傅擬上時政四事一曰急講學之為務二曰急延下之為務三曰急用人之為務四曰急節用之為務逆瑾擅權乞休歸卧震澤作謫解以自嘲焉又自贊曰噫嘻先生何如其人窮年劬書結髮勵行白首於道茫然無聞者乎爵厠公孤官居臺閣志懷輸忠幾昧納約者乎貴戚赫炎不能附麗權璫狂猘不能媕阿一有違言超然不辱者乎遇事直前不知顧忌見利思後不知規畫歸卧空山晏然居之者乎斯人也其量則隘其才則庸無禆於世自潔其躬迹其所至蓋知慕首陽之拙而不知柱下之工知希止足之疏而不能為應變之崇者乎卒諡文恪所著有震澤集廖道南曰豫嘗過閶門登虎丘望震澤七十二峰乃見夫煙嵐杳靄魚鳥沉浮林霏合而流泉清意必有名世者出乎其間既而訪文恪之里觀震澤之書高山景行時嚮往焉嗟乎哲人巳矣贊曰百川瀠回瀦於具區萬峯綿眇會於東吳彼震澤者美人所都采芝山間葺荷水隅平泉樓閣緑野圖書春雲猿鶴秋雨鷗鳬我思若人不渝厥初武英殿大學士靳貴靳貴字充道鎮江丹徒人𢎞治庚戍進士及第授編修武宗出閣命兼司經局校書轉左中允預修會典遷左諭德兼侍講守制服闋擢禮部侍郎逆瑾用事摘會典訛失補光祿卿尋復舊職改吏部侍郎兼學士典誥敕掌詹事府事仍充日講官陟禮部尚書甲戌命兼文淵閣大學士加太子太保户部尚書武英殿大學士其在翰林同考會試及主順天鄉試者各一主考會試及授庶吉士業者各二當辛未會試時言事者發其私以家僮可勤受賄鬻題貴亦不辨及丁丑春方以病在告忽復出典會試意將示公以湔宿垢顧益致羣疑於是言官復醜詆之遂致仕卒贈太傅諡文僖廖道南曰豫嘗泛舟京口登金焦望北固指甘露翛翛然若凌雲御風而無所於繫著既而訪之里閭詢之父老多不滿文僖者及讀國史乃見其歷遭醜詆古語有云寧為玉碎勿為瓦全亶其然乎贊曰金焦屹立黿鼉所宫北固岹嶢煙雲攸崇産於其間宜廣而充豈曰無然云胡可宗龍蛇而巳奚足為容謹身殿大學士蔣冕蔣冕字敬之廣西全州人成化丁酉鄉試第一丁未舉進士選庶吉士授編修𢎞治庚申兼司經局校書遷右中允乙丑預修通鑑纂要轉右諭德兼侍講正德丙寅預修孝廟實録充經筵講官丁卯進侍講學士庚午主考應天鄉試辛未升少詹事兼侍讀學士是嵗擢吏部侍郎甲戌兼學士典誥敕掌詹事府事是嵗陟禮部尚書仍兼學士丙子兼文淵閣大學士賜玉帶丁丑加太子太傅禮部尚書兼武英殿大學士戊寅武宗北狩命內閣撰威武大將軍敕冕上疏言內閣之職其大者在代王言凡手敕旨意俱從撰擬今事出非常逺近驚疑虎豹九關言益齟齬聖駕巳出倐巳浹旬延頸北睇無䇿可施仰惟陛下受天明命為天地神人主內而中國外而四夷孰不尊稱如稱天為天稱日為日孰敢擅稱朱壽號為將軍鼎鑊在前不敢奉詔巳卯駕南巡至金陵大學士梁儲同冕扈從十二月駕旋次揚州以郊期在邇冕力請回鑾從之辛巳正月加少傅兼太子太傅户部尚書謹身殿大學士時楊廷和柄國冕與協心奉迎今上於藩邸入繼大統改元頒詔與天下更始多冕所裁定壬午賜金織襲衣及玉帶敕加伯爵冕具辭癸未冕上疏論災異及禮儀甲申致仕還湘中杜門掃軌不通賔客廖道南曰易有之雲從龍風從虎聖人作而萬物覩夫同聲相應同氣相求物固有然者矣况聖神御極風雲景從璧月珠星光彩陸離二三大臣登黃扉典綸綍爭自濯奮以先天下若冕者固亦清謹之士哉贊曰湘山之南實為桂林湘江之合煙雨蕭森有美君子篤行修名耽幽葆光悠悠古心華蓋殿大學士楊一清楊一清字應寧雲南安寧州人曽祖情仕元為經歷祖福山隱居江湖間父景起家巴陵遂為巴陵人一清幼頴異日誦數千言舉神童大宗伯姚夔少宗伯鄒幹胥器之疏補翰林秀才成化戊子中順天鄉試壬辰登進士第授中書舍人聲華籍甚擢山西督學僉事𢎞治初起復補陜西督學召入為太常少卿督四夷館轉南京太常卿壬戌嵗和碩入邉馬政廢弛乃遷副都御史督理茶馬上五事曰復金牌曰專巡偵曰嚴私販曰處茶課曰廣茶價監苑胥庇甲子巡撫陜西修復靖邊諸城莊浪諸隘及花馬池諸要害罔弗振耀乙丑關西大歉西戎北敵互相蹂躪大冦固原一清單騎馳至瓦亭驛會主帥曹雄預設伏兵冦聞宵遁隆德山正德丙寅復命總制陜西延綏寧夏甘肅諸路軍務上四事曰綏土人曰處額地曰廣招募曰溥賞賚邊土咸賴一清復經略河套河套者周之朔方漢之定襄赫連勃勃所建統萬城也唐築受降城在河套之北正統以後浸失其險既舍受降而衛東勝又撤東勝而就延綏河套為邊人之巢穴其中氷堅入套東冦宣大西冦寧固厥患無窮乃上六事其一修築定邊營迤東邊牆其二修復寧逺塞邊迤西屯堡其三增設花馬池及興武營衛所其四防禦靈州土達其五整飭韋州官軍其六增修黑山鎮逺關墩臺悉中機宜丁卯歸休丹徒逆瑾柄國逮詔獄賴大學士李文正公救免庚午置鐇據寧夏以叛仍起公總制西夏罪人斯得遂與監軍張永定䇿暴瑾罪狀武宗震怒瑾伏誅加太子少保户部尚書辛未順天應天及山東河南盜起公上疏十一事曰裕民曰增軍曰定賞格曰宥脅從曰聫鄉保曰充賞賚曰嚴罰禁曰治退縮曰察蒙蔽曰禁奪功曰防奔突上嘉納之冦平加少保兼太子太保甲戌乾清宫災一清上疏其一謂視朝太遲其二謂祀郊廟太慢其三謂創梵宇於西內其四調邉兵於禁地其五謂皇莊皇店及織造等事言多切直是年十一月加少傅兼太子太傅乙亥命兼武英殿大學士入內閣丙子上疏論遣太監劉允往西畨積忤權貴嗾姦訾毁復乞休歸丹徒嘉靖初大學士楊廷和蔣冕毛紀去位上特召用一清首疏起用謝遷時遷巳八十餘矣一清生而隱宫貌類寺人博學多術善為調停久之術窮數盡讒邪交構遂復乞休歸卒公所著有石淙集督府奏議玉堂稿廖道南曰豫為編修時直邃菴柄國見其奬拔善類練逹事幾每奏報邊情羽檄旁午一夕十疏口占指授悉合神算有訾巳者多從而揚之然門生故吏汲汲援引布置穹顯以故其門如市而其心未必如水云贊曰皤皤國老萬夫之望發迹於滇揚靈於湘首儲翰書繼督學政握機御戎振威宣令三秦底定兩都回翔國有筮龜士有圭璋政本絲綸出而復入嘉猷恆告基命宥密殿閣詞林記卷二
