body:
  text: 殿閣詞林記卷十明黄佐廖道南撰文華洪武六年開文華堂于禁中以為儲材地詔擇鄉貢舉人年少俊異者俾肄業其中正月甲寅選河南第一人張唯上召見便殿親命題俾賦詩詩成穪㫖唯及王輝李端張翀皆擢編修蕭韶為秘書監直長賜冠帶衣服又明日山東第三人王璉等見召試如之璉及張鳳任敬馬亮陳敏皆擢編修賜予亦如之受命入堂讀書詔賛善大夫宋濂正字桂彦良等分教之上謂曰昔許魯齋諸生多為宰輔卿其勉之聴政之暇輙幸堂中取其文親評優劣命光祿日給饌每食皇太子親王迭為主唯等侍食左右冬夏賜衣及金弓矢鞍馬寵錫甚厚濂輩雖司啓廸顧諸生皆上所親教不敢以師道自居一日侍燕閒詢及肄業進益濂對曰無如張唯者因備述其雋才請錄為弟子員上笑而許之盖同時進者凡十有七人又選成均之秀入武英堂俾練習政事方徴彭通宋善王惟吉等皆拜給事中禮遇雖不及唯等然侍從車駕應制被顧問未始異也其後多至執政有聲光云文淵永樂三年正月壬子成祖命學士解縉等於新進士中選其英俊者俾就文淵閣進學乃選修撰曽棨編修周述周孟簡庶吉士楊相王訓王直吴紳彭汝器劉子欽余學夔童朴盧翰熊直王道羅汝敬沈升柴廣敬王英余鼎湯流洪順段民楊勉章敞李時勉倪維哲陳敬宗袁添祿二十八人入見上諭勉之曰人須立志志立則功就天下古今之人未有無志而能建功成事者汝等簡㧞於千百人中為進士又簡拔於進士中至此固皆今之英俊然當立志逺大不可安於小成為學必造道徳之微必具體用之全為文必並驅班馬韓歐之間如此立心日進不巳未有不成者古之文學之士豈皆天成亦積功所致也汝等勉之朕不任爾以事文淵閣古今載籍所萃爾等各食其禄日就閣中恣爾玩索務實得於巳庶國家將來皆得爾用不可自怠以孤朕期待之意時庶吉士周忱自陳年少願進學上喜曰有志之士也命増忱為二十九人遂命司禮監月給筆墨紙光禄給膳禮部月給膏燭并鈔工部擇近第宅居之且命縉領其事數召至便殿問以經史諸子故實或至抵暮方退五日一休沐使内臣隨之校尉備騶從人莫不歆其榮艶上時捜竒書僻事以驗所學棨等多對誦如流者上甚喜之多所奬賚恒顧羣臣曰秀才輩性子直可親近縉嘗以鍾山龍蟠詩試諸人甚稱彭汝器所作一日上問捕蛇者說汝器即朗誦於前甚竒其才王訓以大江遶金陵賦進上最稱之具程試課業大嚴賞罰而王英王直尤為儕輩所推讓葢是時庶吉士𨽻本院者尚多如孫子良凃順李昌祺蕭省身江銕張宗璉田忠等無慮數十人皆不得與選後上親征巡狩雖有庶吉士之選如甲申例則而車駕不及親涖焉宣廟末年鋭意儲才自臨御以來三科進士數百人援其尤者凡二十八人以應二十八宿時癸丑丙辰諸進士發各衙門觀政或奉使出外詔追還選之皆入文淵閣進學其優禮給賜一循永樂甲申之制仍賜御製詩以示勉勵東閣景泰二年詔選庶吉士并首甲柯潜等二十八人命進學于東閣賜居第給大官酒饌及膏紙費命内閣大臣典領之盖不别立師不出就外公署一如永樂初科故事然車駕未嘗親涖教也五年亦選庶吉士暨首甲孫賢等十八人遂遵正統時例矣公署庶吉士在外公署教習始自正統初年内閣奏請學士等官二員教習本院仍行户部給燈油錢兵部撥皂𨽻刑部給紙劄工部撥房屋順天府給筆墨光祿給酒飯内閣按月考試俟有成效送吏部銓注本院并各衙門職事自是庶吉士教習與文華堂文淵閣時舊規不同其所撥給循故事耳今宜依祖宗時入禁中侍燕閒承顧問上以儲材蓄徳為教則下亦必涵養進修自朂不惟人才造就而君徳賛輔有攸賴焉若不得已就外教習領其事者宜奏請專使校讐中秘書曰令有所撰述暇則演習經筵講章日夕與討論古今商確經史同異得失且究竟名理歸諸身心以行誼相砥勵務得其實以為國家用若其學業髙下宜黙成之其或求見邀名則斥而退之勿收匪人以招物議則非惟育材有成效抑亦光昭祖訓也茍舍大綱先末藝以詩文記誦為學而道徳政事則忽棄焉授受之際既近於學究而乃設㑹簿稽勤惰雖嚴聲厲色以督責之亦淺之乎其待士矣正統以來在公署讀書者大都從事詞章内閣按月考試則詩文各一篇第其髙下具揭帖開列名氏發本院以為去留地致使卑陋者多至奔競有志者甚或謝病而去不能去者多稱病不往將近三年則紛然計議􅌽求解館最可笑也𢎞治癸丑學士李東陽程敏政教庶吉士至院閲㑹簿悉注病假而去乃賦一絶云回廊寂􅄫鎖齋居白日都消病厯餘竊食大官無寸補綠隂亭上勘醫書其流弊一至於此又聞之前輩云天順甲申庶吉士次年相率入内閣解館大學士李賢謂曰賢輩教養未久奈何遽欲入仕有計禮者抗聲對曰今日比永樂時何等教養且老先生從何處教養來賢稍責之即曰吾輩教習雖例該三年已燒却一年矣謂癸未春闈災故也賢怒甚明日請㫖各授職罰禮觀政刑部又數月授南京刑部主事禮之言雖近不恭然不可謂無稽者觀此則教法不克復舊久矣考選考選庶吉士始自洪武乙丑迨永樂初益重其事大率每科必選宣宗時合三科進士親試之正統丙辰英廟親選庶吉士于文華殿取蕭鎡等十二人己未以後罷之至戊辰始純選北方及蜀士為庶吉士被選者萬安等二十人不親試也自是其事付内閣例取平日所為詩文或繙閱試巻兼採名實禮部㑹同吏部試以古文暨詩合式者改送吏部讀書景泰辛未選吴匯等二十五人甲戌選丘濬等十八人皆兼選南北士天順庚辰三月上御文華殿召李賢諭曰永樂宣徳中常選庶吉士教養待用今科進士中可選人物端重語音正當者二十餘人為庶吉士止選北方人若南方人有似彭時者選取賢出以語時時疑賢欲抑南人因應之曰立賢無方何分南北賢曰果上意也奈何已而太監牛玉復傳命如前令内閣㑹吏部同選時對牛曰南方士豈獨時比優於時者甚多也是日考選取十五人南方止三人而江西惟張元禎得與焉天順甲申選李東陽等十八人自是皆兼選南北士成化丙戌選林瀚等二十四人己丑選費誾等十五人戊戌選梁儲等二十八人丁未選程楷等三十人𢎞治癸丑選顧清等二十人是科清等已發各司觀政後乃得㫖取自各司者選丙辰選顧潛等二十人壬戌選胡煜等二十人乙丑選崔銑等三十人正徳辛未選許成名等三十三人丁丑選汪佃等三十四人辛巳選道南等二十四人教書洪武中宋濂永樂初解縉皆常領庶吉士特與之講究爾未嘗抗顔為師也宣宗時親教庶吉士考其文藝與永樂時同至正統戊辰乃專命詹事兼侍講學士劉鉉祭酒王詢教書自後以為例考藝永樂中召試庶吉士文藝多入内殿宣宗嘗御文華殿召諸庶吉士試以諸葛孔明可與興禮樂論親第其髙下以鄭建為首賜寳鈔百錠餘有差盖仍永樂之舊也正統元年簡諸進士入翰林為庶吉士時蕭鎡以宣徳丁未進士需次于家久乃得召至與焉召試文華殿取鎡為首王鑑次之凡二十五人云齋宫宣徳五年三月徴庶吉士三十人分𨽻近侍諸衙門如洪武乙丑之制次日引入齋宫御試止用八人仍擇進士有文望者預試命題出取士何以得真才論吴節為首范理第二皆上所親裁在前列者賜白金五兩楮幣五十緡餘有差楊寧等詔歸鄉讀書至九年乃合選二十八人入翰林焉其在六科為庶吉士者自廖莊而下多名士正統後庶吉士止𨽻翰林然考藝出於當宁者罕矣竒童大明㑹典凡各處舉到㓜童奉㫖送本院讀書習字月給米食内閣稽考課業俟有成效奏請擢用其願科舉出身者聴按竒童被薦入翰林讀中秘書者始自正統初兵部尚書程信之子敏政及楊一清自楚舉薦李東陽自順天薦英皇出題命對曰鵬翮髙飛摶扶摇之九萬敏政云龍墀獨對陳禮樂之三千東陽云龍顔端拱位天地于兩間上首肯之成化末崇仁洪鍾七歲善書有司以竒童薦憲宗召見嘉嘆命入翰林充秀才讀中秘書恩䕃天順元年右都御史耿九疇子裕為給事中建言父子同在要地非宜遂改裕為檢討九疇尋坐事裕亦出為泗州判官正徳中大學士焦芳劉宇改其子焦黄中劉仁嘉靖中席書為禮部尚書改其弟春孫交為户部尚書改長子元俱為修撰編修等官添設洪武十六年十月増本院尚書博士二人秩從八品以儒士饒仲恭張庸為之令仲恭於潭王府説書庸於魯王府説書添說始此舉官正統元年奏准知縣有缺令在京四品以上官及國子監翰林院堂上官各一員從吏部推訪除授不職者并坐舉主諸科正統十四年詔各處儒士照永樂間事例送本院嚴加考試選用不中者發原籍為民葉盛曰永樂中清江喻行之以文學舉試記里皷正統中馮益試事道皆不知所謂莫能措一辭所謂名浮於實君子弗貴者歟如復諸科考藝觀徳付諸翰林可也考貢洪武十六年二月丙申命天下學校嵗貢生員時諫官有言命禮部榜諭天下府州縣學自明年為始嵗貢生員各一人正月至京從翰林院試經義四書義各一道判語一條中式者入國子監不中者罰之故有此命也㑹典曰凡考試嵗貢生員禮部奏請出題本部官赴内閣領題試筆送巻本院官批定去取送部奏請施行嘗聞編修張元貞考校精覈嵗貢士鮮入格者時服其公云校職㑹典云凡考試願就教職舉人監生吏部奏請出題本部官赴内閣領題試畢送巻本院官批定中否送部奏請施行又云凡各處儒學訓導九年考滿吏部出題考試初塲四書本經義各一道二塲策論各一道印封文巻送内閣委本院官批定去處送部奏請施行汰吏洪武二十九年四月命本院官㑹同禮部考國子監六堂師弟子甄别髙下送吏部以次錄用其後不知何時遂廢永樂中有詔汰在京儲司冗官左賛善陳完署春坊事即澡筆書某當畱某當去衆服其明决然此後亦不聞焉㑹典云天順八年奏准吏部都察院㑹同内閣考察在京五品以下文職并在外布按二司有不公者許科道官指實劾奏又云宣徳七年勑吏員三考滿當授官者吏部通引於内府㑹同六部都察院翰林院堂上官出題南北𩔖試其文義粗曉行移得當書體不謬三事俱可取者為一等二事可取者為二等俱不可取者放回為民當差可齋雜記云東閣為翰林官㑹揖處一日各部堂上官㑹考三考吏來集閣下諸同寅遂聮步而出周修撰旋不允七年四月起復學士柯潜為祭酒具疏懇乞終制許之時内閣大學士劉吉起復侍講陳音勸使終制且與之書云陳升之起復為相制曰閔子絰而服政先賢稱得事君之宜晉侯墨而即戎前志謂達變禮之用嗚呼升之果何人哉自羅倫之疏傳于世而先王制禮之議始嚴矣外補洪武六年編修孫作辭不拜乃乞外改太平府學教授七年編修張翀入對乞外改南陽府學教授永樂中編修李禎改髙州府學教授陳景著改福州府學教授禎以痼疾景著以養母俱乞外而景著得任原籍厥後作起復為司業翀起復為御史貞暨景著未久卒於任英宗時始擇文學之臣出任憲司提督學政正統元年修撰王鈺自致仕起用擢江西僉事提督學校未幾檢討陳璲亦出為廣西提學僉事自是本院官乞外者援以為例成化中侍讀焦芳編修敖山𢎞治中編修蘇葵檢討李遜學劉瑞正徳中編修余本檢討盛端明張邦竒皆然厯俸稍深則擢副使若葵則以事忤權貴而去者學士王鏊贈之詩曰嚴生久厭承明直楊億俄成乞外書蓋有所為而𤼵召試洪武初南昌縣學訓導朱善以學行聞本府上其名詔擢為教授八年命天下教職曽被薦擢者赴京師上廷試之擢善第一除修撰十六年十月東昌府學教授馮叡考最除左賛善二十年十一月戊子以河南府學訓導葛鈞為侍講學士三十年六月召試行人司副陳性善行人陳成擢檢討他如傅藻袁渙睢稼唐肅等擢應奉孫蕡等擢典籍皆起自州縣庶寮成祖入繼大統聞桐城知縣胡儼有文學召試之稱㫖改除檢討殿閣詞林記巻十
