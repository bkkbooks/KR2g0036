body:
  text: 殿閣詞林記卷四明廖道南撰院學翰林院學士封姑孰郡公陶安陶安字主敬太平當塗人幼頴敏有大志通判馬昂夫令賦喜雨詩立就竒之自是肆力問學博極羣書得程氏讀書日程及吕舍人學規益究心濓洛沉潜道藝元至正甲申舉浙江鄉薦為明道書院山長再調髙節書院講明朱陸之學乙未夏六月朔髙皇帝渡江至太平安偕耆儒李習率父老迎謁驚相謂曰龍姿鳯質非常人也我輩今有主矣上召見與語安因說曰四海鼎沸豪傑並争悉多攻城屠邑志在子女玉帛爾非有撥亂救民安天下之心明公率衆渡江神武不殺人心恱服應天順人以行弔伐天下不足平也上曰爾言甚善吾欲取金陵何如安曰金陵古帝王都龍蟠虎踞長江天塹取而有之撫形勝以臨四方所向無敵何憂不克此天所以資明公也上甚恱乃改太平路為府命習知府事以安叅謀拜左司員外郎丙申克金陵乃陟本司郎中先是劉基宋濓章溢葉琛來謁上問安孰賢安曰臣謀不如基學不如濓治民之才不如溢琛逺甚上嘉其讓已而克武昌乃以安知黄州府事尋改令桐城知饒州府事時閩冦攻城急安諭衆固守援兵至圍解諸將以民多從冦欲屠之安曰民被脅誘非其本心頼以全活甚衆民為立生祠上親製詩勞之詩曰匡廬岩穴甚濟濟水􅏜無端盈彭蠡鰐魚因韓去逺陶安鄱陽即一理吴元年始置翰林院開禮樂二局首召安為學士凡制度儀章悉安草創上錫之誥命有曰國家之立必有一心之臣遵戴匡輔用能張紀綱植表儀正名位善辭命基圗丕安朕初渡江卿安首謁軍門即期以帝王事功賛襄兵務多厯年所宣號令則軍民信議禮樂則體要成建陳以忠出納惟允捍城禦侮勞績茂著朕甚嘉焉廼者開翰苑以崇文治設學士以冠儒英重道尊賢莫先於爾擢居宥密俾職論思錫以寵章用昭國典尚勤獻納賛我皇猷綜理人文以臻至治可翰林學士嘉議大夫知制誥兼修國史洪武元年修大明律令成為總裁官上親製春帖褒之帖曰國朝謀畧無雙士翰苑文章第一家遂拜江西行省叅知政事上諭曰卿安遇朕敷陳王業幕府軍旅禆益良多繼入翰林日聞讜論兹以江西地居上㳺可代汪廣洋者宜莫如卿安辭曰臣恐付託不效有孤渥恩上曰躬擐甲冑决勝負於兩陣間此武夫之事儒生非所能若承流宣化綏輯一方此儒者之事非武夫所能也卿才宜是任吾豈私一人弗愛一方乎乃錫以誥命追封其祖父為姑孰侯秋九月癸卯卒年五十九追封為姑孰郡公安為人外癯而内實精於易數為文純雅疏暢力追古人一日侍上論學術安曰道之不明邪說害之也上曰邪說害道猶美味恱口美色眩目人鮮不為所惑非有豪傑之見不能决去之也戰國之時縱横捭闔類皆游說諸侯急於功利者多從其術事未就而國隨以亡此誠何益夫邪說不去則正道不興正道不興天下焉得而治安對曰陛下所言深探其本上曰仁義治天下之本也賈生論秦之亡不行仁義之過夫秦襲戰國習弊又安知此安頓首謝其所啓沃類如此廖道南曰漢初逐秦羣雄紛擾靡克定一至董公說以仁義其興也勃焉我髙皇起應昌運逺超於漢方其奮跡濠梁取滁和渡采石定當塗陶安謁見期以王道决計趍金陵肆居帷幄英謨密議幽賛神明且言邪說害道其見逖哉𢎞逺矣可不謂一代儒宗爾矣乎彭韶賛曰濓洛闗閩灼有定式屏跡江南授徒考徳適遇天兵來皇斯域謀猶無雙王業是職鄱陽有成翰苑之陟律以表民文以華國翰林院學士朱升朱升字允升徽州休寜人後徙歙之石門幼師鄉進士陳櫟櫟深器之元至正癸未聞資中黄楚望講道湓浦偕趙汸往學焉既有得乃歸讀書紫陽祠中乙酉舉鄉薦授池州路學正壬辰淮甸蘄黄兵起升所居窮僻雖避兵逋竄詞述不輟脫去俗學直造本真究極𤣥㣲覃精大道丁酉夏六月髙皇帝遣元帥胡大海等至徽改徽州路為興安府升被徵入見顧問稱㫖上問之對曰髙築墻廣積糧緩稱王上嘉其朴遂叅密議凡禮樂征伐典章文物多所賛畫吴元年丁未拜侍讀學士中順大夫知制誥同修國史上親製誥詞有曰眷我同宗之老實為耆哲之英無何乃陟為本院學士特免其朝謁以優禮之洪武元年二月乙卯上御東閣顧謂升曰近觀周禮有所謂六夢者朕嘗感異夢厥兆維何升對曰人之精魄上通於天此陛下受命之兆也軒轅夢逰華胥天下大治帝王之興自有天命盖振古如兹矣三月辛未命儒臣修女誡又諭升曰治天下者修身為本正家為先始于謹夫婦后妃雖母儀天下不可使預政事至嬪嬙之屬不過備職事侍巾櫛若寵之太過恐驕恣犯分上下失序厯代宫闈政由内出未有不為禍本者夫内嬖惑人甚於鴆毒惟明主能察於未然其他鮮不為所惑卿等為朕述女誡及古賢妃之事可為法者示後世子孫有所持守升受命纂輯二年三月戊戌復命撰齋戒文是月請老歸石門乃居梅花初月樓上親灑宸翰以賜卒年七十二學者稱為楓林先生所著有易書詩周禮儀禮禮記孝經四書小學旁註及書傳補輯諸書傳解行於世廖道南曰予幼從石門大夫學即誦楓林小四書逈然異之及覽觀諸經旁註慨然興嗟以為道可即矣石門大夫仍復示以𤣥㫖約之精義乃今知朱允升之學要亦􅋀當不可誣也賛曰矯矯耆儒紫陽之裔文不䘮天道未墜地乃究淵源好學篤志躬遇真人風雲景㑹乃攷禮樂乃新規制樂道石門始終一致翰林院學士宋濓宋濓字景濓浙之金華人兒時即抱鉅人志日記五千言既長受春秋于聞人夣吉學古文于栁貫黄溍吴萊之門講道於浦江之青蘿山著書號龍門子元以國史編修徵辭不就髙皇帝定鼎金陵遣使聘至建禮賢館以居之初為儒學提舉陳友諒平乃撰平江漢頌上大稱賞遣世子受經甲辰十月轉起居注上御端門論黄石公三畧濓曰尚書二典三謨帝王大經大法具載願皇上講明是書心學復傳矣上曰朕非不知典謨為帝王大道顧三畧為今日攻取急務爾時中書省臣奏請給牛種於民上令勿徴其租乃謂濓曰朕所言當乎濓曰民富則君不至獨貧民貧則君不至獨富捐利予民實興邦要道也乙巳三月濓卧病館舍上曰老宋起居何久不見繼聞在告乃憂形于色曰宋起居誠篤之士不参以分毫人偽侍予五年猶一日也乃謂侍臣曰爾往傳命俾歸金華山中父子祖孫懽然同聚疾必速愈愈且速造朝國家文翰庶有頼哉乃贐以金幣皇太子致贈有加焉濓歸上表謝并奉書東宫勉以孝友恭敬毋惰毋縱懋修徳業副天下望上覽書喜甚召太子諭曰吾自幼備厯艱難今爾曹冠服華麗飲食甘美安居深宫不知勇於進修是自棄也宋起居言有益爾其味之且酬之以御劄曰先生教吾子以嚴是不佞也以聖人文法變俗教之是不固也以忠厚立心以節儉制行是得體也昔聞古人乃今見矣仍以文綺侑書洪武二年濓終䘮詔修元史以濓為総裁官兼修禮書六月陟翰林學士知制誥三年二月辛酉上御東閣濓等進講大學至有土有人反覆陳說上曰人者國之本徳者身之本徳厚則人懐民安則國固故仁主有仁愛之徳則人歸之如就父母人心既歸有土有財自然之理也若徳不足以懐衆雖有財亦何用哉七月元史成賜金幣有差時甘露屢降濓撰頌其末有曰受命不于天于其人休符不于祥于其仁孔子作春秋祥瑞不書有年則書豈不以天道難知人事可徴者乎皇上留神至治以得仁賢為瑞以臻和豐為祥視前代植金莖以承液誇嘉瑞以紀年者不侔矣上嘗論古帝王宴安之餘多嗜神仙濓曰漢武好神仙方士至梁武好佛異僧集使移此心求賢為治天下其有不平乎上姪文正獲罪且不測濓曰文正罪固弗宥皇上廣親親之恩生之而置諸逺地斯善矣上既追封外王父為楊王立廟將服衮冕以祭濓曰衮冕惟天地宗廟用餘則當降禮也上從之命濓撰楊王廟碑後失朝左遷編修十一月轉國子司業四年七月坐考祭禮遲滯與魏觀同謫濓為安逺令十一月召還為禮部主事是年明昇貢異馬乃撰龍馬賛五年六月嘉𤓰生于句容撰嘉𤓰賛十二月丁酉復以濓為太子賛善大夫六年正月以舉人張唯等為編修入文華堂肄業命濓為之師上聽政之暇輒幸堂中評文優劣每食太子親王迭為之主是月昭鑒錄成八月寳訓成十二月日厯成俱命濓為序上問帝王之學何書最要濓以大學衍義對上命書於兩廡壁時睇觀之因覽史記論黄老事命濓講析濓曰人主能以義理養心則邪說不能侵興學校教民則禍亂無由作矣上曰朕上畏天地下畏兆民兢業不敢自逸對曰陛下此心古先哲王之心也慎終如始斯無間矣乃復以濓為侍讀學士七年十一月孝慈錄成八年三月洪武正韻及大明律成濓俱為総裁官五月丁丑上御端門出内庫蟠桃核示詞臣命濓為賦九月侍皇太子親王逰中都濓隨處開說多所規益既歸上謂濓曰皇太子留心治道卿等居常諷諭庶廣識見幸善調護之上於後􅁐觀穫曰農事成矣濓曰國以民為本民以食為天皇上知稼穡之艱難念民生之疾苦實盛徳也九年五月上御奉天門謂濓曰自古有國家者未有不資賢才而能獨理秦之時張良陳平韓信皆隐屠釣漢髙卒用以成帝業今山林巖穴豈無超羣㧞衆之才兹欲羅而致之其道何繇濓曰取士莫善於鄉舉里選用人莫善於任官任官莫善於久居不遷古有是論而陛下行之得才之效無過此矣是月復命為學士承㫖知制誥如故十年三月致仕上賜緡帛文綺及御製文集皇太子贈衣二襲上曰朕慎于賞予卿誠貫金石故以是賜卿今年幾何對曰六十有八上曰藏此綺俟三十二年作百嵗衣也濓辭行上復曰江漲不可舟卿宜循内河庶保無虞矣九月來朝上勞之曰卿去此數月朕思之今卿復來朕恐失顧問特遣禮官致餽卿當引觴自酌食以養神又親調甘露以賜之曰酌此可頥夀康也是日侍逰禁苑日晏始退上嘆曰純臣哉爾濓今四夷皆知卿名卿其自愛濓謝不敢當十月觀心亭成復命濓為記濓自布衣感上龍飛之遇凡有任使夙夜匪懈䖍恭勤慎凡郊社宗廟山川百神之典禮樂律厯名物度數之制四夷朝貢賞賚之儀及勲臣碑碣銘誌之文承上意㫖即時撰次常曰君猶父也天也其可欺耶上欲命叅大政辭曰臣少無他長惟文墨是工不敢當是任上愈厚之每燕見必命坐賜茶每旦令侍膳或召問廷臣臧否第稱其善者濓素不能飲上強之飲至再面赭行不成步上賦詩一章賜之仍命羣臣咸賦醉學士歌曰俾後世知朕君臣同樂至此也因濓艱於行步詔皇太子選廐馬以賜上復賦良馬歌命羣臣咸賦以紀之有上萬言疏者上怒欲重其罪濓曰彼應詔陳言未可深罪上黙然已而釋之其扶植善類類如此上嘗謂廷臣曰古之人大上為聖其次為賢其次為君子宋濓事朕十有九年未嘗有一言之偽誚一人之短寵辱不驚始終無異君子哉若人乎抑亦可謂賢矣濓子璲為中書舍人孫慎為儀禮司序班十三年璲因事連坐有司請罪濓上念濓舊臣乃安置于茂州卒于夔州所著有龍門子凝道記潜溪集鑾坡前後集翰苑續别集芝園集朝京稿蘿山集浦陽人物記廖道南曰天降時雨山川出雲國家將興必有禎祥若景濓者非天啓之以翊初運者乎予嘗讀楊維楨序景濓之文曰其隐龍門也煜乎其虎豹煙霞也其居館閣也燦乎其鸞鳯日星也貝瓊曰正聲勁氣充塞宇宙星辰河漢山川草木風雨雷電鬼神變化龍跳虎躍瑰詭竒絶掲沉曰浩乎其博淵乎其深蔚乎其色鏗乎其聲春濤之瀰漫也鐵騎之縱横也武庫之珍異也龍門砥柱之可駭也盖論其文者然也至其門人方孝孺稱之曰公之量可以包天下而天下不能容公之一身公之識可以鍳一世而舉世不能知公之為人道可以陶冶造化而不獲終于正寢徳可以涵濡萬類而不穫盖其後昆公之所能者皆衆人之所難勉而未嘗自以為足其所遇者皆衆人之所難處則快然委命而不置乎休戚此公所以跨越前古㧞彚超倫控宇宙而獨立後天地而長存者乎可謂知言矣彭韶賛曰春日載陽列宿繁張江流湯湯是為先生徳容之粹文名之高學問之長禦敵輔夏正我綱常功在萬世其曷敢㤀翰林院學士劉三吾劉三吾名昆孫以字行長沙茶陵人兄耕孫夀孫皆事元三吾少習舉子業元季避兵廣西行省授靖江教授儒學副提舉王師克廣西乃歸茶陵洪武十八年通政衡山茹瑺薦其才可大受乃以為左春坊左賛善三吾年已近老博覽善記應對詳敏屢承顧問悉多稱㫖七月戊寅上問侍臣以民生安否三吾對曰頼陛下威徳四方無虞盜賊屏息嵗比豐登民咸安樂上曰天下之民之衆豈能保其皆安朕為天下主心常在民惟恐失所每加詢問未嘗一日㤀之三吾曰聖心拳拳若此恩徳之及民者深矣上曰恩徳亦非汎然醫如盧扁不施藥石疾不自瘳匠如公輸不施䋲墨木不自正君如堯舜無紀綱法度之施而但曰恩徳所謂徒善不足以為政也上嘗命儒臣編集厯代帝王祭祀祥異感應可為鑒戒者萃為一書名曰存心錄命三吾編集漢唐以來災異之應於臣下者别為一書名曰省躬錄二十年二月甲辰御註洪範書成上謂三吾曰朕觀洪範一書帝王為治之要道也所以叙彛倫立皇極保萬民叙四時成百榖本於天道騐於人事箕子為武王陳之武王猶自謙曰五帝之道我未能焉朕每為惕然遂疏其㫖朝夕省覽三吾曰陛下留心是書上明聖道下福生民為萬世開太平者也遂命三吾撰序二十一年五月乙酉五色雲見三吾進曰雲物之祥徴於治世舜之時興於詩歌此實聖徳所致也上曰古人有言天降災祥在徳誠使吾徳靡悔災亦可弭茍爽其徳雖祥無應國家之慶不專於此也二十二年十一月乙丑朔上御謹身殿因論治民之道三吾曰南地風俗不同有可以徳化有當以威制上曰地有南兆民無兩心帝王一視同仁豈有彼此之間君子懐徳小人懐刑施之各有攸當焉爾十二月癸亥上謂三吾曰愚民犯法如㗖飲酒嗜之而不知止設法以防其犯而犯者益多推恕以行吾仁而仁或可濟三吾曰三代而上刑罰常簡本仁恕也三代而下刑罰常濫以嚴刻也上曰善為國家者惟以生道樹徳不以刑殺立威二十四年七月命攷定武臣封贈之制十一月上御武英殿觀書至恵廸吉從逆凶乃曰凡人罹凶咎無不自己求之者彼事勢窮促冀求茍免竟亦何益三吾曰如是者當聽乎天上曰心無所愧可聴於天若其自求於天何預二十七年正月辛巳上退朝謂三吾曰朕厯年久而益懼者恐為治之心懈也懈心一生百事皆廢生民休戚係焉故日慎一日惟恐弗及如是而治效猶未臻甚矣為治之難也自古先王之治必本於愛民然愛民而無實心則民心不䝉其澤民不䝉澤則衆心離于下積怨聚于上欲國家不危難矣三吾曰陛下之言及此天地神人之福也三月辛丑又謂三吾曰人主之聦明不可使有壅蔽一有壅蔽則耳目聾瞽天下之事難達矣三吾曰人君惟博采衆論任賢使能則視聽廣而聦明無所蔽若信任憸邪隔絶賢路則視聽偏而聦明為所蔽也上曰人主以天下之耳目為視聽則是非無所隐而賢否自見昔唐𤣥宗内惑于聲色外蔽于權奸以養成安史之亂及京師失守倉惶出幸雖田夫野老皆能言其必有今日者𤣥宗雖恍然悔悟亦已晚矣夫以田夫野老皆知而𤣥宗不知其蔽於聰明甚矣使其能廣視聽任用賢能不為邪佞所惑則亂何從生哉七月己酉上因改定書𫝊謂三吾等曰朕每觀天象自洪武初有黒氣凝于奎壁今年春暮其氣始消文運當興爾等宜考古證今有所述作以稱朕意於是禮遇諸儒甚厚各賜以綺繒衣被又御製詩命次韻和之朝叅則列於侍衛之前燕享則坐於殿中仍以朝鮮所貢玳瑁筆賜三吾及修寰宇通衢書禮制集要成俱倍加賞賚三十年命三吾主考㑹試北士偶黜竟以是獲罪三吾為人慷慨坦夷不設城府自號曰坦坦翁至于大節則屹乎其不可奪也上嘗欲易太子三吾痛哭曰太子天下本若欲易之置秦晉二王於何地事多忤㫖降為博士久之乃復為學士廖道南曰可以託六尺之孤可以寄百里之命臨大節而不可奪若三吾者非其人與方茹忠誠之薦也聖祖虗席以待而密勿啓沃格心居多至於易儲痛哭以争可不謂節乎賛曰星沙之南雲陽之墟嶽祗發祥是生鴻儒惟彼鴻儒台輔之器學顔之學志尹之志晚登秘省嘉謨嘉猷嗟予小子景慕前修翰林院侍讀學士張以寜張以寜字志道其先河南固始人厥祖光祿大夫從王審知入閩遂居福建之古田少貧苦嗜學登元泰定辛卯進士初授黄巖州判官轉六合縣尹坐事免至正中復起為國子助教後遷待制侍讀學士以寜有俊才元末遺老多物故以寜獨擅名于時人呼為小張學士國初王師入元都以寜與危素等以故官來歸奏對稱㫖仍以為侍讀學士階朝列大夫知制誥特被寵遇洪武己酉與典簿牛諒奉使安南上親製詩送之時安南王陳日煃偶卒嗣君日㷂遣其臣阮亮求詔璽以寜不許乃留居洱江俾諒往其國諭以朝廷威福彼遂復遣陪臣杜舜卿來告訃上親御翰墨為祭文命編修王亷主事林唐臣往將命事竣上御製詩八章暨錫以璽書褒之還卒于道中詔有司還其柩于家所在致祭以寜清潔自守所居瀟然未嘗營財産其奉使也襆被而往臨終時有詩云覆身惟有黔婁被垂槖都無陸賈金有詩文數十卷號翠屏集子煜為蒲圻知縣炬為刑部員外郎大學士楊榮銘其墓曰世德相傳厥為名族固始徙閩肇於光祿積善流慶懋敏文儒鬰如喬松温若美瑜富有才華早登科第􅆒厯中外英聲倐起際我皇明奉職詞林用𢎞禆益恩眷彌深使節煌煌逺臨交阯夷俗丕變龍顔以喜寵命方降訃音逺來天語興嗟失兹良才廖道南曰使於四方不辱君命可以為難乃若季文子求遭䘮之禮以行亦求不辱而已以寜持節遐荒行李蕭條生則哦詩自樂寄興翠屏死則述詩見志投疏皂囊亦可謂不辱君命巳矣賛曰閩山之堧是為古田堅持古道希古之賢嗟哉斯人死于王事去邉就華卒死逺裔翰林院侍講學士李翀李翀原闕洪武初為典籍十五年十一月乃陟為侍講學士上賜之勑曰治天下之美非賢何以治民非文何以昌化文所以備載萬物闡演幽㣲昔有唐天下嵗和時豐乃啓𢎞文館集四方之賢任館内之事内相慮勤以致遐邇來庭外户不閉斗米三錢家給人足朕欲肩之何用賢之道不齊致遺賢於逺邇今特命爾翀居是任尚期文同韓栁勲比房杜以昌治化汝往欽哉十七年正月庚戊上與翀等論武事翀曰用兵重在任將上曰任將之道固重然必任之重信之篤而後可以成功昔齊用司馬穰苴魏用樂羊可謂任之專信之篤故皆有功若唐憲宗用魚朝恩肅宗用吐突承璀為監軍諸將掣肘以致敗事者是任將不專信之不篤故也翀曰惟陛下聖明深知滋弊上曰將必擇有識有謀有仁有勇者有識能察㡬于未形有謀能制勝于未動有仁能得士心有勇能摧堅破銳兼是四者而後可以成功然亦在人君任之何如爾又有王時者以元故官與危素同為侍講學士有李遜者直𨽻景州人登洪武甲子鄉試官至學士其行蹟多不考云廖道南曰易有之聖人作而萬物睹信哉言乎觀李翀之勑詞望以文同韓栁勲比房杜意亦至矣賛曰翀也鳯舉竹實梧陰于彼髙崗栖于禁林時以舊臣犬為其主素既無為於爾何取鈞以儒學遜以選舉寥寥今古莫可遐晤翰林院直學士陳桱陳桱字子經浙江奉化人祖著宋秘監知台州父秘元饒州教授桱自束髮受書即知𢎞前人業乃撰紀二百巻傳諸同志又上論䆳古逮于髙辛下據三史㑹于有宋述近理刪繁詞比事於通鑑較義於綱目斟酌前編而不必茍同至於尊正統以定大分凛然大義萬世不可易也其紀年則司馬公之補遺其書法則朱文公之綱目猶不敢自比於二公故但名之曰通鑑續編洪武二年春正月以朱升為學士詹同及桱為直學士廖道南曰墳典既遐史傳斯創左史紀言右史紀動後世沿之紀言為寳訓紀動為實錄文彌繁而道愈逺矣乃若陳子經值元末亂亡潜心史學祖晦翁綱目之律例􅄒君實資治之龜鑑昭正統彰大義其文核其事該其㫖淵以正可不謂良史爾矣乎贊曰兩浙之區實為奥壖天目岧嶢鴈蕩蜿蜒篤生良士為國仁賢表章正學纂緝遺編董狐斯偶班馬仔肩予生也晚有開必先翰林院侍讀學士秦裕伯秦裕伯字景容大名人從父仕元都就學冑監登第累官至福建行省郎中㑹世亂棄官寓揚州復避地松江之上海以養母時張士誠據蘇州遣人招之不納吴元年上命中書省檄下松江起之裕伯對使者曰受元祿二十餘年背之不忠也母䘮未終亡哀而出不孝也乃上書中書省固辭洪武元年復檄起之稱疾不出上乃手書諭之曰海濱之民好闘裕伯智謀之士而居此地茍堅守不起恐有後悔裕伯拜書入朝辯博善為辭說上命為侍讀學士洪武二年改待制一日論學術上曰為學之道志不可滿量不可狹意不可矜志滿則盈量狹則驕意矜則小盈則損驕則惰小則陋故聖人之學以天為凖賢人之學以聖為則茍局于小而拘于凡近豈能充廣其學哉裕伯對曰誠如聖言尋出知隴州廖道南曰予讀國初事蹟乃知楚才晉用不獨裕伯為然易有之水就濕火就燥雲從龍風從虎聖人作而萬物睹其然乎贊曰大名之北瀛海攸趍松江之南笠澤攸濡矯矯裕伯士林之魁出遇真人左右是毘明哲保身云何桑隅誦厥遺言悵然深悲翰林院侍講學士潘廷堅潘廷堅字叔聞太平當塗人先世業儒有聲江左廷堅性資頴㧞博學強記元末教授鄉邦學者多從之逰㑹薦起為富陽縣教諭嵗乙未髙皇渡江駐蹕采石廷堅同李習陶安謁見遂命為太平府教授明年金陵平召為中書博士庚子補金華同知壬寅入拜侍講學士階嘉議大夫以年老致政廷堅為人慎密謙約每叅謨議為上所重子黼為起居注中書左司都事江西湖東按察使今其裔家當塗之多福鄉廖道南曰予觀太平志乃見天兵初臨耆儒入謁然皆彬彬然多文學士視漢之酈生諸人尚變詐恃智巧者不侔矣贊曰大江浩𣺌采石縈紆篤生英哲雅集師儒伯羽既翔主敬為基叔聞多學探討淵㣲彚征斯吉聮翩以飛鬰鬰禁林鸞鳯攸栖髙山景行于兹焉依翰林院侍講學士葛鈞葛鈞原闕洪武初以明經薦授河南府學教授躬行訓督多所造就徴為侍講學士時劉三吾以耆儒掌院鈞與相得甚懽凡草創禮儀稽考經籍享祀神祗校閱文卷罔不事事庚午九月命鈞考定諸臣封爵之制鈞奏宋制功臣韓琦生封魏國沒封蘄王考其先世止封公爵王及三代別無舊制若開平王常遇春三代封王出自特恩難為定例今中山王徐達􅄮陽王李文忠追贈三代宜准宋制上謂中山岐陽皆開國元勲三代准贈王爵十一月髙麗貢玳瑁筆分賜三吾及鈞等是年命授秦晉諸王經銓曹糾其怠惰上曰儒者不任劇職俱降國子助教未幾復職廖道南曰漢初命叔孫通創緜蕝之儀史稱其為漢儒宗夫叔孫所定未必如先王經制而因時制宜要亦有可行者我朝自陶安朱升詹同宋濓魏觀諸儒開厥初即繼以三吾與鈞率循彛典潤色徽猷於乎蔚矣贊曰石渠蘭臺漢閣儲書崇文麗正唐院延儒草昧建侯雲雷啓運登崇俊良以協中正鈞也端亮矯跡中原碧嵩渾河靈啓崐崘翰林院侍讀學士王達王達字達善常州無錫人初以明經授邑庠訓導入補國子助教太宗登極姚廣孝薦之擢編修侍皇太子于東宫尋進侍讀學士甲申七月進講乾卦九四一爻舉儲貳為說仁宗問楊士竒恐達含諷意士竒對曰講官非正道不陳豈敢譏諷此宋儒胡瑗之說也仁宗曰易㫖無之若遇庸人亦將為兹說乎士竒曰程子有云凡卦六爻聖賢有聖賢用衆人有衆人用君有君用臣有臣用宋王昭素講易以節儉莫若愛民養心莫若寡欲為對宋太祖特書其言于屏間仁宗遂恱命諸臣分撰五經講義以進一日太宗問建文君如何達對曰可與為善惜輔導非其人以是誤之耳後攖疾卒年六十五時有曽章字日章者永樂辛酉以侍讀學士置南院與達盖後先相望云廖道南曰子觀毘陵志稱達所著有詩書心法易經選註桂林機要及天游集是亦潜心于理性者惜乎未之槩見也贊曰立賢無方夢卜惟徴論學無窮博約惟明吁嗟達善署庠賛冑論易儲闈談詩文囿誰其闡幽國史有紀毘陵之志未䆒厥委翰林院學士王景王景字景彰浙江松陽人洪武中以明經薦授懐逺教諭厯陞知州擢山西布政司右叅政坐事謫雲南撰平雲南頌及黔寜昭靖王碑建文中以知縣召入纂修髙廟實錄守制服闋吏部尚書張紞前為雲南布政雅知其賢薦陞翰林院侍講太宗入正大統陞學士一日問建文君葬禮景對宜從厚𦵏以天子禮上然其言景博學以古文自擅亦擅筆札然不謹細故與時多忤云廖道南曰予考文衡乃見王景彰所撰諸篇俱舂容爾雅暢茂敷賁乃知國初渾厚和平之氣不獨於運數見之寔有徴于文物也巳賛曰淛海之濱巨儒潜光滇池之滸逐臣賁章賜環金門視草玉堂鬱鬰文衡雷電合章翰林院學士藺從善藺從善字有恒河南磁州人永樂癸酉貢士初任揚州府學教授召入授編修轉侍讀宣徳中預修兩朝實錄成遷司經局洗馬進侍讀學士未㡬改右庶子正統初陞學士與王文端公錢文肅公相得甚懽賜之奠章曰卿以文學典教郡邑用膺簡擢進事先朝翰苑宫坊累遷清秩暨朕嗣統陞職有加史館經筵悉勤乃事操履篤實益久不渝廖道南曰予觀王文端公稱從善心淳氣平學行端方景泰易儲詞林加宫保者二十餘員而從善獨守官如舊及讀崔仲鳬所撰彰徳志益信其為篤厚君子也賛曰燕趙多材古為巨邑太行西来恒山北峙藺君産焉抱兹竒氣篤實輝光久而不墜翰林院侍講學士周叙周叙字功叙江西吉水人永樂戊戌進士選庶吉士授編修宣徳初預修兩朝實錄成轉修撰正統中進侍讀辛酉閏十一月叙上言三事一曰興學校二曰勸農桑三曰慎銓選上命所司舉行未㡬陞侍講學士掌南京翰林院事己巳九月英宗北狩叙上言八事一曰勵剛明二曰觀經史三曰修軍政四曰選賢才五曰安民心六曰廣言路七曰謹㣲漸八曰修庶政疏上嘉納天順初叙上言請修宋史詔令自修進呈又上制治保邦十二事中興太平十四事俱付所司采擇行之廖道南曰士之負竒氣樹壯節出而効用於時不少媕婀淟涊以自立者必有所建白以垂不朽乃若功叙筮仕史官即上疏論天下事今載諸蘭臺石室者可攷也然而忌才者衆卒之老於南院而不少試悲夫賛曰皎皎易汙嶢嶢難全蘭以香焚膏以明煎上書北䑓視篆南署老而不倦克承墜緒翰林院侍講學士曽鶴齡曽鶴齡字延年江西泰和人永樂辛丑進士第一授修撰庚戌秩滿轉侍讀正統戊午預修三朝實錄進侍講學士掌南京翰林院事致仕鶴齡為人和厚易直交際以誠作文典實如其為人初生時母夢鶴翔空而下後頂骨有紅暈故其父命之曰鶴齡云孫追進士及第官編修廖道南曰夫人之生豈亦有殊狀哉宋文憲公之生也紫衣未脫薛文清公之生也肌如水晶奚必徴諸往代夫鶴齡亦有然者矣然而功業未究著述靡聞豈其乘軒而弗鳴臯者耶賛曰有鶴南飛翔于江臯𤣥裳縞衣髙栖松巢曽氏夙兆誕瑞彌昭孫䋲祖武振羽煙霄翰林院侍講學士黄諌黄諌字廷臣陜西蘭縣人曽祖仕源為元提舉祖文質父志道咸隐約不耀諫幼有異才正統壬戌進士及第授編修景泰中上鐃歌鼔吹曲詔付史館出使安南始定使臣之禮餽遺悉無所受還朝同少卿劉傑主考順天鄉試時大學士陳循子瑛王文子倫俱不第遂搆䧟考官頼大學士髙榖覆試獲免秩滿轉左春坊左中允兼編修天順初改尚寳司丞仍兼前職石亨等言其功擢尚寳卿兼侍講未㡬進侍講學士石亨敗謫廣東同知尋被逮卒于淮兵部尚書王竑時理淮漕嘆曰季札𦵏于嬴傅之間孔子以為知禮况廷臣髙郵人也乃卜葬于淮成化間官其子琳為中書舍人倪文僖公䟦其鐃歌曰辭㫖閎壯音韻鏗鏘誠可施之軍旅者也楊䆳菴銘其墓曰驥足康莊既􅁬而驤忽一蹶以傷鄧林之良登置明堂雷風舂撞化為土壤奈何乎彼蒼惟劍之氣與玉之光不隨物以亡廖道南曰予讀黄公使南藁及南坡諸集蒼然之色淵然之光直逼古人及攷國史始阨于陳循終阨于石亨豈造物者亦忌才乎賛曰三秦帝京兩淮帝鄉生也挺秀沒也流芳幸菴有賛䆳菴有志誰表遺書以傳奕世翰林院侍讀學士吴希賢吴希賢字汝賢福建莆田人天順甲申進士選庶吉士授檢討與修英廟實録陞修撰成化乙巳遷左諭徳丁未進侍讀學士掌南京翰林院事希賢為文章有竒氣尤工於詩每僚友宴㑹累數百言立就人多服其敏然負氣豪俠人亦以是少之太常卿陳音銘其墓曰東野昌詩子厚優文君殆兼之永播厥芬廖道南曰予觀莆陽文獻謂希賢與西涯咸稱神童及同舉進士則又相篤厚以故西涯奠文有云國有譽望代有文章非虚語也賛曰有美一人宛清揚兮為蟬則緌蟹有匡兮天球河圗寳物蔵兮仰觀斗牛劍氣光兮翰林院侍講學士曽彦曽彦字士美江西泰和人成化戊戌進士第一授修撰時執政欲矯時弊捄文以質而彦所對簡約遂置之魁選邱文荘公作春聮以贈之彦年已近六十餘矣丁未轉侍讀𢎞治紀元預修憲廟實錄遷左諭徳甲申進侍講學士掌南京翰林院事廖道南曰夫士童而習之白首紛如養其才將有試也茂其學將有為也乃若老而射策居殿元者在前則曽士美在後則唐守之俱遲暮不振無聞于時惟吴文定公則老而不衰乃克自見豈天之降才爾殊哉賛曰孰謂桑榆取日虞淵孰謂湛盧貫斗龍泉壯而行之老而彌堅未酬厥志夫奚取焉翰林院侍讀學士徐穆徐穆字舜和江西吉水人幼聦悟日記千餘言𢎞治癸丑進士及第授編修己未同考禮闈得倫文叙為省元癸亥轉侍讀預修通鑑纂要宋元論斷多出其手乙丑復考禮闈得董玘為省元二公皆名士人以此多穆之知人武宗登極奉使朝鮮還朝預修孝廟實錄充經筵講官值逆瑾柄國怒諸詞林不為禮乃改汪俊等于別衙門是時穆居外艱改南京禮部員外郎服闋改兵部瑾敗復職病甚擢侍讀學士卒廖道南曰予觀李文正公所撰墓誌稱穆事親孝事長恭博極羣籍公堂廣坐言論英發略無遜避非其人噤不出一語其所自負每骯髒不下物盖實錄也賛曰躍之鏗然鑄之凝然擊之錚然若干將然胡為而然而胡不然抑豈其然殿閣詞林記巻四
