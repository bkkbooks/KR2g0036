body:
  text: 殿閣詞林記巻七明廖道南撰宫詹等附掌詹事府事韓國公李善長李善長鳳陽定逺人素負大志至正辛卯盗起汝潁壬辰江淮大亂我髙皇帝自濠如定逺善長遇焉相得甚懽俾掌書記參謀軍事甲午克滁州時滁陽王郭子興自泗還欲留善長善長不從乙未正月取和陽上出擊鷄籠山寨值有兵冦和陽善長擊走之既而上渡江俞通海以舟師来歸上喜謂善長曰吾事濟矣遂以六月朔渡江次牛渚㧞采石克太平善長預書禁約榜文凡遇入城懸之以故軍士秋毫無犯初置太平興國翼元帥府以善長為都士丙申三月克建康籍軍民凡五十萬上欲𤼵兵取鎮江恐諸將弗戢悉數其過欲置之法善長懇救獲免七月善長率羣臣奉上為呉國公置江南行中書省以善長為參議丁酉取毘陵寧國皆克之戊戌上親征婺州善長留守建康招降陳氏守將丙午四月上往濠梁八月遣兵討張士誠善長悉為經畫呉元年六月善長率羣臣勸上即帝位畧曰殿下起濠梁不階尺土遂成大業剗削羣雄逺近歸心宜早正位號以順天命上辭至再九月俘張士誠上御㦸門論平呉功封善長為宣國公左相國是月遣將取中原及福建廣西諸路十二月甲辰善長縂裁律令書成賜賚有差癸丑復率羣臣勸進畧曰開基創業既宏盛世之輿圗應天順人宜正大君之寶位盖以道化民者皇以德教民者帝惟首出乎庶物用光建于鴻名繼百王而立國家定四海而縂綱紀事聞在昔運際當今殿下勇智自天聦明冠世掃除六合之風塵拯救兆民于水火擁樓船以西上孺子秉璽而出迎命將帥以東征偽主束身而就縳天下歸服若江漢之朝宗邦域肇隆有金湯之鞏固既膺在躬之厯數必當表正于宸居上復辭之乃以甲子告于昊天皇祇以明年戊申正月四日乙亥即位國號大明改元洪武時御史中丞劉基學士陶安上言中書省及都督府倣元舊制設中書令議太子為之上曰取法於古必擇其善者從之茍不善是從而欲望治猶登髙岡而却歩渡長江而㢠廻楫豈能逹哉元人事不師古設官不以任賢惟其𩔖是與名不足以副實行不足以服衆豈可取法且吾子年未長學未充更事未多所宜尊禮師傅講習經傳博通古今識逹機宜他日軍國重務皆令啓之何必倣彼作中書令乎乃命詹同取東宫官制觀之謂同等曰朕今立東宫官取廷臣勲徳老成者兼其職老成舊人動有典則若新進之賢亦選㕘用夫舉賢任才立國之本崇徳上齒尊賢之道輔導得賢人各盡職故連抱之木必以授大匠萬金之璧不以付拙工至是以李善長為太子少師兼詹事馮宗翼兼副詹事胡廷瑞廖永忠李伯昇同知詹事趙榮王溥同知副詹事楊憲傅瓛兼攝府丞康茂才兼左率府張興祖兼右率府顧時同知左率府孫興祖同知右率府吳禎兼左率府副使耿炳文兼右率府副使鄧愈湯和兼諭德劉基章溢兼賛善大夫文原吉范顯祖兼太子賓客上諭善長等曰朕今于東宫官屬不别設府寮而以卿等兼之者盖軍旅未息朕若有事于外必留太子監國若設府僚卿等在内事當啓聞或有聽㫁不明而與卿等意見不合卿等必謂府寮導之嫌隙由是而生朕所以特置賓客等官以輔成太子之德惟選名儒為賓友昔周公教成王告以克詰戎兵召公教康王告以張王六師此居安慮危不忘武備盖繼世之君生長富貴泥于安逸軍旅多忽而不講一有緩急罔知攸措二公所言不可忘也二月善長率羣臣上郊社宗廟議三月取汴梁四月取河南府五月上幸汴梁善長留守京師軍國重事啓聞皇太子八月車駕還善長奏定吏户禮兵刑工六部官制設尚書侍郎郎中貟外郎主事各有定品十二月定官民䘮服之制及三師朝東宫儀二年正月定太歳風雲雷雨嶽瀆諸神祭禮及翰林官制二月丙寅修元史命善長為監修乙亥奉詔立皇陵碑四月編祖訓録定封建諸王國邑及官屬八月定大祀受誓戒十二月議賞平中原及守禦諸將功次三年正月議出師征沙漠三月議定朝臣服色悉准散官四月定官民書札式五月承制存恤陣亡子孫六月奏禁􅁋祀及左道惑民者定文官朝服之制十二月壬辰大將徐逹等平沙漠師還善長率羣臣上表賀丙申大封功臣上諭諸將曰朕自起兵以来爾等披堅執鋭戰勝攻取功曷可忘今天下既定報以爵賞皆朕所自定至公無私如李善長雖無汗馬之勞然事朕年久給足軍食其功甚大已列公爵今進封大國以示褒嘉乃授開國輔運推誠守正文臣特進光禄大夫左柱國太師中書左丞相韓國公叅軍國重事仍賜誥命鐵劵是冬禮部尚書陶凱請專選東宫官罷善長等兼職庶於輔導有所責成上曰古者官不必備惟其賢朕以廷臣有才望勲德者兼東宫官非無謂也嘗慮廷臣與宫寮有不相能遂成嫌隙或生奸謀離間骨肉其禍非小若江充之事可為明鑑朕今立此兼職庶父子一體君臣一心允無相搆之患也一日上因齋戒語善長曰人之一心極難㸃檢心為身之主若一事不合理則百事皆廢所以常自檢心凡事必求至當善長頓首曰陛下此言乃聖賢治心之道心既治天下無難治矣四年正月乞致仕許之十三年正月胡惟庸伏誅辭連善長上曰朕初起兵善長即謁軍門曰有天有日矣是時朕年二十七善長年四十一所言多合朕意遂命掌簿書賛計畫爵以上公子尚公主此吾股肱心腹不忍罪也五月復以善長代安然理御史䑓事十六年雲南平善長上表賀二十三年榜列逆黨勲臣凡五十七人㑹星變有以善長為黨者上疑之五月乙卯善長卒廖道南曰太子天下本也古之教太子者有師以道之教訓有傅以傳之德義有保以保其身體是故三公三少明孝仁禮義以導習之於是選天下之端士孝悌愽聞有道術者以衛翼之是故太子生而見正事聞正言行正道左右前後皆正人也故曰一正君而國定矣我聖祖神謨睿見髙出千古開國之初即以李善長等兼其官以劉基宋濂等司其教而又申之以聖訓是故三代之遺法猶存也録善長者昭元功也原東宫輔導之始也略諸臣而不録者非專官也賛曰於皇國本宗社之紀必善其終必正其治我聞三代文王世子居處有箴萬事就理聖謨𢎞逺元臣是委嘉言孔章淵哉厥㫖詹事兼兵部尚書唐鐸唐鐸鳳陽人初守濠州庚子從上討江州授西安縣丞召還除中書管勾出知延平府洪武三年召為殿中侍御史四年正月己亥御史䑓進憲綱四十條上覽之謂鐸等曰元時任官但貴本族輕中國之士南人至不得入風憲豈皆公道朕之用人惟才是使無問南北風憲作朕耳目任用得其人自無壅蔽之患鐸對曰臣聞元朝遣使宣撫初出之時四方驚動及其至也略無能為民為之語曰遣使宣撫問民疾苦来若迅雷去若敗皷至今羞之陛下一視同仁任官惟賢尤重風憲明立法度所以安百姓興太平也未幾復出知紹興府陟刑部尚書改太常卿守制家居賜食半俸服闋轉兵部尚書遷諌議大夫十七年四月己丑上謂鐸曰人有公私好惡不同故其言有邪有正正言務規諌邪言務阿謟謗言近于忠諛言近于愛惟不惑于謗言則聽日聦而讒人自去不眩于諛言則智益明而侫自絶矣鐸對曰聽言之難自古為然惟不為所眩惑則讒侫自逺上曰朕日緫萬幾所行有得失非資人言何由以知故廣開言路以来衆言言有善者則奬而行之言之非實亦不之罪惟讒謟靣諛者決不可容也尋以事左遷監察御史陟右副都御史復為兵部尚書致仕二十二年四月丙寅置詹事院秩正三品上謂吏部侍郎侯庸曰朕觀厯代賢明之君于輔導太子必擇忠正賢良之士三代保傅禮甚尊嚴後世若唐太宗為子擇師傅而李綱之徒直言正議頗有禆益今東宫官屬詹事未設衆務無所統領兵部尚書唐鐸為人謹厚有徳量亦當是任其以鐸為詹事仍兼尚書之禄逾年加少保二十七年四月癸未上謂鐸曰帝王之於天下體天道順人心以為治則國家基業自然久安朕思前代亂亡之故未有不由於違天道逆人心所致也天之愛民故立之君以治之君能乂安生民則可以保天眷卿與共事者久夙夜左右資弼良多凡朕之事天子民有弗至者卿即以為言使知所警毋謂已安不以為意治亂繋焉鐸頓首曰陛下敬天恤民之心惓惓如此臣雖老悖敢不奉命鐸為人厚重慎宻上毎以故舊遇之嘗稱之曰鐸自昔至今其與人交不知變色交絶不出惡聲其見恩遇如此卒年六十九廖道南曰我聖祖開國之初雖以李善長等兼東宫輔導然而未設專官也至是唐鐸為詹事且稱其謹厚有德量嗚呼有德足以受天下之善有量足以容天下之才受天下之善而天下之善歸焉容天下之才而天下之才趍焉嗚呼休哉聖謨亦𢎞逺矣賛曰少海波澄前星光燭惟彼重離國本所屬守曰監國出曰撫軍惟蚤諭教克長克君彼鐸老成天夀平格茍非其人其胡能國御史中丞兼太子賓客章溢章溢字三益浙江龍泉人㓜從鄉先生王叔剛㳺留心正學元憲使圖卜沁布哈與語大悦之要與俱之秦溢至虎林心動辭歸而父病已革人以為孝感至正壬辰冦犯龍泉溢從子存仁為冦所獲溢以身代克石扶宜孫平慶元及松溪溢有力焉乃奏上其功授龍泉簿溢辭不受海冦起黄岩攻台城他冦攻龍泉溢計平之值龍田嵗歉乃以私田易粟里人多䝉其濟處州七邑盗起溢檄千户曹勝安督兵授以方略一戰而降改授松陽縣尹又辭不受既而平鄭冦于麗水退長鎗軍於婺州授奉訓大夫僉帥府事又辭不受乃結廬匡山避地之閩中歲庚子髙皇帝遣使徴之溢與劉基葉琛宋濓偕至建業上勞之曰吾為天下屈四先生爾然四海紛紛何時定乎溢對曰天道無常惟徳是輔惟不嗜殺人者能一之上曰卿等其留輔予亡何擢僉營田司事巡視江南及兩淮多所匡治上一日問溢安否都事張來碩曰溢夙夜在公勤勞憂鬰成疾遂命溢歸省留其子存厚于京師乃遷溢浙東僉事王師平楚乃又遷溢湖廣僉事溢至覩荆襄多曠地建議分兵屯田且以控制北方為便行省鎮撫回回怙惡溢以法罪之時河内按察使宋思顔浙東按察使孔克仁僉事王疇俱彼逮繫上命溢為浙江副使溢辭曰臣同列獲罪而獨蒙寛宥若加之擢過亦大矣乃仍僉浙東事值山寨多叛開越㓂合攻慶元溢召兵設䇿恃以無恐浙西諸郡悉平上加奬甚至曰章溢雖儒臣父子宣力一方其功不在諸將下洪武元年正月拜御史中丞尋兼太子賛善大夫溢務存大體不屑屑於細故或以為言溢曰憲臣百司之儀表居其職者當先養人以㢘耻使人避而難犯豈直恃摶擊為能哉上親祀社稷㑹大風雨還坐外朝欲斬諸儒議禮不合者溢曰陛下一誠心自足以通感神明若以風雨罪之人其謂何溢後以母憂辭歸負土成墳二年卒年五十六廖道南曰賛善大夫之職兼之者始劉伯温既則章三益唐鐸也特著三人者彰名臣也溢之經濟賛亮載在名臣錄及功臣錄者不為少矣畧之者存其槩也賛曰元氏國頽民率為厲出而濟時去以全義結廬匡山以待聖世營田觀風莫辭勞勩提兵于南邦人攸暨臺端諤諤金汝作礪忠孝全歸心無所滯殿閣詞林記巻七
