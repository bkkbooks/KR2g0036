body:
  text: 殿閣詞林記卷三明廖道南撰閣學文淵閣大學士宋訥宋訥字仲敏大名滑縣人父崇祿元陜西行臺侍御史訥博學強記動遵矩矱性遲重不妄言笑登元至正癸卯進士任鹽山縣令洪武十三年徴為國子助教横經發難繫蔀廓塞學者如歸嘗同諸儒應制撰諸勑文操筆立就雅稱上意遂遷學士十五年五月命撰宣聖廟碑文賜衣帽文綺鈔錠秋七月庚戌上謂訥曰朕觀尚書至敬授人時嘗嘆敬天之事後世中主猶能知之敬民之事則鮮有知者盖彼自謂崇髙謂民皆事我者分所當然故威嚴日重而恩禮寖薄所以然者視民輕故也視民輕則與己不相干而畔涣離散不難矣惟能知民與已相資則必無慢視之弊故曰可愛非君可畏非民衆非元后何戴后非衆罔與守邦古之帝王視民何嘗敢輕故致天下長久者以此而已是月有廣東儒士獻治平䇿上覽之謂訥曰此人不識道理豈有涉數千言而不及用賢天下之大欲朕一人自理可乎盖自知而用則所見者狹知賢而用則所及者廣訥對曰賢才在天下人主豈能知之必頼羣臣薦舉然得賢與否係所舉在何如爾上曰小人所舉未必為君子君子所舉未必為小人故觀其舉者可知其人之賢否矣十一月以訥為文淵閣大學士制曰朕觀古今賢者遇君有遲速名譽有先後昔望于磻溪有飛熊之兆而乃興周八百訥年雖髙邁特授是官爾往欽哉未幾以為國子祭酒上復勅諭曰太學賢士所闗禮義所由出人材所由興自建學以來厯選師儒以居是職至今未臻其效豈士習之難變與抑師道之不立與此朕所以夙夜究心慎擇老成以任之惟卿夙學耆徳可以任此卿宜體朕意使士習丕變邦其有頼焉十八年二月甲辰隂晦不雨雪雹如雷訥上守邊䇿曰今海内既安蠻夷奉貢惟沙漠未遵聲教若置之弗治恐嵗久滋患邊圉卒荒若窮追逺繫恐士馬疲費餽餉艱難陛下為聖子神孫萬世計莫若善備邊之策爾備邉固在乎兵食足食又在乎屯田漢本始中匈奴率十萬餘騎為冦趙充國乃率四萬騎分屯緣邉九郡單于聞之引去夫以四萬騎屯九郡而充國統制其間則當時之籌畫可見矣今諸將中豈皆借才於異代哉宜選其有智勇謀畧者數人每將以東西五百里為制隨其逺近髙下分屯所領衛兵斟酌損益率五百里一將彼此相望首尾相應耕作以時訓練有法遇敵則戰冦去則耕此長久安邊之䇿也上善其言其為祭酒嚴毅莊敬諸生畏如神明乙丑戊辰兩科得士最多而魁選出太學大被賞遇及遘疾上遣中使諭之畧曰卿禀性純誠疾必速瘥命畫工圗其像子麟往候問至廂房疾篤始請歸寢訥厲聲曰何風雲氣少兒女情多耶卒年八十上親為文祭之官其次子復祖為司業廖道南曰往予甲戌遊南雍時沔陽魯公鐸為祭酒乃令習誦監規乃嘆我聖祖每戒敕諸生恒曰宋訥云乃知師道立善人多訥之名不朽矣彭韶賛曰中州文獻遺緒可徴稽古力學飾車以行百僚讓徳六館蜚聲嚴而有度樂育羣英乃叙教條爾準爾䋲士皆適用一人以寜制詞褒重吾道増榮文淵閣大學士朱善朱善字備萬江西豐城人少聰頴十嵗能文通五經四書大義祖雲洞先生嘗謂人曰吾孫他日必為令器及壯以經學授徒壬辰兵變隐居鄉里養親教子杜門絶跡以聖賢道學為巳任奉繼母李氏克盡孝道友諒戰争扶母奔竄十餘日復全人謂孝感所至髙皇帝平一海内開建學校乃以豐城為富州州守強憲中南昌守許方俱延至郡庠教有成效以名聞於朝授郡學教授洪武八年廷試諸儒善為首乃以為修撰署院事知制誥逾年以奏對失㫖謫戍遼東復改典籍放還十七年上思用老成驛召善還京以為待詔七月戊戍上御東閣謂善曰人君能以天下之好惡為好惡則公以天下之智識為智識則明盖人之常情多矜已能好言人過君子則不然揚人之善不矜已之善貸人之過不貸己之過又曰萬事不可以耳目察惟虚心以應之萬方不可以智力服惟誠心以待之善嘗奏有國者重世臣有家者重世婚近日禮教弗明婚姻混亂或已聘而見絶或既婚而復離議律不精其禍乃至於此成周之世為婚姻者不過齊宋陳杞數國而已故當時稱大國曰伯舅小國曰叔舅世為婚姻可知也列國之君曹魏陳鄭秦晉莫不皆然降及後世如晉之王謝唐之崔盧潘楊之睦朱陳之好罔不以世婚為重今宜弛禁以通人情別族以明世教上從之十八年命主考禮闈撤棘之日乃超遷奉議大夫文淵閣大學士五月辛酉朔上御華盖殿命善進讀心箴上曰人心道心有倚伏之幾盖仁愛之心生則忮害之心息正直之心存則邪詖之心消羞惡之心形則貪鄙之心絶忠慤之心萌則巧偽之心伏故人常持此心不為情欲所蔽則至公無私自無物我之累矣八月丙辰善復言曰古者人君至治重在任人蓋任衆賢為耳目則視聽周乎四海任衆知為計慮則利澤施於萬民今天下太平惟選任賢才宜留聖慮上曰任人之道當嚴於簡擇簡擇嚴則庸鄙之人不進當專於任使任使專則茍且之意不行然必賢者乃可以專任之非賢而專任者必生亂也是任人為難然人亦有謹始怠終者亦有過於前改於後者固不能保其始終惟始終如一者其懐忠報國之心堅如金石安得不任之若匿詐似信懐姦似忠者决不可任也是年忽遘危疾上遣醫調治其子逢掖請告還豐城卒年七十有二屬纊正冠危坐舉手加額曰感荷聖恩無以報也語畢而絶鄉人見有星如虹墜其舍所著有詩經解頥輯釋史輯諸書廖道南曰予幼學詩誦善所著解頥輯釋頗得其要領然而國風民謡宗廟朝廷雅頌之詩爰自千篇刪為三百亦已嚴矣宋儒泥於鄭聲淫之說遂槩以為淫奔而不以進講豈皆作者之本㫖哉思欲起善于九原而與之論難又胡可得也林塾賛曰羡彼雲洞煜有来裔道立教成令聞斯渒乃擢翰林掌帝之制寵辱不驚皇極經世爰起校文登華振滯墜星有占歸則云逝東閣大學士吴沉吴沉字濬之浙江金華人故元國子博士師道子也博學有文累徵為縣庠訓導辭不就洪武十二年薦授待制十一月甲午朔上觀漢紀顧謂沉曰人君理財之道視國如家可也一家之内父子不異貲其父經營儲蓄未有不為子計者父子而異貲家必隳矣君民猶父子也若損民以益君民衣食不給而君獨富豈有是理哉丁酉上論持身保業之道又謂沉曰人當無所不謹事雖㣲而必慮行雖小而必防不慮於㣲終貽大患不防於小終虧大徳謹小行而無已者可以成大善忽細事而不戒者必至於成大惡常人且然况人君乎沉對曰聖慮及此誠社稷永安之道上曰安生於危危生於安安不克慮則能致危危而克慮則能致安在於能謹與否爾上御奉天門視朝畢又謂沉曰人君治天下進賢納諫二者真切事也沉曰求之於古克行者鮮矣是故亂日常多治日常少上曰使其真知賢者與治其國何有不好真知諫者在於忠已何有不納惟其知之不真是以於已難入若誠能好賢則不待招􅝘而賢者自至誠能納諫則不待旌賞而諫者必來沉曰陛下之言及此國家何幸焉未幾降編修十三年六月丁卯復以為待制沉薦教授童冀儒士吴慎遣使徴之十四年冬十月辛酉給事中鄭相奏言尊無二上稱臣於東宫是並所尊矣沉駁之曰東宫國之大本所以繼聖體承天位者也臣子尊敬之禮胡得而異焉請凡啓事東宫如舊制上從之十五年十一月戊午乃以為東閣大學士十六年二月朔上將享太廟沉進精誠錄先是上謂沉曰朕閱古昔聖賢其垂訓立教大要有三曰敬天曰忠君曰孝親君能敬天臣能忠君子能孝親則人道立矣然其言散在經傳未易㑹其要領爾等其以三事以類編輯至是書成上覽而善之命沉撰序三月沉因講周書至國則罔有立政用憸人上曰甚矣國家不可有小人有小人必敗君子故唐虞任禹稷必去四凶魯用仲尼必誅正卯沉進曰書言去邪勿貳所以深致其戒上曰國家不幸有小人如蓄毒藥不急去之必為身患小人巧于恱上忍于賊下人君若喜其順已而恣其所為將無所不至矣沉曰小人中懐奸邪而言似忠信不可不察上曰然小人善於逢迎彼知人主所樂為者不顧非義乃牽合附㑹曰是不可不為人主不樂為者不顧有益於國家亦牽合附㑹曰是不必為此誠國之賊也自古知人固難而知言亦不易八月丙戌以進講後期降侍書尋改博士十九年七月丁丑卒沉富蓄逺覽嘗因奏對誤遷渭源教諭未行改典籍陟大學士考功監劾其怠事降侍讀終博士三仕三已無喜愠人以此多之廖道南曰予觀沉所進精誠錄其學粹乎正矣至論小人不可用斷斷乎其為確論也金華之學沉亦可取矣贊曰於乎君子浙水之英竒氣焕發正學端純精誠有錄格于皇天天心克享秉志彌堅三仕三黜喜愠不形於乎君子浙水之英文淵閣學士兼左春坊大學士解縉解縉字大紳世居鴈門厥後徙居吉水遂為吉水人曽大父應辰元髙安教諭應辰生子元子元生開先開先生縉縉生而英悟竒絶五嵗誦書七嵗賦詩十嵗日記數千言十八舉江西鄉試第一洪武二十一年計偕如京師考官劉三吾閱卷極其稱賞名遂大振與弟綸暨女弟之夫黄金華同舉進士皇祖親加簡㧞選縉及金華為庶吉士讀中秘書日侍左右特被寵眷一日寓大庖西室諭之曰爾縉試舉今日施政所宜直述以聞縉即屬草以進其畧曰陛下得國之正非漢唐宋所及取天下于羣盗捄民生於塗炭命將出師皆受成筭不假良平不倚信布女寵外戚寺人藩鎮之患消融底定且不邇聲色不殖貨利不為逰畋又逺過漢唐宋之君而無愧三代盛王矣夫令出惟行也不宜數改令數改則民疑刑期無刑也寜失不經刑太繁則民玩今好善而善不顯善者未必䝉福惡惡而惡日滋惡者未必䝉禍臣願篤惇信之本加慎密之功喜怒一聽于天理存養無間于須㬰夫人君不以察為明也元首叢脞則股肱惰萬事皆隳人君當以徳為政也帝徳罔愆則衆志應天命用休今畏天畏鬼神矣畏民則未至治民治強暴矣治心則未至臣願畏民為畏天之本治心為治民之本祭不必瀆受無咎之福神不必勞享無為之治夫經正則庶民興故孟子距詖行息邪說臣願上泝虞夏商周之華奥下及濓洛闗閩之佳葩釋老之壮者驅之復于人倫經咒之妄者火之絶其欺誑斷瑜珈之教禁符式之條夫名不正則言不順故賈生定官名易服色臣願明經制以任諸侯王於衆職推恩義以待百執事于一體大臣不施辱罰屬官不加捶楚夫禮樂不備非所以協神人臣願配天復掃地之規尊祖隆七廟之制祀列聖于太學祀孔子於諸學而又訪求審樂之儒大備禮經之缺夫險要不防非所以保邦國臣願開武舉以收英才擇闗隘以屯重鎮額設弓手課之以弓弩兼教民兵習之于兵農而又時申戒飭之令特重官守之防夫風俗不正非所以示民趍臣願倣藍田吕氏鄉約及浦江鄭氏家範率先于世族以端軌則夫田稅不均非所以厚民生臣願行授田均田之法擬常平義倉之舉積久以嵗月以豐財賦夫臺綱不肅非所以厲清要長風采今御史糾彈咸承密㫖未聞舉善但日除姧臣願去朋姦倚法之條使民有所恃而不恐夫賢路不清非所以勵頑鈍奨忠貞今椎埋嚚悍列布朝省朝捐刀鑷暮擁冠裳臣願遵鄉舉里選之法使民有所勸而為善尤願陛下推所以愛臣之心以愛天下推所以待臣之心以待萬物幸埀鑒焉奏凡數千言上嘉其識時兵部侍郎沈溍忌縉才誣其狎侮胥𨽻上慮其中傷即拜江西道監察御史值都御史袁泰搆害張昶怙勢恣横諸御史莫敢糾其非縉執筆起草力詆其姧狀又代虞部郎中王國用論救韓國公李善長寃疏上又慮其涵養未至召縉父謂曰才之生甚難而大器者晚成其以而子歸益進其學又諭縉曰朕與爾義則君臣恩猶父子其歸益盡心于古人後十年來朕大用爾未晚也縉侍父歸感恩勵志所造益深矣髙皇帝升遐縉趍赴臨權臣搆害謂赴臨非詔㫖遂謫河州未幾召還入為待詔一日於宫中披覧建文時羣臣所上封事千餘通命縉徧閱有闗政治者留覧餘悉焚之文皇靖難雅聞縉名拜侍讀學士階奉訓大夫初開文淵閣簡用七人備顧問以縉為首諭之曰爾七人朝夕相與共事鮮離左右朕嘉爾等恭慎故在宫中亦屢言之然恒情保初易保終難朕常存于心爾等亦宜謹終如故庶幾君臣保全之美縉對曰陛下不以臣等淺陋俯垂信任敢不策勵圗報上喜各賜五品公服又曰皇后欲召見爾七人命婦其即令赴柔儀殿見之永樂元年十二月壬辰上御謹身殿閱髙祖御製文集諭縉曰皇考文章天資超邁然亦學問所至觀其所著皆天地之心帝王之度語簡理至藹然可見朕于宫中徧索宸翰不可得有言建文君自焚時并寳璽皆毁矣意者其有遺帙乎縉對曰國初佐命之臣理當有之於是遺書諸藩索之二年八月己丑縉進呈大學正心章講義上覧之至再諭之曰人心誠不可有所好樂一有好樂泥而不返則欲必勝理若心能静虚事來則應事去如明鑑止水自然純是天理朕每朝退默坐未嘗不思管此心為切要十二月進文獻大成賜宴禮部是嵗文華寳鑑成上賜皇太子諭縉曰朕皇考訓戒太子嘗采經傳格言為儲君昭鑑録朕此書稍加充廣益以皇考聖謨大訓以為子孫帝王萬世之法誠能守此足為賢君昔秦始皇教太子以法律晉元帝授太子以韓非書帝王之道廢而不講此所以亂亡朕此書皆大經大法卿等兼輔東宫從容閒暇亦當以此為說庶幾成其徳業他日不失為守成令主嗣後纂修髙廟實錄及永樂大典命縉為總裁官先是上與淇國公丘福等二三大臣議建儲諸臣咸謂髙煦有扈從功上不以為然召縉密議事遂定立仁宗為皇太子髙煦為漢王加縉為學士兼右春坊大學士階奉議大夫未幾福等初議泄于外髙煦知之憾縉獨深遂譛于上曰藩邸舊臣無泄者其縉泄之乃坐縉廷試讀巻不公罪出為廣西㕘議既而禮部尚書李至剛誣縉怨望改交阯八年入京奏事時車駕北征皇太子監國縉伏謁徑歸髙煦聞之又譛縉私覲儲君無人臣禮復竄交阯之化州檢討王偁在謫所邀與同趍廣東之化州縉復上言請用數萬人鑿贑江上大震怒徴逮詔獄拷掠備楚詞連大理丞湯宗中允李貫賛善王汝玉編修朱紘檢討蔣驥潘畿蕭引髙經厯髙得暘及李至剛相繼死獄中縉子禎應禎亮舉家俱戍邊仁宗登極特宥還官其子禎亮為中書舍人縉􅁭宇曠略絶無城府喜引㧞士類如曽棨等二十八人俱所奨進太宗嘗命縉評諸臣縉以實對於蹇義曰其資重厚中無定見於夏原吉曰有徳有量不逺小人於劉􅖡曰雖有才幹不知顧義於鄭賜曰可為君子頗短於才於李至剛曰誕而附勢雖才不端於黄福曰秉心易直確有定守於陳瑛曰刻于用法好惡頗端於宋禮曰戅直而苛人怨不恤於陳洽曰疏通警敏亦不失正於方賓曰簿書之才狙儈之心既奏上以授仁宗曰李至剛朕洞燭之矣餘徐騐之仁宗嘗問建文所用諸臣縉對曰此皆洪武中人才往事不足論已問尹昌隆王汝玉曰昌隆君子而量不洪汝玉文翰不易得所惜者市心爾縉卒後十餘年仁宗出所評十人者示楊士竒曰人謂縉狂士乃今知非狂士也楊士竒銘其墓曰千里之足越國過都或一蹷之不虞梗楠百尋其才之螙寜見捐于匠輸郁乎紛紛五采承日競瞻望以忻快何泯沒之遄疾干將地下其神不死尚有光華天漢之涘廖道南曰縉負竒氣抱儁才意興所到肆筆成章水摶蛟蚪陸剸犀象淵乎其不窮浩乎其若有餘其自視何如者髙皇網羅英俊智屈羣䇿當時翊運元臣雖親如善長貴如廣洋惟庸近侍如安如濓如觀如素雷霆所擊罔不震慴縉以一少年上庖西萬言疏批鱗逆心罔所諱忌而聖度優容令其進學才難之嘆猶可想見規模真𢎞逺矣召旋河隴踐厯清華密賛建儲有故老舊臣所不及知而獨斡運廟謨措神器于磐石視古英哲何以加諸然諫沮交阯力抗權倖卒罹于讒莫之敢白悲夫賛曰董子三策賈生萬言誓日邅廻遡風孤騫縉也竒才國士鮮儷遭際真龍逆鱗弗諱河朔既竄日南載遷魂飛湯火殄瘁疇憐文貞銘辭勒于貞石潜光益彰照耀方策文淵閣大學士胡廣胡廣字光大江西吉水人延平守子祺之孫永豐丞師尹之子也㓜受學于叔祖子貞及長之閩從黄仲器逰建文庚辰舉進士第一賜名靖授修撰文皇登極簡用儒臣入文淵閣擢侍講疏請復其舊名允之踰月改侍講階承徳郎上一日問百姓安否廣對曰郡縣窮治姦黨外親深為民厲詔免䆒頼全活者甚衆四年七月又問曰昨有中官自江西來言田家刈稻已畢何獨大早對曰臣鄉民多勤且多種早稻上曰勤之一字豈獨農家為然至于人君尤當致勤於心朕每退朝静坐必思今日所行幾事果當於天理合於人情則心安矣否則中夜必思命左右記之俟旦改之盖一事失當民受其弊故不得不勤爾廣對曰誠如聖諭未幾陟右庶子仍兼侍讀四年七月命撰神木山碑文皇太子立遷廣為學士兼右春坊大學士階奉政大夫諭吏部曰廣等侍朕日久繼自今秩滿勿改外任五年七月命同淇國公丘福等輔導皇太孫賜之𠡠諭略曰棟樑之建必由匠石之功圭瓉之成必假琢磨之力卿等皆懋簡徳藝職輔東宫東宫之子必資兼弼宜協心同志輔導于成推廣仁義道徳之源開陳二帝三王之治涵養本原恢𢎞智量以成其徳器庶國家有無窮之休卿等亦有無窮之聞五年冬廣進呈文字上覽之稱善問曰黄淮不滿于楊士竒何也廣對曰淮有政事士竒有文學盖因解縉重士竒輕淮故併及於臣上曰知汝不客于淮惟朕不為所惑廣頓首謝六年七月命撰浡泥國恭順王碑文七年二月甲戌聖學心法成諭廣曰古人治天下皆有其要雖生知之聖亦資學問由唐虞至宋聖賢名訓具著經傳然簡帙浩繁未易遽領帝王之學惟得其要篤信力行足以為治朕惟皇太子天下之本今當進學貴在知要朕因機暇采輯古聖之學如執中建極切于身心家國天下者類為成書卿等試觀之廣曰帝王道徳之要備載此書宜與典謨訓誥並傳萬世八年上大閱誓師聞衛喇特使者言諭廣曰國家無所用兵今日此舉非得已也廣對曰孔子所慎齊戰疾願致謹焉上曰孔子又言我戰則必勝祭則受福誠敬之至效可必也三月丙子上北征次凌霄峰諭廣曰諸將比來不進一言何也廣曰成筭在上莫之能禆上曰好問則裕自用則小雖聖人資于芻蕘朕曷敢任巳以掩羣䇿暨旋師廣等頒賚有差九年多罕台吉并女直野人來朝上諭廣曰朕非欲併其土地良以此輩貪殘數為邉患來嵗賂以金幣剥民膏血若餌虎狼今既畏服授官賜賚捐小費以弭大患可也十一月乙巳重修髙廟實錄命廣同胡儼等為纂修官十二年十月甲寅諭廣等曰五經四書皆聖賢精義要道其傳註之外諸儒議論有發明餘藴者爾等采其精語増附於下其周程張朱諸君子性理之言如太極通書西銘正䝉之類皆六經羽翼爾等亦别類成編務極詳備庶幾可垂後世命廣為總裁官書成廣等撰表進呈上親製序文擢廣為文淵閣大學士時禮部郎中周訥建請封禪羣臣多從之廣撰却封禪頌以進上大嘉賞十六年五月嬰疾卒年四十九仁宗登極贈官賜謚奠章有云卿徳行文學士林所重事我皇考論思宥密十有七年清慎恭勤始終一節輔朕春宫小心直諒今特加贈榮祿大夫少師禮部尚書謚文穆仍賜其家金鈔文綺官其子穜為檢討楊士竒銘其墓曰經國所資文武並施惟武以靖惟文以治巍巍太宗統御九有任武暨文如左右手公職詞坦十有九禩秉恭執勤司帝之制玉冊金簡天章龍文光華日星敷宣帝仁萬幾燕閒清問前席公所入告惟帝時懌公所蓄志寛惠被下沕穆泯焉密賛鴻化春宫輔徳平直之行二聖惟明獨鍳公誠好文之朝儒林之首人聳其瞻公眎無有泊虚之存簡肅之度彼其何心有好有惡寵章駢蕃賁終猶始始終之全曠代其幾金螺在左文江在右埋璧有光上貫牛斗廖道南曰國朝選士擢冠於廷者自吴伯宗任亨㤗軰受知皇祖至廣益大以肆表章六經及性理諸書可謂有大造於後學者觀其扈蹕帷幄之籌與夫典樞綸綍之文蔚然炳矣視文貞以下鮮與其儷云賛曰東壁之躔月合星聮西崑之岫玉澤珠懸彼美人兮龍見于田運逢九五風雲翕焉本天親上上際九𤣥本地親下下徹九淵七俊廻翔頡頏誰先宏猷秘畧公也則然吏部侍郎兼學士曹鼐曹鼐字萬鍾真定寜晋人曽祖克柔祖廷訓父祉咸隐徳弗耀鼐幼有遐志日誦數千言居常篤行事繼母備極孝養初舉鄉薦中乙榜授代州學官疏辭不受銓曹衘之改任泰和典史時中使旁午置郵無虚日鼐處之裕如公暇即延禮師儒講明理性宣徳壬子督部工匠赴闕䟽乞入試中第二人楊文真公一見竒之明年廷試宣皇策以羲禹河洛象數鼐對稱㫖上親擢第一授翰林修撰從楊文定公逰所得益深英廟初御經筵掄選講讀官鼐首預焉敷納明暢聞者聳敬預修宣廟實錄轉侍講五年簡入内閣叅知政事甲子進學士乙丑廷試讀卷得商輅為第一是嵗陟吏部右侍郎仍兼學士己巳五月戊申鼐奏侍講劉鉉修撰王振堪教庶吉士修撰許彬郎中潘勤堪督四夷館從之七月俄聞額森大舉入境中官王振力請親征上命武官英國公張輔等文官兵部尚書鄺埜等及鼐與侍讀學士張益扈從廵邉是月壬寅車駕次鷄鳴山癸卯次萬全峪是夕金星犯亢甲辰次懐安是夕黒氣四塞乙巳次天城丙午次陽和是夕火星犯土丁未次聚落驛戊申次大同庚戌次雙寨王振蔚州人邀上幸其第辛亥次滴水岩壬子次洪州癸丑次白登王振益恣廹挾進兵成國公朱勇膝行聽命户部尚書王佐竟日跪伏草中噤無一語惟欽天監正彭徳清首斥振曰象緯示警不可復前若有疎虞䧟乗輿于草莾誰執其咎鼐繼之曰臣子固不足惜主上繫宗社安危豈可輕進振怒詈之曰儻有此亦天命也八月辛酉次土木命太監吴亮相地布營陣未定敵已據南河次日敵偽退王振復矯制起營追之大為蹂躪我師敗績死者十餘萬人鼐及諸臣五十二員皆死之景帝聞之贈鼐榮祿大夫少傅吏部尚書文淵閣大學士謚文襄遣官諭祭官其子恩為大理評事英宗復辟加贈太傅改謚文忠又官其孫為錦衣百户廖道南曰予觀李忠文公及劉文安公奏疏謂自古外國之禍未有甚于土木之難者夫漢之冒頓桀黠方張唐之安祿豢飬已久宋之遼金及元則又中國偏安勢匪其敵我明當全盛之時王用三驅獲狐射隼而乃受制閹䜿親勞六飛至使全師覆沒善人殄瘁如鼐者褎然為廷魁首元䘮沙漢身膏草野不亦可悲乎予故備述國史亦以為世鍳也已賛曰六龍北狩八駿西馳龍沙遼邈狼山逶迤矯矯倫魁耿耿大節其身雖隕其神猶烈人亦有言泰山鴻毛之子之死當辨秋毫文淵閣大學士彭時彭時字純道江西安福人正統戊辰進士第一授修撰己巳英廟北狩郕王監國命時奪情起復入文淵閣陞侍讀賜五品服時請終制不允值易儲遷左春坊大學士寰宇志成陞太常卿兼侍讀天順元年九月上御文華殿召時入見問年幾何時對曰犬馬齒四十有二上笑曰年方壯可用也覆命入閣兼學士時徐有貞既去許彬薛瑄岳正吕原相繼拜命及李賢復入欲于閣中南向坐時曰不可宣宗臨幸跡猶在也賢曰東閣何獨正坐時曰東閣西向内閣南向恐非臣子所敢專且華盖謹身文華武英皆至尊所御設官兼殿止可侍坐備顧問正坐非禮也賢語塞戊寅二月恭上聖烈慈夀皇太后徽號時條上寛恤數事詔頒行之仍賜金綺有差十月扈駕校獵于南海己卯賜逰西苑五月端午賜觀驃騎七月賜逰南内庚辰上御南薫殿召時同李賢吕原入命内侍鼔琴賜博帯十二月閱射西内召時同觀憲宗即位陞吏部侍郎知經筵尋進兵部尚書兼學士給假歸省遣中官䕶行因四川地震時上言十事賜麒麟服總裁英廟實錄成加太子太保兼文淵閣大學士慈懿皇太后崩時上言請如漢文葬吕后宋仁葬劉后故事不報時同禮部尚書姚夔率百官伏文華門號泣争葬禮上感動從之戊子九月丙寅彗星見時上言正宫闈廣儲嗣數事是嵗改吏部尚書賜玉帯己丑冬無雪時上言三事因及景帝固安公主及筓宜出嫁太監劉永誠冒軍功不宜封以伯爵從之丙申十二月庚辰時上言比者彗見天田西掃太㣲北近紫宫警懼譴告可謂至矣因條上七事一曰正心術二曰謹命令三曰親接見四曰慎賞罰五曰納諫諍六曰勵官守七曰恤軍民上嘉納之是嵗加少保卒贈太師謚文憲官其子頥為尚寳寺丞廖道南曰予觀可齋記乃見文憲公之貞朴非若文達公之多智也及讀國史謂時端慎嚴密外和内剛立朝三十年未嘗不在公公退未嘗語子姓以政事於手今之君子何獨不然温室之對可為永鍳也已賛曰漢稱丙魏吉知大體唐稱姚宋璟能正已惟明達務惟介知止於乎文憲無愧斯語文淵閣學士階兵部尚書苗𠂻苖𠂻字秉彛鳯陽定逺人永樂辛卯進士及第授編修宣徳初預修兩朝實錄轉侍讀正統紀元侍經筵預修宣廟實錄進侍讀學士命入内閣典機務乙丑充廷試讀卷官丁卯擢兵部侍郎兼前職戊辰廷試讀卷得彭時為第一景㤗初陟兵部尚書兼學士乞休景帝賜之勑曰卿以科目髙第發身事我皇曽祖考以至于朕凡四十年厯官翰苑寅畏小心朕方進卿以大司馬兼翰林長官冀有倚毗曽未幾時遽以老辭揆之古先哲王求舊之美固不能㤀而士大夫甘退之節亦不可拂特賜寳鏹金綺給舟以歸以副朕懐賢念舊之意卒贈榮祿大夫加少保賜文康子穟為監察御史廖道南曰予觀中都志載苖文康素履弗得其詳及讀國史稱其為人温厚簡重外和内莊諳于世故樂道人善翛然有塵外之意予始知文康之風遐哉逖矣賛曰嵩嶽巃嵸趍于中都渾河洸洋風氣鬱紆乃生文康躋陟龍圗嬉笑叱咤咳唾璣珠急流勇退上嘉兩疏國史如丹尚有嘉謨文淵閣學士贈禮部尚書馬愉馬愉字性和山東臨朐人宣徳丁未進士第一授修撰正統初轉侍讀倚經筵預修宣廟實錄進侍讀學士庚申命入内閣乙丑遷禮部侍郎兼侍讀學士嘗奏讞疑獄多所平反兩考㑹試甄㧞才雋人咸稱之忽晨起趍朝仆不能語事聞即命醫往治越四日卒年五十三上聞嗟悼賜棺槨賻鏹萬緡命有司營兆域贈禮部尚書兼學士舊例贈者無兼官兼之自愉始廖道南曰予觀山東志謂愉淳雅寛厚行義可式及讀國史則又云端重簡黙自處澹如門無私謁於乎使居台揆者其門如市其心如水亦何愧於愉哉賛曰青州之野長應虚危倫魁之擢文炳壁奎商彭匪夀子淵匪夭大化司之若彼莾𦕈於乎若人入掌絲綸胡為遽隕天奪良臣天奪之良不憗遺老蒐幽秘史丹青厥貌文淵閣學士贈户部尚書江淵江淵字時用四川江津人宣徳庚戌進士選庶吉士授編修轉侍讀正統己巳陞刑部侍郎又改户部侍郎兼學士景泰辛未主考㑹試得吴匪為省元尋命廵視淮徐諸郡淵條奏三事一准之常盈徐之廣運諸倉俱在城外宜築月城以守之一天津為北河之㑹鳯陽為中都之㑹宜放操軍以守之一河南為中原之要地北平為京師之巨甸宜選民兵以守之疏上命所司議行尋改吏部左侍郎景泰壬申以易儲事加太子少師入内閣預機務英宗復辟刑于謙王文王誠舒良張永王勤于市謫陳循江淵俞士聰項文曜充鐵嶺軍後石亨敗復其官廖道南曰予觀景泰時陳循柄國凡厥有猷有為者咸程厥能効厥用然而任怨太深操權太重怨叢則衆怒權踰則主疑如江時用等才固可取而志亦可恤也循之明於知人暗於知已又胡足恤乎賛曰西川浩𣺌玉壘攸崇千崖屹嶫金峨是宗鱉靈為相杜宇為辟子紏小白建成元吉君子於兹權其重輕師臣雖美儲位當寜於乎時用昧於時中鐵嶺之役請祝勲庸文淵閣學士贈禮部尚書許彬許彬字道中山東寜陽人永樂乙未進士選庶吉士授檢討宣徳中秩滿轉修撰正統己巳曹鼐推舉提督四夷館九月陞大理少卿尋遷太常卿景泰庚午議遣近臣奉迎聖駕於沙漠彬毅然請行曰主辱臣死分也八月辛酉額森為土臺設座於上率衆膜拜奉辭太上皇進良馬貂皮遣得知院等䕶送至野狐嶺仍遣五百騎送至宣府彬謁見太上命寫罪已詔勑諭文武羣臣仍遣彬祭土木陣亡官軍英廟復辟遷禮部侍郎兼學士入文淵閣叅知政事嘗薦王竑治河果有成績及石亨専横憾岳正忤巳并及於彬調南京禮部未幾出為陜西叅政亨敗乃復其官卒贈禮部尚書廖道南曰予觀天順日錄及袁彬李實楊善紀行記乃知許道中之大節亦不可誣也夫晉之懐愍宋之徽欽鑾輿奔播于龍沙衮藻䝉塵於狼胥良以中國諸臣狃于細節闇于遐覽拘于𤨏務暗于逺圖未有若我朝英廟之全福而諸臣建䇿逺出晉宋之上如許道中者詞林中之翹楚也賛曰龍庭荒漠六飛廻翔虎闗嚴閟萬乗趨蹌偉哉志士捐生為國捧日以還赫赫業業推賢讓能綽焉有容立名不朽於乎道中文淵閣學士階禮部右侍郎薛瑄薛瑄字徳温山西河津人曽祖常祖仲義皆通經教授鄉里父貞領鄉薦為真定元氏教諭再調玉田母齊氏夢一紫衣人入謁遂生瑄於學舍初生肌如水晶五臓皆露祖仲義聞其啼聲曰必異人也洪武己卯父貞改除馬湖吏目瑄撰平雲南賦黔國見而竒之永樂己亥父貞復除鄢陵教諭庚子瑄發觧河南明年辛丑登進士宣徳戊申授監察御史差監湖廣銀塲手錄性理大全潜心誦讀深有所得著讀書錄正統紀元擢山東僉事提督學政首以朱子白鹿洞規開示學者講明理性多所造就楊文真公薦之入為大理少卿撰大理箴以自警時太監王振專柄錦衣指揮馬順附之㑹有百户病死其妾誣妻殺其夫瑄白其寃都御史王文譛之于王振振怒嗾言官劾之詔逮之獄處以大辟兵部侍郎王偉申救除名放歸正統己巳給事中陳信薦起為大理寺丞命督餉貴州户部侍郎江淵薦之陞南京大理卿蘇州有饑民火富室之廬者王文復往按其事坐以謀逆連及五百餘家瑄又白其寃文謂人曰瑄崛強猶昔瑄曰辨寃獲咎又何憾焉既而執之愈力頼以平反者甚衆天順初都御史楊善薦之特召為禮部侍郎兼學士入内閣一日英宗御便殿召瑄入語移時諄諄啓沃皆有闗於聖學君徳者是科命主考㑹試瑄以復性為問得劉定之為省元時曹石冒功亂政瑄曰君子見幾而作寜俟終日耶即上疏乞休卒年七十六子四人孫祺舉進士李文達公銘其墓曰昔有王氏鳴道河汾流風餘韻以啓休聞乃若薛公不以自足濓洛闗閩意向甚篤稽其出仕實始為親􅆒厯中外進學日新學既日新道亦有得身體力行至無少息操履堅定外物不移中心自固夫豈有私富貴利達患難貧賤隨處而安曷有歆羡成就後學大小不遺由粗而精以隨其質嗟今之人無公所好公今已矣誰臻其奥廖道南曰予㓜誦讀書録以為程朱語錄之後即有此書及觀國史乃見劉文安公定議謂瑄直躬慕古談道淑徒進不附麗退不慕戀允為一代名臣然論其於朱熹之學未若黄􅆬輔廣之親承㣲言金履祥許謙之推衍緒論推之從祀似亦為過也彭韶賛曰力行好古進趨有程寤寐河洛以䆒舂陵􅆒厯中外大􅁄之卿縲絏非罪復起而丞貳卿掌制以弼以承豈寶逺物而志可行乞年以退惟道之楨文淵閣學士兼右春坊大學士吕原吕原字逢原浙江秀水人父嗣芳為萬泉教官卒於任原孤貧假館養母郡守黄懋舉充邑庠生正統辛酉鄉薦第一明年進士及第授編修癸亥預修五倫書賜寳鏹丁卯被選進學東閣侍經筵景泰初遣祭於蜀歸充經筵講官轉侍講壬寅遷右中允兼侍講是秋進侍講學士兼中允癸卯預修厯代君鑒錄主考順天鄉試乙巳預修寰宇通志明年擢右春坊大學士仍兼侍講天順初改通政司左叅議兼侍講主考㑹試時徐有貞既黜薛瑄請老乃特用李賢并召原與岳正入内閣命原兼學士總裁一統志成有金帶玉杯之賜壬午守制歸躬視母塋哀毁踰節期年卒年四十五贈禮部侍郎謚文懿子㦂為太常卿廖道南曰予觀楊文懿公誄原之文有曰繄檇李之鍾秀兮挺碩人其頎頎植仁義以為本兮横百行以為枝劉文安公輓原有曰君子非始之難而終之難若公之終孝不㤀於其親則無愧於其君矣盖嘆逢原之學所從來者逺矣及國史所載謂其為人寛厚不立崖岸事母撫孤克盡孝友其在内閣多所禆益郡志亦稱其内端外和與物無競程篁墩文葺遺事謂居官二十年家無田宅為學務實踐不事多言盖皆實錄也賛曰檇李之域龍淵是名嘉禾之秀虎觀有人惟陸宣公為唐内相惟吕逢原為明人望文懿所誄文安所哀於乎已矣上燭中台文淵閣學士贈禮部尚書王一寜王一寜字原闕浙江仙居人十三能詩父峻任國子監丞一寜從侍時仁宗在春宫聞其善撫琴召見命賦銀河詩嘉之俾就國子監讀書永樂戊戌舉進士授吏部稽勲主事於文華殿供事秩滿改修撰曹鼐薦教庶吉士萬安等預修宣廟實錄成轉侍講兩命為京闈考官正統戊辰遷禮部右侍郎景㤗初勑往湖廣督理軍餉明年召還轉本部左侍郎兼翰林院學士命入内閣預機務以中官王誠軰嘗受業報其私恩也壬申易儲進太子少師仍兼舊職尋卒於官贈太子太保禮部尚書謚文通廖道南曰古之豪傑之起也固不拘其類後世則不然乃若王伾王叔文李訓鄭注之儔或以他伎進卒敗其身而動摇宗社故曰君子未嘗不欲仕也又惡不由其道王君始由狎客射策甲科終由佞幸絲綸秘閣君子奚取焉亦以寓勸戒焉爾賛曰天台窈窕赤城霞標鴈蕩摩雲龍湫噴霄允矣王君夙頴埀髫皷琴潜邸校藝京寮卒階崇秩徳音奚昭文淵閣學士階户部尚書蕭鎡蕭鎡字孟勤江西泰和人宣徳丁未進士選庶吉士授編修正統初預修宣廟實錄轉侍讀未幾陞祭酒勤于訓士矩度整肅嘗欲乞歸監丞鮑相合師生三千餘人慰留如陽城景泰辛未召入文淵閣兼學士尋擢户部侍郎命議易儲事鎡曰無易樹子霸者所禁况天朝乎不聽加鎡太子少師因天變上疏論時政甚切修寰宇通志充總裁官書成陟户部尚書加太子太師仍兼學士廖道南論曰予觀邱文莊賛辭謂鎡蒼然古色淵然徳光進有所施舍可以藏知鎡為可人也及讀國史稱鎡言動温雅性多猜忌遇事亦多退避方景泰易儲時則顯言以争及加官秩則又靦顔以受是遵何徳哉賛曰文江之源靈氣鬰蟠仁山之麓英又挺生傑哉孟勤幼抱巨志繼踐金華徘徊廊宁時政有疏秘省有書力争易儲徳也不孤文淵閣大學士陳文陳文字安簡其先湖廣茶陵人有名蘭孫者其仲子欽徙居江西之廬陵文幼警敏甫弱冠即魁多士正統丙辰進士及第授編修癸亥被選東閣進學士己巳秩滿轉侍講景泰庚午主考順天鄉試以髙文毅公薦補雲南右布政轉廣東左布政天順改元召旋拜詹事癸未遷禮部侍郎兼學士入内閣甲申改吏部左侍郎與李文達彭文憲同心輔政成化乙酉陟禮部尚書總裁英廟實録加太子少保文淵閣大學士卒年六十四贈榮祿大夫少傅謚荘靖官其子璋為中書舍人廖道南曰予觀劉文安所著陳莊靖傳邱文莊所撰哀辭咸謂文出厯外藩入長宫端受密命賛化權謨謀毗益眷注日隆及觀郡志亦稱為一時之能臣而國史小傳則寥寥數語於乎若人者吾奚得而名狀之哉賛曰文達之才如崇通變文憲之介如璟守正荘靖於時同心輔政無言無争惟寜惟静出厯二藩入踐三台周旋曲折亦已焉哉文淵閣學士階兵部尚書尹直尹直字正言江西泰和人景泰甲戌進士選庶吉士授編修轉侍讀直上言典章制度必大備于文明之朝著述纂修當不廢于承平之世我祖宗神功聖徳雖登于秘史其儀文法制未載于全書雖有諸司職掌然遺畧尚多更革不一欲示永久曷粹大成乃若通鑑綱目起自周威烈王迄於五季兹宜續修以成巨典上是其言尋進侍講學士上言災異修省三十二事轉吏部侍郎兼學士入内閣加太子少保兵部尚書兼學士主考㑹試得程楷為第一是科得人最多如蔣冕費宏劉眷毛紀時江右李孜省用事鄉宦多附誣之直密與通但其斥中使李毅之誣辨御史吴珍之􅁈人又稱之卒謚文和廖道南曰予讀直所撰瑣綴錄力詆吴與弼之為人及諸勝已者悉加媒孽心竊疑之既而讀國史狀直之心如其所撰者不爽也賛曰大江之西吉水之濱英才疊出多為名臣直負修能屢有啓沃論史有疏𤨏綴有錄顯斥與弼潜附孜省國史如丹洞燭幽隐文淵閣學士階禮部尚書彭華彭華字彦實江西安福人景泰甲戌㑹試第一選庶吉士授編修天順中以多支廪餼坐除名頼大學士李賢救免成化初轉侍讀充經筵日講官進侍讀學士預修宋元綱目成陞學士文華大訓成遷詹事兼學士丁未陞吏部左侍郎仍兼學士入内閣尋加太子少保禮部尚書先是江右李孜省以小吏致位卿佐華私附之又與大學士萬安結為心腹以故肆讒投間亟亟若狂如尚書李秉王恕馬文升秦紘侍郎邢讓祭酒陳鑑與其同鄉劉宣羅璟相繼斥逐華之力居多未㡬輿疾歸卒謚文思廖道南曰予觀吉安志謂華才識超邁望重一時及讀國史累千百言皆極其醜詆又謂羅倫之逐張元禎之劾皆原于華予不敢盡信姑存其著者賛曰漢之廣受咸事儲皇宋之郊祁並擅文塲乃若二彭盍簮玉堂文憲何狷文思何狂既昧介石猶慚復隍彤管紀之云胡不臧文淵閣學士贈禮部尚書劉定之劉定之字主静江西永新人正統丙辰㑹試第一明年進士及第授編修正統己未六月定之上言十事一曰謹號令二曰察人才三曰處降夷四曰重守令五曰杜奔競六曰訓武官七曰嚴考課八曰惜名器九曰遵服制十曰禁淫奔疏上留中秩滿轉侍講景泰庚午定之上言自古邊疆之禍未有甚于今日者昔晉懐愍䧟於匈奴宋徽欽䧟于女真皆因邉塞外破藩鎮内潰救援不集播遷無所未有若今日舉天下之大合數十萬之衆奉上皇於沙漠委以與衛喇特者也晉宋既遭此旤之後元帝繼統髙宗嗣服皆舍棄舊都偏安一隅尚能奮既衰之勢振方張之敵未有若今日額森入侵直抵京城奉上皇以來而天下之大數十萬之衆聽其自來又聽其自去者也謹條上十事一曰戰陳二曰守禦三曰通使四曰降番五曰練兵六曰撫民七曰選將八曰賞罰九曰議政十曰徳學景帝嘉納壬申遷司經局洗馬定之又上請遣使奉迎命禮部㑹議行之丙子轉右春坊右庶子天順紀元改通政司左叅議兼侍講是冬進學士甲申遷太常少卿兼侍讀學士充副總裁官成化丙戌簡入内閣叅預機務明年秋陞工部右侍郎又明年轉禮部左侍郎俱兼學士卒年六十一贈資善大夫禮部尚書謚文安李文正公叙其集曰譬之山焉出雲雨産寳玉生材木禽獸而朽株糞壤亦雜乎其間斯足為嶽為鎮譬之水焉吞吐日月藏蓄魚龍變現蛟蜃而汚泥濁潦受之而無不容斯足為江為河為海若句鍜字錬探之有窮取之無餘不過為孤峰絶澗而止惡足以成其大哉文安伸紙運思揮毫對客正書旁竄晷不移刻稿不易幅及登秘閣析疑義稽古訓或日詠百詩或一揮九制渟泓演迤頓挫奔放竒正並用變化不窮昔漢劉向宋劉敞皆博極羣籍未見於用若文安晚始大用用亦不久功業未竟而其文大鳴于時固一代之盛哉廖道南曰予自兒時五洪家君嘗誨以文安之受教於石潭君也雖古人亦無踰焉乃取果齊諸稿讀之郁郁乎盛矣及閱國史乃見其昌言直氣卓不可撓沛不可禦昔人所謂此皆節義文章可相屈耶惜乎用之既晚未究厥施西涯其知言哉彭韶賛曰天資絶倫八面受敵髙古渾雄變化莫測經筵講官太子洗馬三疏抗言援筆立寫惟公之文名重天下豈但當時愛而不捨至今後人詞林定價文淵閣大學士劉珝劉珝字徳温山東夀光人正統戊辰進士選庶吉士授編修景泰丙子預修寰宇通志轉修撰天順改元遷右中允侍東宫講讀憲皇登極以宫寮舊臣擢太常少卿兼侍讀預修英廟實錄進太常卿兼侍讀學士甲午陞吏部侍郎充經筵日講官乙未簡入内閣兼學士丁酉陟户部尚書明年加太子少保文淵閣大學士文華大訓成加太子太保光祿大夫柱國時妖人李孜省輩左道亂政動摇國本珝力争之無少避謀遂沮然亦以此不安於位或搆以飛語假俳優以中傷之珝遂乞休詔允之卒諡文和子鈗為太常卿廖道南曰予觀東土志謂珝事親孝母沒廬墓時父昺在珝昧爽問安畢復詣墓所郡守李昂表其里曰仁孝豈即昌黎所謂出則秉笏垂魚入則侍安問膳者耶於乎孫子之昌固有本矣賛曰泰山蜿蜒滄海滂洋靈精灝氣鍾於夀光惟彼文和其徳不窳孝以事親忠以遇主抗疏辭榮幽栖雲門令聞不泯有徳斯存殿閣詞林記卷三
