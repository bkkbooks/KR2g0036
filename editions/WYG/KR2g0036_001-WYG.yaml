body:
  text: 殿閣詞林記巻一明廖道南撰殿學武英殿大學士吳伯宗吳伯宗名柘以字行撫州金谿人父儀元鄉貢進士伯宗生而岐嶷十嵗通舉子業識者竒之嘆曰此兒玉光劔氣終不可掩洪武庚戌鄉試辛亥廷試俱第一是時初議開科取士命國子祭酒魏觀博士孫吾與修撰王僎為讀巻官髙皇帝親製䇿問畧曰古者敷奏以言明試以功漢之賢良宋之制舉得人為盛今特延子大夫于廷不知古帝王敬天勤民其道何繇伯宗條對稱㫖上擢為第一賜袍笏冠服授承直郎禮部員外郎命與學士宋訥等同修日厯時丞相胡惟庸専横伯宗性剛直不屈惟庸􅋦之八年坐貶鳯陽伯宗上疏論時政因指斥胡惟庸罪狀不宜獨任以政恐滋久為國大蠧辭甚切直上覽其奏即召還賜襲衣鈔錠奉使安南獲馴象方物以歸獻之改國子助教十二年進講東宫首陳正心誠意之學皇太子嘉納明年改典籍御試以十題命賦詩伯宗援筆立就風格峻絶上大稱賞賜織金錦衣十四年遷太常丞不拜十五年又以為國子司業又不拜忤㫖貶陜西金縣教諭行至淮召還以為檢討拜武英殿大學士十六年冬至弟仲晏為三河令薦舉不以實坐是復降檢討卒伯宗為人温厚貞諒而不茍媕婀故屢獲罪所著有南宫集使交集成均玉堂諸稿廖道南曰喬林之枝風折之殘當衢之蘭物踐之傷若伯宗者以忤惟庸竟坐貶斥其直氣勁操屢折不囬說者以為開科第一人名徳俱稱非耶賛曰矯矯烈士大廷之魁侃侃直節君子之才積忤權臣乃遭竒禍人亦有言義不可過歴數徃哲如君幾人誰其繼之一峯羅倫華蓋殿大學士劉仲質劉仲質字文質袁州分宜人敏而好學博通經典洪武初為宜春訓𨗳被薦入詞垣奏對稱㫖授文林郎歴遷禮部尚書十五年四月詔天下通祀孔子增學校及師生廪膳上諭質曰孔子明帝王之道以教後世使君君臣臣父父子子綱常以正彛倫攸叙其功參于天地今天下郡縣廟學並建而報祀之禮止行京師未遍天下豈非闕典耶卿與儒臣共定釋奠禮儀頒之天下令毎嵗春秋仲月通祀孔子是年十一月戊午倣宋殿閣大學士之制以仲質為華葢殿大學士宋訥為文淵閣大學士吳伯宗為武英殿大學士吳沉為東閣大學士上親製誥文賜仲質曰朕閱宋書見尚文之美崇儒之道廓焉且當時諸儒皆以賢徳輔景運三百有竒焉今特倣宋制殿閣之名必期近侍有補文並歐蘇爾仲質才頗稱任授以華蓋殿大學士奉議大夫爾徃欽哉未幾質坐事降御史時有邵質亦為大學士質為人篤厚文多質實如其人云廖道南曰予讀國史乃知倣宋殿閣大學士之制設華蓋文華武英文淵東閣大學士以崇文儒以備顧問及觀聖祖御製文集乃見所謂華蓋劉仲質文淵宋訥之誥於乎休哉重矣或者漫不之攷乃云創自永樂是又可駭也賛曰端明龍圖寳謨煥章自宋已然文運隆昌髙皇作則乃建殿閣嗟乎仲質耆儒宿學宿學耆儒公輔之儲禮文寵重其究何如文華殿大學士鮑恂鮑恂字仲孚其先嘉興人元至治間始遷崇徳之千乘鄉恂沉悟淵頴受易于臨川吳幼清深有所得著大易傳義㤗定元統省試第一人至正中由鄉薦授温州路學正改教婺州御史劉彦博薦其學有原本為世儒宗洪武初以明經徵為文華殿大學士輔導皇太子暨皇太孫固辭歸隠與貝瓊結詩社所著有西溪稿云廖道南曰漢髙欲立趙王如意留侯乃為吕后畫䇿招致四皓以輔翌之矧洪武建極即創大本堂以教太子乃蒲輪𤣥纁聘諸耆儒視古帝王之禮臨雍齒胄何如耶不知恂詮長年將何以畀之耶賛曰浙水之南寔惟桐江咄咄子陵髙尚鮮雙浙水之北寔惟檇李矯矯徳輿才名罔儷江風山月白雲紫芝徳輿為友子陵為師文華殿大學士全思誠全思誠字希賢松江上海人博雅宏粹少負文名洪武十六年以耆儒徴授文華殿大學士賜敕致仕其辭曰朕觀古人有志之士雖髪白氣衰心猶不怠故能善其始終垂芳史冊卿懐才抱徳志肩古人朕甚嘉焉惜乎年迫衰暮志雖存而力不能任朕不忍復勞特令卿還鄉里以撫子孫享其奉養不亦恱乎時又有全詮湖州安吉人張長年髙郵人張紳山東登州人俱年七十餘禮部主事劉庸薦詮等明經通逹治體遣使徴之恂詮長年先至上見之甚喜賜坐顧問終日俱命為文華殿大學士詮等固辭上曰朕以卿等年髙故授此職以輔導太子爾免卿早朝日晏而入不久當從其志庶不負卿等平生所學而鄉里亦有光矣卿何辭焉恂等復固辭翌日放還紳後至以為鄠縣教諭廖道南曰粤自商山茹芝㝠鴻寥落上下千載數人而已全誠賜敕恂詮被寵龎眉皓首安車蒲輪雖竹帛所書圖畫所傳何以加焉賛曰采采紫芝英英白雲葆光凝和脫垢離氛既樂且康眉夀黄耉國之蓍龜號稱大老康侯晝接天子葵之邈矣髙風為世所師華蓋殿大學士楊士竒楊士竒名寓以字行江西泰和人曾祖景行仕元為待制景行生榮榮生子將子将生士竒士竒幼孤力學越章貢浮琴江艤鄂渚登黄鶴與蔣隠溪子立恭遊西山慨然有幽人貞士之志已而應奉翰林授王府審理靖難兵起約偕周是修諸人死難是修縊於尊經閣士竒不徃文皇履極擢國史編修簡入文淵閣進侍講兼春坊左中允轉左諭徳永樂二年撰文華殿講義上諭曰先儒謂堯典一章大學全書皆具亶其然乎士竒對曰堯舜禹湯文武數聖人凡修諸身施諸家國天下者皆大學之道也上曰帝王之道貴切已實用故孟子道性善言必稱堯舜爾等講說理性當證諸古人以牖朕衷焉是嵗饒州士人朱季友獻所著書詆訾濓洛諸儒士竒請焚其書毋使惑衆二年命侍東宫講學士竒撰易本義要㫖以進皇太子恱賜名周易直指因閱真氏文章正宗諭士竒曰徳秀學術純正如此對曰徳秀所著大學衍義為君者不可不知為臣者不可不知君臣不知此義為治皆茍而已又閱歐陽修文集喜其奏議懇切令賛善陳濟校正諭士竒曰為文不本大道斯無用之文為臣不能正言斯不忠之臣如歐陽子無忝矣廬陵有君子爾其勉之又間與賛善王汝玉論詩問士竒曰古人詩法何如士竒曰詩以言志明良喜起之歌南薫解阜之詩唐虞之君之志尚矣後世若漢髙帝大風歌唐太宗雪耻除兇詩徒尚覇力皆非王道至於漢武帝秋風辭及隋煬帝陳後主所為詩則萬世之戒也五年廣東布政徐竒入覲遍賂要津獨不及士竒文皇知之召士竒謂曰為臣當戒私交為士當務清慎爾其􅅷諸六年冬車駕巡狩北京命士竒輔監國于南京九年三月朔上御右順門召士竒問曰汝輔監國最久東宫所行如何對曰皇太子天資甚髙非人所能及事宗廟謹祭祀可以觀孝遇進表箋及諸儀物于行在必躬必親可以觀敬且有過未嘗不知知之未嘗不改其用人以愛人為本不輕任匪人真宗社之福也又問髙煦奪嫡之謀信否士竒對曰臣與蹇義同事東宫匪見之真不敢妄對漢王初封于滇不之之也改封于青又不之之也茲聞徙都北京彼欲留守南京其意可知已上黙然還宫亷知髙煦罪狀即禠其衣冠縶之且削其䕶衛徙封樂安州十一年十二月嵗除欽天監奏明年元旦日有食之禮部請朝賀如常儀士竒曰日食天變之大者宋仁宗時元旦日食富弼請罷晏撤樂吕夷簡不從後聞契丹免賀仁宗悔甚臣愚以為宜免賀上曰君子愛人以徳其如士竒議乃加左春坊大學士十四年十一月周王楚王來朝命士竒議謁陵禮士竒曰二王尊屬也皇太子太孫嫡宗也二王當居前分為兩行太子當于二王之後之中太孫又于太子之後之中諸孫班視太孫行視二王此非臣之臆見也朱熹家禮之序也上出儀注于袖中與士竒合十二月壬申歴代名臣奏議成上命刋賜皇太子太孫諭士竒曰致治之道千古一揆君能納善臣能盡忠天下未有不治朕觀是書見當時人君之量人臣之直為君者以前日之事為今事為臣者以古人之心為已心天下國家之福也二十二年八月仁宗繼統進太子少傅禮部侍郎兼華蓋殿大學士上見士竒陛謁謂尚書夏原吉曰新華蓋來必自有說士竒奏恩詔甫下惜薪司傳㫖賦棗於山東河南以供香炭至八十餘萬民何以堪上喜曰吾固知爾言中理即殺其半㑹禮部尚書吕震題請釋服易吉元旦用樂士竒以為不可兵部尚書李慶建請朝覲官員宜給養官馬士竒又以為不可尚書蹇義論事偶及舊侍御史舒仲成李祥欲逮問之士竒又以為不可大理卿虞謙少卿弋謙各上封事過激上大怒左遷虞謙為少卿免弋謙朝參而以屬吏楊時習代虞謙士竒又力争以為不可上皆霽威從之諭曰為君以受直言為賢不受直言則過益深為臣以能直言為賢不能直言則忠不盡朕自今行有未當卿當盡心言之賜之銀章一曰繩愆紏繆諭曰卿祗事先帝二十餘年又事朕于東宫朕今嗣位凡軍國重務協心賛輔或羣臣有言未之能從卿有言未之悉從宜用兹印宻疏以聞君臣之間盡誠相與庶幾朝無闕政民無失所而祖宗付托之重亦不負矣士竒遂宻疏言事上褒荅曰卿助朕以徳期朕為唐虞主真股肱臣也卿勿以朕尊居宸極或有所畏而不之盡言繼自今其知無不言洪熙元年正月陟兵部尚書兼職如故賜天元玉厯賦諭曰天道人事未嘗判殊有動於此即應於彼朕少侍皇祖教以慎修敬天未嘗敢怠是書言簡理當左右輔臣亦當知之四月既望上御奉天門召蹇義夏原吉楊榮及士竒諭曰夜來星變卿等知之乎乃歎曰天之命也夫勅士竒曰國家肇建兩都庶務孔殷卿侍朕監國籌畫適中屢歴艱虞㤀身徇國兹特錫爾牙章文曰貞一用傳厥家與國咸休宣徳元年髙煦叛宣宗親征罪人既得師既旋大學士陳山請乘勝襲執趙王楊榮力賛之上命士竒草勅士竒曰勅㫖以何為辭榮山咸曰汝敢沮撓大事乎士竒曰太宗三子惟趙王在且上親叔也有罪者既不可赦無罪者亦當加厚庶幾仰慰在天之靈上聞之不懌還京始召士竒問曰人言趙王滋衆奈何士竒對曰趙王懿親當思保全毋惑羣言悔之何及上曰朕業已思之於是檢羣臣章疏命廣平侯袁容齎賜趙王諭士竒曰趙邸獲全卿之力也二年十月黎利奏稱安南陳王孫暠宜立為後上命廷臣集議英國公張輔曰此黎利譎謀爾當𤼵兵討之蹇義夏原吉曰舉以與之無名徒示弱耳士竒曰立陳氏後者先帝本心求之不得乃郡縣其地且十數年來兵民困於交阯之役極矣體祖宗之初心以保祖宗之赤子此盛徳事也何謂無名漢棄珠厓前史榮之何謂示弱上從其言遂棄交阯三年十月下都御史劉觀于獄士竒舉通政使顧佐代之䑓紀遂振五年二月上御南齋宫命士竒草寛恤詔多所禆益三月清明上奉皇太后謁陵士竒扈從上曰母后為朕言先帝在青宫惟卿言不避忤意先帝能從以不敗事又謂朕當受直言士竒對曰此皇太后盛徳之言也願陛下念之六年七月日既夕上微行至士竒宅傳呼范太監來士竒叩首曰陛下奈何以宗廟社稷之身自輕至此擾擾塵埃誰識至尊若變起倉卒何以備之上笑謂曰朕思卿一言故來爾明日遣太監范𢎞問曰海内平靜時一㣲行何足過慮士竒曰天子尊居九重恩澤未洽幽隠萬一有寃夫怨婦窺伺竊𤼵誠不可不慮也後果獲盗如士竒言上歎曰愛朕莫若卿朕自今不復㣲行矣正統初進少師同知經筵事展墓還鄉冢子稷坐事逮繫英宗賜之璽書曰歴事祖宗寔惟簡在暨朕繼統啟沃弼賛厥勞尤多卿子既乖家訓干國紀朕不敢私卿其以禮自處以副倚毗士竒感泣卒年八十贈特進光祿大夫左柱國太師諡文貞官其子穟為尚寳丞所著有沙羡稿石臺稿文籍志法書志東里集楊溥銘其墓曰斯文遭際千載亨期以翼君徳以福羣黎逺稽諸古異世同規皇眀啓運大統重熈純佑有命挺生瓌竒左右宻勿四紀于茲老成耆徳以臣以師中流砥柱羣疑蓍龜天不愸遺吁其以悲廖道南曰予觀沙羡稿及石臺稿見文貞蚤嵗跅弛魁岸視天下莫已若及觀國史暨三朝聖諭錄乃知管仲之才優于召忽魏徵之績多於王珪視諸詭隨無良者不侔矣然而輔亮東宫保全趙邸歴事四朝終始如一非所謂社稷之臣與或者乃以周是修之死子稷之獄少之則吾不知也賛曰肇啟文淵首㧞文貞和調鼎鼐潤色絲綸羽翼儲皇煦媪宗親殄䜛以信剗偽以真夷吾在齊語稱其仁𤣥成在唐史著厥徴彼君子兮不失令名謹身殿大學士楊榮楊榮字勉仁福建建安人曽祖伯遜祖達卿父伯成嘗遇異人得吉地遂生榮初名子榮鄉薦魁閩多士洪武庚辰進士授國史編修太宗履極簡入文淵閣更名榮轉修撰侍講一日上御右順門召解縉等七人惟榮在出江西守臣奏章示之先是吉安鄉民嘯聚遣行人許子謨齎勅撫諭復遣都督韓觀統兵繼之至是奏至其亂已平上欲賜璽書褒觀榮言不可從之永樂元年請告歸省二年賜二品金織衣謂榮曰天下事朕與若等共計之非若六卿祗分理也二年選侍皇太子于東宫進春坊右諭徳階奉訓大夫未幾轉右庶子五年命往甘肅閱視邉闗險要及糧餉豐耗旋奏稱㫖六年給傳奔父母喪奪情起復七年正月車駕巡狩北京命胡廣金幼孜及榮扈從甘肅守將何福奏降將托克托布哈等率衆來歸命榮徃受降仍命持節至額齊訥之地封福為寧逺侯道經寧夏㑹同寧陽侯陳懋區書邉務悉中機宜及還建白上皆嘉納八年二月上北征布尼雅實哩榮仍扈從至臚朐河命榮馳報東宫于南都復還北京九年春命中官宋成䕶榮犇喪還閩中皇太子召起為太孫講學十年二月甘肅守帥西寧侯宋琥奏叛冦婁達衮等逃居赤斤䝉古諸衛將為邉患上命榮同豐城侯李彬往討之十二月榮馳還奏餉道險逺士馬疲困師不可久居且小醜勝之不武久當自定上從之未幾叛者復歸果如榮筭十一年春扈狩北京十二年三月上親征衛喇特博囉皇太孫從命榮兼尚寳司卿同胡廣金幼孜扈行凡行營有暇即與講學比還敇修五經四書性理大全充總裁官十四年陟學士仍兼庶子十五年扈狩北京十六年夏髙廟實錄成命掌翰林院事上疏指陳府部臺寺十弊言多過直𤼵人隂私上留中問曰兵食何由充足對曰擇將屯田訓練有方耕耨有時則食足兵精矣十七年進文淵閣大學士兼學士階奉政大夫十八年北征還將西征有言建文時江西垜集民兵宜徵赴行在上召榮議對曰陛下命復民業二十年矣今復徵之非所以示信于天下也遂寢其事是年三殿災榮上疏論十事悉允行之二十一年復扈西征寧陽侯陳懋奏邉人額森圖罕來降命榮復徃受降二十二年正月上親征阿嚕台次長樂鎮諭榮曰漢髙帝過栢人慮迫于人今朕至長樂思與天下同樂何時庶幾乎此榮對曰有志者事竟成陛下聖志如此天必助順矣師旋適浙江守臣奏至謂處州之麗水福建之政和山冦竊𤼵榮請遣使撫處上從之次翠㣲岡諭榮曰東宫歴涉年久政務已熟朕還京後軍國重事悉以付之朕惟優游暮年以享安和之福不亦可乎榮對曰東宫孝友仁厚天下屬心付托允稱矣上喜命中官馬榮賜羊酒次榆木川宫車晏駕榮議秘不𤼵喪朝夕上食如常儀即馳歸報皇太子尋遷太常寺卿階嘉議大夫兼職如故逾月進太子少傅階資善大夫兼謹身殿大學士山陵事竣太監孟繼言榮盡心襄事陟工部尚書仍兼前職洪熈元年賜銀章一曰繩愆紏繆榮盡言無隠匡賛居多宣宗親征漢邸榮勸之尤力既而黎利據交阯以叛請立陳氏後上顧楊士竒及榮曰爾二人云何榮曰交阯在荒服外唐虞三代不有其地不失為聖君漢唐以來雖嘗為郡縣然叛服不常棄之可也上從之五月車駕北巡召榮問曰人君馭世之權何者為重對曰命徳討罪二者為重上曰二者天下公器舜舉十六相而天下服以天下之好惡為好惡也齊威王封即墨大夫烹阿大夫此不以左右之好惡為好惡也故爵賞刑罰至公無私然後能服天下榮頓首曰誠如聖諭是嵗進榮祿大夫太子少傅兼支尚書大學士三俸又賜之銀章一曰方直剛正天潢玉牒成上諭曰古人重世譜蓋欲正倫理篤恩義我國家宗族之盛皆祖宗積徳所致也八年賜之敕曰卿榮以博通之學明敏之識練逹之才歴事祖考踰三十年多効勤誠以樹勞勣朕即位以來卿秉誠攄謀飭武綏夷忠言讜論禆益為多人惟求舊允釐天工卿其懋諸英宗嗣位進光禄大夫柱國少師仍兼尚書大學士賜玉帯同知經筵五年展墓還京卒于杭州武陵驛年七十贈太師諡文敏官其子恭為尚寳丞所著有黙菴集退思集北征記訓子編靜軒雲山二稾楊士竒銘其墓曰桓桓文敏通才博識遭際聖明光奮于績承明延閣著作之庭以翺以翔舒華振英北裔西陲從狩萬里職典者文亦兼知武晚陟三公貳工𢎞化恪恭朝夕敢或遑暇帝懷敷仁鞠躬承之民懷被福黽勉成之志存寛恵行在果斷嘉謨讜議褒書有煥越昔内閣七人同事荏苒三紀我銘其四公壽考終哀榮寵光於乎文敏歿也不亡廖道南曰宋儒有言徳勝才謂之君子才勝徳謂之小人信斯言也豈天之降才爾殊哉非其才之罪也夫國家多難羽檄旁午匪才弗逹上下多危蕭墻交搆匪才弗定敵國窺伺内猜外疑匪才弗靖奸雄僣竊彼甲此乙匪才弗協是故陳平燕居深念張良借箸前籌才矣而謂之小人可乎或謂文貞正而不譎文敏譎而不正則予豈敢彭韶賛曰文武兼資通人之器運籌帷幄折衝千里擁佑三朝捧日而起恩遇有加抑畏無替保身全名經邦掌制巍巍當時煜煜來裔卓哉相業吁其難繼武英殿大學士金幼孜金幼孜名善以字行江西新淦人祖仲卿父守正咸有隠徳幼孜初學春秋于聶鉉超悟不羣洪武庚辰舉進士授户科給事中永樂初改翰林檢討簡入文淵閣轉侍講時皇太子立㓜孜纂集春秋十二公事名曰春秋要㫖以進五年遷春坊右諭徳階奉訓大夫七年扈從車駕巡狩北京八年二月上親征北邊胡廣楊榮及幼孜從之次永甸雪初霽諸峰竒絶上曰雪後㸔山此景最佳過雞鳴山躡野狐嶺曰至此㸔山盡在下矣至興和曰汝觀地勢逺望似髙近即漸平此隂山脊也若因山為塹因壑為池守茲巖險雖有鐵騎千羣安能飛度耶次鳴鑾戍曰此大巴延山其西北則為小巴延山其東北則為開平汝等觀此始知塞外風景也駐蹕凌霄峰上召至帳殿夜分乃出次環瓊圃指示塞北山川曰古交河在今哈剌火州兩河相交水齾沙出唐之碑蹟尚在也次小甘泉曰女直有山其巔有水色白草木虎豹色皆如之所謂長白山也至長清塞曰至此南望北斗矣經濶灤海曰此水周圍千餘里斡離臚朐凡七河注其中遂名為𤣥溟池次通川甸又遥指海邉石山曰此即三石山也爾等記之還京階奉直大夫錫之誥命十二年扈從北征還京重修高廟實錄及五經四書性理大全俱充總裁官進學士兼諭徳階奉議大夫賜金織襲衣十八年擢文淵閣大學士仍兼學士二十二年扈從北征次開平上召至幄中諭曰朕夢神人語曰上帝好生者三是何祥也豈天謂兹冦乎幼孜請班師上曰卿言正合朕意即命草詔次清平鎮上晏羣臣命内侍歌髙皇御製詞五章曰此先帝垂諭創業守成之難戒荒淫酣酗之失也朕嗣鴻業惟恐失墜尚相與勉之於是自製五章以奉天法祖勤政恤民為言仍命内侍歌之次清水源命幼孜刻石曰俾後世知朕親征過此也仁宗嗣位進户部侍郎兼文淵閣大學士踰月加太子少保武英殿大學士専典内制賜之銀章一曰繩愆紏繆是嵗持節冊梁王及趙王妃洪熈元年陟禮部尚書階資善大夫給告歸省宣徳元年命充兩朝實錄總裁官明年持節之寧夏冊安化貞寧二王妃歴覽周秦漢唐之墟事竣上封事上嘉納之實錄成賜金織襲衣及金綺鞍馬五年三月命同楊士竒等選進士薩琦等八人為庶吉士十月壬午扈從巡邉度雞鳴山上曰唐太宗恃其英武征遼嘗過此山對曰太宗後亦悔之此憫忠閣所繇建也上曰山崩于元順帝時人謂元亡之徵信乎對曰順帝亡國之主也雖山不崩國亦亡上曰自古聖帝明王未嘗無災異國之存亡繫乎君之仁與不仁而已矣後嵗餘遘疾屬纊子姓有干澤者正色斥之曰君子所耻正襟危坐而卒年六十四贈榮祿大夫少保諡文靖子五人昭伯舉進士楊士竒銘其墓曰玉笥崔巍金川湛澄公生其間萃龢挺英賔興賢能濟濟偕至青萍出匣淬礪初試六御乘時登庸玉署清䆳崇巖㕘典宻務恪勤夙夕小心寅恭于狩于征龍旂率從上承簡知履坦平平鵾游滄溟鵬翔九天歴事三聖敬終猶始不競不絿有譽無毁方簡大冊天府所藏崇碑厚碣敷在四方廖道南曰予觀國史稱述文靖簡易沉黙温裕有容且不伐善不騖名名其燕室曰退菴古所謂金玉君子者非其人耶七人之中保全始終堅立名節如公者蓋不多見也賛曰我聞諸易謙謙君子謙之為象地山有美我聞諸詩温温恭人温之為義緡木有宜惟彼文靖誦詩玩易捫舌斯黙檢躬斯益扈從六飛為王先驅北征有記情見乎詞求諸古人金温玉粹始終一節庶幾無愧武英殿大學士黄淮黄淮字宗豫浙江永嘉人曽祖應發為松陽教諭生子通通生性性生淮淮幼抱鉅人志年十二賦詩竒絶充邑庠弟子員洪武丁丑舉進士授中書舎人太宗一日御奉天門左室裁决庶務召見訪以大政淮對稱㫖簡入文淵閣擢編修轉侍讀一日吏部以南人官北土凡建文中不効順者例編伍淮曰近勅㫖凡征討官與舊官同一體若復追罪南人是示人以不廣也永樂二年命同解縉考試天下士得曾棨等四百七十二人四年三月上問建儲事對曰立嫡以長萬世法也皇太子既立進左春坊左庶子兼侍讀賜以袍笏五年遷右春坊大學士兼輔導皇太孫六年上巡狩北京命蹇義金忠楊士竒及淮留守南京諭曰朕留汝四人居守猶唐太宗之任房𤣥齡也卿等其識朕意七月上諭曰東宫天性仁厚識見甚正朕嘗問今日說何書對曰論語君子小人和同章朕問君子難進易退小人易進難退何如對曰君子守道而無欲小人逞才而無耻朕又問小人何以常勝君子對曰視君上好惡何如爾如明主在上君子必勝矣朕又問明主果不盡用小人乎對曰小人有才不可棄者湏駕馭之有方警飭之不使有過可也朕聞之甚喜爾等其用心輔翼之八年長沙妖冦李法良亂淮薦豐城侯李彬討之髙煦譛彬不可用淮曰豐城老將必能成功後果如淮算九年阿嚕台率衆來降請併女直吐蕃諸部屬其約束淮曰此人莫測其心離其黨使各為心則易制若併為一則難圖矣上曰黄淮如立髙岡無逺不見諸人如處平地所見惟目前爾十一年西域烏思藏大寳法王來朝上命玉工以全璞製印畀之淮曰朝廷賜諸畨制勅所用廣運二寳亦有限制今此璞大於璽書恐非所以示諸夷也上嘉納之十二年髙煦隨侍北征潜蓄異志譛淮尤力值進表行在稍滯上怒逮繫詔獄凡十年淮在狴犴惟賦詩引咎名曰省愆集又即人情物變寓之於情名曰自省錄仁宗嗣位遷通政使兼武英殿大學士仍典機要洪熈元年加少保户部尚書仍兼大學士職階榮祿大夫宫車晏駕淮佐鄭府襄府二王監國宣宗嗣統親征髙煦淮留守盡勞夙夜匪懈師旋請告終制陛辭賜遊西苑命乘肩輿登萬歳山淮撰詩以進上恱仍命宴餞于太液池且諭之曰明年朕誕辰卿其復來越明年如期至寵錫有加卒年八十三諡文簡官其子來為中書舎人所著有介菴集歸田藁祭酒陳敬宗銘其墓曰惟周三公視古百揆公不獨立三孤以二爰副調燮益𢎞化理惟寅惟亮公寔職此王躬是保百辟攸式寵顧雖隆小心翼翼視草玉堂高文大冊六經黄麻有典有則獻替宻勿日于帝側定䇿安邦宣慶布徳廟堂柱石薦紳蓍龜惟鹽惟梅鼎鼐是資列聖眷倚心膂股肱功在社稷福及蒼生廖道南曰予觀文貞所載日錄謂淮忌胡廣解縉及觀國史亦謂縉之死淮有力焉再觀省愆錄乃知淮之不容于時下獄十年家食二十餘年杜門掃軌不問國事而同事七人縉既雉罹廣亦蟪夭惟文貞秉鈞文敏謀幄淮之䝉詬亦未可知也賛曰淛海浩瀚􅚈流仙壇羅山崒嵂俯瞰神湍篤生哲人持危以安貝錦青蠅䜛夫鼓瀾省愆有集炳炳如丹武英殿大學士楊溥楊溥字𢎞濟湖廣石首人洪武時為諸生入試考官胡儼大加稱許建文庚辰進士授編修永樂二年四月辛未選用東宫官屬遷司經局洗馬仍兼編修侍皇太子于南都一日問漢廷尉張釋之之賢􅄎對曰釋之誠不易得然世豈無其人但無文帝寛厚仁恕之君用之爾釋之固難得文帝尤難得也退采文帝事闗治道者編為事類以進皇太子嘉納之十二年七月車駕北征東宫遣使奉迎稽緩漢王高煦譛之上怒曰此輔導者之咎也黄淮先至下之獄楊士竒金問繼至上曰楊士竒姑宥之朕不識金問何人乃爾得侍東宫命法司鞫之辭連溥及芮善王愷遂俱逮之淹繫十年仁宗登極釋之擢行在翰林學士洪熙元年正月己卯建𢎞文閣于思善門之左命溥掌閣事選侍講王進侍直改儒士陳繼為博士學錄楊敬為編修訓導何澄為給事中俱輪班奏對上親握閣印授溥曰朕用卿等於左右非止助益學問亦欲廣知民事為理道助卿等有所建白即用封識以進十一月丙申溥宻疏言事上褒荅曰覽卿所奏為國家計誠合朕心但望始終如一知無不言賛朕政治以承天休感卿忠懇特用酬報賜寳鈔綵幣卿其領之尋陞太常寺卿兼學士宣宗嗣位預修兩朝實錄為總裁官宣徳元年十二月上召溥語及治兵之道溥曰兵貴訓練有方撫養得宜上曰養之厚則得其心練之精則得其用必氣鋭志果而後可用若素不訓養一旦驅之矢石之間進退失措何望有濟溥曰誠如聖諭四年正月上御齋宫召溥諭曰朕即位以來今四年常念祖宗創業之難子孫守成之不易夙夜惓惓未嘗敢怠今幸百姓初安皆賴天地祖宗敷祐蓋亦羣臣勵翼之功朕恒自喜然自古國家禍亂毎生于不虞朕未嘗不以為憂溥對曰聖人治不忘亂安不忘危今聖心如此足以膺天眷福蒼生也上曰滄海之大皆由江河之助古之君臣更相戒飭克致太平號稱賢良若為君不求資于臣為臣不克輔其君欲求善治未之有也比來人臣多進諛詞朕殊厭之卿宜輔朕于善道溥對曰臣荷至恩敢忘報稱上曰卿覺朕有過舉直言無隠即為報多矣溥曰自古直言非難受盡言為難陛下樂聞讜論臣敢不竭愚衷是年十月上幸文淵閣諭溥曰朕聞有道之君願治之主崇禮儒臣講求治道卿等職専秘閣朕躬至此冀有所聞稍暇當復至卿等必有所陳論也遂製詩一章賜之五年正月實錄成賜溥白金十鎰羅衣一襲綵帛十二端六年十一月上御文華殿溥同楊士竒楊榮入侍諭曰朕念祖宗積徳累善篤生太祖繼天立極創業垂統太宗迅掃姦回再安宗社皇考仁宗恢𢎞治化増髙累厚以固鴻業朕承天位夙夜不忘記曰先祖有美而不知不明知而不傳不仁是用撰述成詩揭之座上朝夕覽觀勉圖繼述庶幾永保天命今以刻本賜卿當亦思祖宗開創之難守成不易盡心輔朕國家安卿等亦與有榮焉溥頓首受賜未幾奪情起復陟禮部尚書兼學士英宗繼統命溥同知經筵總裁宣廟實錄成加少保禮部尚書兼武英殿大學士卒贈特進光祿大夫左柱國太師謚文定官其子夀為尚寳丞大學士曹鼐銘其墓廖道南曰予觀國史謂溥與士竒榮相繼入相時稱三楊士竒有相業榮有相才溥有相度雖兒童婦女咸知其名然繫獄不改其操秉鈞不渝其忠史謂謙恭淳謹不愧斯言已矣賛曰荆山岹嶢陽岐斯支岷江澔涆渚宫斯涯山祗毓靈水若貢祉元和凝㑹誕生君子彼君子兮惟楚之良厥徳允常厥謀允臧九折厥肱三緘厥口嘉石如肺金印如斗履險視夷處平思陂史稱醇儒夫復何辭華蓋殿大學士張瑛張瑛字子玉直𨽻邢臺人洪武丙子鄉貢士授陜西寧州訓導調武徳衛再調宿遷縣永樂戊子秩滿九載擢吏科給事中時宣廟為皇太孫瑛與選為伴讀洪熈元年遷春坊中允進諭徳改洗馬宣徳元年三月錄瑛舊勞陞行在禮部右侍郎未幾轉左侍郎兼華蓋殿大學士入内閣丁未加禮部尚書五年正月總裁兩朝實錄成賞白金六十兩金織羅衣一襲綵幣十端未幾調南京禮部七年十月瑛上言天下儒學廪膳生員計三萬有竒嵗食廪米不下十數萬石朝廷養士之隆自古鮮儷洪熈定制舉人額數應天嵗取八十人宣徳以來稍加増益凡諸省皆然臣愚以為人才與氣運相為消長不可預為額數才寡而數盈其失也濫才多而數少其失也隘矧今各府州縣教官多員缺學政多廢弛士習多未正請自今副榜中式悉補教官其鄉試額數量為加補疏入下之所司甲寅奪情起復賜御詩十餘軸楮萬緡卒年六十二廖道南曰予觀國史謂瑛儀觀魁梧持已莊重文章政事非其所長予竊惑焉夫渾朴多木强老成類遲鈍恂恂若不能言者藏辯於訥蹇蹇若無能為者晦巧於拙然則子玉若是班乎跡其所言豈其然乎賛曰俚哉子玉歴踐清階扈日青宫上應星台排雲華蓋中紓眷懐彼何人斯亦已焉哉謹身殿大學士陳山陳山字闕福建沙縣人初繇教官召拜吏科給事中時偕張瑛侍宣廟講讀遷左春坊左庶子宣徳元年陟户部尚書兼謹身殿大學士時髙煦反形已具上親征師旋山迎謁請間謂宜乘勝移師彰徳襲執趙王則朝廷永寧可無蕭墻虞也上召楊榮以山言諭之榮曰山之言國之大計請先勅責趙王詰其與髙煦連謀六師奄至可不旋踵而擒也楊士竒執不可上悟其非遂薄山不復任四年十月朔上御左順門遥見山趍朝問楊士竒曰汝試言山何如人對曰山雖侍從日久然寡學術昧大體非君子也上曰然趙邸幾為所誤近聞干謁諸司内閣政本之地豈可令斯人貽溷也遂命改山機務専授内豎習書既而疏陳休致卒年七十廖道南曰予觀國史謂山存心險刻臨事乖方趙邸之謀終身䝉訾信乎擇術不可不慎也賛曰漢之代邸從官有差張武受賂宋昌無私唐之䇿府文學亦異𤣥齡忠懇敬宗詭偽張陳二君翊龍以飛一忠一佞各有攸歸文華殿大學士權謹權謹字仲常直𨽻徐州人十嵗喪父哀毁頓絶復甦洪武初薦知樂安縣清慎平恕其民懐之九載考績遷光祿署丞迎母就養母疾籲天祈以身代母卒躬負土成墳廬墓三年有白兔青蛇馴擾不去有司以聞太宗嘉之召拜文華殿大學士扈從皇太子徃南京諸臣皆獻方物不受至徐州謹以孔門聖賢道統圖獻特賜留覧洪熙元年九月改通政司左叅議致仕仍旌其門曰孝行廖道南曰古稱求忠臣于孝子之門亶其然乎夫一孝立萬善從孝之不立道奚生焉君子是以重權謹也賛曰雲龍之山其山嵯峨吕梁之水㑹流于河彼仲常兮孝思匪他擢居殿學以風天下山水增榮光流閭舎視彼權姦盗負且乘孰重孰輕請問天命華蓋殿大學士陳循陳循字徳遵江西泰和人永樂乙未進士第一授翰林修撰太宗特重儒臣賜第萬寳坊駕幸北京命循載秘書詣行在遂留用之三殿災循上疏多采納洪熙改元轉侍講宣徳初命與楊溥輪直南宫備顧問又賜第于玉河西庚戌擢侍講學士時御史張楷上詩涉時政僉事陳祚勸講大學衍義忤㫖宣廟震怒循力捄之獲免正統初兼經筵官壬戌擢學士甲子入内閣乙丑遷户部侍郎尋陟尚書兼學士奏復近侍翰林官於早朝時當立于金臺左側於午朝時當先諸司奏事悉從之未幾加少保兼太子太傅景泰初兼文淵閣大學士集古帝王行事名曰勤政要典上之修寰宇通志成進華蓋殿大學士時額森擁駕入闗索大臣于謙胡濙王直出迎衆知其詐循奏請勅各邉精騎入衛京師又多𤼵榜文招諭回番以疑其心額森計窮復遁嗣後景帝臨御既久循秉鈞軸擅易儲宫㗖以爵禄遽變初志恃權剛愎不能容物其子瑛入試不第與王文誣奏考官劉儼黄諌欲抵之罪又謀取鄉人塚域傾䧟御史周鑑王豪士論鄙之英宗復辟言者𤼵其奸狀謫戌遼東及石亨敗奏雪已愆釋之復其官廖道南曰予觀𤨏綴錄所載陳芳洲事語多近俚及觀國史乃見其城府深刻羅鉗吉􅃠靡所不為視厥初疏陳諸事力救張楷陳祚若有睽焉不然又胡為乎力詆劉儼黄諌末流至此極也豈孔子所謂患得患失者耶賛曰匪位之患令名為艱匪名之患令終為艱保初節易保晚節難於乎徳遵有􅌤斯顔謹身殿大學士髙榖高榖字世用揚之興化人永樂乙未進士選翰林庶吉士授中書舎人甲辰改春坊司直郎洪熈初擢翰林侍讀宣徳乙卯考順天鄉試正統改元楊士竒薦侍經筵講讀賜三品服戊午預修宣廟實錄成轉侍講學士甲子考應天鄉試乙丑遷工部右侍郎仍兼前職入内閣與聞機務已巳上北征命榖居守景泰初陟工部尚書兼學士時敵情叵測羽檄旁午乘輿未返人心恟懼中書舎人趙榮獨請徃迎穀壯其志解所束金帯贈之及都御史楊善迎太上皇歸榖奏禮宜從厚有千户龔遂榮投書于穀穀即以示公卿陳循見之恚甚請下之獄穀執議如初未幾加少保兼東閣大學士壬申加太子太傅上言内外諸司惟賢是用况經筵日講闗係聖徳尤在得人遂薦少卿陳詢學士吕原中允楊鼎都御史王文大理卿蕭維禎司業王恂疏上命詢鼎侍經筵文入内閣甲戌命徃南京巡視災歉事竣還朝都給事中林聦忤權貴將置重辟穀持正救解賴末减丙子進謹身殿大學士是嵗順天鄉試循奏考官劉儼黜其子命穀覆試穀曰貴冑與寒畯爭進固已不可况從而為之辭乎因閱巻止黜林挺一人餘俱從儼所選從之英廟復辟榖辭職乞休賜璽書慰諭仍侑以金鏹給驛以歸卒謚文毅廖道南曰予讀國史稱穀為人髙簡㢘靜不比匪人觀其白劉儼之公救林聦之直嘉趙遂榮之忠推是心也天日將為昭焉賛曰江海之㑹寔維維揚毓和委灝𤼵為禎祥有斐君子邦之司直衆醉獨醒抗顔不屈寧為孤立毋為依違侃侃誾誾永世有辭謹身殿大學士王文王文初名强字千之保定束鹿人永樂中繇鄉薦計偕如京師太宗命選下第舉人給冠帯入冑監文預焉辛丑登進士擢監察御史綽有能聲與同官王翺于謙咸為都御史顧佐所稱許時彰徳妖冦張普祥謀逆宣廟簡命徃治事平還奏稱㫖欽改名文擢陜西按察使正統己未轉右副都御史巡撫寧夏兼理軍務辛酉入為大理寺卿壬戌夏大旱上命中貴興安審錄狴犴文片言折獄衆皆輸服未幾陟右都御史時冢宰郭璡貪墨文疏其罪風紀大振癸亥命代陳鑑撫鎮陜西額森犯順當國者移文沿邉歛民入城以避其鋒文謂邉衆逆天神人共憤不宜驚擾以惑人心闗中安堵如故尋召還加太子太保改左都御史景泰壬申南畿及山東河南被災命徃綏懷多所全活大學士髙穀薦入内閣改吏部尚書兼翰林學士㕘預機務疏陳舉官賑民數事悉中時宜甲戌應天蘇松大水命徃巡視蘇人鼓術惑衆互相屠戮文悉捕獲誅之加少保兼東閣大學士修寰宇通志充總裁官進謹身殿大學士因其子倫不第訐奏考官峻文深詆英廟復辟言者首論于謙王文迎立外藩擅易儲宫廷鞫文力辯謙不言遂同戮于市後其子倫改名宗彛仕至尚書請雪父寃詔復其官加太保諡毅愍廖道南曰予觀國史謂文為人深沉剛果屢鎮大藩兩總憲政毎廷議百官莫敢先𤼵文以一二語裁决與陳鑑交代一揖之外未嘗接談及入閣毅然欲有所為即茲以觀其志果其情深其才充其器隘迺若私詆考官廷詰獄吏誣薛文清以死又何險也賛曰廣漢神明延壽深刻匪術弗精匪才弗逹果于自用昏于自恕彼何人斯秉心乖戾張湯之後安世則侯犂牛騂角誰謂無郵華蓋殿大學士徐有貞徐有貞初名珵字元玉蘇州吳縣人宣徳癸丑進士選庶吉士授編修正統初進侍講己巳之變倡議南遷尚書于謙斥之于廷遂懐悵惘大學士陳循授之䇿曰汝當更名無使内家習知也即更有貞以易儲事轉左諭徳遷左僉都御史徃視水災時河决沙灣居民播蕩漕運阻艱有貞奏曰凡平水土在知天時地利人事三者天時既經地利既緯人事庶可施也今欲捄之請先䟽其勢水勢平乃治其决决止乃濬其淤茲為之方以時節宣一曰置造水門二曰開分水河三曰挑濬運河於是决渠以平水勢築堤以平水性作閘以平水道功告成為文紀之召還為副都御史嵗丁丑天象告變有貞隂結太監曹吉祥武靖侯石亨及太平侯張輗等宻謀迎請上皇復辟禁漏下數十刻有貞等擁至南内躬舁步輦陞奉天殿夜已嚮晨鼓三嚴百官班定而景帝已彌留不起矣英廟嘉其功加特進光禄大夫柱國封武功伯兵部尚書兼華蓋殿大學士掌文淵閣事值山東荐饑𤼵内帑賑之有司奏請增給上召有貞同李賢議可否賢曰可有貞怫然曰不可竊恐里胥滋弊恵澤阻遏罔及小民賢曰雖有滋弊民方待哺不可不救也有貞退而不樂時石亨張輗外雖結納中實猜疑御史楊瑄張鵬糾其不法上謂有貞曰御史敢言如此實為難得因語有貞及賢恊心輔政亨軰聞之益懼遂訴其奪門之功詬有貞泄其謀上怒下有貞及李賢于獄是日震雷雨雹大風㧞木乃出有貞為廣東㕘政行至徳州㑹有投匿空名文書者亨輩以為有貞所為上怒甚覆逮詔獄拷治無驗乃命取誥劵出示三法司刑部侍郎劉廣衡等劾奏有貞詐撰制文竊弄國柄自謂治水希蹤神禹敢以定䇿冒貪天功大不敬無人臣禮宜戮市曹㑹承天門災乃宥之編置雲南金齒為民及曹吉祥石亨張輗相繼伏誅上御奉天門論及人才謂李賢曰徐有貞才學亦難得當時有何大罪乃石亨張輗輩害之耳茲若不宥後世其謂何可令生還故里於乎聖人恩法可謂兩盡矣廖道南曰予觀吳志謂有貞短小精悍其學自天官地理兵法河渠隂陽方術無不通貫及讀其所為漕河碑閎博爾雅當時詞臣無出其右然而心術險賊急嗜功利首倡南遷繼謀奪門比眤奸回屠戮忠良金齒之行亦天道也賛曰謂天蓋髙不敢不跼謂地蓋厚不敢不􅐲彼其之子狡焉猖狂負氣以逞搆謀匪臧遷國奚忠奪門奚智亦已焉哉胡不惴惴殿閣詞林記巻一
