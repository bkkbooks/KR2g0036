body:
  text: 殿閣詞林記巻十七明黄佐廖道南撰秘書按周禮太史掌建邦之六典外史掌四方之志三皇五帝之書漢圖籍所在有石渠石室延閣廣内藏之於外府又有御史居殿中掌蘭臺秘書及麒麟天禄二閣藏之於内禁後漢圖書在東觀置秘書監又有鴻都等處唐有秘書監集賢書院宋建昭文史館集賢院置大學士直學士修撰等官以掌之又有秘書省崇文館其重如此聖祖初定天下即遣使求遺書國初四庫之書多藏文華堂堂在禁中抵奉天門不百武車駕嘗幸臨之洪武三年三月庚子置秘書監秩正六品先除監丞一員直長二員十三年七月癸巳以内府書籍已有本院典籍掌之於是罷秘書監典籍張敏行者掌書籍中使傳宣索書即啓鑰以上嵗時得燕見聖祖籍古右文其勤如此葢罷掌書之官併其任於翰林實自我朝始今内閣史館凡御製宸翰列聖寶訓實録及玉牒副本經史子集𩔖書之屬皆在焉永樂四年四月成祖視朝之暇輒御便殿閲書或召翰林儒臣講論嘗問文淵閣經史子籍皆備否學士解縉對曰經史粗備子籍尚多闕上曰士人家稍有餘貲皆欲積書况於朝廷可闕乎遂召禮部尚書鄭賜令擇通知典籍者四出捜求遺書且曰書籍不可較價直惟其所欲與之庶竒書可得又顧縉等曰置書不難須常覽閲乃有益凡人積金玉亦欲遺子孫金玉之利有限書籍之利豈有窮也十六年遣修撰陳循往南京起取本閣所貯古今一切書籍自一部至百部以上各取一部北上餘悉封識收貯葢兩京皆有儲書也十九年四月庚子夜奉天華葢謹身三殿災火勢猛烈而奉天門東廡切近秘閣學士楊榮奮身直入麾武士三百人將御書圖籍并積嵗制勑文章舁致東華門金水橋次明日上召諭之曰昨夜火發在目前者幾人卿能收拾圖籍不避艱危可謂難矣因褒賞之于時書籍淆亂無紀典籍周翰理淆葺亂逾二載而後復舊今館閣書目葢永樂間所定也自正綂以前凡官本院者每朝退即入閣中檢所未見書葢館閣無政事以討論考校為業故得縱觀中秘而受命進學者亦與焉景泰時編修周洪謨輩猶然其後始為内閣所扄鑰𢎞治五年五月大學士丘濬請訪求遺書焉上疏有云今内閣儲書有匱書目有簿皆可查考乞勑内閣量委學士并講讀以下官督同典籍與吏典班匠人等將書目較讐有無全欠分為經史子集四𩔖及雜書𩔖書二𩔖開具奏報仍刻考較年月委官名銜識於巻末立案存照又勑兩京内外大臣會同南京禮部本院官查盤永樂中原留南京内府書籍有無全欠具數奏知於凡兩京書籍令南京國子監謄寫各令兩監藏之以備遺失夫國家採補佛道書以為藏經雕以文梓飾以文綾徧賜天下寺觀儲以髹紅函匱載以金碧輪藏況此書籍乃自古帝王傳心之要道經世之大典禮樂刑政制度文為之所具烏可吝惜小費而不為經久之計哉請勑内閣將書目付禮部抄謄分送直隸十三布政司提督學校憲臣用心設法訪求抄謄送京以補所未備仍於内閣近便去處别建重樓一所專用磚石累砌如民間所謂土庫者令内閣書辦中書等官遇其閒暇抄謄累朝實録各一部盛以銅匱庋于樓之上層凡内府衙門收藏國家大事文書如玉牒之類皆附焉其制勑房一應文書如詔冊誥勑書等項草檢行禮儀註應制詩文等項底本前朝遺文舊事等項雜録亦各抄一部盛以鐵匱貯於樓之下層凡内府衙門所藏文書可備異日纂修一代全史之用者如永樂以前文武官貼黄之𩔖皆附焉茍無禦災備急之具一或散失後之秉史筆者無所憑據往往求之於草澤訪之於傳聞簡牘無稽真贋莫辨非但大功異政不得紀載而明君良臣為人所誣揑者亦有之矣至若列聖實録及聖祖御製等書請依洪武六年纂集日厯以為寶訓事例勒成一書頒行天下如此則祖宗之功德在萬世永傳信而無疑國家之典章埀百王逓沿襲而有本所謂金匱石室豈虚文哉奉聖㫖太祖御製書籍著翰林院打㸃見數收貯南京書籍查照目録開寫缺少的去著守備同南京禮部翰林院㸃檢送來天下遺書禮部行移南北直隸十三布政司訪求至正德中權奸柄國典籍散逸嘉靖十三年七月今上勑館閣重書列聖寶訓實録命大學士李時等為經理官臣道南為管録官肇建皇史宬于重華殿之西藏以金匱置之石室又於欽天閣樹碑以紀欽天記頌追先閣樹碑以紀祖德詩仍錫燕儒臣于謹身殿臣嘗誦吕祖謙表云帝暉下燭光榮河温洛之藏天藻昭埀邁過沛横汾之韻湛露示醇醲之惠承雲宣純繹之音若豫頌矣開局國初召儒臣載筆以定有天下之制分三局總之一曰律局以定律令凡舊官之練憲章者居焉二曰禮局以究禮儀凡宿儒之通古制者居焉三曰誥局以撰誥命凡俊才之優文辭者居焉此開局之始也汪克寛曰洪武元年命中書省翰林太常寺率諸儒定擬三禮明年再命集議禮樂又明年徧徵在野道德文章之士分局相與訂正之其後纂修國史每分為十館以均六局之多寡六局一曰吏以究人材之進退二曰户以蔽地利之盈縮三曰禮以考禮儀之􅆓革四曰兵以載軍政之臧否五曰刑以書刑罰之祥濫六曰工以審力役之寛緩皆本六官職掌為之十館所修不能綂一則擇人總勘如修他書則有不盡然者葢自罷起居注之後本院職掌專文史遇有纂修旋設館席給筆札惟官長凡例是遵逐事呈稿筆削惟命其中雖有所見亦不敢盡用己意葢官局修書從古然也監修洪武二年二月丙寅朔勑修元史以中書左丞相宣國公李善長為監修不預史事三十五年十月己未重修太祖髙皇帝實録勑太子太師曹國公李景隆為監修都總裁官太子少保兵部尚書忠勤伯茹瑺為副監修官永樂九年十月又重修之勑户部尚書夏原吉太子少師姚廣孝監修未及成而廣孝死原吉獨專其事洪熈元年五月庚午朔勑修太宗皇帝實録閏七月甲辰勑修仁宗皇帝實録俱以太師英國公張輔少師兼吏部尚書蹇義少保兼太子少傅户部尚書夏原吉監修自永樂以來皆預秉筆與國初不同宣德十年九月庚午勑修宣宗皇帝實録止用張輔為監修始復不預秉筆矣監修英宗皇帝實録者㑹昌侯孫繼宗監修憲宗皇帝實録英國公張懋監修孝宗皇帝實録者亦懋也若修他書則罕設惟永樂元年七月修永樂大典以太子少師榮國公姚廣孝禮部尚書鄭賜為監修刑部左侍郎劉季箎副之餘不可盡書總裁國初修元史以前起居注宋濂漳州府通判王褘為總裁濂尋進學士褘拜待制三年二月乙丑續修元史仍為總裁太祖皇帝實録總裁者始為禮部左侍郎兼學士董倫與侍講方希直重修為李景隆與侍講解縉再重修則文淵閣大學士兼左春坊大學士胡廣學士兼右庶子楊榮祭酒兼侍講胡儼也成祖仁宗兩朝實録總裁為少傅兵部尚書兼華葢殿大學士楊士竒太子少𫝊工部尚書兼謹身殿大學士楊榮太子少保禮部尚書兼武英殿大學士金幼孜户部尚書兼謹身殿大學士陳山禮部尚書兼華葢殿大學士張瑛太常寺卿兼學士楊溥自是其柄始盡歸館閣矣宣宗皇帝實録總裁為少傅工部尚書兼謹身殿大學士楊榮行在禮部尚書兼學士楊溥總裁兼纂修為詹事兼侍讀學士王直少詹事兼侍講學士王英總裁兼纂修前此未有也英宗皇帝實錄總裁為少保吏部尚書兼華葢殿大學士李賢禮部尚書兼學士陳文兵部尚書兼學士彭時副總裁為禮部右侍郎李紹太常寺少卿兼侍讀學士劉定之呉節副總裁葢自此始紹雖為侍郎然發身則自翰林故與焉憲宗皇帝實錄總裁為少傅兼太子太師吏部尚書謹身殿大學士劉吉禮部尚書兼文淵閣大學士徐溥禮部右侍郎兼學士劉徤副總裁為禮部尚書丘濬詹事府少詹事兼侍講學士汪諧孝宗皇帝實錄總裁為少師兼太子太師吏部尚書華葢殿大學士李東陽少傅兼太子太傅吏部尚書謹身殿大學士焦芳户部尚書兼文淵閣大學士楊廷和副總裁為吏部左侍郎兼學士梁儲若纂修日厯惟洪武時有之總裁為學士承㫖兼吏部尚書詹同侍講學士宋濂聖祖所修諸書多不可考獨太宗時永樂大典分局皆有總裁學士解縉修撰呉溥檢討王洪禮部郎中鄒濟布衣陳濟等皆得為之無慮十餘人葢門彚多而事實繁故也大明一綂志總裁為吏部尚書兼學士李賢太常寺少卿兼學士彭時學士吕原副總裁為學士林文劉定之侍讀學士錢溥大明㑹典總裁為大學士李東陽焦芳楊廷和副總裁為學士梁儲若四書五經性理大全宋元資治通鑑綱目等書多不設總裁止用纂修官纂修國初纂修皆用山林隠逸之士洪武日厯纂修者皆儒士職官獨貟外郎呉伯宗一人戊寅年勑修太祖皇帝實録纂修可考者為侍讀學士兼太常寺少卿髙遜志太常寺少卿廖昇都察院左僉都御史程本立禮部郎中夏止善修撰李貫編修呉溥楊子榮劉觀檢討陳性善侍讀劉彥銘史官髙讓呉勤趙友士端孝思張秉彞唐耕國子博士王縉僉事胡子昭知縣葉惠仲儒士楊士竒等永樂初重修太祖實録纂修為學士王景禮部尚書李至剛侍讀胡靖曾日章王灌胡儼侍講鄒緝楊榮金幼孜楊士竒修撰李貫呉溥編修呉節鄭好義檢討王洪博士張伯穎王汝玉典籍沈度潘畿待詔王延齡給事中朱紘吏部郎中徐旭禮部郎中胡逺太常寺博士錢仲益國子助教王達博士金玉鉉行人蔣驥晉府伴讀蘇伯厚僉事李煜葉砥知府劉辰靖江府教授張顯楚府教授呉勤知府鄒濟知縣楊覯梁潛王褒沈瑜趙季通唐雲教諭解榮劉宗平訓導富貴清羅師程儒士端禮王孟易朱逢吉莫士安凡外官生儒之預此者皆由本院官舉薦及再重修其纂修者學士兼諭德金幼孜楊士竒侍講學士曾棨侍讀兼賛善梁潛侍講王英修撰羅汝敬刑部主事李時勉陳敬宗也成祖仁宗兩朝實録纂修官為左春坊大學士兼侍讀學士曾棨右春坊大學士兼侍講學士王英右春坊庶子兼侍讀學士王直左春坊左諭徳兼侍讀周述侍講李時勉錢習禮侍講余學夔陳循藺從善蔣驥修撰苖衷曾鶴齡張洪劉永清編修周叙孫曰恭楊敬檢討周翰王雄楊翥五經博士陳繼户部主事陳中四川道御史陳叔剛福建右㕘議潘文奎知縣萬節教授丘錫教諭梁萼葢自是不復用儒士矣宣宗皇帝實録纂修官為侍讀學士李時勉錢習禮侍讀學士陳循洗馬藺從善侍讀苗衷曾鶴齡馬愉侍講髙穀胡穜邢寛修撰周叙尹鳳岐孫曰恭習嘉言陳叔剛陳詢曹鼎儀銘王一寧杜寧儲懋編修楊翥董璘楊壽夫林文鍾復主事劉劉鉉洪與評事張益御史邵宏譽英宗皇帝實録纂修官為學士柯潛萬安侍講學士李泰太常寺少卿兼侍讀孫賢劉珝左諭德黎淳右諭德童縁劉宣侍講江朝宗楊守陳修撰王一夔彭教編修尹直徐瓊陳秉中李永通鄭環劉徤汪諧張元禎呉鉞羅璟檢討耿裕周經纂修兼校正官為侍讀劉吉陳鑑侍講丘濬編修彭華葢始自專用本院及詹事府官而纂修兼校正始見於此憲宗皇帝實録纂修官為太常寺少卿兼侍讀傅瀚少詹事兼侍讀費誾左庶子兼侍讀謝遷右庶子兼侍讀陸簡侍讀曾彥楊守阯侍講劉戩王鏊楊傑梁儲左賛善張元禎修撰劉璣武衛張芮編修劉忠鄧掖黃珣張天瑞劉春涂瑞檢討楊時暢纂修兼校正官為南京國子監祭酒李傑左庶子兼侍講學士李東陽左庶子兼侍讀呉寛右庶子兼侍講董鉞纂修兼㕘對官為修撰楊廷和編修江瀾纂修兼㕘對亦始見於此孝宗皇帝實録纂修官為侍讀毛紀傅珪朱希同侍講豐熈沈濤呉一鵬修撰顧鼎臣編修汪俊李廷相温仁和李時滕霄何瑭董玘檢討汪偉王九思潘辰至於修他書者不能盡記大率成化以後纂修皆純用本院官而永樂大典四書五經性理大全寰宇通志庶吉士亦得與焉催纂洪武日厯設催纂官以侍講學士樂韶鳳為之永樂初重修太祖實録催纂兼謄冩為禮部主事陸顒宣德初兩朝實録因之以禮部主事張習為催纂宣宗實録編修蕭鎡賴世隆呉節徐珵檢討李紹王玉姜洪何宣主事潘勤正字沈寅俱為稽考㕘對并催纂官英宗實録以編修李東陽倪岳謝鐸焦芳陳音程敏政檢討呉希賢吏部員外郎韓定中書舍人馬麟焦㻞李溥俱為催纂官憲宗實録以禮部員外郎李通中書舍人胡清為催纂官自此始專用制勑誥勑官云稽考稽考㕘對始自永樂洪熈兩朝實録以修撰邢寛蔣禮胡穜編修陳詢劉矩裴綸梁禋孔目沈寅為之葢纂修之次也然寛乃永樂甲辰進士第一禋次之孫曰恭又次之寛禋同為稽考㕘對宣宗實録稽考㕘對與催纂併為一事英宗實録因之止以催纂為名憲宗實録以纂修者兼校正或兼㕘對孝宗實録稽考參對者修撰吕柟編修崔銑湛若水翟鑾徐縉景𤾉檢討段炅易舒誥穆孔暉張邦竒及胡纘宗至是始復專設其賞格與催纂同謄寫洪武中修日厯謄寫用舉人監生永樂初重修太祖實録以催纂者監謄寫官其謄寫用監生生貟儒士凡二十五人暨纂兩朝實録改謄寫為謄録用檢討許彬連智馬信周貴等四人中書舍人蕭湘等十八人郎中貟外郎主事寺副等官程南雲等九人儒士生貟各一人凡三十三人收掌文籍則為檢討胡讓典籍李錫牛麟張禮宣廟實録有謄録正副官凡二十九人又有謄藁官修撰黄裳編修許彬周貴中允蔣禮郎中何賢夏衡寺副石慶姚本温良收掌則修撰胡讓寺副陳紀中書舍人靳通英廟實録謄寫有太僕寺卿余濂山東㕘議林章禮部郎中呉謙中書舍人凌暉鴻臚主簿王佑白真序班毛顯譯字胡清徐德王臣凌逺共三十五人官雖不同大率皆制勑誥勑二房辦事者也殿閣詞林記巻十七
