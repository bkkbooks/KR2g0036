body:
  text: 殿閣詞林記卷十二明黄佐廖道南撰朝㕘洪武中常朝御殿命本院官序立居文武第一班之後近上便於觀聽凡遇上御奉天門則立御榻之左皆常服朝朔望上御奉天殿具公服隨班行禮畢詣文華殿朝東宫永樂初令内閣儒臣侍立金臺東御三殿皆陞殿賜燕宅憂則御西角門如常朝制正統初内閣官始移下貼御道之東序立本院官則序立丹墀之東第一班御西角門亦如之永樂中午朝御左順門既陞御坐内官設案内閣及本院侍班官俱於案西序立晚朝或御右順門儀節亦如之宣徳以後上御門早朝退御便殿景泰中復御午門而晚朝遂廢大學士王鏊論視朝曰在易泰之象曰上下交而其志同否之象曰上下不交而天下無邦下之情達於上上之情達於下所以為泰交則泰不交則否如近世止於視朝數刻遥相唯諾君或不識其臣臣或不得交一言於君上下之間不過章奏批答相闗接刑名法度相把持而已非獨沿襲故常亦其地使然也本朝視朝於奉天門未嘗一日廢可謂勤矣然堂陛懸絶威嚴赫奕將軍持鈲臺史糾儀鴻臚舉不如法通政司引奏上特是之命所司知之而已謝恩見辭惴惴而退未嘗問一事進一言此無他地勢懸絶雖欲言無由言也今欲上下之交莫若復古内朝之法葢周之時有三朝庫門之外為外朝詢大事在焉路門之外為治朝日視朝在焉路門之内曰内朝亦曰燕朝玉藻云君日出視朝退適路寢聽政説者以為視朝而見羣臣所以通上下之情聽政而適路寢所以通逺近之情漢制大司馬左右前後將軍侍中散騎常侍諸吏為中朝丞相以下至六百石為外朝葢外朝為尊中朝為親也唐皇城之北南三門曰承天正旦冬至受萬國之朝貢則御焉葢古之朝也其北曰太極門其内曰太極殿朔望視朝在焉葢古之中朝也又北曰兩儀門其内曰兩儀殿常日聽朝視事葢古之内朝也宋時常朝則文徳殿五日一起居則垂拱殿正旦冬至聖節稱賀則大慶殿賜宴則紫宸殿或集英殿試進士則崇政殿侍從以下五日一員上殿謂輪對則必入時政利害殿引見葢亦三朝之遺意焉夫天有三垣天子象之中朝太微也外朝象天市也内朝象紫微也國朝朔望正旦冬至大朝會則奉天殿即古正朝也常朝則奉天門即古之治朝也而内朝獨缺聖祖時御華葢謹身武英等殿筵宴奏事則内朝也而今久不御三殿深嚴人臣鮮或窺焉故上下之交絶而不通天下之弊由是而積臣愚欲於常朝之外於便殿之側倣古内朝之法或三日或五日一御焉外朝或可間歇内朝必以時舉六部諸司以次奏事難決者或從容問之大臣一日次起居侍從䑓諫五日一員上殿輪對或不時召見凡謝恩見辭咫尺相對略去威嚴上不難於問下不難於對人才賢否政事得失風俗美惡閭閻疾苦古今治亂皆畢陳于前如此則上下之情可通内外之壅蔽可決天下之事無不可為矣侍宴洪武三年七月禮部尚書崔亮奏准凡朝㑹賜宴文官三品以上武官四品以上上殿者賜坐墩其退朝燕閒行幸之處勛舊之臣文學之官賜坐者仍加絨罽繡褥九年定學士承旨於六部尚書之上學士在光禄卿之上侍講學士在侍郎之上時正官列卿先侍郎故也其後學士雖五品猶先尚書焉十六年十一月甲寅詔定朝㕘官員坐次凡奉天門賜坐六部侍郎應天府尹國子監祭酒翰林院宫諫官僉都御史坐于西角門東向若華葢殿坐於鹿頂外東西向至永樂以後御三殿或便殿行幸悉賜坐惟𢎞熙宣徳二朝始以尚書侍郎兼學士官於是學士非兼三品以上職者乃坐其下正統以來接見儒臣之日少故侍坐之儀遂廢若郊祀慶成大宴羣臣學士陞殿侍坐在文職四品之上本院及詹事府坊經局宴官在六部侍郎之次中左門侍坐修撰等官在六科給事中之上本院帶俸官在太常寺博士之上詹事府主簿中書舍人在鴻臚寺署丞之上丹墀東序坐正統三年特命侍講一人升殿列學士之下成化四年令修撰等官凡近侍風憲者叧列于丹陛下之東西稍北而庶士與焉燕㑹本院官銓注後吏部題本以到任管事請旨俞允具公服謝恩擇日諸公署與同寮相見謂之到任本院自内閣大學士至孔目皆出燕錢置盛筵于後堂用樂大學士列坐于上新任者坐于前之左講讀坐于前之右史官皆傍坐公燕之盛葢諸衙門所未有又數日回席比前加盛若首甲則狀元出燕錢倍第二第三人謂之聚奎燕其後併在一日同寮先設小席以待新任者序賔主東西列坐飲數行即徹去就新任者之席勸酬大率成禮而已然五品官至博士以下不預惟講讀史官在焉非舊典也聚奎之燕或久乃舉行云庶吉士入館則内閣大學士而下皆送至外公署備燕席待之諸士亦回席然不謂之到任者以非職官故也殿班國朝謹身華葢奉天三殿百官行叩頭禮畢本院官用學士侍讀學士侍講學士侍讀侍講修撰編修陞殿侍班洪武二十四年三月辛未詔文武官除分詣文華殿啓事外凡遇陞殿合用履鞋照依品級侍班有違越失儀者從儀禮司糾劾東班則六部掌印官本院官及春坊學士尚寳司西班則五府等官及給事中中書舍人正統以後惟聖節冬至正旦大朝賀及頒詔進書冊立冊封始御奉天殿其侍班惟用修撰編修檢討等官四員是日早具朝服履鞋同導駕給事中糾儀御史等官鼓初嚴先入循殿旁至華葢殿前候駕出鴻臚寺奏執事官行禮禮甫畢即趨出復從殿旁趨入奉天殿内北向立後雙炬自中前導駕至上陞寳座導駕官分東西立即趨至寳座之東西向與中書舍人對立候行禮畢自殿門以次趨出若東宫千秋節及冬至正旦朝賀亦用修撰等官二員與春坊司經局官對立侍班於文華殿行禮云奏事洪武三年七月己亥禮部尚書崔亮奏凡諸儒官於御前奏事或進呈文字退立二三步毋輒近御案凡立必於東西隅不得直前制曰可永樂四年令六部及近侍官有事當商略者皆於晚朝陳奏景泰二年令午朝翰林院先奏事學士周叙嘗上疏曰臣職叨班行伏見永樂洪熙宣徳三朝臨御大班既退即於門上説事各衙門官輪流向前君臣相與商確政務罄盡所言人懐畏憚而事幾不泄成宻勿廟堂之美自正統以來王振擅權獨立在旁於是輔弼大臣及近侍官員不得召對亦不敢盡言以致醸成今日之禍宜令羣臣依舊制輪流向前説事止與敷對者令知他人不得預聞庶得吐露肝膽而不宣泄於外然竟莫能行今按楊士竒所録曰翰林諸臣奏事退如此之類不一而足今上召問大臣多於文華進講後或御無逸殿及太髙𤣥殿嘗問輔臣李時曰道南欲令同鼎臣教庶吉士何如時對曰宋仁宗欲用蘇軾典制韓琦以為太早今道南才識俊茂須久養之大用未晚上曰朕御書文劄今道南編纂時曰然他日輔臣薦余光有才上曰余光未必如道南卿何以此對後御咸陽宫聖諭曰禮部覆道南廟議何乃堅執遂唯唯而退便殿國初信用儒臣謁見無時毎出御奉諸門有奏事常規退御便殿有特以事入詣奏者許徑入洪武二十九年五月戊寅命詹事府翰林院尚寳司中書舍人六科給事中儀禮司於午門内入者各給牌為驗已而罷之使近侍官得日至便殿奏事永樂二十二年八月楊士竒新改華葢殿大學士謝恩畢聞惜薪司奏准北京山東棗薪八十萬供宫中香炭之用士竒入將奏之時蹇義夏原吉奏事未退上望見士竒笑謂蹇夏曰新華葢學士來奏事必有理試共聽之士竒言詔下裁兩日今聞惜薪司傳旨賦棗八十萬得無過多雖是嵗例然詔書所減除者皆嵗例上喜曰吾固知學士言有理吾數日來宫中事叢脞此是急遽中答之不暇致審即命減除四十萬景泰中侍講劉定之抗疏言凡政事有早朝未及決者宜日御便殿使近臣侍於側大臣奏於前言官察其邪正而加糾彈史官書其言動以示懲勸君臣之間詢謀互相可否以求至當此前代故事祖宗成法也遵而行之則剖決萬幾日益以熟審察百官日益以明聖政益新天命益隆矣若乃仍如前日無事但以奏本進入擬旨批出臣恐偏聽生奸獨任成亂治化無由時雍也疏上不省今按聖祖時出入禁御以至臨朝侍臣侍從者有所擬議欲修播告則翰林院官承旨草制中書舍人當御謄寫謂之副墨尚寳官用寳即時發行若有憸邪在側或事當㕘駁則六科給事中十三道御史抗聲於御前執奏謂之對仗彈劾云入直洪武永樂洪熙宣徳四朝近侍官輪班入直若本院官則日在館閣吳況劉三吾胡廣楊士竒胡儼王英王直輩嘗有内直倡和詩曽棨東華門内新館初成入直有作云東華樓觀鬱岩嶤髙閣新成抗碧霄秘府圖書金作匱御溝流水玉為橋草分碧色承殷輅鳥弄歌聲和舜韶當直幾畨清坐乆隔簾時有御香飄葢當時車駕嘗臨幸館閣故也不獨宣召燕對與供奉文字而已宿直洪武三年剖符封功名命學士宋濂議五等封爵宿大本堂討論達旦永樂中内閣七人者常召至燕寢論事或命假寐至達旦始出成祖出狩崩于榆木川仁宗命尚書蹇義夏原吉學士楊榮楊士竒侍讀王直侍講王英同定大喪禮議國政宿内閣者凡七日今上御西苑仁夀宫命内閣大學士入宿延和門内直房侍逰聖祖製大誥首以君臣同遊為言故當時儒臣毎侍上遊觀禁苑凡亭樓臺閣靡不登眺以通上下之情成地天交也學士宋濂嘗侍遊後苑觀穫上曰農事成矣對曰國以民為本民以食為天陛下知稼穡之艱難念生民之疾苦實盛徳也洪武六年正月丙午上御武樓召御史中丞陳寜太子贊善大夫宋濂賜坐左右談嘉祥之應􅃯中使人取所儲膏露於宫中盛以翠甖玉潔珠圓世所未覩已而舁爨器至用金杓煉水二升火既勻水勢成濤上起自龍帳中親啓甖以投須臾融化與水為一上取杓傾瀉二内侍舉幕承之渣滓巳靜重漉以絳紗囊上飲一爵而分賜寧與濂焉且曰此天地至和所凝也卿等服之去沈疴享遐齡矣寧等飲畢奠爵於几頓首而退賦甘露漿詩以侈其榮濂所陳説不為隠蔽嘗曰君猶父也天日其可欺邪一日上問曰卿昨飲酒座客為誰饌為何物濂悉以其實對上笑曰卿飲時朕令人視之果如卿言卿信不欺我久益厚之每燕見必命坐賜茶每旦令侍膳詢訪舊章講求治道或至夜分乃退永樂中學士解縉胡廣等七人每令節燕閒陪駕幸東西二苑登萬嵗侍宴廣寒殿泛太液以為常多為歌詩以紀之宣宗時宸遊尤多宣徳七年七月上登萬嵗山坐廣寒殿召翰林儒臣侍命周覽都畿山川形勢即畢上諭以元興之故曰兹山兹宇順帝所日宴遊者也豈不可感侍臣叩首曰紂之荒周之監也又嘗召遊太液池上親射鳬獲之命以羞侍臣英宗復辟始命諸大臣同遊天順三年十月十日内閣學士李賢彭時吕原扈駕校獵南海子海子距城南二十里方百六十里闢四門繚以崇墉中有水泉三處獐鹿雉兎育其中籍海户千餘家守視每獵海戸合圍縱騎士於中亦所以訓武也是日扈從官皆䝉頒賜獐鹿雉兎而内閣比諸人差厚云四年四月六日辰刻上御南薰殿召尚書王翺李賢馬昻學士彭時吕原五人入侍命内侍三人鼓琴上曰琴音和平足以養性情曩在南宫自撫一二曲今不暇矣所傳曲調得於太監李永昌經事先朝精於琴是三人者皆不及也賢等對曰由此不輟亦可精矣因頓首曰願皇上歌南風之詩以解民慍幸甚上起入賜廂鶴頂博帶舉授五人者皆叩頭謝二十日上御西苑閲武臣騎射召賢五人侍是日所閲皆侯伯都督都指揮指揮𨽻三營把總管操者總兵官會昌侯孫繼祖廣寧侯劉安懷寧伯孫鏜都督趙輔具名籍進呈令逐一馳馬射箭以三箭為率上親按籍記中否比中例試畢賜鈔有差總兵暨賢五人各賜鈔十二月閲御監勇士騎射亦如之自是將士咸感徳畏威知所奮勵云常觀君臣之際上貴致其禮下貴盡其誠若私眤媟䙝流連光景殆非聖祖所謂同遊之初意也巳嘉靖十二年四月十三日上御環碧殿試演馬歌曰朱夏纔入四月中乗閒試馬出深宫惟兹七馬壯且雄登霄未可擬跳澗或崢嶸爰因演步至環碧命諸左右來輔弼同遊同遊兮祖訓昭贊襄贊襄兮須竭力朕非商髙宗諸輔勿我棄旱為霖兮羮作梅啓心務期沃朕心俾令湯孫繼祖烈庶幾政化維日新燕和洪武二年十一月上御外朝召學士宋濂危素詹同等飲親御翰墨賦冬日詩諸臣皆和焉六年開局禁中修大明日厯十一月十五日御史中丞誠意伯劉基偕學士宋濂詹同侍上燕乾清宫之便閣同被酒而還時善書監生黄昶在館同愛其有俊才賦詩贈之字大如斚少選奉御傳宣召濂等赴右順門㑹上適乗輦而坐同餘酲猶未解上謂之曰卿醉猶未醒邪同對曰在史館中猶能賦詩贈黄秀才謂昶也上曰詩何在同對曰在史館中上顧濂亟取之既上奏上笑謂濂曰朕即和同詩卿當為朕書之濂於是受命書焉同詩不過稱昶才美而御製詩則并及君臣燕飲之故濂歸與昶言之以為詞垣盛事八月甲午上觀水有上秋水賦者言不契道乃更為之賦成召學士宋濂等觀之且令各撰賦以進濂率同列撰成俱于東黄閣次第投獻上皆親覽焉復加品評於其間已而賜坐􅃯大官進天厨竒珍内臣行觴上顧濂曰卿何不盡飲濂出跽奏曰臣荷陛下聖慈賜以醇醪敢不如詔第臣年衰邁恐志不懾氣或愆於禮度無以上承寵光爾上曰卿姑試之濂即席而飲將徹上復顧曰卿宜更釂一觴濂再起固辭上曰一觴豈解醉人乎卒飲之濂舉觴至口端又復瑟縮者三上嘆曰男子何不慷慨為對曰天威咫尺間不敢重有所瀆勉强一吸至盡上大悦顧濂顔面變頳頓覺精神霞飄若行浮雲中上復嘆曰卿宜自述一詩朕亦為卿賦醉歌二奉御捧黄綾案進上揮翰如飛須臾成楚辭一章濂既醉下筆傾欹字不成行甫綴五韻上遽召至前命編修朱右重書以遺濂遂諭曰卿藏之以示子孫非惟見朕寵愛卿亦可見一時君臣道合共樂太平之盛也濂行五拜禮叩頭以謝上更􅃯給事中宋善等賦醉學士歌云宣宗尤喜為詩初即位起學士李時勉而任用之一日幸文淵閣賜諸學士飲呼時勉謂曰卿非朕安得飲此酒時勉頓首謝他日侍遊東苑上賜時勉酒酌以御甌時勉頓首辭曰臣可與陛下同飲不敢同器上悦命易以銀爵既醉上出御製詩俾賡之宣徳六年上御製詩一章賜尚書胡濙蹇義大學士楊士竒楊榮且曰朕茂膺天眷惟爾四人贊翼之功賜宴盡歡而罷明日士竒榮各奉和以獻又嘗召大學士黄淮燕飲萬嵗山淮獻詩他日陛辭復燕飲于太液池御製長歌以贈焉語在第五卷嗟乎虞廷喜起巻阿遊歌不聞乆矣至我朝而續夫燕所以示慈惠也詩所以道性情也燕飲賡和之際而至情藹然逈出千古祖宗盛時上下之交有如是哉召對祖宗以來凡燕閒執政大臣左右近侍時常召見英宗嗣位此禮遂廢惟有大事則傳奉召之問對一二語遽出景泰中大臣専擅英宗復辟始知其由乃親決章奏日與學士李賢議之凡便殿入奏舊規每朝退獨進不待呼召徑詣入見以承顧問然同列彭時吕原恆不得與焉上嘗謂景泰不理政務或用人陞官謝恩不知所以文武大臣未嘗接言上下之情如何得通賢曰自古明君常與大臣相接若接賢士大夫之時多親宦官官妾之時少天下何患不治上曰如此天下豈不治安又李東陽曰東陽自乙卯承乏内閣時孝廟臨朝淵黙自朝㕘復命經筵日講之外罕接天顔凡有擬奏陳説答問之類每用本票揭帖大則具題本雖日積月累往往不能盡𢎞治十年三月二十二日朝食前忽遣太監韋泰馳至閣亟呼曰宣四先生叩其故曰不知臣溥臣健臣東陽臣遷亟具衣冠至文華殿叩頭畢上曰近前於是直扣御榻司禮監取本皆環跪於案側上曰看文書諸中官取本付臣溥等各一本上曰與先生輩計較臣溥等看畢相與議定又分置朱硯朱筆授片紙數幅於臣東陽臣遷批辭以次陳奏得允乃録於紙上以進上覽畢親批本面或更定二三字或刪去一二句皆應手疾書宸翰清逸畧無凝滯上揮餘本謂左右曰此皆常行事不過該衙門知道耳乃皆叩頭退上顧左右曰喫茶出文華殿尚膳監捧茶以俟葢時出急召未有宿辦也自是平臺煖閣稍稍召對并及部院大臣詢其政務若欲復祖宗之舊者及孝肅太皇太后之喪議禮考文乆或移晷多或連日藹然若家人父子上既明習國事天語嚴宻議論層出或累數十句臣下雖承歡造膝欲盡一二語至無間可入或不竟其辭而退退而尋繹所受亦不能悉記召慰編修楊士竒始入内閣每敷對望見天威猶有懼色成祖召而慰之曰朕知爾文學親擢于此爾但盡心勿自疑畏英廟既復位御文華殿召大學士髙榖學士商輅謂曰朕在南宫知爾二人無偏向心如今正要用爾宜用心辦事成化四年彗星見言官劾内閣大臣商輅等輅遂求退憲宗謂曰朕用卿不可欲加人言至詰責言者曰唐太宗用王魏朕用商輅有何不可欲加譴調輅奏言臣嘗勸陛下優容言官已荷嘉納如修撰羅倫輩復請召用今因論臣而交責之如公論何上以為然乃釋言官不問召輅至御座前慰諭之殿閣詞林記卷十二
