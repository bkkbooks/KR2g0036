body:
  text: 殿閣詞林記卷六明廖道南撰館學𢎞文館學士封誠意伯劉基劉基字伯溫浙江青田人年十四即領春秋大義元至順癸酉以明經舉進士授髙安丞揭文安公曼碩一見竒之曰此魏徴流也而英特過之他日其濟時之器乎初基遊燕京見書肆有象緯占經閲之經夕談誦如流其人大驚欲舉以授之基辭曰業已習矣及丞髙安有進賢鄧祥甫者精於天文術數乃以其學授基焉治髙安有能聲江西行省辟掾史基辭去尋起為江浙儒學提舉又辭去嘗與魯淵宇文公諒泛西湖有異雲起西北祥光掩映湖波如綺諸人皆賦詩記之基獨縱飲不顧徐呼曰此天子氣也應在金陵十年當有王者起其下我當輔之衆駭以為狂悉舍之去基獨與門人沈與京劇飲湖亭時無能知者惟西蜀趙天澤以為隆中諸葛也方國珍起兵海上元帥多爾濟巴勒被其誘脅省憲遂舉公為帥府都事基募兵平山寇吳成改行樞密院經厯與參知政事舒穆嚕宜孫守處州以拒國珍遷行省郎中經略使李國鳳上其功執政者貪得國珍賂遺奏入不省授以判官基又辭去歸青田山中乃著郁離子書我髙皇帝取婺州遣孫炎聘基基指乾象謂人曰此天命也吾其行乎基至金陵上時務十八䇿上嘉納之會陳友諒入寇或謀以城降或以鍾山有王者氣欲趍據之上問基曰先生以為何如基曰先斬主降議及奔鍾山者乃可破賊爾上曰先生計將安出基曰天道後舉者勝若散府庫開至誠以固士心伏兵伺隙擊之取威制敵在兹一舉已而友諒至果大敗走復將討友諒于九江基曰金星在前火星在後克之必矣上大喜即出師攻皖城自旦至晡不拔基請徑趍江州遂拔之友諒走湖廣其洪都守將胡廷美遣子約降預請禁約數事上有難色基自後踢所坐胡床頓悟許之廷美以城降先是嘗遣都督馮勝出攻基授以方略俾夜半候望青雲起則我兵宜伏見黑雲則彼冦兵伏也慎勿妄動黑雲漸薄與青雲接此冦歸也宜急追之果如所料基以母冨氏喪奔歸過衢州值苖軍叛殺守將胡大海耿再成孫炎等夏毅時守衢城驚懼失措基徐為畫計且諭諸軍以禍福衆乃定遂與平章邵榮擒苗帥賀李等克復諸城方國珍素畏基名遣間致書問基因宣布威德諷使歸順方氏納欵上遣人訪基以軍國重事基隨問條答悉合機冝及還都道經建德會張士誠冦其城守將李文忠欲奮擊之基曰不出三日賊可成禽也比三日黧明基登城望曰賊走矣趍使疾追至東陽悉禽之基至入謁上問曰友諒據楚士誠據吳二者孰先伐之便基曰友諒居上流名號未正宜先伐之友諒既平取士誠如囊中物爾巳而友諒復攻洪都上親征之大戰于鄱陽湖勝負未決基密謀移軍湖口以金木相犯日制勝上皆從之陳氏平遂決計伐士誠暨北定中原基運籌居多上時至基所屏人語移時乃去人莫知之乃以基為太史令一日基見日中有黑子奏曰東南當失一大將時參軍胡深征閩果覆沒他日上欲刑人基曰何為乃語以所夢基曰三人頭上有血此衆字也以土傅之得土得衆之象也後三日當有驗越三日海寧果以城降上大喜悉以所留刑者俾基縱之是年熒惑守心羣臣震懼基勸罪已以回天意上即詔諭羣臣人心始安值大旱命基讞滯獄多所平反天降澍雨張昶上請羣雄既平宜及時為樂基曰是欲為趙髙也昶色動乃使齊翼巖等伺基欲中之傷上廉得其情昶翼巖伏誅未幾為御史中丞兼太子贊善大夫上北巡命丞相李善長及基留守京師且敕以督察姦惡以肅輦轂基素剛嚴凡中書內府閹人吏胥有犯即捕治宦者監工匠不肅及宿衛舍人奕棊基啓皇太子悉置於法有中書都事李彬者犯法基即廢之善長祈緩其獄弗得遂􅋦之上還都基言曰鳳陽固帝鄉非天子所都之地雖置中都不宜居也庫庫特穆爾雖可取然未易輕視願留意基辭歸青田適章溢奏定處州田稅上命減稅畝止五合且曰使劉伯溫子孫世為美談也厥後定西失利庫庫特穆爾北走沙漠上乃手詔召基略曰爾從朕於羣雄未定之秋居則匡輔治道動則仰觀天象察列宿之羅布驗日月之光華發蹤指示無征弗克攻皖城拔九江撫饒郡降洪都取武昌平處州爾多力焉至於彭蠡鏖戰炮聲如雷鬼神悲號星日晦冥自旦至暮如是者四爾時在舟中備嘗患難今久而未至朕心慊焉命駕一來朕心良慰基至上欲拜之爵基曰陛下乃天授臣何敢貪天功固辭不拜上以事詰責丞相善長基曰善長勳舊且能輯和諸將上曰是數欲害汝者汝反為之地耶汝之忠勳足以任此基曰譬如易柱必得大木若用小木為之將速顛覆如臣駑鈍尤不可爾上欲相楊憲基與憲素厚乃直言曰憲有相才無相器夫宰相者持心如水以義理為權衡而已無與焉者也今憲不然能無敗乎上曰汪廣洋何如基曰器局𥚹淺觀之可知上曰胡惟庸何如基曰彼小犢爾將僨轅而敗犂矣上曰吾之相無踰於先生基曰臣非不自知但臣疾惡太深不任繁劇為之且孤厚恩天下何患無才願明主悉心求之如目前諸人臣誠未見其可上嘗與論兵曰克敵在兵制兵在將兵無節制則將不任將非其人則兵必敗是以兩軍之間決死生成敗之際有精兵不如良將基曰臣每觀廟算初謂未必皆然及摧鋒破敵動若神明臣由是知將之勝又不若主之勝然陛下不拘古法而勝尤人所難上曰兵者謀也因敵制勝豈必泥於古哉戰陳之事闔闢竒正頃刻變化如風雲之無常勢要在通其變爾三年七月以為𢎞文館學士十一月大封功臣拜誠意伯錫之誥命追贈其祖父皆永嘉郡公四年正月賜歸田里遣子璉赴闕謝恩并上平西蜀頌上手書優答且問以天象基覆上言霜雪之後必有陽春今國威已立宜濟以寬上命以其書付之史館或有言殺運三十年未除者基歎曰吾若當國掃除弊俗一二年後寬政可復也初甌括間有隙地曰談洋基言於上以為頑民負販私鹽因挾方冦為亂宜設巡檢司上從之及設巡檢司民以為非便適茗洋作亂郡縣匿不以聞基令子璉奏之時胡惟庸柄政憾其所奏乃謂基圖談洋為已墓地詔以基勳舊赦弗治仍奪其祿先是楊憲敗後汪廣洋為相復敗胡惟庸繼之基大戚曰使吾言不驗蒼生福也如其驗諸其如蒼生何八年正月胡惟庸以醫來視疾飲其藥二服有物積腹中如石基白於上亦未之省也乃御製文一通遣使送歸及家一月而薨年六十有五所著有覆瓿集寫情集及犂眉公集廖道南曰豫觀誠意伯集慨然激嘆以為有子房之風及誦我聖祖之言亦曰吾子房也夫子房椎擊沙中何異於伯溫之憤方氏也伯溫受天文於鄧祥甫又何異於圯上老人之三略哉漢之元功大封子房願封留足矣乃辟榖導引明哲保身始神黃石之術終從赤松之遊易曰介如石不終日貞吉何其智也而伯溫乃徘徊容與雉罹于羅象以齒焚豈其忠於國而弗智於身耶彭韶贊曰治淪於弱曷仕於時爰歸盛德仕止乃宜就桀就湯節義奚虧大哉王佐燭物炳幾運籌制勝翼龍以飛昭回制作文章是咨允為宗臣爾爵爾祠𢎞文館學士羅復仁羅復仁字原闕江西吉水人初從陳友諒為編修甚見禮遇歲壬寅太祖髙皇帝兵至九江復仁來降命侍左右癸卯從破友諒于鄱陽湖命齎蠟書招諭臨江袁州諸郡甲辰除中書省咨議性率直每論事指陳得失無所隱避益親信之及武昌久圍不下上以復仁友諒舊臣命往招諭其子理復仁至城下號慟不已理怪之使召之入復仁曰今不降大兵且屠城諸民何罪早為之所則族可保也理由是遂降復招諭江西還為國子助教以老賜車出入每宴見賜坐飲食丙午春奉使山西招諭元將庫庫特穆爾前使多被拘留復仁議論慷慨獨還洪武元年擢編修二年冬齎詔諭安南命毋侵占城既至曉以大義安南王恱服還贈以黃金美玉復仁辭不受歸奏之上多其廉讓適安南使者至仍令持之以歸改翰林檢閲未幾拜𢎞文館學士屢召論復仁多土音質俚上以其率直多見聽納尋乞休賜大布之衣書曰性雖粗率忠直可嘉賜爾布衣放歸田里仍賜玉帶名馬鐡柱杖坐墩諸物上嘗幸其第復仁方操塗具急呼其妻取凳故上每呼為老實羅云廖道南曰馬援有言非惟君擇臣臣亦擇君夫中原鼎沸綱紀􅑁壞而羣椎角立未知鹿死誰手復仁乃能辭其故主翊戴真龍推心置腹直見本真綸綍寵褒非溢美也贊曰朴而不浮戅而有真却金知義賚布知仁玉帶溫栗鐡杖堅貞大哉奎章照耀山城𢎞文館學士危素危素字大朴撫州金溪人年十五能究五經大旨與同郡葛將曽堅黃􅒐更相策勵乃從吳沉范梈遊遂知名薦入經筵為檢討厯升學士承旨奏請加封朱考亭楊龜山李延平真西山蔡九峰從祀俱從其論國初徐逹收燕京令故臣咸投告身素與編修黃冔誓死於難有報國寺僧梓者救之乃免而冔竟死矣逹乃以素歸上雅聞素文學仍命為侍講學士因進言宋朝諸陵為元西僧所發以理宗頂骨為飲器上聞之惻然曰宋南渡諸君無大失德與元又非世讐既乘其弱取之何乃縱姦人肆酷如是耶即命守將吳勉訪索頂骨得之僧廬命有司厝於京城之南紹興亦以永穆陵圖來獻命掩瘞故處時值井露降宋濂為頌上問素此何徴也素曰王者愛養耆老則井露降而松柏受之尊賢容衆則竹葦受之今井露降於松是陛下養老所致也宜以制幣册告宗廟頒於史館以永休聞三年四月命素及胡鉉雎稼王大中俱為𢎞文館學士鉉歸素撰皇陵碑以獻上念其老賜小車免朝謁時從論説經史質證疑義御史王著等劾素亡國之臣不冝居侍從乃謫居和州之含山所著有宋史稿元史稿文集五十篇奏議三卷宋濂銘其墓曰大明方隆多士景從有詔任公侍講禁中公文之純大音玄酒道則在兹爵祿何有孰高為山孰深為淵文之有傳終古昭宣廖道南曰素仕元秉文衡都樞要學者仰之如星凰及徐逹收燕薊命仕兀者投告身素與編修黃冔約死於難冔死而素背約焉及至躋顯榮陟清華愧東閣之履聲慘南滁之汗顔竟自經於溝瀆而不之恥莊生有言哀莫大於心死素之謂矣贊曰華國之才救時之略其學博雅其操簡約鳥則擇木魚則依水為臣不二有負斯語宫學左春坊大學士董倫董倫字安常順天宛平人所學浩博沉潛學者從之稱為貝川先生洪武十五年張寧以明經薦入朝奏對稱旨授春坊贊善大夫侍懿文太子陳説剴切髙皇帝嘉之未幾補河南參議二十五年改詹事院為府遴選東宫官屬以唐鐸為詹事祝春李文吉為少詹事而以倫為春坊大學士倫薦葛伯衡代已三十年以詿誤坐事謫雲南教官皇太孫憐之賜白金為道里費倫涉淮溯汴驅馳梁雍以逹於蜀蜀王聞而重之賦詩八章以贈其行時雲南初開倫以身教用夏變夷逺人嚮慕建文中召入為禮部侍郎兼學士階嘉議大夫御書怡老堂三大字及髹几玉鳩杖各一倫上表略云臣素無閥閲功勞兼乏智能才藝徒知篤信于古道自分無用于明時幸蒙髙皇帝之知忝拜左春坊之命任臣以兩宫輔導之職稱臣為三葉帝王之師兹者踐阼之初乃復馳書以召蒼顔白髮萬里來歸金馬玉堂十年如昨自今持杖戒噎則思兆民或阻于飢憑几安身則念一物或失其所乃方孝孺代撰也先是解縉代夏長文章奏劾都御史袁泰謫河州至是倫薦之召還為待詔其汲引士類如此廖道南曰豫觀順天志稱倫端厚質實及考諸國史乃知其歷履夫方遜志解春雨皆名儒也或代之撰表或受其薦剡其人品髙尚可徴也已贊曰真人啓運哲士景從獻策彤廷授經青宫出補大藩入司坊學侃侃大節卓彼先覺左春坊大學士李至剛李至剛名銅以字行浙江寧海人少從楊鐵崖遊洪武初以明經舉侍懿文太子初授祠部試郎中坐事謫戍邊未幾召還為虞部郎中尋補河南參議會河決汴堤以匡濟調湖廣參議太宗登極至剛來朝擢右通政預修髙廟實録陟禮部尚書甲申册立皇太子命至剛兼左春坊大學士初開經筵同解縉進講及修永樂大典多所裁定侍郎宋禮劾之降儀制郎中及縉被譛詞連至剛下詔獄仁宗嗣位復以通政改守興化府卒子源中永樂甲辰進士廖道南曰豫讀楊文貞公所撰至剛墓表稱其入典邦禮輔儲君出佐藩翰守名郡顯庸光大雖間歷夷險然回視同儕輩覆滅消亡何可勝計蓋指縉也及考縉所評至剛語曰誕而附勢雖才不端太宗後舉以告仁宗曰至剛朕洞燭之矣縉語有徴非狂士也於乎豈士竒亦忌縉耶贊曰崛強此老􅏡歷居多屢遭竒禍弗罹于羅大紳少之文貞則多聖謨如在人其謂何右春坊大學士曽棨曽棨字子啓江西永豐人永樂甲申進士第一授修撰軀儀膚碩問學敏贍太宗竒其才命解縉選二十八人為庶吉士進文淵閣棨為之冠上嘗召問棨應對如響命撰天馬海青歌揮筆立就詞氣豪宕預修永樂大典充副總裁官丁亥轉侍講守制車駕幸北京起復扈從同邑有坐建文間黨繫者人咸為棨危又所居西長安門失火延及禁垣上皆以棨故不問秩滿進侍讀學士重修髙廟實録成駢沐賜賚仁宗嗣位遷右春坊大學士仍兼侍讀階奉議大夫宣德改元預修兩朝實録成賜金織襲衣寶帶擢少詹事仍兼侍講學士卒贈禮部侍郎楊榮銘其墓曰永樂初科首賜及第玉質金聲為國令器居官翰苑克慎克勤文行之懿逺近著聞廖道南曰豫觀國史謂棨溫雅英邁喜推薦士學博才曠為文沛然惜乎天不假之以年未究厥終也贊曰渥窪神駒奔風逸電丹穴威鳳雲輝星爛子啓之才夙自天成大廷擢魁宫府埀名天奪之速齎志以沒長篇大章照耀石室詹事兼侍讀學士李泰李泰字文通順天香河人正統戊辰進士選庶吉士授編修景泰間遷左春坊司直郎兼編修再轉右中允英廟復辟改尚寶司丞兼編修既而侍東宫講讀轉侍講成化改元升侍講學士兼經筵官尋侍文華日講預修英廟實録成升少詹事兼侍講學士未幾進詹事兼職如故卒年四十三賜祭葬贈禮部侍郎太監李永昌泰之伯父也正統中掌章奏有寵泰為其後初應鄉試京尹進録英廟問左右李泰中否見其名甚喜及官翰林頗知向學矜已自足性狷僻與人寡合而所與者則相朋比汲引士論以是薄之廖道南曰豫讀小説家見唐有皮思謙者冒中常侍魚朝恩之寵登髙科歷顯仕未嘗身為其後獲居宥密如李泰者也嗟乎翰林清要貴重匪宿儒不可以斯人踐斯地豈非豫殿閣師濟之辱乎贊曰曹瞞後騰思謙冒恩史局溷處掖庭奧援泰也雖才歷試則愆鴟蹲鳳池有汗斯顔吏部侍郎兼侍講學士楊守陳楊守陳字維新浙江鄞縣人景泰辛未進士選庶吉士授編修預修一統志轉侍講憲宗登極充經筵講官一日講尚書武成篇守陳曰古稱舜無為而治武王埀拱而天下治蓋聖人勞于求賢佚于得人後世人主深居禁中委政內侍者召望夷之禍髙拱無為肆情嬖豔者啓祿山之變孟子所謂安危利災此之謂也時中官梁方及昭德萬妃有寵故守陳及之聞者悚然未幾遷司經局洗馬進侍講學士孝宗出閣命侍講讀時議憲廟升祔禮守陳上言古者天子七廟祖有功宗有德凡號太祖者即始祖當尊以配天若商周之契稷則又以功論不以統論也宋之僖祖可比商報乙周亞圉非契稷比議者徒取王安石之説遂使七廟之間既有始祖又有太祖既以配天又不正南向之位名與實乖皆非禮也今升祔憲廟請并祧德懿熙三祖自仁宗以下為七廟異時祧盡則以太祖擬商周契稷而祧主藏于後寢祫禮行于前廟時享則尊太祖祫祭則尊德祖各不失尊庶無悖禮執政不能從及修文華大訓成升少詹事仍兼侍講學士守陳上言二事其一請開日講云陛下一日御文華殿之時多處乾清宫之時少則欲寡而心清惑少而理明得于內者純出治之本立矣其二請御午朝云大政則召大臣靣議未當則許諫官救正俾賢才常集于目前視聽不偏于左右資于外者深致治之綱舉矣若如近日凡百題奏付內監調旨批答臣恐積弊未革隱禍已深不但如目前所慮而已上褒答之未幾擢吏部侍郎兼詹事府丞專典史事英廟實録充總裁官踰年卒贈禮部尚書諡文懿何喬新敘其集曰文懿載筆蘭臺讎書延閣侍講經幄輔導儲宫三十餘年自六經諸史旁及九流靡不探源綜要故其發于文也法度森嚴如龍虎鳥蛇布立于行陳意態間雅如朱紘赤舄周旋于殿陛其閎深雄放又如彭蠡驚濤龍門駭浪浩乎渺乎不可狎玩也王鏊誄之曰聖亡經在異説紛兮厄秦造漢離多門兮商詩瞿易授受親兮黨同矜異傳失真兮遺言奧旨不尚存兮唐有啖趙宋孫石兮抱經剗傳挺見特兮逮乎伊洛義轉精兮紫陽承之集厥成兮設科置學為世程兮父傳師授莫知其端兮雖有異説誰敢干兮於文懿公生已後兮周漢唐宋得通究兮聖經浩浩如天淵兮家鑽人淬庶或全兮瑰辭微義日星陳兮取信何傷益自珍兮嗟我何知乃得師兮謂公自信當勿疑兮太羮玄酒所貴希兮豈不或過志亦竒兮後千萬年來者誰兮廖道南曰豫讀文懿桂坊金坡諸稿固已異之及觀國史謂其恬靜易直仕雖齟齬而守正不變彭韶贊曰無思不通無書不讀講章震主聽者悚服羡彼世光袍笏滿床有三尚書有六桂坊吁嗟我公直筆如競奏草已具死不目瞑少詹事兼學士柯潛柯潛字孟時福建莆田人景泰辛未進士第一授修撰明年遷右中允丙子寰宇通志成轉司經局洗馬天順丁丑改尚寶少卿兼修撰己卯侍東宫講讀憲宗踐阼擢學士掌院事授庶吉士業誠心訓迪士多造就凡百廢弛悉加振作人以是多之預修英廟實録成升少詹事兼學士成化戊子充日講官守制歸適祭酒缺廷議會舉詔起復之潛力辭不起卒潛為人髙介有氣節遇事不茍故今詞林諸士尚呼為柯竹嵓云楊文懿公敘挽集曰孟時姿儀德器才識文學敻出人表且秉史筆典文衡視院篆侍講幄茂著勞望士方仰之若山嶽民具望之作霖雨天胡奪之速耶廖道南曰豫遊翰林見有亭一區曰柯亭有柏二株曰柯學士柏何其流風遺澤令人永矢勿諼也蓋其孤介之節剛正之氣所漸被者逺矣贊曰壺山之隂蘭水之陽倫魁夙兆宫端潛光竹巖流清柏亭埀芳有斐君子終焉允臧詹事兼學士程敏政程敏政字克勤徽州休寧人生而蚤慧侍父襄毅公官蜀巡撫侍郎羅綺以神童薦英宗召至便殿試以春聫應對如響館閣覆試賦聖節及瑞雪詩并經義援筆立就詔詣翰林讀書李文達公妻以女成化丙戌進士及第授編修預修英廟實録秩滿轉侍講及修宋元綱目敏政自撰宋史受終考大學士彭文憲公稱之遷左春坊左諭德充經筵講官乙未廷試讀卷丙午主考應天鄉試孝宗登極升少詹事兼侍講學士充日講官時詔議從祀孔子禮敏政上言聖王治天下以祀典為重故有功德于一時者一時祀之更代則已有功德于一方者一方祀之踰境則已况孔子功德在萬世必文與行兼名與實副者乃可以從祀若戴聖身陷贓吏劉向喜談神仙馬融為梁冀草詔殺李固何休解春秋黜周王魯王弼何晏倡為清談王肅佐司馬昭篡魏杜預為吏不廉為將不義得罪名教類當黜祀疏上會御史魏璋以曖昧中傷之致仕歸郎中陸容給事中楊廉辨其寃上召之還擢太常卿仍兼前職教習庶吉士預修玉牒乙卯守制歸服闋詔修會典充副總裁官轉詹事兼學士尋升禮部右侍郎掌詹事府事侍皇太子講讀己未主考禮闈給事中華昶劾之詔廷辨昶語塞坐罪敏政致仕卒贈禮部尚書所著有皇明文衡瀛賢奏對儀禮定本新安文獻志宋遺民録諸書廖道南曰豫為兒時竊觀篁墩文集浩乎其莫禦及豫謫居徽上登齊雲望紫陽訪其廬吊其墓想見其為人蓋一代之豪也而卒被誣以死當國者寧不有遺憾耶贊曰黃山嶻嶪萬仞干霄練水渟浤百川怒號惟彼齊雲紫翠岹嶢篤生英又卓哉人豪磊落髙邁天風海濤撰述紬繹璽絲牛毛青蠅貝錦見睍則消誦述遺編德音孔昭詹事兼侍讀學士陸簡陸簡字廉伯常州武進人成化乙酉鄉貢第一明年進士及第授編修秩滿轉侍講預修宋元綱目成遷右諭德充東宫講讀官𢎞治紀元召修憲廟實録升右庶子兼侍讀充經筵日講官辛亥擢少詹事兼侍講學士甲寅以日講勞特升詹事兼侍讀學士踰年卒贈禮部右侍郎簡姿貌秀偉少有俊才頗不自檢晚益矜誇自負當逺到既久滯不顯亦多鬱抑齎志以沒李文正公銘其墓曰文以竒勝耻弗已出持堅敵強孰能我屈中所自負觸事硎發有銛弗施飲志而沒若在冶金久乃成質器之斯艱恆百斯一成斯棄斯嗟彼造物謂天默默孰爾揭揭廖道南曰豫友水南張學士謂陸龍臯氣蓋萬夫才雄一時及接其子煥章諸郎咸有父風豫過武進乃得訪其幽蹤遺迹蓋志大而術踈者也贊曰矯矯龍臯淵淵鳳池夙負英氣𡨕繹玄思麗藻所裁信史誰欺徴羣公子永世有詞吏部侍郎兼學士掌詹事府事張元禎張元禎字廷祥江西南昌人天順庚辰進士選庶吉士授編修憲宗登極禎上言三事一曰勤聖學二曰公聽政三曰廣用賢上嘉納成化丁亥謝病歸二十餘年潛心理學士子多從之遊孝宗即位召修憲廟實録轉左春坊左贊善上疏論王道幾萬言己酉主考應天鄉試辛亥升侍講學士掌南京翰林院事疏侍母養歸九年召修會典充副總裁書成進學士壬戌遷南京太常卿癸亥召修厯代通鑑纂要改太常卿兼學士甲子命掌詹事府事上疏請觀太極圖西銘諸書上亟命內閣取觀之未幾擢吏部侍郎兼職如故元禎為人孤峭竒拔其所交遊若天台陳選南海陳獻章豐城羅倫江浦莊昶皆一時名士也李文正公銘其墓曰木生在山久乃益堅輦至于途蹶萬牛以顛貢之明堂將棟將梁忽內蝕以傷孰其生之而棄厥良人才實殊公負其有唯厥攸負曰可與大受與不在天受不在豫夫茍不自愧遑恤其誰維文之絶惟名之揭彼利達者疇巧疇拙地靈人傑惟鄉邦之哲百世之下山不泐水不嚙惟張東白之穴廖道南曰豫嘗讀東白集若彭蠡奔濤匡阜飛壑不可蹤迹及觀國史則又有不滿人意者於乎豈其才髙見忌耶贊曰匡阜之涯羣峰蜿蜒彭蠡之濱衆派淪漣東白學古襟嶽帶湖煙雲鳳標星斗龍圖西涯有碑守溪有志於乎已矣令名不世禮部尚書兼學士劉春劉春字仲仁四川巴縣人成化癸卯鄉試第一丁未進士及第授編修𢎞治辛亥轉修撰庚申充東宫講讀官秩滿遷左諭德癸亥預修會典進侍講學士正統紀元升學士辛未擢吏部侍郎充經筵日講官明年陟禮部尚書占城世子失國竄居邦都郎請封春曰春秋公孫青尚不辱命于衛况天朝乎疏上已之又明年改南京吏部尚書辛巳調禮部尚書兼學士典誥勑掌詹事府事卒贈太子太保諡文簡子彭年舉進士為督學副使今擢都御史延年蔭中書舍人禮部主事孫起宗戊戌進士大學士楊廷和銘其墓曰重慶先達曰蹇忠定文簡繼之煒煒輝映其始從事史局講筵隨試自效職業罔愆四典三禮秩亦屢遷法守是慎不比于權召自留都司帝之制行將大受參預政事諧于庶明以贊新治胡進之難胡奪之易廖道南曰豫為庶吉士時東川公方起赴闕見其醇雅篤厚有古人風方擬樹教祕書省未幾而亡石齋之銘豈欺我哉贊曰峨嵋㠍嶫灧澦淵渟忠定先奮文簡後征恂恂其貌翼翼其心兩川黎老兹其典刑禮部尚書兼學士李遜學李遜學字希賢河南上蔡人成化丁未進士選庶吉士授檢討𢎞治丙辰出補浙江僉事以憂去服闋升陜西副使又以憂去起復改山東前後更三任俱督學政所至務崇寬厚頗得士心正德戊辰召入為太常少卿提督四夷館仍兼侍講尋擢户部侍郎提督太倉禮部侍郎乙亥陟南京禮部尚書丙子以慶賀入京調禮部明年兼學士掌詹事府事典誥勑命授庶吉士業卒廖道南曰豫計偕時嘗過蔡之故墟訪春秋列侯故迹及式公之閭無恙也既而入讀中祕書而公已不作矣贊曰上蔡之先實惟申伯迄今百祀誰復繼絶峨峨宗伯赫赫宫端簮纓輝映不愧南冠雍學侍讀學士拜祭酒魏觀魏觀字把山武昌蒲圻人父雲瑞隱德弗耀觀讀書蒲首山中勤苦弗輟性喜吟咏觸物感興陶寫自如乃搆亭曰梅初以寄志焉元吕忠肅公讀其詩嘆賞薦於朝辭弗就江漢既平觀被徴與青田劉基金華宋濂諸儒同謁上與語大竒之授平江州學正遷國子助教浙江提刑僉事吳元年改兩淮都轉運使入為起居注一日同待制王禕侍上問曰漢髙祖唐太宗孰優觀曰太宗雖才兼文武於善未免矯揉髙祖豁達大度規模𢎞逺以兹觀之髙祖為優上曰髙祖之度人皆知之然其記兄嫂之怨封其子為戞羮侯怨豐之叛不封雍齒不肯以豐為湯沐邑度亦未𢎞矣太宗規模雖不及髙祖然能其駕馭羣臣各為巳用大業巳定卒能保全功臣此則太宗為優也洪武初建大本堂命觀侍太子説書及授秦晉諸王經觀有詩記之詩曰翠葆葳蕤九鳳旗東華遙望立多時都堂啓事貂蟬集宿衛輪班虎豹馳月繞珠簾升講席花迎金輅肅朝儀六王炳炳前星後珠緯聮輝上玉墀二年十月甲戌天降膏露于乾清宫禁林上問災祥觀曰帝王恩及于物順于人則甘露降陛下誕寬民賦衆庶歡豫底于敉寧神應之臻職此故也十一月冬暖如春上召偕危素詹同吳琳宋濂遊觀內苑錫燕紫閣御製序文賜之曰卿等各賦一詩以述今日之樂觀奏詩詩云深冬晴暖動逾旬內苑遊觀詔侍臣五色慶雲開鳯尾九重麗日繞龍鱗和鸞喜奉彤車御式燕欣叨紫閣賓淑氣已從天上轉人間無地不陽春上覽之大喜三年正月轉太常卿賜之制曰太常之職掌郊廟社稷山川羣神之祀厥任重矣爾觀學行方正事朕有年屢持憲節振揚風紀及領鹽運勞績茂彰頃居翰院日記言動朝夕之間屢進讜論尤簡朕心兹用長于太常益恭乃職七月命觀改定太廟祝文稱孝子皇帝臣凡遣太子行禮稱長子某著為令是月陟為侍讀學士十二月辛酉編集大明志成以觀為嘉議大夫國子祭酒宋濂為司業四年廷試進士觀與博士孫吾與修撰王僎為讀卷官乃得吳伯宗等一百二十人時開科之始得人最盛而伯宗卒為名臣人以此多觀之識九月坐考祀孔子禮不以時奏乃謫觀知龍南縣濂知安逺縣行未至任即召還以為禮部主事上賜燕奉天門喜曰前日逐卿去今日與卿飲何其樂哉仍命各賦一詩五年三月上念姑蘇為京輔重地經張士誠之亂荼毒罔有寧宇廷臣咸薦觀有治才乃出知蘇州府既涖事懲陳寧苛政鋤暴樹良寬而且肅敬老恤民大建學舍乃闢宣聖廟庭舉鄉飲酒禮聘郡賢士周南老王行徐用誠與教授貢頴之定儀節髙啓王彛張羽闡文學郡多耆耋崑山周夀誼年百有十嵗吳縣楊茂年九十三林文友年九十二皆延至之禮成彬彬可觀夀誼還躬餞諸郊再拜送之觀者如堵時戎事倥􅘓百物雕耗禮文衰落乃能力挽躬行風教勃興封部皥然課績為天下最上嘉之陟為四川行省參知政事蘇父老上疏願留仍命觀還郡七年觀以舊治為士誠竊據且郡多水患乃修府浚河以壯士觀以資民利御史張度誣其興既滅之基遂與髙啓等俱獲罪上悔之命所在致祭皇太子諸王哀賻有加乃歸瘞于蒲圻燈窩山廖道南曰把山豫里人也豫自髫童訪其廬吊其墓未嘗不泫然悲焉及誦其所為蒲山牧唱集思見其人而弗可得也既而讀楊符鄉序曰先生之心廣大而髙明先生之才篤實而端重其學博其辭贍其所履任率有成績事至不擇利害而為之有古大臣君子之風黔國沐璘亦曰貌偉而修氣完而優聳衡廬之神秀瑩江漢之清秋其為德也雖耕而隱其為名也匪釣而求與宋景濂碧崖亭辭蘇伯衡梅初亭記相符合也贊曰維我蒲山衡嶽之支維我蓴川洞庭之湄先生崛起于蒲之里邦之司直國之良史伯衡有記景濂有辭璧月珠星光彩陸離學士拜祭酒李時勉李時勉名懋以字行江西安福人五嵗即知學七嵗小學四書皆能成誦甫成童言動以禮既長大肆力於學夜以達旦隆冬盛暑無間永樂甲申進士選庶吉士預修太祖實録守制服闋起復授刑部主事仍與纂修書成轉侍讀三殿災詔求直言時勉條陳十五事一曰停止工作二曰罷四夷朝貢三曰汰冗官四曰賑飢荒五曰慎選舉六曰嚴考核七曰理刑獄八曰黜贓官九曰散處達官十曰罷遣僧道十一曰省買辦十二曰革接遞軍夫十三曰免生員充軍十四曰設法儧運十五曰優恤軍士太宗嘉之未幾被讒下獄既而宥之癸卯以楊榮薦復其官洪熙初上疏言事命武士以金瓜捶之傷肋幾死明日改監察御史又明日下錦衣獄宣宗登極謂左右曰李時勉能直言忠臣也召對于萬嵗山命誦前所上疏時勉誦至六事少止曰天威嚴重不能詳記上微笑曰政自難言耳問奏稿在否曰已焚之矣特命宥之修兩朝實録成進侍讀學士一日上幸史館撒金錢于地衆爭取之時勉端立不動上親取袖中餘錢賜之又幸文淵閣命諸學士飲上曰時勉非朕安能飲此酒正統戊午升學士已而遷國子祭酒既涖任崇廉恥抑奔競别賢否示勸懲士習丕變諸生有疾躬為醫療至於貧不能娶死不能殯者皆為營辦恩義兼盡不啻父子疏請修太學王振怒坐以擅伐官樹枷號監前監生石大用上章救之獲免嗣是屢乞休諸生伏闕輒留之嵗丁卯懇疏致仕允之命給驛舟賜寶鏹為道里費去之日諸生涕泗送者數千人觀者如堵既歸聞車駕蒙塵號慟上疏言選將練兵數事卒諡文毅改諡忠文廖道南曰豫觀名臣録稱時勉至孝父有疾躬親湯藥不離側恤孤救難無間戚疏楊文貞公云時勉文學老成操行修潔節義足以表俗剛正足以任事量足以容物而志則不可奪真確論也彭韶贊曰嗚呼剛士浩然正氣博聞有養學自中祕危言峻行厯事四帝臣身百折臣心不替學士司成姦驕我忌荷校願代門徒之義歸老於田名儒風致侍講學士署祭酒邢寬邢寬字用大直𨽻無為州人幼頴敏力學不輟永樂甲辰廷試初擬孫曰恭為第一太宗皇帝以曰恭一暴字耳及見邢寬二字甚喜遂親擢為第一授修撰預修仁宗實録轉侍講正統戊午預修宣宗實録賜織金文綺加從五品俸己未同考會試尋引疾家居上言民情十餘事丙寅召至復任丁卯主考順天鄉試景泰壬申進侍講學士署南京國子監事卒廖道南曰豫考國史稱寬居家孝友與人交終始不渝且處心夷坦於物無所忤嗟乎庸言之信庸行之謹豈一朝一夕之故哉蓋其所養者厚矣贊曰霍山之麓實為廬郡佳氣鬱結中啓昌運邢君之起夙著休聞厯事四朝蔚然有文侍講學士拜祭酒陳詢陳詢字汝同直𨽻華亭人永樂乙未進士選庶吉士授編修宣德間轉修撰正統初充經筵講官預修宣廟實録進侍讀秩滿升侍講學士坐纍謫知安陸州己巳召入為大理少卿巡撫大名諸郡改太常少卿兼侍講學士尋改國子祭酒天順戊寅卒廖道南曰豫讀國史稱詢剛直慷慨但嗜酒豪放不矜細行及考松志乃知其素履考無咎也贊曰翛然有鶴唳于華亭刷羽林臯揚聲海濱彼美人兮抱光含醇秉德惟恆履險不傾侍讀學士拜祭酒陳鑑陳鑑字緝熙直𨽻長洲人父潤戌遼道經京師以鑑托于舊遊范叔瓉遣從王居為神樂觀道士正統戊辰進士及第授編修景泰中轉修撰充經筵講官天順初預修一統志遷侍讀成化初預修英廟實録進侍讀學士未幾補國子祭酒初祭酒邢讓為大學士萬安構害延蔓及于鑑會廷鞫讓辨不已鑑曰吾為國師安能喋喋對刀筆吏哉遂自誣服除名楊守址上書訟其寃廷議壯之廖道南曰豫讀碧川論救鑑疏有云文章政事時望所歸自今論之其人品可知雖幼從羽衣長即儒服變墨崇正亦可尚也贊曰師道克艱匪人弗受法紀克明匪人弗宥緝熙之悮惟立之救人兩恕之孰批厥繆寺學直學士兼太常卿范常范常字子權滁州人宋青山先生孟申孫也幼警晤嗜學淹貫古今性夷粹無競篤於行義鄉里咸重之謂其有青山先生風至正甲午太祖兵克滁駐蹕城中常以文學聞即召見禮遇之預典兵牘授總管府知事從克和州乙未六月扈蹕渡江取太平授元帥府都事丙申三月定建康皆預謀議自是下毗陵及取江南諸郡贊畫居多辛丑七月乙酉朔命為太平知府既至募民種藝時兵亂乏種官廪有榖數千石常請於朝悉發貸之至秋大稔私庾既實官廪亦充乃興學校延師儒民甚安之上嘉其績召入為侍儀訪以時政及古今事宜常直對無隱又嘗紀滁和事績上之上嘉恱洪武元年四月癸亥擢為翰林直學士尋兼太常卿時肇興禮樂講究設施常多預議無何以疾免尋起為起居注復懇乞歸上重念其老許致仕御製詩四章寵之賜宅一區于太平因家焉子袓仕至右通政改雲南左參政廖道南曰豐沛之歌壯士興懷南陽之謡勳戚增榮而况漆沮造周亳都肇商振古如兹矣我聖祖起中都一時風雲景從攀鱗附翼者固皆魁梧竒犖倜儻雄杰士也如范常者蓋居一於是矣贊曰神龍奮淵蛟螭蜿蜒威鳳翔霄雕鶚蹁躚真人纂厯時乘御天聲應氣求無物不然子權俊又紹武青山起于帝鄉厯試間關侍講學士拜太常少卿髙巽志髙巽志字士敏徐州蕭縣人元末僑寓嘉興幼嗜學從父宦遊吳中時宣城貢師泰鄱陽周伯琦皆與之交後為鄮山書院山長洪武二年徴修元史授編修厯升侍講學士建文中擢太常少卿時黃子澄為正卿與定國難夙夜匪懈庚辰同董倫主考會試得胡廣吳溥胡濙輩皆為名臣是科同事者則右拾遺朱逢吉編修吳勤葉惠仲趙旭張秉彞及殿試讀卷則劉三吾也三吾以韓克忠覆試被害而葉惠仲則死于建文之難云贊曰中原之區徐土為關山奔以屹水迅而湍爰有髙君雲翔羽翰輔儲效命史炳如丹太常少卿兼侍讀學士林文林文字恆簡福建莆田人宣德庚戌進士及第授編修正統初預修宣廟實録轉修撰景泰中遷左諭德兼侍講預修厯代君鑒及方輿志進左庶子英宗復辟改尚寶卿兼侍講未幾擢學士以老乞休上謂李賢曰文老成忠厚宜留之成化初擢太常少卿兼侍讀學士卒贈禮部左侍郎子載為中書舍人廖道南曰豫觀莆陽文獻志稱文年逾七十神觀精爽安靜守禮所著淡菴集自成一家乃知渾朴和厚之氣尚存全璞也贊曰方壺之陽翠峨眇綿扶輿清淑代産仁賢若恆簡者抱朴守恬亹亹令名奕世猶傳太常少卿兼侍讀學士劉儼劉儼字宣化江西吉水人正統壬戌進士第一授修撰秩滿轉侍講未幾進右春坊大學士兼侍講預修厯代君鑒及寰宇通志成遷太常少卿兼侍讀學士景泰七年考順天鄉試大學士陳循之子瑛王文之子倫不第共誣儼欲置極典賴大學士髙榖救之朝廷卒直儼至是卒贈禮部侍郎諡文介敕有司為營葬祭倪文僖公哭之曰公挾其所得掉鞅文場蚤有聲于鄉解是以一出而魁天下多士景瞻衆山之宗岱入官詞林大放厥辭議論敷陳則又瓌異而光怪蓋才之藴於中也閎深而氣之畀於天者豪邁故每纂述刪定筆削繁簡適中而是非不貸嘗典文衡華胄被黜反交章而誣害卒之邪不干正志不少挫廷議允伸而聖明是賴使盡用其才也則可為士之矩矱國之蓍蔡奈何遽爾溘然不登耆艾恤典是加而諡為文介廖道南曰豫嘉靖甲午自徽召還是秋典順天文衡時當途如張閣老汪冡宰夏宗伯林司空諸子姪咸就試不第交構考官置之重憲既而仰賴宸斷洞燭羣情乃知劉文介之被誣不減于三吾也贊曰徑松不屈鷙鳥不朋人亦有言蹈道如奔惟彼文介力抗權幸孤忠直氣挽回文運眇豫小子時復仰髙實獲我心矢忠宣勞太常卿兼侍讀學士孫賢孫賢字舜卿河南把縣人景泰甲戌進士第一授修撰預修寰宇通志成轉侍講天順初改左中允侍東宫講讀憲宗即位遷太常少卿兼侍讀成化庚寅預修英宗實録進太常卿兼侍讀學士上疏請立皇太子且引疾乞休示無希覬意章並上上皆允之皇子立是為悼恭太子賢憤憤不樂而卒年五十四贈禮部侍郎兼翰林院學士廖道南曰夫宋儒有言君子為名譽而為善則其善必不誠人臣為利祿而效忠則其忠必不盡乃若孫君建請立儲其意善矣而又怏怏含憤無乃有為乎贊曰商山茹芝羽翼何人晉國乞塊衰絰寶親建儲公議辭爵虛名二者交戰罔恤厥身太常卿兼侍講學士吳節吳節字與儉江西安福人為諸生時偕劉球李紹王原受學于麻城鮑楚山宣德己酉鄉試第一明年登進士選庶吉士授編修秩滿轉侍講擢南京國子祭酒先是慈溪陳敬宗以嚴立教節濟之以寬諸士感化成化紀元召修英廟實録充副總裁官改太常卿兼侍講學士書成進太常卿兼學士節為人簡易質直信人不疑為文如其為人奉母至孝子逺舉進士為知府丘文莊公銘其墓曰三代盛時人行直道任其天真庸常是蹈世降氣漓存者幾希懿哉先生今之古人我存古心謂人皆然官非不崇學非不深求先生者當於其心廖道南曰豫觀吉安志稱節學博才雋己巳之變條陳時政多切利病及考文莊之銘亦然贊曰師道貴嚴臣道貴忠顯允吳君克嚴克忠時政之規國學之範金石有銘永世可鑒太常卿兼侍讀學士王獻王獻字惟臣浙江仁和人甫弱冠登景泰辛未進士改庶吉士授編修預修寰宇通志升修撰秩滿遷左諭德兼修撰庚寅充日講官壬辰進學士明年賜金帶丁酉追崇宣聖禮樂遣獻祭告闕里預修宋元綱目成升少詹事兼學士戊戌皇太子出閣日侍講讀預修文華大訓擢太常寺卿兼侍讀學士獻美風儀性頴敏書一過目即強記才思飄逸與大學士商輅有隙或造為曖昧不根之語以揚於內坐是不得致大位掌院事者十六年奄奄不得志而卒贈禮部右侍郎廖道南曰詩有之取彼讒人投畀豺虎何惡之深拒之嚴也堯舜堲讒説孔子惡佞人古之至聖必謹于兹乃若秃婦傳之譏不知獻有無而竟以此終其身可畏也哉贊曰青蠅貝錦詩詞所悲鄭聲紫色孔訓所埀英英王君兩浙之杰誰為此讒終不可雪侍講學士晉太常卿張芮張芮字文卿山西安邑人成化戊戌進士選庶吉士授檢討𢎞治初預修憲廟實録暨會典正德初復修孝廟實録轉修撰進侍講學士以憂歸所居近河東運司鹽商有訐奏者詞連及芮時劉瑾方欲以事裁抑儒臣遂坐纍出為鎮江府同知再謫兩浙鹽運司副使量遷處州府同知瑾誅始入為南京尚寶卿進太常卿致仕芮為人朴實其處僚友無忮害心然性嗜酒終日酣酗於種學績文非其好云廖道南曰豫嘗聞𢎞治間有造為俚語者曰一枚黃老五箇白丁時張芮武衛諸人頗倦于學故來人之譏如此及豫計偕乃識芮之子濂甫要亦朴野士也贊曰周官鹽人足供王貢漢室鹽官亦濟國用云何張君密邇解池人之謗也卒以兹違太常少卿兼侍講學士楊時暢楊時暢字知休陜西咸寧人户部尚書鼎之子也成化戊戌進士選庶吉士授檢討𢎞治紀元預修憲宗實録轉修撰充經筵講官改右贊善秩滿遷左諭德預修會典進侍講學士續修玉牒擢太常少卿兼職如故卒李文正公銘其墓有曰經業有門周彖羲爻史法有傳鉞貶華褒講幄敷陳藝苑甄擇有一于斯皆公遺則有笏堆床有里鳴珂仲叔之間孰與伯多嗚呼西涯可謂善名狀矣贊曰韓公諸子忠彥有聲范老諸子純仁惟貞世席箕裘時傳琬琰知休何人傳世丕顯藝學侍講學士沈度沈度字民則松江華亭人洪武中舉文學弗就謫雲南岷府聘之弗就都督瞿能延之家孰携至京師太宗命選善書者供事史館大學士楊溥薦之擢翰林典籍時解縉善真行書胡廣善行草書滕用亨善八分書王汝玉梁潛善真書度于其間獨稱上意補檢討轉修撰進侍講學士卒廖道南曰士之逢機構會鴻漸髙雲蛟騰逺海者曷可勝數若沈君者周旋滇嶠回翔燕甸卒能奮翼赤霄䇿名紫清其大篇長書遒徑清潤至今為詞林稱賞是亦髙士也贊曰鍾繇古𨽻逸少草書虎鳳飛躍蛟螭縈紆沈君妙絶時稱獨步榮名彌播玉堂之署侍講學士武周文武周文北平大興人𥘉以儒士明經入侍燕邸太宗龍潛時命入侍講永樂丙戌召至慰勞備至特命為侍講學士賜冠帶金織羅衣一􅊞上謂學士胡廣曰朕守藩時間暇喜觀易時王府官寮間亦有知者然未若武周文切實但所言亦有拘滯不流動處蓋易貴知變不失其宜古人隨時從道之説最為要妙亦在虛心玩之耳又曰為學不可不知易只內君子外小人一語人君用之功效不少次日周文入謝上憫其老乃命為侍講學士賜之休沐廖道南曰夫易之道廣矣大矣以言者尚辭以動者尚變以制器者尚象以卜筮者尚占是故程傳尚辭朱義尚占至於尚變尚象非聖人孰能知之文皇聖諭所謂易貴知變不失其宜者千古讀易之心法也不識周文曽有一于是乎贊曰易之道大匪聖弗知象之數幽匪神胡為確哉武君一言悟主老而益壯永終厥譽太常少卿兼侍讀學士金問金問字公素蘇州吳縣人永樂初以善書薦授司經正字侍皇太子于南京因進賀表文稽滯太宗怒曰朕不識金問何人乃得侍太子并黃淮楊溥王凱下獄十年仁宗登極釋之轉修撰每論時政多見采納宣德乙卯遷太常少卿兼侍讀學士正統癸亥調南京禮部侍郎卒廖道南曰豫觀姑蘇志謂問有逸才長於辭翰及考國史乃知其論時政多所禆益胡可以他流少之哉贊曰匪位之患惟名之昭匪名之患惟德之昭嗚呼公素藻翰飄飄致身廊署揚聲清朝斥鷃鵾鵬貽誚扶搖侍講學士拜祭酒劉鉉劉鉉字宗器直𨽻長洲人幼習楷書選翰林秀才中順天鄉試授中書舍人宣德初預修兩朝實録遷兵部主事正統初預修宣廟實録擢侍講曹鼐薦教庶吉士己巳進侍講學士景泰初充經筵官遣祀濟瀆壬申大學士髙榖薦改國子祭酒嚴條規淑諸生天順改元擢少詹事侍東宫講讀卒贈禮部左侍郎諡文恭子闕為大理丞廖道南曰豫觀姑蘇志稱鉉介特自持言行不茍楊文貞楊文定嘗過其所居名假菴甚湫隘稱為古人云贊曰朴不離俗介不附權嗜學不倦立志彌堅所居假菴廳不旋馬文貞文定稱賢不暇贈學贈學士諡文莭王禕王禕字子充浙江義烏人幼師同郡黃溍與宋濂胡翰為友博通羣書究極奧窔慕司馬遷之文探禹門泛錢塘涉江濤沂震澤久而有得乃趍淮徐訪鄒魯北遊燕趙嘗有薦為經筵國史者落落難合髙皇帝取婺州禕來謁乃撰平江西頌上覽而喜曰吾固知浙東有二儒者卿與宋濂爾學問之博卿不如濓才思之雄濂不如卿遂以為江南提舉司校理改侍禮郎兼引進使未幾同知南昌府事竣召還議郎位禮奏對忤旨復出判漳州府元年五月禕上疏略曰古帝王定天下成大業祈天永命為萬世無疆計者亦惟在乎修德而巳矣君德既修天眷彌固書皇天無私惟德是輔此之謂也修德之要有二曰忠厚以存心曰寬大以為政故成周以忠厚開國故能垂八百年之基漢以寬大為政故能成四百載之業陛下資不世出志大有為艱難十載大業已成周文武漢髙光蓋無讓焉今日所當急務者惟於忠厚寬大加之意而已二年六月召修元史以禕與宋濂為總裁官同知制誥兼國史編修三年以失朝故與濂俱降編修使招土畨未至復召還五年正月遣禕偕蘇成奉詔雲南禕諭梁王巴圖曰聖上聰明神聖新創大業是天命人心之所歸惟爾有衆僻在西南未洽聲教故遣使者來諭意今能亟奉版圖歸職方則尺地一民按堵如故髙官厚祿不爾吝也否則魚遊釡底終取夷滅時有元遺孽自立于沙漠者遣使托克托徴糧雲南且欲連師以拒我知禕説梁王欲屈以威禕罵曰天訖汝元命我明代之汝知爝火未盡敢與日月爭光乎顧謂梁王曰汝朝殺我大兵夕至矣遂被害時六年十二月二十四也卒年五十二子紳以十五年往求遺骸布政張紞參政王景紀其事建文中贈學士諡文節正統五年郡丞劉傑白其忠復贈學士諡忠文所著有華州集玉堂雜著續東萊大事記廖道南曰豫讀鄭濟所述子充行狀方孝孺所撰奠章諡議與夫像贊泫然興悲及考文集乃見宋景濂稱其文曰喬嶽長河摩日月蕩雲煙故其為文也波浪湧而魚龍張風霆流而雨雹集胡仲子亦曰雍容俯仰如冠冕佩玉馳騁分布如風雲蛇鳥可謂之知言也巳林孰贊曰惟公長身屹如山立人一望之儼不可即惟德執恆惟威弗畏朔漠孤臣英英義氣吁嗟公前有顔魯公公死使命與顔攸同太常寺卿兼翰林學士黃子澄黃子澄名湜以字行江西分宜人也少從邑人歐陽貞受易周與學受尚書清江梁寅受春秋博學負俊聲遊鄉校同舍避席嘗賦寒江把釣圖及枯梅詩人爭傳誦之洪武癸亥膺貢入太學明年定科舉之制中京闈鄉試第二乙丑會試第一廷對及第三人俱授翰林修撰尋兼春坊官侍東宫講讀纍遷太常卿皇太孫立諸王以叔父之尊多不遜服一日太孫坐東角門召子澄謂曰諸王尊屬各擁重兵何以制之子澄以漢平七國事為對太孫喜曰得先生謀吾無慮矣及即位兼翰林學士與齊泰皆用事時周齊湘代岷五府相繼煽動上一日朝罷召子澄問曰先生憶昔者東角門之言乎子澄曰不敢忘也然須密退與齊泰謀之泰欲先燕子澄曰周燕之母弟取周即翦燕之手足而燕因可圖也入白之上遂遣曹國公李景隆圍河南迫周王橚至京遷之雲南徙代王桂于邊湘王聞討狼狽闔宫焚死執齊王榑囚之京師岷王梗降為庶人雖聖德如燕藩亦捃托其事加誚讓朝廷以子澄為功褒賞之燕於是上書救周罪子澄指為連坐決意討之己卯三月命都督宋忠等北征七月靖難師起移檄大意言上崇信姦回離間骨肉遵太祖皇帝命奉天征討罪人既得則法周公以輔成王首以誅齊泰及子澄為名遂破雄縣懷來遣長興侯耿炳文禦之互有勝負子澄慮師老遂請上班師詔以李景隆為征敵大將軍率諸將兵凡百萬以往景隆自負有文武才子澄亦薦之上寵信特深甫行餞之江滸賜犀玉帶諸將各一賞賚無算子澄授以指畫景隆依違而巳子澄甚憂之未幾景隆攻北平城纍戰皆大敗奔還京師赦不治子澄哭諫曰景隆出師無紀度意在觀望不誅之以謝宗社何以懲將士不聽已而徐凱盛庸繼踵敗衄顧民等皆降子澄拊膺大慟曰大事去矣萬死不足贖誤國之罪乃賦一詩以志痛詩曰仗鉞曽登大將壇貂裘逺賜朔方寒出師無律真兒戲負國全身獨汝安論將每時悲趙括攘夷何日見齊桓尚方有劍憑誰借哭向蒼天幾墮冠聞者哀之尋用侍臣議詔謫子澄及齊泰于逺方以快敵意其實使之募兵也時諸將猶守淮南而文廟忽渡江矣潭王與李景隆開門迎附子澄出走蘇州語見姚善傳詔執之捕獲責問不服死之命赤其族同時被戮者俱號齊黃姦黨榜示天下一子逃難易姓為田經宥乃復姓家湖廣之咸寧孫表登進士廖道南曰古語有之犬各吠為其主言忠貞之不可二也荀息死晉召忽死齊固其分焉爾子澄與齊泰方孝孺謀國之臣安得不死難以自負于天哉贊曰舍生取義殺身成仁矧為人臣敢自謀身朝錯雖忠袁盎弗平天實為之人何為能直文淵閣侍讀學士改文學博士方孝孺方孝孺字希直一字希古浙江寧海人世家候城里族甚蕃父克勤元季隱居萬山中其學得諸晦庵而源流伊洛尤邃於易名振東南洪武初為濟寧知府有異政子三人孝孺其仲也至正丁酉始生之夕有木星墮於其所故其性資精敏絶倫長老見之皆咄咄嗟異方髫齔已善屬文雙眸炯炯如電讀書十行俱下日積寸許見典册所載聖賢名字或良將相形貌輒默記欣然有願慕之志鄉人呼為小韓子年十五侍父官遊濟上覽周公孔子故宅求七十子之遺迹慨然嘆曰使吾得遇孔子同時縱顔閔未可幾及其餘若樊遲冉求輩豈可多讓哉但恨今世無聖人不得所依歸耳曹國公李文忠一見竒之待以國士年二十翰林學士宋濂方在中朝以文章道德推重海內四方至其門者輻輳洪武八年克勤嘗絓誤繫京獄孝孺實從數言於朝請代父死既而謫戌江浦又上疏乞身代役皆不報克勤自獄中遣孝孺從濓遊孝孺持所為文上謁濓願受業濓一見大加賞異謂孝孺曰吾備位禁林數年來閲天下之士亦多矣而未有如子者子之文非當世之文也顧肯從我遊乎即日館置左右日與討論經史為文辭濓歸金華孝孺往來山中凡四年盡得其所學自是文章繼濓而起一時四方耆儒宿俊無不折輩行與之交而胡翰蘇伯衡葉見泰輩在衛東尤以文學知名當世每見孝孺未嘗不心服也會父坐空印事草疏將詣闕伸理而父沒扶喪歸葬濂尋徙蜀孝孺欲往省不可以文籲天願輸壽以延之濂嘗欲甥之而不果洪武壬戌上用學士吳沉揭樞薦詔徵至京入見陳説多稱旨上問樞曰孝孺孰與汝對曰十倍於臣錫之宴几稍欹必正而後坐上使人覘之喜其舉動端整謂皇太子曰此莊士也當老其才以輔汝試靈芝甘露論上每靣試舉子輒親定髙下注選至孝孺獨不注曰異人也吾不能用留為子孫光輔太平足矣皇太子素重其才召賜食東宫待以賓友孝孺既歸益杜門纂述不出會仇家得罪詞連孝孺有司例簿録家資械赴闕下太祖立命釋之孝孺奉祖母挈妻子家屬數口還鄉鄉人感歎以為盛已而家益貧窘無為資孝孺處之泰然不以為意嘗卧病絶糧家人告乏則曰聞古人有三旬九食者窮豈獨我哉吾嘗勝之矣授徒石鏡精舍若將終身二十五年復辟至上方重賞罰以其志存教化謂左右曰今非用孝孺時乃除漢中教授詔許水陸給舟車明年閏四月携妻子抵任山郡荒僻水土暴惡病癭痿者十之五士人鮮少雖五經亦無全者孝孺安之嗜蔬糲若飫萬鍾者每昧爽升席為諸生講解文義至暮嘵嘵無惰容由是山南人皆知向學二十七年春蜀獻王聞其賢以賓禮召見每有所陳論輒虛懷聽納恆曰方先生古之賢者也皇太孫聞其名癸酉丙子徴入典試應天府二十一年閏五月太祖大漸遺令必先召孝孺建文帝立馳驛召還將用為執政天下莫不以王佐責望旦夕成功而用事者忌之乃止遷翰林博士再遷侍講直文淵閣日侍左右備顧問德望素隆一時倚重尋定官制改侍讀學士為文學博士以孝孺為之是時館中徴集四方名士修太祖實録及類要後而永樂大典諸書皆命總裁監修諸儒于所長各互有得失至孝孺則卓然為一世儒宗朝廷大制作皆出其手靖難兵至京駐金川門外宫中悉自焚三十五年六月十四日孝孺聞之持斬衰服晝夜號哭太宗即位欲詔天下問左右誰可草詔者廷臣以孝孺對上遣人召之數次皆不至上乃使擁之入見孝孺既至見上益悲慟聲徹殿陛間左右禁之莫能止上親降榻慰諭之曰我家事耳先生何良苦又曰先生為我作詔命左右給以紙筆孝孺大批數字訖擲筆於地曰死即死耳詔不可草上大怒磔之夷其族孝孺臨終作絶命辭一章詞略曰天降亂離兮孰知其由姦臣得計兮謀國用猶忠臣發憤兮血泪交流以此徇君兮抑又何求嗚呼哀哉兮庶不我尤識與不識哀之如親戚年四十六復有旨收其妻鄭氏使者至其門已經死門人王稌輩收孝孺遺骸殯之聚寶山宗族坐死者八百四十七人廖道南曰豫聞諸黃泰泉云孝孺得家庭之教於書靡不通究常慨然以古聖賢自期以經綸天下為己任弱冠作深慮等論十九篇謂化民必自正家始又作宗儀十八篇雜誡三十八章識者已知其運用指設不凡矣在宋濂門為髙第子從濂後每私居念及或見其手迹或對客談及濂事輒涕泣既官漢中其家不能存言於蜀王嘗撫恤之墓在夔每舟次夔必往祭墓下慟哭移時乃去在建文時羽儀斯文隱然為當世重以蜀王嘗賜號正學齋世號正學先生所著有遜志齋集三十八卷大易枝辭周禮考次武王戒書注帝王基命録文統宋史要言諸書皆未傳孝孺文章似宋蘇軾雄邁奔放泝龍門狂流倒峽而氣不可遏發為論著醲粹都郁雖博極羣書而根據六經憲章孔孟宋程朱以前無有也濓嘗推之謂歐陽少師蘇長公姑置勿論自餘諸子與之角逐文藝之場未知孰為後先其後李賢亦稱孝孺師景濂議論波瀾類東坡之才而忠義之氣凛然不可犯景濂不能及世以為知言嗚呼忠義在宇宙文章在金石孝孺雖死猶生矣謝鐸贊曰我台之學考亭是師逮於愚庵實聞而知愚庵之子是曰正學益擴而充上泝伊洛如麟在藪如星在晨旁觀一世絶類離倫潛溪之門盡天下士驚叱起立謂莫敢比心實希聖自視欿然銘盤書紳雜誡惓惓家人有針宗儀有紀謂道之行莫先於此學以氣充磅礴四行孰顧孰思禍福死生歷宋迄元士氣益下有復古初不在作者贈學士諡文僖張益張益字士謙蘇州吳縣人𨽻籍江寧永樂乙未進士選庶吉士授中書舍人轉大理評事正統戊午改修撰於內府授內使書己巳進侍讀學士知制誥初與夏昶同年昶好寫竹偶見益所撰石渠賦遂絶筆不作文益見昶寫竹妙絶亦不復寫竹是歲七月額森入寇上命益同侍郎曹鼐扈從皆死于土木之難贈學士諡文僖官其子栩為大理寺評事倪文毅公銘其墓曰先生之文海澄山崇先生之德天和日融先生之節抱義死忠鳳臺之原龍江之東歸兮故鄉乘雲御風廖道南曰豫讀姑蘇志稱益為人清淳端謹文章圓熟對客數千言揮毫立就及觀國史乃知死于土木之難嗚呼悲哉贊曰不有居者誰守社稷不有行者誰扞牧圉六飛蒙塵羣凶傀傫臣則何知有死而已贈學士諡忠愍劉球劉球字永樂江西安福人永樂辛丑進士授禮部儀制主事時尚書胡濙草創禮儀悉球裁定遣使蜀府行喪禮餽遺一無所受正統初開經筵濙首薦之擢侍講預修宣廟實録成加五品俸己未京師大水球具陳治水事宜識者韙之辛酉麓川叛遣定西伯蔣貴征之球上言帝王馭夷狄必宥於其小而防於其大是故周伐崇不克則退而修德至玁狁孔熾則命南仲城朔方漢征南粵不利即罷兵以通好至胸奴陸梁則命魏尚守雲中夫以周漢之盛視崇粵如振稿耳乃釋不誅而惟急于北方蓋不窮兵于小敵以傷生靈惟防患于大冦以安中國故也今額森併吞諸部深謀入侵而思任發依阻山谷悔過乞降議者乃釋豺狼攻犬豕舍門庭之近圖邊徼之逺非計之得也臣愚以為麓川僻陋滅之不為武釋之不為怯特降璽書原其罪過固結木邦以為我援分屯金齒以離彼黨是即周漢修教賜告之意至於西北諸邊敵勢尚強戎馬尚衆宜謹烽堠修孰堡選將帥練士卒豐糧餉備器械勑總副諸將以巡視塞垣戒參贊文臣以區畫軍務是即周漢備禦城守之意疏上上命都御史陳智傳諭戒飭沿邊諸郡時太監王振擅權喜功開釁復大舉伐麓川癸亥夏雷震奉天門鴟吻詔求言球覆上言十事其一謂權柄不可下移振見之怒適編修董琳自陳願為太常卿疑球助之乃下詔獄錦衣指揮馬順拷訊備極慘刑球既死于非命舉朝慟之景帝監國都給事中王谹率百僚廷擊馬順暴其尸初編修鍾復與球議連名上疏其妻沮之後聞球死復怏怏卒其妻以告其子同故同卒為直臣死于諍云景泰初贈學士諡忠愍廖道南曰仲尼有言志士仁人無求生以害仁有殺身以成仁夫球之志於仁也務引君以當道慷慨激烈首論額森之必寇繼發王振之姧邪身就斧鑕殺身成仁卒之乘輿播遷中原板蕩雖野厭王振之肉廷暴馬順之尸竟亦何益嗚呼有天下者可以鑒矣彭韶贊曰於惟忠臣詞林之英沉思力學好義勇行大阿倒持執命腐刑乞戒履霜勿致堅氷不售蒙難乃險而傾褒贈官階節惠易名凛凛大節萬世猶生殿閣詞林記卷六
