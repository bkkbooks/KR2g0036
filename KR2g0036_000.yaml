body:
  text: 殿閣詞林記傳記類三總録之屬提要臣等謹按殿閣詞林記二十二卷明廖道南撰道南有楚紀已著録道南自正德辛已改庶吉士由編修厯官侍講學士在詞垣最久嫻習掌故因集詞林殿閣宫坊臺省諸臣舊事分類記載以成是編其例凡仕至華蓋武英諸殿者曰殿學文淵東閣者曰閣學兼六館者曰館學晉詹事者曰宫學屬春坊者曰坊學屬宏文者亦曰館學典成均者曰雍學升本院者曰卿學有節義者曰贈學擅書翰者曰藝學終始本院者曰院學大概仿列傳之例悉載其官階恩遇而事實亦附見焉自卷九以下標題皆作國子監祭酒黃佐侍講學士廖道南同編蓋道南採掇黃佐翰林記之文不沒所自猶有前輩篤實之遺今亦仍從舊本並存其名焉乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀殿閣詞林記原序夫詞林奚始也周官太史掌六典以辨法內史掌八柄以詔治凡學世子及學士必時上下交修內外交養所以為國本記者重且大也漢置太史令凡供奉承明待詔金馬者胥麗焉唐設學士兼講讀𢎞文闢館麗正創院集賢揮翰延英召對厥儀始備至宋則彬彬然盛矣祥符則建龍圖閣天禧則建天章閣嘉祐則建寶文閣元符則建顯謨閣大觀則建徽猷閣紹興則建敷文閣淳熙則建煥章閣慶元則建華文閣嘉泰則建寶謨閣寶慶則建寶章閣咸設學士以典宸章代王言可不謂重且大乎我高皇帝法周建官倣宋建閣初創翰林院以陶安宋濓為學士建華蓋諸殿以劉仲質全思誠為大學士又增設𢎞文館學士以劉基等為之左右春坊大學士以董倫等為之肆我成祖開文淵閣以解縉胡廣楊士竒等七人預機務仁宗復𢎞文館以楊溥陳繼王璡等五人備顧問纂修實録即右史紀動也表章寶訓即左史紀言也撰擬制誥演潤絲綸掄材祕省校藝禮闈即太史掌典內史掌柄也上而啓沃經筵贊襄聖神夾輔儲宫弼亮元良其所繫者至重且大非諸司儷也凡遇御殿慶成則令列坐于殿上御門視朝則令侍立于金牀是故大學士學士之官尤重且大焉我皇上紹帝王鴻烈光祖宗舊制肇御無逸殿則命大學士坐講錫宴豳風亭則命大學士坐饗陪祀土穀壇則命學士分直臨幸太學則命學士侍坐聽講明禋圜丘則命學士輪班視牲捧敕天門則親承玉音起草禁籞則密覲龍顔晉錫駢蕃宸慈豐渥誠百王所未有千載所罕遇也臣道南自弱冠登第首被簡注紓琚入館薦荷寵渥編摩史垣獻納講幄幾二十年顯陵甘露降則錫以寶罌泰畤卿雲見則貺以瑶篇徽土召還平臺祗謁則賚以金綺內殿捧主禁掖修書則勞以珍饌聖心淵軫御劄咨詢有同館諸儒所不獲與而特眷焉者昔李肇撰翰林志祗載唐事周必大撰玉堂記亦繫宋典臣道南嘗讀中祕書與泰泉黃君佐纂翰林雜記六冊暨屏居楚野恭撰興都通紀之暇乃列華蓋武英諸殿名曰殿學文淵東閣名曰閣學其兼六館者名曰館學晉詹事者名曰宫學長春坊者名曰坊學屬𢎞文者名曰館學典成均者名曰雍學繇寺署者名曰卿學死節義者名曰贈學擅翰書者名曰藝學而終始本院者則名之曰院學夫士知所以自重然後任天下之重矧兹秩至重且大矣乎自周以來上下數千載宅兹者又數百十其上不負天子下不負所學者一代不數人而已若夫知幾三長泰和四斷袁嵩五難荀悅五志闕一匪通儒也故曰宰相須用讀書人翰林當以宿儒處圖政本者允宜深長思焉嘉靖乙巳秋九月菊日廖道南序
